# Cloudflare Configuration
name = "ai-nexus"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat_v2"]

pages_build_output_dir = "dist"

[build]

[[r2_buckets]]
binding = "R2_ASSETS"
bucket_name = "ai-nexus-assets"

# P2 Adoption Telemetry -- Workers Analytics Engine sink (D-2026-0615-49 O-1/O-6 B-1).
# Binding name FROZEN = ADOPTION_TELEMETRY. Dataset names FROZEN here; they are
# NEVER constructed dynamically from any customer/route/secret at runtime.
# Production candidate dataset = free2aitools_adoption_v1; preview/canary =
# free2aitools_adoption_canary_v1. Declaring the binding does NOT enable
# telemetry: the write adapter is default-OFF (TELEMETRY_ENABLED unset != 'true')
# and TA1 wires NO call site, so no events are emitted by this PR.
[[analytics_engine_datasets]]
binding = "ADOPTION_TELEMETRY"
dataset = "free2aitools_adoption_v1"

# env.preview overrides ONLY the telemetry dataset (prod -> canary). Cloudflare
# Pages: r2_buckets + analytics_engine_datasets are NON-INHERITABLE -- once ANY
# is overridden in an env, EVERY required non-inheritable binding must be
# re-declared there or it is dropped. So R2_ASSETS is restated verbatim (serving
# must not break in preview) and only the dataset name changes to the canary.
# Guarded by the config-invariant test in tests/srs1/telemetry-isolation.test.ts.
[env.preview]
[[env.preview.r2_buckets]]
binding = "R2_ASSETS"
bucket_name = "ai-nexus-assets"
[[env.preview.analytics_engine_datasets]]
binding = "ADOPTION_TELEMETRY"
dataset = "free2aitools_adoption_canary_v1"
