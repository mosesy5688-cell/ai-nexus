# V27.98 FALLBACK HIT-RATE PROBE — READ-ONLY. workflow_dispatch only, never
# auto-triggered. Pairs with scripts/factory/probe-fallback-hitrate.js. Restores
# prod meta-NN.db from R2 (state/vfs-data/, written by factory-upload.yml's
# V27.51 backup step), scans all shards, and reports what the page resolver's
# +/-2 adjacent-shard fallback uniquely resolves (fallback-only %) vs. the
# per-candidate primary probe — the evidence gate for safely dropping the +/-2
# fallback. No R2 mutation. Delete this workflow + script once the decision ships.
name: V27.98 - Query Fallback Hit-Rate (Probe)

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  probe:
    name: Probe fallback hit-rate from prod meta-NN.db
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/factory-setup
        with:
          aggressive-disk-cleanup: 'false'
          with-rust-ffi: 'false'
      - name: Restore prod meta-NN.db from R2 (read-only)
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          mkdir -p output/data
          node scripts/factory/r2-workflow-cli.js restore-dir state/vfs-data/ output/data/
      - name: Verify meta-NN.db present
        run: |
          META_COUNT=$(find output/data -name 'meta-*.db' 2>/dev/null | wc -l)
          echo "Restored ${META_COUNT} meta-NN.db shards"
          if [ "$META_COUNT" -lt 1 ]; then
            echo "::error::No meta-NN.db restored from R2 state/vfs-data/. Cannot probe."
            exit 1
          fi
      - name: Run fallback hit-rate probe
        run: node scripts/factory/probe-fallback-hitrate.js
