name: V6.1 Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # L1: Iron Gates - Constitution & Lint
  iron-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: CES Check (Constitution)
        run: npm run ces-check

      # C4 (Commercialization-Constitution): "Sponsors Never Influence
      # Structure". Static gate fails if any payment signal reaches a
      # ranking/scoring/edge serve path. No npm deps -- pure Node, runs early.
      - name: C4 Anti-Arbitration Static Gate
        run: node scripts/check-c4-anti-arbitration.mjs

      # P2 Adoption Telemetry (D-2026-0615-49 O-5, MANDATORY/BLOCKING):
      # no-read + binding-confinement static gate. Fails if the frozen telemetry
      # binding is read by any serve/scoring/ranking/projection/MCP path, if the
      # emitter accepts a Request/URL/Headers param, or if the binding is named
      # outside its textual allowlist. The confinement scan is genuinely repo-wide
      # (derived from git ls-files), so this workflow itself must NOT name the bare
      # binding token. Anti-vacuity + fail-closed self-proof. No npm deps -- pure Node.
      - name: Telemetry No-Read + Binding-Confinement Static Gate
        run: node scripts/check-telemetry-no-read.mjs

  # L2: Unit Logic (Vitest) — this job IS the SRS-1 Tier-1 BLOCKING invariant gate.
  #
  # SRS-1 (the hermetic, deterministic invariant suite — central registry at
  # tests/srs1/INVARIANT_REGISTRY.md) runs here: vitest.config.ts collects
  # **/*.{test,spec}.ts, so both the reused per-fix regressions (tests/unit/*)
  # and the new SRS-1 invariants (tests/srs1/*) execute in this required job.
  # A red SRS-1 assertion fails `unit-test` and blocks the merge. Do NOT narrow
  # the vitest scope to exclude tests/srs1/ — it would silently drop the Tier-1
  # gate. (SRS-2A is Tier-2 / informational / non-blocking, in its own workflow.)
  unit-test:
    runs-on: ubuntu-latest
    needs: iron-gates
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install Dependencies (Root)
        run: npm ci

      # C2-LOCK (D-2026-0702-228/230 + D-2026-0703-236/237 + D-2026-0704-245): the
      # .mjs node:test suites are NOT collected by vitest (which globs only
      # **/*.{test,spec}.ts). Run them EXPLICITLY as a required gate with the EXACT
      # file list — the satellite-registry contract test, the D-219 core handoff test
      # (the anti-vacuity matrix depends on the CORE test catching a satellite role
      # added to the core closed set), the D-236/D-237 harvest R2 source-authority
      # contract test AND the D-245 vfs-pack -> vfs-derived + vfs-derived -> upload R2
      # handoff verifier contract test. No wildcard, no unrelated tests, no
      # continue-on-error: any red fails this job.
      - name: Run node --test factory handoff suites (satellite + core + harvest + vfs-derived, blocking)
        run: node --test scripts/factory/aggregate-handoff.test.mjs scripts/factory/satellite-registry-handoff.test.mjs scripts/factory/harvest-authoritative-handoff.test.mjs scripts/factory/vfs-derived-handoff-manifest.test.mjs

      - name: Run Vitest (Root) — Tier-1 SRS-1 invariant suite (blocking)
        run: npx vitest run --coverage

      # D-127 (Founder B3/B5, BLOCKING): the @free2aitools/sdk workspace is NOT
      # collected by the root vitest run (packages/** is excluded so root SRS-1
      # does not double-collect SDK tests). Verify it explicitly INSIDE this same
      # required `unit-test` context — build (tsc), typecheck (tsc --noEmit), and
      # the SDK's own vitest suite. Each command's exit code is honored: any SDK
      # build/typecheck/test failure fails THIS required job. No continue-on-error,
      # no swallowed exits, no separate check name. The SDK live-smoke test is
      # network-gated (skipped unless SDK_LIVE_SMOKE=1) so this stays hermetic.
      - name: Verify @free2aitools/sdk workspace (build + typecheck + test)
        run: |
          npm run build --workspace @free2aitools/sdk
          npm run typecheck --workspace @free2aitools/sdk
          npm test --workspace @free2aitools/sdk
