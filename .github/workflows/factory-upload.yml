# Factory 4/4 - Finalize V14.6
# Consolidated Stage 3.5 + 4.0
# 
# Triggers: workflow_run from Aggregate, or manual dispatch
# Inputs: factory-output artifact/cache from Aggregate stage
# Jobs: Relations, Knowledge Mesh, RSS, and Final R2 Upload

name: Factory 4/4 - Finalize

permissions:
  actions: write
  contents: read
  id-token: write

on:
  workflow_run:
    workflows: ["Factory 3/4 - Aggregate"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Aggregate workflow run ID (3/4 upstream)'
        required: false
        type: string
      # V27.52: force rebuild even when cycle-scoped cache hit. Pass when shipping
      # code changes that affect heavy-compute output (pack-db.js / master-fusion.js)
      # — cycle-cache restore would yield stale data otherwise.
      force_fresh:
        description: 'Force rebuild all compute (ignore cycle-scoped cache restores)'
        required: false
        type: boolean
        default: false

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_BUCKET: ai-nexus-assets
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  NODE_OPTIONS: '--max-old-space-size=6144'
  ENABLE_R2_BACKUP: 'true'
  # Embedding-CODE version token. BUMP this whenever the embedding logic changes
  # (model name, normalization, or int8 quantization in pack-db.js) so cached
  # vectors are busted. pack-db.js only computes embeddings for ids NOT already in
  # the restored shards, so a code change would otherwise leave every existing
  # vector STALE forever (the #2145-class stale-artifact bug for data). Bumping
  # this token is the supported way to force a full re-embed; force_fresh does NOT
  # (a cold 551K recompute exceeds the 330-min job cap — see #2150 revert below).
  EMBED_CODE_VERSION: 'v1'
  # P3-EVIDENCE-1 STAGE-B: VFS-pack-CODE version token. BUMP this whenever the code
  # that produces the packed meta-NN.db rows changes (row-builders.js / pack-db.js)
  # so the intra-4-4-vfs-pack cache cannot be REUSED across incompatible packer code.
  # A cache restored under an OLD version (or with a missing/mismatched sentinel) MUST
  # NOT satisfy skip-detect — pack-db.js re-runs and rewrites the rows. Bumped to
  # citation-authority-v2 for the row-builders citation re-derivation (final authority
  # at the pack chokepoint): a re-run on the prior cache would otherwise skip pack-db
  # and ship the stale raw-citation rows. Scope is the SQLite rows ONLY — the fused
  # entities + warm embedding caches are intentionally NOT busted (their keys are
  # untouched), so only the packed rows rebuild while fusion/embeddings stay warm.
  VFS_PACK_CODE_VERSION: 'citation-authority-v2'

jobs:
  check-upstream:
    name: Check Upstream
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      upstream-run-id: ${{ steps.get-id.outputs.id }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
      - name: Verify Upstream Conclusion
        if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion != 'success' }}
        run: |
          echo "ERROR: Upstream workflow '${{ github.event.workflow_run.name }}' failed with conclusion '${{ github.event.workflow_run.conclusion }}'."
          exit 1
      - name: Get ID
        id: get-id
        run: |
          AGGREGATE_RUN_ID=${{ inputs.run_id || github.event.workflow_run.id }}
          if [ -z "$AGGREGATE_RUN_ID" ] || [ "$AGGREGATE_RUN_ID" == "null" ]; then
            echo "Finding latest successful Aggregate run on main..."
            AGGREGATE_RUN_ID=$(gh run list --workflow factory-aggregate.yml --branch main --status success --limit 1 --json databaseId --jq '.[0].databaseId' | tr -d '[:space:]')
          fi
          echo "id=$AGGREGATE_RUN_ID" >> $GITHUB_OUTPUT

  mesh-baking:
    name: Mesh Baking
    needs: check-upstream
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/factory-setup
        with:
          aggressive-disk-cleanup: 'false'
          with-rust-ffi: 'true'
      - name: R2 Fallback for Rust FFI
        continue-on-error: true
        run: |
          FOUND=$(find rust -name '*.node' 2>/dev/null | wc -l)
          [ "$FOUND" -lt 9 ] && node scripts/factory/r2-workflow-cli.js restore-rust-ffi || true
      - name: Restore Complete Cycle Output from Cache
        id: cache-output-mesh
        uses: actions/cache/restore@v5
        with:
          path: output/
          key: cycle-${{ needs.check-upstream.outputs.upstream-run-id }}-output
          # Cycle-SCOPED restore-key: a bare `cycle-` prefix could restore a
          # DIFFERENT cycle's output (or a wrong-shape -shards/-harvest cache) into
          # output/ on an exact-key miss. Scoping to this aggregate run-id keeps the
          # intended same-cycle -output fallback while rejecting foreign cycles. True
          # misses fall to the R2 state/cycle-output/ fallback below.
          restore-keys: cycle-${{ needs.check-upstream.outputs.upstream-run-id }}-
      # V25.8.3: R2 fallback if cache miss
      - name: R2 Fallback for Cycle Output
        if: steps.cache-output-mesh.outputs.cache-hit != 'true'
        run: |
          node scripts/factory/r2-workflow-cli.js restore-dir state/cycle-output/ output/ --strict
      # V27.52: restore cycle-scoped baked cache (per-dispatch key + cycle-prefix restore-keys).
      # Skipped on force_fresh so compute is forced.
      - name: Restore Baked Profile Shards from Cache (V27.52)
        id: cache-baked-restore
        if: ${{ !inputs.force_fresh }}
        uses: actions/cache/restore@v5
        with:
          # PR-D0b: restore the evidence-dict sidecar on the same key as the shards.
          path: |
            output/cache/mesh/profile-shards/
            output/cache/mesh/profile-evidence-dict.json.zst
          key: intra-4-4-baked-${{ needs.check-upstream.outputs.upstream-run-id }}-${{ github.run_id }}
          restore-keys: |
            intra-4-4-baked-${{ needs.check-upstream.outputs.upstream-run-id }}-
      # V27.52: file-existence detection (cache-hit output false-negatives on restore-keys partial match).
      - name: Detect baked output present
        id: detect-baked
        run: |
          COUNT=$(find output/cache/mesh/profile-shards -type f 2>/dev/null | wc -l)
          if [ "$COUNT" -ge 100 ]; then
            echo "skip_compute=true" >> "$GITHUB_OUTPUT"
            echo "[V27.52] ${COUNT} baked profile shards present → skip Bake compute"
          else
            echo "skip_compute=false" >> "$GITHUB_OUTPUT"
            echo "[V27.52] ${COUNT} baked profile shards present (need ≥100) → fresh Bake"
          fi
      - name: Bake atomized Mesh Profiles
        if: steps.detect-baked.outputs.skip_compute != 'true'
        env:
          CACHE_DIR: ./output/cache
        run: node scripts/factory/mesh-profile-baker.js
      # V27.52: Save uses per-dispatch unique key (cycle+run_id); cycle-prefix restore-keys
      # gives soft hit on next dispatch. Save runs ONLY when fresh compute happened.
      - name: Save Baked Profile Shards to Cache
        if: success() && steps.detect-baked.outputs.skip_compute != 'true'
        uses: actions/cache/save@v5
        with:
          # PR-D0b: carry the baked evidence-dict sidecar (mesh-profile-baker.js:188)
          # on the SAME key as the shards. Without it, a cache-restored canary job
          # (verify-db.js -> loadBakedDict) sees null -> ui_related_mesh reverse-edge
          # refs resolve as gaps -> the verification bake UNDER-REPORTS coverage.
          path: |
            output/cache/mesh/profile-shards/
            output/cache/mesh/profile-evidence-dict.json.zst
          key: intra-4-4-baked-${{ needs.check-upstream.outputs.upstream-run-id }}-${{ github.run_id }}
      - name: Backup Profile Shards to R2
        if: success() && steps.detect-baked.outputs.skip_compute != 'true'
        run: |
          node scripts/factory/r2-workflow-cli.js backup-dir output/cache/mesh/profile-shards/ state/mesh-profile-shards/
          # PR-D0b: back up the baked evidence-dict sidecar alongside the shards so the
          # R2-fallback restore (canary jobs) recovers it when the GHA cache misses.
          node scripts/factory/r2-workflow-cli.js backup-file output/cache/mesh/profile-evidence-dict.json.zst state/mesh-profile-dict/profile-evidence-dict.json.zst

  # V27.40: master-fusion was a 1h20m monolithic job — split into compute + persist.
  # R2 backup failure no longer redoes 1h20m fusion.
  master-fusion-compute:
    name: Master Fusion (Compute)
    needs: [mesh-baking, check-upstream]
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/factory-setup
        with:
          aggressive-disk-cleanup: 'true'
          with-rust-ffi: 'true'
      - name: R2 Fallback for Rust FFI
        continue-on-error: true
        run: |
          FOUND=$(find rust -name '*.node' 2>/dev/null | wc -l)
          [ "$FOUND" -lt 9 ] && node scripts/factory/r2-workflow-cli.js restore-rust-ffi || true
      - name: Restore Base Output from Cache
        id: cache-output-fusion
        uses: actions/cache/restore@v5
        with:
          path: output/
          key: cycle-${{ needs.check-upstream.outputs.upstream-run-id }}-output
          # Cycle-SCOPED restore-key: a bare `cycle-` prefix could restore a
          # DIFFERENT cycle's output (or a wrong-shape -shards/-harvest cache) into
          # output/ on an exact-key miss. Scoping to this aggregate run-id keeps the
          # intended same-cycle -output fallback while rejecting foreign cycles. True
          # misses fall to the R2 state/cycle-output/ fallback below.
          restore-keys: cycle-${{ needs.check-upstream.outputs.upstream-run-id }}-
      - name: R2 Fallback for Base Output
        if: steps.cache-output-fusion.outputs.cache-hit != 'true'
        run: |
          node scripts/factory/r2-workflow-cli.js restore-dir state/cycle-output/ output/
      # V25.13: R2 fallback completeness gate (P3 fail-fast).
      # Mirrors 3/4 G1 — checks 3/4-actual outputs (satellite results in
      # output/cache/). Registry shards live in cache/ (separate cache key),
      # not output/cache/shards/. reports/index.json.zst is 4/4 vfs-packing's job.
      - name: Verify Cycle Output Completeness
        run: |
          set -e
          MISSING=()
          [ ! -f "output/cache/knowledge/index.json.zst" ] && MISSING+=("knowledge/index.json.zst")
          [ ! -f "output/cache/trending.json.zst" ] && MISSING+=("trending.json.zst")
          RANKINGS_COUNT=$(ls output/cache/rankings 2>/dev/null | wc -l)
          ARTICLES_COUNT=$(ls output/cache/knowledge/articles 2>/dev/null | wc -l)
          [ "$RANKINGS_COUNT" -lt 5 ] && MISSING+=("rankings (got $RANKINGS_COUNT, need ≥5)")
          [ "$ARTICLES_COUNT" -lt 10 ] && MISSING+=("knowledge articles (got $ARTICLES_COUNT, need ≥10)")
          if [ "${#MISSING[@]}" -gt 0 ]; then
            echo "::error::R2 cycle-output incomplete (P3 violation). Refusing to use partial state."
            for m in "${MISSING[@]}"; do echo "  - $m"; done
            echo "Action: trigger fresh 3/4 to rewrite R2 cycle-output."
            exit 1
          fi
          echo "✅ Cycle output complete: $ARTICLES_COUNT articles, $RANKINGS_COUNT rankings"
      - name: Restore Baked Profile Shards from Cache
        id: cache-baked
        uses: actions/cache/restore@v5
        with:
          path: output/cache/mesh/profile-shards/
          key: intra-4-4-baked-${{ needs.check-upstream.outputs.upstream-run-id }}-${{ github.run_id }}
          restore-keys: |
            intra-4-4-baked-${{ needs.check-upstream.outputs.upstream-run-id }}-
      # V27.52: file-existence (cache-hit false-fires on restore-keys partial match)
      - name: R2 Fallback for Profile Shards
        run: |
          if find output/cache/mesh/profile-shards -type f 2>/dev/null | head -1 | grep -q .; then
            echo "✅ Baked profile shards present from cache"
          else
            echo "⚠️ Baked profile shards missing — falling back to R2"
            node scripts/factory/r2-workflow-cli.js restore-dir state/mesh-profile-shards/ output/cache/mesh/profile-shards/
          fi
      - name: Restore Global Registry Cache
        id: cache-global-registry
        uses: actions/cache/restore@v5
        with:
          path: |
            cache/global-registry.json.zst
            cache/registry/
          key: global-registry-${{ needs.check-upstream.outputs.upstream-run-id }}
          restore-keys: global-registry-
      # V27.53: Purge legacy .json.gz ghost files (mirror 3/4's V25.8.3 protection).
      # cache restore-keys partial match may pull pre-V25.8.3 era caches that contain
      # legacy gzip shards. registry-loader.js rejects .json.gz (line 34), so leaving
      # them in place is harmless — but explicit purge makes diag log cleaner and
      # prevents future confusion.
      - name: Purge Legacy Registry Ghosts (V27.53)
        run: |
          if [ -d "cache/registry" ]; then
            GHOST_COUNT=$(find cache/registry -name 'part-*.json.gz' -o -name 'part-*.json' 2>/dev/null | wc -l)
            if [ "$GHOST_COUNT" -gt 0 ]; then
              echo "🧹 Purging ${GHOST_COUNT} legacy .json.gz ghost files from cache/registry/"
              find cache/registry -name 'part-*.json.gz' -delete 2>/dev/null || true
              find cache/registry -name 'part-*.json' -delete 2>/dev/null || true
            fi
            BIN_COUNT=$(find cache/registry -name 'part-*.bin' 2>/dev/null | wc -l)
            echo "[V27.53] cache/registry: ${BIN_COUNT} .bin shards, 0 legacy ghosts"
          fi
      # V27.53: Ensure registry .bin shards present — if GHA cache miss AND restore-keys
      # didn't catch a usable cache, restore from R2 state/registry/ (populated by 3/4's
      # new Backup Registry Shards to R2 step). Mirror 3/4's V26.9 fallback pattern.
      # Prevents master-fusion 0-entities scenario when GHA cache evicts mid-cycle.
      - name: Ensure Registry Shards Present (V27.53)
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          BIN_COUNT=$(find cache/registry -name 'part-*.bin' 2>/dev/null | wc -l)
          if [ "$BIN_COUNT" -ge 100 ]; then
            echo "✅ Registry: ${BIN_COUNT} .bin shards present (no R2 restore needed)"
          else
            echo "⚠️ Only ${BIN_COUNT} .bin shards (need ≥100). Restoring from R2 state/registry/..."
            mkdir -p cache/registry
            # Try V27.53 fresh path (state/registry/) first
            node scripts/factory/r2-workflow-cli.js restore-dir state/registry/ cache/registry/ || echo "⚠️ state/registry/ unavailable (3/4 V27.53 may not have run yet)"
            # Also try monolith download
            node scripts/factory/r2-workflow-cli.js restore-file state/global-registry.json.zst cache/global-registry.json.zst 2>/dev/null || true
            # Last-resort: V25.8 bootstrap script (handles legacy meta/backup/registry/ + format mismatch)
            BIN_COUNT=$(find cache/registry -name 'part-*.bin' 2>/dev/null | wc -l)
            if [ "$BIN_COUNT" -lt 100 ]; then
              echo "⚠️ Still ${BIN_COUNT} after state/ restore — invoking r2-registry-restore.js for legacy/bootstrap paths"
              node scripts/factory/lib/r2-registry-restore.js || echo "⚠️ Bootstrap restore failed"
            fi
            BIN_COUNT=$(find cache/registry -name 'part-*.bin' 2>/dev/null | wc -l)
            echo "[V27.53] Final: ${BIN_COUNT} .bin shards in cache/registry/"
            if [ "$BIN_COUNT" -lt 100 ]; then
              echo "::error::Registry restore failed all paths (cache + state/registry/ + bootstrap). master-fusion will fail with 0 entities."
              exit 1
            fi
          fi
      - name: Align Registry Cache for Fusion
        run: |
          mkdir -p output/cache/registry
          [ -f "cache/global-registry.json.zst" ] && cp cache/global-registry.json.zst output/cache/ || true
          [ -d "cache/registry" ] && cp -r cache/registry/* output/cache/registry/ 2>/dev/null || true
          echo "✅ Registry aligned: $(ls output/cache/registry/ 2>/dev/null | wc -l) shards"
      # V27.52: restore cycle-scoped fused cache for re-dispatch reuse. S1-BR: EXACT
      # key only — the restore-keys prefix is removed so a re-dispatch can never pull a
      # FOREIGN-attempt's fused output (identity-ambiguous) and skip recompute on it. An
      # exact-key miss simply recomputes (the >=400 gates + handoff re-validate fresh).
      - name: Restore Fused Cache (V27.52)
        id: cache-fused-restore
        if: ${{ !inputs.force_fresh }}
        uses: actions/cache/restore@v5
        with:
          path: output/cache/fused/
          key: intra-4-4-fused-${{ needs.check-upstream.outputs.upstream-run-id }}-${{ github.run_id }}
      - name: Detect fused output present
        id: detect-fused
        run: |
          # Reuse Verify Shard Count threshold (400 shards) so skip only when sentinel-passing data is present.
          FUSED_COUNT=$(find output/cache/fused -name 'part-*.json.zst' 2>/dev/null | wc -l)
          if [ "$FUSED_COUNT" -ge 400 ] && [ -f output/cache/fused/.complete ]; then
            echo "skip_compute=true" >> "$GITHUB_OUTPUT"
            echo "[V27.52] ${FUSED_COUNT} fused shards + sentinel present → skip Master Fusion compute"
          else
            echo "skip_compute=false" >> "$GITHUB_OUTPUT"
            echo "[V27.52] ${FUSED_COUNT} fused shards present (need ≥400 + .complete sentinel) → fresh Fusion"
          fi
      - name: Execute Master Fusion
        if: steps.detect-fused.outputs.skip_compute != 'true'
        env:
          CACHE_DIR: ./output/cache
          ARTIFACT_DIR: ./output/cache/registry
          AES_CRYPTO_KEY: ${{ secrets.AES_CRYPTO_KEY }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
          # §18.22.4: --unhandled-rejections=strict surfaces silent promise
          # rejections instead of letting them swallow the process. RUST_BACKTRACE
          # ensures the next NAPI panic leaves an unwind trace in stderr.
          NODE_OPTIONS: '--max-old-space-size=8192 --expose-gc --unhandled-rejections=strict'
          RUST_BACKTRACE: full
        # §18.22.4: explicit exit-code capture. The previous `run: node …`
        # form returned green when the field run silently aborted at part-087.
        run: |
          set -uo pipefail
          node scripts/factory/master-fusion.js
          rc=$?
          echo "[GHA] master-fusion.js exit code: ${rc}"
          if [ "${rc}" != "0" ]; then
            echo "::error::Master Fusion exited with code ${rc}"
            exit "${rc}"
          fi
      - name: Verify Master Fusion Sentinel
        # §18.22.4: file-existence check is the ONLY mechanism that survives
        # native crashes that bypass Node's 'exit' event. master-fusion.js
        # writes .complete only after its post-loop assertion passes.
        run: |
          set -euo pipefail
          if [ ! -f output/cache/fused/.complete ]; then
            echo "::error::Master Fusion did not produce .complete sentinel — silent early-exit suspected"
            ls -la output/cache/fused/ 2>/dev/null || echo "(fused/ dir missing)"
            exit 1
          fi
          echo "[GHA] Master Fusion sentinel verified:"
          cat output/cache/fused/.complete
      # V25.13: Absolute entity count gate (P6 fail-fast).
      # Sentinel only checks "processed == expected shards" — passes even if
      # input was a truncated cycle-output. This adds an absolute lower bound
      # against historical baseline (~480K). Prior catastrophic run produced
      # 301K (38% drop) and pack-db halted 1+ hour later at FNI=77% zero
      # sanity check — wasted 1+ hour. Fail HERE instead.
      - name: Verify Master Fusion Shard Count
        # V25.13: master-fusion.js:134 writes `part-NNN.json.zst` per shard (~488 normal).
        # Each shard contains ~1000 entities. Threshold 400 shards ≈ 400K entities.
        # Sentinel `.complete` written only if processedCount >= expectedCount
        # (fusion-completion-guard.js), so existence implies no silent-truncate.
        run: |
          set -e
          SHARD_COUNT=$(find output/cache/fused -name 'part-*.json.zst' | wc -l)
          THRESHOLD=400
          # Sentinel content (already verified to exist by prior step)
          SENTINEL_PROCESSED=$(node -e "try{const j=require('fs').readFileSync('output/cache/fused/.complete','utf8');process.stdout.write(String(JSON.parse(j).processedShards||0))}catch{process.stdout.write('0')}")
          echo "[GHA] Master Fusion: $SHARD_COUNT files in fused/, sentinel.processedShards=$SENTINEL_PROCESSED"
          if [ "$SHARD_COUNT" -lt "$THRESHOLD" ] || [ "$SENTINEL_PROCESSED" -lt "$THRESHOLD" ]; then
            echo "::error::Master Fusion shard count below threshold ($SHARD_COUNT files / $SENTINEL_PROCESSED reported < $THRESHOLD)."
            echo "Refusing to save partial fused-entities.tar that would propagate to vfs-packing → bad FNI → broken cycle."
            echo "Likely cause: incomplete cycle-output input (R2 state stale, or 3/4 produced fewer than expected)."
            exit 1
          fi
          echo "✅ Shard gate passed: $SHARD_COUNT files / $SENTINEL_PROCESSED reported ≥ $THRESHOLD (≈$((SHARD_COUNT * 1000)) entities)"
      # V27.40 end of master-fusion-compute. V27.52: per-dispatch unique save key
      # gated on detect-fused (mirrors Compute condition — fires when fresh compute
      # ran, skips when restore-keys hit and Verify gates already validated cached data).
      # S1-BR: generate the producer manifest BEFORE the cache save so the GHA
      # fast-path cache carries manifest.json (lets consumers verify the GHA hit
      # against the descriptor without always falling back to exact staging). Runs
      # after the .complete + >=400 gates, so the carrier set is sentinel-passing.
      - name: Generate Fused Handoff Manifest (S1-BR)
        if: success()
        env:
          HANDOFF_UPSTREAM_RUN_ID: ${{ needs.check-upstream.outputs.upstream-run-id }}
          HANDOFF_FACTORY_RUN_ID: ${{ github.run_id }}
          HANDOFF_PRODUCER_ATTEMPT: ${{ github.run_attempt }}
          HANDOFF_HEAD_SHA: ${{ github.sha }}
        run: node scripts/factory/fused-handoff-manifest.js generate output/cache/fused/ output/cache/fused/manifest.json
      - name: Save Fused Entities to Cache
        if: success() && steps.detect-fused.outputs.skip_compute != 'true'
        uses: actions/cache/save@v5
        with:
          path: output/cache/fused/
          key: intra-4-4-fused-${{ needs.check-upstream.outputs.upstream-run-id }}-${{ github.run_id }}
      # S1-BR EXACT-PRODUCER R2 HANDOFF — Compute produces a DURABLE, run +
      # PRODUCER-attempt scoped, content-verified handoff to R2 so Persist never
      # depends on the LRU-evicted GHA fused cache (the root cause: the cache
      # carrying output/cache/fused/ was unretrievable at Persist restore time,
      # forcing a fail-closed empty-state guard). Runs AFTER the .complete + >=400
      # gates above, so output/cache/fused/ is sentinel-passing. PRODUCER attempt =
      # github.run_attempt OF THIS compute job (the attempt that produced the set).
      # Order: (1) local manifest -> (2) ALL data + .complete + manifest.json to the
      # attempt-scoped staging prefix (manifest LAST) -> (3) handoff.json descriptor
      # LAST OF ALL at the run level. Fail-loud on any step (no empty handoff).
      - name: Produce Exact-Producer R2 Handoff (S1-BR)
        if: success()
        env:
          HANDOFF_UPSTREAM_RUN_ID: ${{ needs.check-upstream.outputs.upstream-run-id }}
          HANDOFF_FACTORY_RUN_ID: ${{ github.run_id }}
          HANDOFF_PRODUCER_ATTEMPT: ${{ github.run_attempt }}
          HANDOFF_HEAD_SHA: ${{ github.sha }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          set -euo pipefail
          UP="${HANDOFF_UPSTREAM_RUN_ID}"
          RUN="${HANDOFF_FACTORY_RUN_ID}"
          ATT="${HANDOFF_PRODUCER_ATTEMPT}"
          RUN_PREFIX="state/_handoff/fused/${UP}/${RUN}"
          export STAGING="${RUN_PREFIX}/attempt-${ATT}/"
          # (1) local manifest over the carrier set (part-*.json.zst + .complete).
          node scripts/factory/fused-handoff-manifest.js generate output/cache/fused/ output/cache/fused/manifest.json
          # (2) upload ALL data objects (part-*.json.zst + .complete) FIRST, EXCLUDING
          # manifest.json so it is uploaded strictly LAST.
          node scripts/factory/r2-workflow-cli.js backup-dir output/cache/fused/ "${STAGING}" --extensions=.json.zst,.complete
          # (2a) explicitly upload the .complete sentinel so it never depends on the
          # backup-dir extension matcher (Rust FFI walkDirWithMd5 is unverified for the
          # dotfile; JS fallback uses endsWith which is fine). Idempotent re-upload.
          node scripts/factory/r2-workflow-cli.js upload-file output/cache/fused/.complete "${STAGING}.complete"
          # (2b) manifest.json LAST (after every data object is durable).
          node scripts/factory/r2-workflow-cli.js upload-file output/cache/fused/manifest.json "${STAGING}manifest.json"
          # (3) run-scoped descriptor handoff.json LAST OF ALL. Points ONLY at the
          # CURRENT upstream + CURRENT factory run + this producer attempt — no list,
          # no prefix guess, no previous-run fallback.
          export MANIFEST_SHA=$(node -e "const c=require('crypto'),f=require('fs');process.stdout.write(c.createHash('sha256').update(f.readFileSync('output/cache/fused/manifest.json')).digest('hex'))")
          export SET_SHA=$(node -e "const m=require('./output/cache/fused/manifest.json');process.stdout.write(m.set_sha256)")
          node -e "const f=require('fs');f.writeFileSync('output/cache/fused/handoff.json',JSON.stringify({producer_attempt:Number(process.env.HANDOFF_PRODUCER_ATTEMPT),exact_staging_prefix:process.env.STAGING,manifest_sha256:process.env.MANIFEST_SHA,set_sha256:process.env.SET_SHA,upstream_run_id:String(process.env.HANDOFF_UPSTREAM_RUN_ID),factory_run_id:String(process.env.HANDOFF_FACTORY_RUN_ID),head_sha:String(process.env.HANDOFF_HEAD_SHA),created_at:new Date().toISOString()}))"
          node scripts/factory/r2-workflow-cli.js upload-file output/cache/fused/handoff.json "${RUN_PREFIX}/handoff.json"
          echo "✅ [HANDOFF] staging=${STAGING} set_sha256=${SET_SHA} descriptor=${RUN_PREFIX}/handoff.json"

  # V27.40: master-fusion-persist isolates R2 backup from heavy compute.
  # Transient R2 failure → re-run only persist (~3-5m), not 1h20m fusion.
  master-fusion-persist:
    name: Master Fusion (Persist R2)
    needs: [master-fusion-compute, check-upstream]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # S1-BR: expose the VERIFIED handoff identity so downstream consumers
    # (vfs-pack-db, upload) verify their restored fused set EQUALS this exact one
    # and recover from the SAME exact producer staging prefix on any miss/mismatch.
    outputs:
      verified_fused_manifest_sha: ${{ steps.handoff-verify.outputs.manifest_sha }}
      verified_fused_set_sha: ${{ steps.handoff-verify.outputs.set_sha }}
      verified_fused_staging_prefix: ${{ steps.handoff-verify.outputs.staging_prefix }}
      verified_fused_producer_attempt: ${{ steps.handoff-verify.outputs.producer_attempt }}
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/factory-setup
        with:
          aggressive-disk-cleanup: 'false'
          with-rust-ffi: 'false'
      # S1-BR AUTHORITATIVE ORDER. The GHA fused cache is an OPTIONAL FAST PATH,
      # NOT authority — the run-scoped descriptor + content-verified producer
      # staging prefix is. (1) read descriptor -> (2) verify provenance ->
      # (3) TRY exact-key GHA restore (NO restore-keys prefix) -> (4) verify the
      # GHA-restored content EXACTLY matches the descriptor manifest + set hash ->
      # (5) on miss OR mismatch: wipe local fused/ + restore from the EXACT producer
      # staging prefix -> (6) full manifest verification -> (7) mark VERIFIED ->
      # (8) only THEN publish the compatibility copy to state/fused-entities/.
      - name: Fetch + Verify Handoff Descriptor (S1-BR)
        id: handoff-verify
        env:
          HANDOFF_UPSTREAM_RUN_ID: ${{ needs.check-upstream.outputs.upstream-run-id }}
          HANDOFF_FACTORY_RUN_ID: ${{ github.run_id }}
          HANDOFF_RUN_ATTEMPT: ${{ github.run_attempt }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          set -euo pipefail
          UP="${HANDOFF_UPSTREAM_RUN_ID}"; RUN="${HANDOFF_FACTORY_RUN_ID}"
          DESC_KEY="state/_handoff/fused/${UP}/${RUN}/handoff.json"
          # (1) read the run-scoped descriptor (missing/malformed => fail-loud).
          if ! node scripts/factory/r2-workflow-cli.js restore-file "${DESC_KEY}" /tmp/handoff.json; then
            echo "::error::Handoff descriptor ${DESC_KEY} unretrievable — Compute must write it LAST. Fail-closed (no empty-state publish)."
            exit 1
          fi
          if [ ! -s /tmp/handoff.json ]; then echo "::error::Handoff descriptor empty/missing"; exit 1; fi
          # (2) verify provenance: current upstream + current run; producer_attempt
          # <= current run_attempt; exact staging prefix derivation. Emits prefix\tset.
          OUT=$(node scripts/factory/fused-handoff-manifest.js verify-descriptor /tmp/handoff.json)
          STAGING_PREFIX=$(printf '%s' "$OUT" | cut -f1)
          SET_SHA=$(printf '%s' "$OUT" | cut -f2)
          MANIFEST_SHA=$(node -e "process.stdout.write(String(require('/tmp/handoff.json').manifest_sha256))")
          PRODUCER_ATTEMPT=$(node -e "process.stdout.write(String(require('/tmp/handoff.json').producer_attempt))")
          echo "staging_prefix=${STAGING_PREFIX}" >> "$GITHUB_OUTPUT"
          echo "set_sha=${SET_SHA}" >> "$GITHUB_OUTPUT"
          echo "manifest_sha=${MANIFEST_SHA}" >> "$GITHUB_OUTPUT"
          echo "producer_attempt=${PRODUCER_ATTEMPT}" >> "$GITHUB_OUTPUT"
          echo "✅ [HANDOFF] descriptor verified: staging=${STAGING_PREFIX} set=${SET_SHA}"
      # (3) OPTIONAL FAST PATH: exact-key GHA cache restore. NO restore-keys prefix —
      # a prefix hit is identity-ambiguous and is NOT authority. A miss is fine; the
      # exact-staging recovery below is the durable source of truth.
      - name: Restore Fused Entities (GHA fast path, exact key only)
        id: cache-restore-fused
        uses: actions/cache/restore@v5
        with:
          path: output/cache/fused/
          key: intra-4-4-fused-${{ needs.check-upstream.outputs.upstream-run-id }}-${{ github.run_id }}
      # (4)+(5)+(6) verify GHA content == descriptor manifest/set EXACTLY; on miss OR
      # mismatch wipe local fused/ and restore from the EXACT producer staging prefix,
      # then full-verify. (7) mark VERIFIED_FUSED_HANDOFF. An exact GHA hit with 400
      # files + .complete is NOT acceptable unless it matches the handoff manifest.
      - name: Verify or Recover Fused from Exact Staging (S1-BR)
        env:
          STAGING_PREFIX: ${{ steps.handoff-verify.outputs.staging_prefix }}
          EXPECT_SET_SHA: ${{ steps.handoff-verify.outputs.set_sha }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          set -uo pipefail
          verify() {
            node scripts/factory/fused-handoff-manifest.js verify output/cache/fused/ output/cache/fused/manifest.json
          }
          NEED_RECOVER=0
          # GHA fast path is only trusted if it carries the producer's manifest.json AND
          # full verification passes (set hash + per-file + counts).
          if [ -f output/cache/fused/manifest.json ] && OUT=$(verify); then
            GOT=$(printf '%s' "$OUT" | tail -n1)
            if [ "$GOT" = "$EXPECT_SET_SHA" ]; then
              echo "✅ [HANDOFF] GHA fast-path content matches descriptor set_sha=$GOT"
            else
              echo "⚠️ [HANDOFF] GHA set hash $GOT != descriptor $EXPECT_SET_SHA — recover from exact staging"; NEED_RECOVER=1
            fi
          else
            echo "⚠️ [HANDOFF] GHA fast path missing/unverified — recover from exact staging"; NEED_RECOVER=1
          fi
          if [ "$NEED_RECOVER" = "1" ]; then
            rm -rf output/cache/fused/
            mkdir -p output/cache/fused/
            node scripts/factory/r2-workflow-cli.js restore-dir "$STAGING_PREFIX" output/cache/fused/ --strict
            # backup-dir's restore fast-path uses its own _manifest.json sidecar and
            # excludes the producer manifest.json (uploaded separately, LAST). Restore
            # it explicitly so `verify` has the producer manifest to verify against.
            node scripts/factory/r2-workflow-cli.js restore-file "${STAGING_PREFIX}manifest.json" output/cache/fused/manifest.json --strict
            # Explicitly restore the .complete sentinel so recovery never depends on
            # restore-dir having captured the dotfile (belt-and-suspenders for the
            # producer-side explicit upload above). Before verify so the .complete gate sees it.
            node scripts/factory/r2-workflow-cli.js restore-file "${STAGING_PREFIX}.complete" output/cache/fused/.complete --strict
            OUT=$(verify) || { echo "::error::Exact-staging recovery failed verification ($STAGING_PREFIX). Fail-closed."; exit 1; }
            GOT=$(printf '%s' "$OUT" | tail -n1)
            if [ "$GOT" != "$EXPECT_SET_SHA" ]; then
              echo "::error::Recovered set hash $GOT != descriptor $EXPECT_SET_SHA. Fail-closed."; exit 1
            fi
            echo "✅ [HANDOFF] recovered + verified from exact staging set_sha=$GOT"
          fi
          echo "VERIFIED_FUSED_HANDOFF=1"
      # (8) COMPATIBILITY PUBLICATION COPY only. state/fused-entities/ is NEVER a
      # pre-Persist recovery input, NEVER exact-cycle authority, NEVER a prefix-fallback
      # input — it is written ONLY after VERIFIED above (not an atomic promotion).
      - name: Publish Fused Compatibility Copy to R2
        if: success()
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: node scripts/factory/r2-workflow-cli.js backup-dir output/cache/fused/ state/fused-entities/

  # V27.40: vfs-packing renamed to vfs-pack-db; sitemap/RSS/health moved to vfs-derived.
  # Pack-db heavy step + verify-gate stay here; derived artifacts split into separate job.
  vfs-pack-db:
    name: VFS Packing (Stable 1.0) — Compute
    needs: [master-fusion-persist, check-upstream]
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/factory-setup
        with:
          aggressive-disk-cleanup: 'true'
          with-rust-ffi: 'true'
      - name: R2 Fallback for Rust FFI
        continue-on-error: true
        run: |
          FOUND=$(find rust -name '*.node' 2>/dev/null | wc -l)
          [ "$FOUND" -lt 9 ] && node scripts/factory/r2-workflow-cli.js restore-rust-ffi || true
      - name: Restore Base Output (Trending Context)
        id: cache-output-vfs
        uses: actions/cache/restore@v5
        with:
          path: output/
          key: cycle-${{ needs.check-upstream.outputs.upstream-run-id }}-output
          # Cycle-SCOPED restore-key: a bare `cycle-` prefix could restore a
          # DIFFERENT cycle's output (or a wrong-shape -shards/-harvest cache) into
          # output/ on an exact-key miss. Scoping to this aggregate run-id keeps the
          # intended same-cycle -output fallback while rejecting foreign cycles. True
          # misses fall to the R2 state/cycle-output/ fallback below.
          restore-keys: cycle-${{ needs.check-upstream.outputs.upstream-run-id }}-
      # 2026-05-16: GHA cache for cycle-<run_id>-output gets LRU-evicted within
      # ~24h when other large caches (vfs-assets 8.6GB, fused, embeddings) push
      # past the 10GB per-repo limit. mesh-baking + master-fusion + final-upload
      # all already have this R2 fallback (lines 102, 157, 534); VFS Packing was
      # the only consumer of cycle-output that lacked it. Run 25949879955 caught
      # this gap when the cycle-25912771844-output cache evicted between yesterday
      # and today and pack-db.js needs `cache/mesh/graph.json` + `search-core.json`
      # + `category_stats.json` which only live in cycle-output, not in any of the
      # per-file R2 fallbacks below.
      - name: R2 Fallback for Base Output
        if: steps.cache-output-vfs.outputs.cache-hit != 'true'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          node scripts/factory/r2-workflow-cli.js restore-dir state/cycle-output/ output/
      - name: R2 Fallback for Trending Data
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          mkdir -p output/cache
          [ ! -f "output/cache/trending.json.zst" ] && node scripts/factory/r2-workflow-cli.js restore-file state/satellite-trending/trending.json.zst output/cache/trending.json.zst || true
          [ ! -f "output/cache/trend-data.json.zst" ] && node scripts/factory/r2-workflow-cli.js restore-file state/satellite-trending/trend-data.json.zst output/cache/trend-data.json.zst || true
          # V27.38: trends-summary.json.zst fallback removed (V27.36 paused generation)
      # S1-BR consumer (VFS Packing): may first try the exact-key GHA cache, but the
      # restored fused set's manifest/set hash MUST EQUAL the Persist-VERIFIED identity.
      # NO restore-keys prefix (identity-ambiguous), NO state/fused-entities/ fixed
      # fallback (that fixed prefix is a compatibility copy, not current-run authority).
      # On miss OR mismatch: wipe local fused/ + restore from the EXACT producer staging
      # prefix from Persist's output, then re-verify; verification failure => fail-loud.
      - name: Restore Fused Entities (GHA fast path, exact key only)
        id: cache-fused
        uses: actions/cache/restore@v5
        with:
          path: output/cache/fused/
          key: intra-4-4-fused-${{ needs.check-upstream.outputs.upstream-run-id }}-${{ github.run_id }}
      - name: Verify or Recover Fused from Exact Staging (S1-BR)
        env:
          STAGING_PREFIX: ${{ needs.master-fusion-persist.outputs.verified_fused_staging_prefix }}
          EXPECT_SET_SHA: ${{ needs.master-fusion-persist.outputs.verified_fused_set_sha }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          set -uo pipefail
          if [ -z "${STAGING_PREFIX}" ] || [ -z "${EXPECT_SET_SHA}" ]; then
            echo "::error::Persist did not export a verified fused identity — cannot consume fused safely."; exit 1
          fi
          verify() { node scripts/factory/fused-handoff-manifest.js verify output/cache/fused/ output/cache/fused/manifest.json; }
          NEED_RECOVER=0
          if [ -f output/cache/fused/manifest.json ] && OUT=$(verify) && [ "$(printf '%s' "$OUT" | tail -n1)" = "$EXPECT_SET_SHA" ]; then
            echo "✅ [HANDOFF] VFS fast-path fused matches Persist set_sha=$EXPECT_SET_SHA"
          else
            echo "⚠️ [HANDOFF] VFS fused miss/mismatch — recover from exact staging"; NEED_RECOVER=1
          fi
          if [ "$NEED_RECOVER" = "1" ]; then
            rm -rf output/cache/fused/; mkdir -p output/cache/fused/
            node scripts/factory/r2-workflow-cli.js restore-dir "$STAGING_PREFIX" output/cache/fused/ --strict
            node scripts/factory/r2-workflow-cli.js restore-file "${STAGING_PREFIX}manifest.json" output/cache/fused/manifest.json --strict
            # Explicitly restore the .complete sentinel so recovery never depends on
            # restore-dir having captured the dotfile (before verify so the gate sees it).
            node scripts/factory/r2-workflow-cli.js restore-file "${STAGING_PREFIX}.complete" output/cache/fused/.complete --strict
            OUT=$(verify) || { echo "::error::VFS exact-staging recovery failed verification ($STAGING_PREFIX)."; exit 1; }
            [ "$(printf '%s' "$OUT" | tail -n1)" = "$EXPECT_SET_SHA" ] || { echo "::error::VFS recovered set hash != Persist $EXPECT_SET_SHA."; exit 1; }
            echo "✅ [HANDOFF] VFS recovered + verified from exact staging"
          fi
      # Embedding-shard restore. The EMBED_CODE_VERSION token in the key busts the
      # cache when the embedding logic changes (pack-db.js re-embeds only ids NOT in
      # the restored shards, so a stale token would freeze every vector); bump it to
      # force a full re-embed. restore-keys stay scoped to the SAME code version —
      # they never fall through to a bare cross-version prefix.
      # NOT gated on force_fresh (revert of #2150): force_fresh must recompute
      # baker/mesh/master-fusion/pack, but a cold 551K embedding recompute (≈12-19h)
      # blows the 330-min job cap → cancelled. Restoring warm embeddings keeps
      # force_fresh viable while pack-db still re-embeds only genuinely-new ids.
      - name: Restore Embedding Shards (Cache)
        id: cache-embedding
        uses: actions/cache/restore@v5
        with:
          path: output/cache/embeddings/
          key: embedding-shards-${{ env.EMBED_CODE_VERSION }}-${{ needs.check-upstream.outputs.upstream-run-id }}-${{ github.run_id }}
          restore-keys: |
            embedding-shards-${{ env.EMBED_CODE_VERSION }}-${{ needs.check-upstream.outputs.upstream-run-id }}-
            embedding-shards-${{ env.EMBED_CODE_VERSION }}-
      # R2 fallback when the GHA cache misses. Runs regardless of force_fresh
      # (revert of #2150) so a force_fresh dispatch still restores warm vectors and
      # avoids the 330-min-busting cold recompute; pack-db re-embeds only new ids.
      - name: R2 Fallback for Embedding Shards
        if: steps.cache-embedding.outputs.cache-hit != 'true'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          mkdir -p output/cache/embeddings
          node scripts/factory/r2-workflow-cli.js restore-dir state/embeddings/ output/cache/embeddings/ || echo "⚠️ No embedding shards on R2 — cold start"
      - name: Restore Pack-State DB
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          mkdir -p output/cache
          node scripts/factory/r2-workflow-cli.js restore-file state/pack-state.db output/cache/pack-state.db || echo "⚠️ No pack-state.db — cold start"
      # V27.67: bridge mesh-profile-shards into this job. V27.62 mesh-attach in
      # pack-db.js silently skipped each cycle ("[MESH] profile-shards dir missing
      # — skip mesh attach") because vfs-pack-db runs in an isolated GHA workspace
      # and never restored output/cache/mesh/profile-shards/ that mesh-baking job
      # (line 130) saved to cache + R2. Same GHA-cache + R2-fallback pattern as
      # master-fusion-compute (lines 190-204) which already has it.
      - name: Restore Baked Profile Shards from Cache (V27.67)
        id: cache-mesh-profile-vfs
        uses: actions/cache/restore@v5
        with:
          # PR-D0b: restore the evidence-dict sidecar on the same key as the shards.
          path: |
            output/cache/mesh/profile-shards/
            output/cache/mesh/profile-evidence-dict.json.zst
          key: intra-4-4-baked-${{ needs.check-upstream.outputs.upstream-run-id }}-${{ github.run_id }}
          restore-keys: |
            intra-4-4-baked-${{ needs.check-upstream.outputs.upstream-run-id }}-
      - name: R2 Fallback for Profile Shards (V27.67)
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          if find output/cache/mesh/profile-shards -type f 2>/dev/null | head -1 | grep -q .; then
            COUNT=$(find output/cache/mesh/profile-shards -type f | wc -l)
            echo "✅ Profile shards present from cache: ${COUNT} files"
          else
            echo "⚠️ Profile shards missing from cache — falling back to R2"
            mkdir -p output/cache/mesh/profile-shards
            node scripts/factory/r2-workflow-cli.js restore-dir state/mesh-profile-shards/ output/cache/mesh/profile-shards/
            COUNT=$(find output/cache/mesh/profile-shards -type f 2>/dev/null | wc -l)
            echo "[V27.67] R2 restore: ${COUNT} profile shards"
            if [ "${COUNT}" -eq 0 ]; then
              echo "::error::Profile shards still missing after R2 fallback — pack-db mesh-attach will silent-skip and ui_related_mesh will be empty. Aborting to avoid releasing degraded data."
              exit 1
            fi
          fi
          # PR-D0b: ensure the evidence-dict sidecar is present (cache miss or R2-only path)
          # so the canary's loadBakedDict resolves ui_related_mesh refs (incl. reverse edges).
          if [ ! -f output/cache/mesh/profile-evidence-dict.json.zst ]; then
            node scripts/factory/r2-workflow-cli.js restore-file state/mesh-profile-dict/profile-evidence-dict.json.zst output/cache/mesh/profile-evidence-dict.json.zst || echo "⚠️ evidence-dict sidecar not on R2 (canary falls back to graph dict)"
          fi
      - name: Migrate Legacy Embedding Cache (one-time)
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          SHARD_COUNT=$(find output/cache/embeddings -name 'embed-*.bin.zst' 2>/dev/null | wc -l)
          if [ "$SHARD_COUNT" -eq 0 ]; then
            echo "[MIGRATE] No shards found — attempting legacy SQLite migration..."
            node scripts/factory/r2-workflow-cli.js restore-file state/embedding-cache.db output/cache/embedding-cache.db || true
            node scripts/factory/migrate-embedding-cache.js output/cache/embedding-cache.db output/cache/embeddings
            rm -f output/cache/embedding-cache.db
          else
            echo "[MIGRATE] ${SHARD_COUNT} shards present — no migration needed."
          fi
      - name: Download Hosted-On Data from R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          for p in replicate together hf-inference; do
            node scripts/factory/r2-workflow-cli.js restore-file "state/hosted-on/hosted-on-${p}.json" "output/cache/hosted-on-${p}.json" || echo "⚠️ hosted-on-${p}.json not in R2 (first run?)"
          done
      # V27.2: fail-fast before pack-db if essential metadata files are missing.
      # Saves ~2h of wasted runner time on cycle cache miss (run 25896561032).
      - name: Verify Essential Metadata Cache
        run: |
          REQUIRED=(
            "output/cache/mesh/graph.json"
            "output/cache/search-core.json"
            "output/cache/category_stats.json"
          )
          MISSING=()
          for f in "${REQUIRED[@]}"; do
            if [ ! -f "$f" ] && [ ! -f "${f}.zst" ] && [ ! -f "${f}.gz" ]; then
              MISSING+=("$f")
            fi
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "❌ Essential metadata cache files missing — pack-db would produce content-stripped meta DBs:"
            printf '  %s\n' "${MISSING[@]}"
            echo "Upstream cycle cache (cycle-<aggregate-run-id>-output) must contain these files."
            exit 1
          fi
          echo "✅ All essential metadata cache files present"
      # V27.52: restore cycle-scoped vfs-pack cache for skip detection.
      # P3-EVIDENCE-1 STAGE-B: the cache key + restore-keys carry VFS_PACK_CODE_VERSION
      # so a restore can NEVER cross packer-code versions. A cache produced by older
      # row-builders code lives under a different prefix and is invisible here; the
      # sentinel gate below is the second, content-level defense.
      - name: Restore VFS Pack Output for Skip Detection (V27.52)
        id: cache-vfs-pack-restore
        if: ${{ !inputs.force_fresh }}
        uses: actions/cache/restore@v5
        with:
          path: |
            output/data/
            output/meta/
            output/cache/reports/
            output/cache/knowledge/
            output/cache/mesh/
          key: intra-4-4-vfs-pack-${{ env.VFS_PACK_CODE_VERSION }}-${{ needs.check-upstream.outputs.upstream-run-id }}-${{ github.run_id }}
          restore-keys: |
            intra-4-4-vfs-pack-${{ env.VFS_PACK_CODE_VERSION }}-${{ needs.check-upstream.outputs.upstream-run-id }}-
      # P3-EVIDENCE-1 STAGE-B: skip pack-db ONLY when ALL hold —
      #   (a) force_fresh is NOT set,
      #   (b) >= 20 meta-NN.db present,
      #   (c) the mesh graph is present,
      #   (d) the version sentinel EXACTLY equals VFS_PACK_CODE_VERSION.
      # A missing OR mismatched sentinel -> skip_compute=false (must run pack-db.js),
      # so repaired row-builders code can never be skipped on a re-run of a stale cache.
      # force_fresh -> unconditional fresh compute (and the fresh pack below overwrites
      # any restored meta-NN.db). The sentinel file is written by the fresh-pack step.
      - name: Detect vfs-pack output present
        id: detect-vfs-pack
        env:
          VFS_PACK_CODE_VERSION: ${{ env.VFS_PACK_CODE_VERSION }}
          FORCE_FRESH: ${{ inputs.force_fresh }}
        run: |
          SENTINEL=output/meta/vfs-pack-code-version.txt
          META_COUNT=$(find output/data -name 'meta-*.db' 2>/dev/null | wc -l)
          MESH_OK=false
          { [ -f output/cache/mesh/graph.json ] || [ -f output/cache/mesh/graph.json.zst ]; } && MESH_OK=true
          SENTINEL_VAL=""
          [ -f "$SENTINEL" ] && SENTINEL_VAL=$(tr -d '[:space:]' < "$SENTINEL")
          if [ "$FORCE_FRESH" = "true" ]; then
            echo "skip_compute=false" >> "$GITHUB_OUTPUT"
            echo "[STAGE-B] force_fresh=true → unconditional fresh pack-db (cache ignored)"
          elif [ "$META_COUNT" -ge 20 ] && [ "$MESH_OK" = "true" ] && [ "$SENTINEL_VAL" = "$VFS_PACK_CODE_VERSION" ]; then
            echo "skip_compute=true" >> "$GITHUB_OUTPUT"
            echo "[STAGE-B] ${META_COUNT} meta-NN.db + mesh graph + sentinel '${SENTINEL_VAL}' == '${VFS_PACK_CODE_VERSION}' → skip pack-db.js compute"
          else
            echo "skip_compute=false" >> "$GITHUB_OUTPUT"
            echo "[STAGE-B] fresh pack-db: meta=${META_COUNT}(need>=20) mesh=${MESH_OK} sentinel='${SENTINEL_VAL}'(need '${VFS_PACK_CODE_VERSION}')"
          fi
      - name: Execute Stable 1.0 Packer
        if: steps.detect-vfs-pack.outputs.skip_compute != 'true'
        env:
          CACHE_DIR: ./output/cache
          AES_CRYPTO_KEY: ${{ secrets.AES_CRYPTO_KEY }}
          NODE_OPTIONS: '--max-old-space-size=6144 --expose-gc'
          VFS_PACK_CODE_VERSION: ${{ env.VFS_PACK_CODE_VERSION }}
        # P3-EVIDENCE-1 STAGE-B: a SUCCESSFUL fresh pack stamps the version sentinel
        # (output/meta/, carried by the vfs-pack save below). It is written only after
        # pack-db.js exits 0, so a failed/partial pack leaves no/old sentinel and the
        # next run will NOT skip. force_fresh reaches here too (skip_compute=false),
        # and this fresh pack overwrites any restored meta-NN.db.
        run: |
          node scripts/factory/pack-db.js
          mkdir -p output/meta
          printf '%s' "$VFS_PACK_CODE_VERSION" > output/meta/vfs-pack-code-version.txt
          echo "[STAGE-B] wrote pack-code sentinel: $(cat output/meta/vfs-pack-code-version.txt)"
      # V27.2 fail-loud gate (always runs as sanity check on both fresh + cached data)
      - name: V27.2 Verify Shard-Meta Consistency
        run: node scripts/factory/verify-shard-meta-consistency.js
      # PR-C2 WIRE: run the identity-cluster crate on the 4/4 full recompute.
      # Reads ONLY PR-C1 SAME_AS shards (output/cache/assertions/, restored via the
      # cycle-output cache above) and writes ONLY the cluster-assignment artifact
      # (output/cache/identity/, producer-internal -- NOT in the upload allow-list).
      # HARD-fails the bake if buildIdentityClusters errors (MAX_PASSES / SKEW /
      # NON_SINGLETON_FLOOR); skips loudly only when PR-C1 produced no shards.
      - name: PR-C2 Build Identity Clusters
        env:
          OUTPUT_DIR: ./output
          CACHE_DIR: ./output/cache
        run: node scripts/factory/build-identity-clusters.js
      # Persist the cluster artifact to R2 producer-internal state (NOT the public
      # CDN). Gated on a fresh compute so a re-dispatch cache-hit does not re-upload.
      - name: Backup Identity Clusters to R2
        if: success() && steps.detect-vfs-pack.outputs.skip_compute != 'true'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          if [ -f output/cache/identity/cluster-assignment.jsonl.zst ]; then
            node scripts/factory/r2-workflow-cli.js backup-dir output/cache/identity/ state/identity/
            echo "[R2] Identity cluster-assignment backed up to state/identity/"
          else
            echo "[IDENTITY] No cluster artifact to back up (PR-C1 produced no SAME_AS shards this cycle)."
          fi
      - name: Save Embedding Shards to Cache
        if: success() && steps.detect-vfs-pack.outputs.skip_compute != 'true'
        uses: actions/cache/save@v5
        with:
          path: output/cache/embeddings/
          key: embedding-shards-${{ env.EMBED_CODE_VERSION }}-${{ needs.check-upstream.outputs.upstream-run-id }}-${{ github.run_id }}
      - name: Backup Embedding Shards to R2
        if: success() && steps.detect-vfs-pack.outputs.skip_compute != 'true'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          node scripts/factory/r2-workflow-cli.js backup-dir output/cache/embeddings/ state/embeddings/ --extensions=.bin.zst
          if [ -f "output/cache/pack-state.db" ]; then
            node -e "const D=require('better-sqlite3')('./output/cache/pack-state.db');D.exec('DROP TABLE IF EXISTS html_cache');D.exec('VACUUM');D.close();"
            node scripts/factory/r2-workflow-cli.js upload-file output/cache/pack-state.db state/pack-state.db
          fi
          echo "[R2] Embedding shards + pack-state (no html_cache) backed up"

      # V27.51: backup meta-NN.db + sitemaps to R2 — vfs-pack → vfs-derived → upload cache
      # chain hit GHA 10GB cache-entry limit on the V27.40 first real cron (run
      # 26362048142, vfs-assets save silently failed because vfs-pack restore had
      # already used 12.8GB). upload's cache restore returned empty → output/data/
      # had no meta-NN.db → L2 probe failed → cycle broke after 4h+ compute.
      # R2 is source-of-truth (P2 principle); backing up meta DBs here decouples
      # upload-job correctness from inter-job cache success.
      # V27.51 + V27.52: backup meta-NN.db + sitemaps to R2. Gated on detect-vfs-pack
      # so re-dispatch cache-hit doesn't re-upload identical state (R2 has it).
      - name: Backup VFS Data to R2 (V27.51)
        if: success() && steps.detect-vfs-pack.outputs.skip_compute != 'true'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          node scripts/factory/r2-workflow-cli.js backup-dir output/data/ state/vfs-data/
          if [ -d "output/meta" ]; then
            node scripts/factory/r2-workflow-cli.js backup-dir output/meta/ state/vfs-meta/ || true
          fi
          META_COUNT=$(find output/data -name 'meta-*.db' 2>/dev/null | wc -l)
          echo "[R2] VFS data backed up: ${META_COUNT} meta-NN.db files to state/vfs-data/"
      # V27.40: end of vfs-pack-db. Save VFS pack output (data/meta/reports/knowledge/mesh)
      # as inter-job cache for vfs-derived. Sitemap + RSS + health move to vfs-derived job.
      # P3-EVIDENCE-1 STAGE-B: the save key carries VFS_PACK_CODE_VERSION so a fresh
      # pack is stored under the current-version prefix only. output/meta/ carries the
      # version sentinel written by the packer step, so a restore on the matching key
      # recovers BOTH the rows and the sentinel (skip-gate's content check).
      - name: Save VFS Pack Output to Cache
        if: success() && steps.detect-vfs-pack.outputs.skip_compute != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            output/data/
            output/meta/
            output/cache/reports/
            output/cache/knowledge/
            output/cache/mesh/
            output/cache/assertions/
          key: intra-4-4-vfs-pack-${{ env.VFS_PACK_CODE_VERSION }}-${{ needs.check-upstream.outputs.upstream-run-id }}-${{ github.run_id }}

  # V27.40: vfs-derived = sitemap-gen + RSS-gen + SQL-health + cache saves.
  # ~2m; failure here costs minutes, not hours (vs old vfs-packing 2h10m blast radius).
  # Recovery: GHA UI "Re-run failed jobs" — run_id stable, vfs-pack cache hits within ~5min window.
  # No R2 fallback for vfs-pack cache miss (state/cycle-output/ does NOT contain meta-NN.db).
  vfs-derived:
    name: VFS Derived (Sitemap + RSS + Health)
    needs: [vfs-pack-db, check-upstream]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/factory-setup
        with:
          aggressive-disk-cleanup: 'false'
          with-rust-ffi: 'false'
      # P3-EVIDENCE-1 STAGE-B: vfs-derived may restore ONLY output of the matching pack
      # version — the key + restore-keys prefix carry VFS_PACK_CODE_VERSION so a
      # cross-version vfs-pack cache can never be pulled into the derived (sitemap/RSS/
      # health) job that runs over the packed meta-NN.db.
      - name: Restore VFS Pack Output from intra-cache
        id: cache-restore-vfs-pack
        uses: actions/cache/restore@v5
        with:
          path: |
            output/data/
            output/meta/
            output/cache/reports/
            output/cache/knowledge/
            output/cache/mesh/
            output/cache/assertions/
          key: intra-4-4-vfs-pack-${{ env.VFS_PACK_CODE_VERSION }}-${{ needs.check-upstream.outputs.upstream-run-id }}-${{ github.run_id }}
          restore-keys: |
            intra-4-4-vfs-pack-${{ env.VFS_PACK_CODE_VERSION }}-${{ needs.check-upstream.outputs.upstream-run-id }}-
      # V27.40.1 + V27.52: fail-fast on missing meta-NN.db. File-existence detection
      # (cache-hit output false-fires on restore-keys partial match).
      - name: Verify VFS Pack Files Present (defensive)
        run: |
          META_COUNT=$(find output/data -name 'meta-*.db' 2>/dev/null | wc -l)
          if [ "$META_COUNT" -lt 1 ]; then
            echo "::error::No meta-NN.db found post-restore. vfs-pack-db should have written via primary key OR restore-keys partial hit. Aborting vfs-derived to avoid empty sitemap/RSS output."
            exit 1
          fi
          echo "✅ VFS pack present: $META_COUNT meta-NN.db files"
      - name: Generate VFS-Parity Sitemaps
        run: node scripts/factory/vfs-sitemap-gen.js --db=output/data/meta-00.db --out=output
      # V25.13: RSS gen requires output/cache/reports/index.json.zst (from pack-db meta-anchors)
      # — guaranteed present via vfs-pack cache restore above.
      # V27.39: soft-warn when both feeds empty (V27.36 paused daily reports + knowledge-ai).
      - name: Generate RSS feeds
        run: node scripts/factory/lib/rss-generator.js ./output
      - name: V23.1 SQL Health Check
        run: |
          for db in output/data/*.db; do
            case "$(basename "$db")" in rankings-*) echo "⏭ Skipping rankings DB: $db"; continue;; esac
            echo "🔍 Verifying $db..."
            node scripts/factory/verify-db.js "$db"
          done
      - name: Save VFS Assets to Cache
        if: success()
        uses: actions/cache/save@v5
        with:
          path: |
            output/data/
            output/meta/
            output/sitemaps/
            output/sitemap.xml
          key: intra-4-4-vfs-assets-${{ needs.check-upstream.outputs.upstream-run-id }}-${{ github.run_id }}
      - name: Save RSS Feeds to Cache
        if: success()
        uses: actions/cache/save@v5
        with:
          path: output/rss/
          key: intra-4-4-rss-feeds-${{ needs.check-upstream.outputs.upstream-run-id }}-${{ github.run_id }}

  # V25.13: rss-feeds job DELETED — RSS gen moved into vfs-packing (now vfs-derived).
  # V27.40: vfs-packing further split into vfs-pack-db (heavy compute) + vfs-derived (light).

  upload:
    name: Final Upload to R2
    needs: [mesh-baking, master-fusion-persist, vfs-derived, check-upstream]
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/factory-setup
        with:
          aggressive-disk-cleanup: 'false'
          with-rust-ffi: 'true'
      - name: R2 Fallback for Rust FFI
        continue-on-error: true
        run: |
          FOUND=$(find rust -name '*.node' 2>/dev/null | wc -l)
          [ "$FOUND" -lt 9 ] && node scripts/factory/r2-workflow-cli.js restore-rust-ffi || true
      - name: Restore Base Output from Cache
        id: cache-output-upload
        uses: actions/cache/restore@v5
        with:
          path: output/
          key: cycle-${{ needs.check-upstream.outputs.upstream-run-id }}-output
          # Cycle-SCOPED restore-key: a bare `cycle-` prefix could restore a
          # DIFFERENT cycle's output (or a wrong-shape -shards/-harvest cache) into
          # output/ on an exact-key miss. Scoping to this aggregate run-id keeps the
          # intended same-cycle -output fallback while rejecting foreign cycles. True
          # misses fall to the R2 state/cycle-output/ fallback below.
          restore-keys: cycle-${{ needs.check-upstream.outputs.upstream-run-id }}-
      - name: R2 Fallback for Base Output
        if: steps.cache-output-upload.outputs.cache-hit != 'true'
        run: |
          node scripts/factory/r2-workflow-cli.js restore-dir state/cycle-output/ output/
      - name: Restore Upload Manifest from Cache
        uses: actions/cache/restore@v5
        with:
          path: output/cache/last-upload-manifest.json
          key: r2-upload-manifest-${{ needs.check-upstream.outputs.upstream-run-id }}-${{ github.run_id }}
          restore-keys: |
            r2-upload-manifest-${{ needs.check-upstream.outputs.upstream-run-id }}-
            r2-upload-manifest-
      # S1-BR consumer (Final Upload): exact-key GHA fast path, then the restored
      # fused set MUST match the Persist-VERIFIED identity. NO restore-keys prefix,
      # NO state/fused-entities/ identity-ambiguous current-run fallback. On miss OR
      # mismatch: wipe local fused/ + restore from the EXACT producer staging prefix
      # from Persist's output, then re-verify; verification failure => fail-loud.
      - name: Restore Fused Entities (GHA fast path, exact key only)
        id: cache-fused-upload
        uses: actions/cache/restore@v5
        with:
          path: output/cache/fused/
          key: intra-4-4-fused-${{ needs.check-upstream.outputs.upstream-run-id }}-${{ github.run_id }}
      - name: Verify or Recover Fused from Exact Staging (S1-BR)
        env:
          STAGING_PREFIX: ${{ needs.master-fusion-persist.outputs.verified_fused_staging_prefix }}
          EXPECT_SET_SHA: ${{ needs.master-fusion-persist.outputs.verified_fused_set_sha }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          set -uo pipefail
          if [ -z "${STAGING_PREFIX}" ] || [ -z "${EXPECT_SET_SHA}" ]; then
            echo "::error::Persist did not export a verified fused identity — cannot consume fused safely."; exit 1
          fi
          verify() { node scripts/factory/fused-handoff-manifest.js verify output/cache/fused/ output/cache/fused/manifest.json; }
          NEED_RECOVER=0
          if [ -f output/cache/fused/manifest.json ] && OUT=$(verify) && [ "$(printf '%s' "$OUT" | tail -n1)" = "$EXPECT_SET_SHA" ]; then
            echo "✅ [HANDOFF] Upload fast-path fused matches Persist set_sha=$EXPECT_SET_SHA"
          else
            echo "⚠️ [HANDOFF] Upload fused miss/mismatch — recover from exact staging"; NEED_RECOVER=1
          fi
          if [ "$NEED_RECOVER" = "1" ]; then
            rm -rf output/cache/fused/; mkdir -p output/cache/fused/
            node scripts/factory/r2-workflow-cli.js restore-dir "$STAGING_PREFIX" output/cache/fused/ --strict
            node scripts/factory/r2-workflow-cli.js restore-file "${STAGING_PREFIX}manifest.json" output/cache/fused/manifest.json --strict
            # Explicitly restore the .complete sentinel so recovery never depends on
            # restore-dir having captured the dotfile (before verify so the gate sees it).
            node scripts/factory/r2-workflow-cli.js restore-file "${STAGING_PREFIX}.complete" output/cache/fused/.complete --strict
            OUT=$(verify) || { echo "::error::Upload exact-staging recovery failed verification ($STAGING_PREFIX)."; exit 1; }
            [ "$(printf '%s' "$OUT" | tail -n1)" = "$EXPECT_SET_SHA" ] || { echo "::error::Upload recovered set hash != Persist $EXPECT_SET_SHA."; exit 1; }
            echo "✅ [HANDOFF] Upload recovered + verified from exact staging"
          fi
      - name: Restore Global Registry Cache (V22.8 Cycle)
        uses: actions/cache/restore@v5
        with:
          path: |
            cache/global-registry.json.zst
            cache/registry/
          key: global-registry-${{ needs.check-upstream.outputs.upstream-run-id }}
          restore-keys: global-registry-
      - name: Restore FNI History Cache
        id: cache-fni-history
        uses: actions/cache/restore@v5
        with:
          path: |
            cache/fni-history.json.zst
            cache/fni-history/
          key: fni-history-${{ needs.check-upstream.outputs.upstream-run-id }}
          restore-keys: fni-history-
      # P0-R3: R2 fallback for FNI history
      - name: R2 Fallback for FNI History
        if: steps.cache-fni-history.outputs.cache-hit != 'true'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          mkdir -p cache/fni-history
          node scripts/factory/r2-workflow-cli.js restore-dir meta/backup/fni-history/ cache/fni-history/ || echo "⚠️ R2 FNI history fallback unavailable"
          node scripts/factory/r2-workflow-cli.js restore-file meta/backup/fni-history.json.zst cache/fni-history.json.zst || true
      - name: Restore Daily Accumulator Cache
        id: cache-daily-accum
        uses: actions/cache/restore@v5
        with:
          path: |
            cache/daily-accum.json.zst
            cache/daily-accum/
          key: daily-accum-${{ needs.check-upstream.outputs.upstream-run-id }}
          restore-keys: daily-accum-
      # P0-R3: R2 fallback for daily accumulator
      - name: R2 Fallback for Daily Accumulator
        if: steps.cache-daily-accum.outputs.cache-hit != 'true'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          mkdir -p cache/daily-accum
          node scripts/factory/r2-workflow-cli.js restore-dir meta/backup/daily-accum/ cache/daily-accum/ || echo "⚠️ R2 daily-accum fallback unavailable"
          node scripts/factory/r2-workflow-cli.js restore-file meta/backup/daily-accum.json.zst cache/daily-accum.json.zst || true
      - name: Verify Fused Entities
        run: |
          FUSED=$(find output/cache/fused -name '*.json.zst' 2>/dev/null | wc -l)
          echo "Fused shards present: $FUSED"
      - name: Restore Baked Profile Shards from Cache
        id: cache-baked-upload
        uses: actions/cache/restore@v5
        with:
          # PR-D0b: restore the evidence-dict sidecar on the same key as the shards.
          path: |
            output/cache/mesh/profile-shards/
            output/cache/mesh/profile-evidence-dict.json.zst
          key: intra-4-4-baked-${{ needs.check-upstream.outputs.upstream-run-id }}-${{ github.run_id }}
          restore-keys: |
            intra-4-4-baked-${{ needs.check-upstream.outputs.upstream-run-id }}-
      # V27.52: file-existence check
      - name: R2 Fallback for Profile Shards (Upload Job)
        run: |
          if find output/cache/mesh/profile-shards -type f 2>/dev/null | head -1 | grep -q .; then
            echo "✅ Baked profile shards present from cache"
          else
            node scripts/factory/r2-workflow-cli.js restore-dir state/mesh-profile-shards/ output/cache/mesh/profile-shards/
          fi
          # PR-D0b: ensure the evidence-dict sidecar is present so verify-db's canary
          # (loadBakedDict) resolves ui_related_mesh refs incl. reverse edges.
          if [ ! -f output/cache/mesh/profile-evidence-dict.json.zst ]; then
            node scripts/factory/r2-workflow-cli.js restore-file state/mesh-profile-dict/profile-evidence-dict.json.zst output/cache/mesh/profile-evidence-dict.json.zst || echo "⚠️ evidence-dict sidecar not on R2 (canary falls back to graph dict)"
          fi
      - name: Restore VFS Assets from Cache
        id: cache-vfs-assets
        uses: actions/cache/restore@v5
        with:
          path: |
            output/data/
            output/meta/
            output/sitemaps/
            output/sitemap.xml
          key: intra-4-4-vfs-assets-${{ needs.check-upstream.outputs.upstream-run-id }}-${{ github.run_id }}
          restore-keys: |
            intra-4-4-vfs-assets-${{ needs.check-upstream.outputs.upstream-run-id }}-
      # V27.51: R2 fallback when vfs-assets cache miss OR cache restored empty
      # output/data (the failure mode in run 26362048142 — vfs-derived's cache
      # save silently failed at 12.8GB, upload's restore returned no error but
      # no meta-NN.db either). meta-NN.db files are required by upload-s3 +
      # L2 R2 Origin Probe + Data Quality Check. R2 backup is now done by
      # vfs-pack-db (see "Backup VFS Data to R2" step) so state/vfs-data/ has
      # the fresh files from this cycle's pack-db.
      - name: R2 Fallback for VFS Data (V27.51)
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          META_COUNT=$(find output/data -name 'meta-*.db' 2>/dev/null | wc -l)
          if [ "$META_COUNT" -lt 1 ]; then
            echo "⚠️ output/data/meta-NN.db missing post-restore (cache hit: ${{ steps.cache-vfs-assets.outputs.cache-hit }}). Falling back to R2 state/vfs-data/"
            mkdir -p output/data output/meta
            node scripts/factory/r2-workflow-cli.js restore-dir state/vfs-data/ output/data/ || echo "⚠️ R2 vfs-data restore failed"
            node scripts/factory/r2-workflow-cli.js restore-dir state/vfs-meta/ output/meta/ 2>/dev/null || true
            META_COUNT=$(find output/data -name 'meta-*.db' 2>/dev/null | wc -l)
            if [ "$META_COUNT" -lt 1 ]; then
              echo "::error::R2 fallback also empty — state/vfs-data/ not populated by vfs-pack-db. Cannot proceed without meta-NN.db."
              exit 1
            fi
            echo "✅ R2 fallback restored $META_COUNT meta-NN.db files from state/vfs-data/"
          else
            echo "✅ output/data/ has $META_COUNT meta-NN.db files from cache (no R2 fallback needed)"
          fi
      - name: Restore RSS Feeds from Cache
        uses: actions/cache/restore@v5
        with:
          path: output/rss/
          key: intra-4-4-rss-feeds-${{ needs.check-upstream.outputs.upstream-run-id }}-${{ github.run_id }}
          restore-keys: |
            intra-4-4-rss-feeds-${{ needs.check-upstream.outputs.upstream-run-id }}-
      - name: Consolidate Enrichment Artifacts
        run: |
          # V22.8: RSS feeds restored directly to output/rss/ via cache
          [ -d "output/rss" ] && echo "✅ RSS feeds loaded from cache" || echo "⚠️ No RSS feeds found"
          
          # V22.8: Verify Fused Shards
          if [ -d "output/cache/fused" ]; then
            FUSED_COUNT=$(ls -A output/cache/fused | wc -l)
            echo "✅ [FUSION] $FUSED_COUNT fused shards located in output/cache/fused"
          else
            echo "❌ [ERROR] Fused entities missing from output/cache/fused!"
            exit 1
          fi
          
          # Ensure sitemaps from vfs-packing are in the right place
          if [ -d "output/sitemaps" ]; then
            echo "✅ VFS Sitemaps aligned for upload"
          fi
          
          echo "✅ Artifacts consolidated into output/"
      - name: Prepare Industrial Backup for R2
        run: |
          echo "🛡️  V22.8: Sequestering Industrial Data in meta/backup..."
          mkdir -p output/meta/backup/registry output/meta/backup/fni-history output/meta/backup/daily-accum
          
          # 1. Promote Monoliths from local cache to Stage 4 sequestration zone
          MONOLITHS="global-registry.json.zst fni-history.json.zst daily-accum.json.zst entity-checksums.json.zst"
          for f in $MONOLITHS; do
            if [ -f "cache/$f" ]; then
              cp "cache/$f" output/meta/backup/
              echo "✅ Sequestered monolith $f to meta/backup"
            fi
          done
          
          # 2. Promote Shards from local cache to Stage 4 sequestration zone
          for dir in registry fni-history daily-accum; do
            if [ -d "cache/$dir" ] && [ "$(ls -A cache/$dir 2>/dev/null)" ]; then
              cp -r cache/$dir/* output/meta/backup/$dir/
              echo "✅ Sequestered $dir shards to meta/backup"
            fi
          done
          
          echo "✅ Industrial Isolation Complete. Public CDN remains clean."
      # V23.1: SQL Health Check before upload (blocks deployment on failure)
      - name: V23.1 SQL Health Check
        run: |
          if [ -d "output/data" ]; then
            for db in output/data/*.db; do
              case "$(basename "$db")" in rankings-*) echo "⏭ Skipping rankings DB: $db"; continue;; esac
              echo "🔍 Production Guard: Verifying $db..."
              node scripts/factory/verify-db.js "$db"
            done
          else
            echo "⚠️ No VFS DBs found in output — skipping health check"
          fi
      # V26.6: Restore sharded dedup ledger from R2 (has_fulltext=1 markers survive across cycles).
      - name: Restore Dedup Ledger from R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          node scripts/factory/r2-workflow-cli.js restore-dir state/dedup/ output/data/dedup/ || echo "⚠️ No sharded dedup on R2"
          # Legacy fallback: migrate monolith if shards not found
          if [ ! -d "output/data/dedup" ] || [ -z "$(ls output/data/dedup/*.db 2>/dev/null)" ]; then
            node scripts/factory/r2-workflow-cli.js restore-file state/dedup.db output/data/dedup.db || true
            if [ -f "output/data/dedup.db" ]; then
              echo "🔄 Migrating legacy dedup.db → 16 shards..."
              node scripts/factory/lib/dedup-manager.js migrate
            fi
          fi
          SHARD_COUNT=$(ls output/data/dedup/*.db 2>/dev/null | wc -l)
          echo "✅ Dedup ledger: $SHARD_COUNT shards restored"
      # V26.6: Feed Density Booster Queue — stream meta shards → sharded dedup
      - name: Sync Ledger (Feed 1.5)
        env:
          SHARD_DIR: ./output/data
          DEDUP_DIR: ./output/data/dedup
        run: node scripts/factory/sync-ledger.js
      - name: Upload to R2 via S3 API
        env:
          # V22.9.6: Removed cache/fused/ (~290K PUTs) and cache/mesh/profiles/ (~10K PUTs)
          # VFS is now the sole data source — individual entity JSONs are redundant.
          # Kept: cache/mesh/graph + cache/mesh/stats (VFS-IN via site_metadata)
          R2_PREFIX_FILTER: checkpoint.json,entities.json,entities.json.zst,cache/rankings/,cache/search/,cache/trending.json,cache/trending.json.zst,cache/category_stats.json,cache/category_stats.json.zst,cache/search-core.json,cache/search-core.json.zst,cache/search-manifest.json,cache/relations/,cache/relations.json,cache/relations.json.zst,cache/trend-data.json,cache/trend-data.json.zst,cache/trends-summary.json,cache/trends-summary.json.zst,cache/knowledge/,cache/mesh/graph,cache/mesh/stats,cache/graph.json,cache/reports/,meta/,sitemaps/,rss/,sitemap.xml,data/hot-shard.bin,data/vector-core.bin,data/id-index.bin,data/,parquet/,datasets/
          CACHE_DIR: output/cache
          # V25.8 §2.2: Enable S3 Multipart for fused-shard-NNN.bin (>8MB)
          R2_MULTIPART_ENABLED: 'true'
        run: node scripts/factory/r2-upload-s3.js
      - name: Save Upload Manifest to Cache
        if: success()
        uses: actions/cache/save@v5
        with:
          path: output/cache/last-upload-manifest.json
          key: r2-upload-manifest-${{ needs.check-upstream.outputs.upstream-run-id }}-${{ github.run_id }}
      # S1-BR STAGING LIFECYCLE. Reached ONLY after the Final Upload step above
      # succeeded (same job, gated success()). (a) delete THIS run's exact staging
      # prefix + descriptor — recovery evidence is no longer needed once the cycle
      # shipped; (b) bounded GC: delete ONLY OTHER run prefixes under
      # state/_handoff/fused/ whose newest object is older than RETENTION_DAYS (7).
      # NEVER deletes: the current run, the current descriptor's producer-attempt
      # target, state/fused-entities/ (compatibility copy), or any other carrier
      # (delete-prefix refuses anything outside state/_handoff/). On a downstream
      # FAILURE this step does not run, so the exact staging is RETAINED for the
      # evidence-based failed-job recovery (one re-run reads the same descriptor).
      - name: Cleanup + GC Fused Handoff Staging (S1-BR)
        if: success()
        env:
          HANDOFF_UPSTREAM_RUN_ID: ${{ needs.check-upstream.outputs.upstream-run-id }}
          HANDOFF_FACTORY_RUN_ID: ${{ github.run_id }}
          PRODUCER_ATTEMPT: ${{ needs.master-fusion-persist.outputs.verified_fused_producer_attempt }}
          RETENTION_DAYS: '7'
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          set -uo pipefail
          UP="${HANDOFF_UPSTREAM_RUN_ID}"; RUN="${HANDOFF_FACTORY_RUN_ID}"
          CUR_RUN_PREFIX="state/_handoff/fused/${UP}/${RUN}/"
          # (a) delete the current run's whole run prefix (every per-attempt subtree's
          # data + manifest + the handoff.json descriptor). This is a literal prefix
          # delete, NOT a glob/latest lookup; delete-prefix refuses anything outside
          # state/_handoff/.
          node scripts/factory/r2-workflow-cli.js delete-prefix "${CUR_RUN_PREFIX}" || echo "⚠️ current-run staging cleanup partial (will be GC'd later)"
          # (b) bounded GC of OLD run prefixes only. Enumerate upstream dirs, then each
          # run dir, read its handoff.json created_at, and delete-prefix ONLY runs older
          # than RETENTION_DAYS — never the current run, never any non-_handoff carrier.
          # Best-effort: a GC hiccup must never block the shipped cycle (|| true).
          GC_CUR_RUN="${RUN}" GC_RETENTION_DAYS="${RETENTION_DAYS}" bash -c '
            set -uo pipefail
            now=$(date -u +%s)
            keep_after=$(( now - GC_RETENTION_DAYS*86400 ))
            for up in $(node scripts/factory/r2-workflow-cli.js list-prefix state/_handoff/fused/ --delimiter=/ 2>/dev/null); do
              for runp in $(node scripts/factory/r2-workflow-cli.js list-prefix "$up" --delimiter=/ 2>/dev/null); do
                rid=$(basename "$runp")
                [ "$rid" = "$GC_CUR_RUN" ] && continue
                node scripts/factory/r2-workflow-cli.js restore-file "${runp}handoff.json" /tmp/gc-desc.json >/dev/null 2>&1 || continue
                created=$(node -e "try{process.stdout.write(String(Math.floor(Date.parse(require(\"/tmp/gc-desc.json\").created_at)/1000)))}catch{process.stdout.write(\"0\")}")
                if [ -n "$created" ] && [ "$created" -gt 0 ] && [ "$created" -lt "$keep_after" ]; then
                  echo "[GC] deleting aged run prefix $runp (created epoch=$created)"
                  node scripts/factory/r2-workflow-cli.js delete-prefix "$runp" || true
                fi
              done
            done
          ' || echo "⚠️ handoff GC best-effort skip"
      # V27.3 three-tier verification order:
      #   Upload -> L2 R2 origin probe -> Purge -> Drain -> L3 CDN probe
      # L2 confirms R2-side integrity (orthogonal to CDN), so a later CDN failure
      # is unambiguously an edge-cache issue and a CDN PASS is unambiguously real.
      - name: V27.3 L2 R2 Origin Probe
        env:
          R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ai-nexus-assets
        run: node scripts/factory/probe-r2-direct.js
      - name: Purge & Warm CDN
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          if [ -z "$CLOUDFLARE_ZONE_ID" ] || [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "⚠️ [PURGE] Skipping CDN purge: CLOUDFLARE_ZONE_ID/TOKEN missing"
            exit 0
          fi

          PURGE_LIST="output/cache/purge-list.json"
          CDN_BASE="https://cdn.free2aitools.com"

          if [ -f "$PURGE_LIST" ]; then
            TOTAL=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$PURGE_LIST','utf-8')).changed.length)")
            echo "📡 [V27.3] Targeted CDN Purge: $TOTAL manifest files (batch=30)"
            # Extract URLs, batch 30 per API call
            node -e "
              const list = JSON.parse(require('fs').readFileSync('$PURGE_LIST','utf-8')).changed;
              const urls = list.map(p => '${CDN_BASE}/' + p);
              for (let i = 0; i < urls.length; i += 30) {
                const batch = urls.slice(i, i + 30);
                console.log(JSON.stringify(batch));
              }
            " | while IFS= read -r batch; do
              curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/purge_cache" \
                -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" -H "Content-Type: application/json" \
                --data "{\"files\":$batch}" > purge_res.json
              SUCCESS=$(node -e "console.log(JSON.parse(require('fs').readFileSync('purge_res.json','utf-8')).success||false)")
              echo "  Batch purged: $SUCCESS"
            done
          else
            echo "⚠️ [PURGE] purge-list.json not found. Falling back to prefix purge..."
            curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/purge_cache" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" -H "Content-Type: application/json" \
              --data '{"prefixes":["data/","cache/"]}' > purge_res.json
            cat purge_res.json
          fi

          echo -e "\n🔥 [V25.1] Commencing Proactive CDN Warming..."
          
          # V25.8: Initialize with global configs, core DB, and new V25.8 assets
          WARM_URLS=(
            "https://cdn.free2aitools.com/data/shards_manifest.json"
            # V25.9.5: search.db retired from CDN — no runtime consumer
            # V27.104: fts.db retired from build + CDN warm — no live reader (keyword
            # search is the static inverted index term_index/, not FTS5).
            "https://cdn.free2aitools.com/data/hot-shard.bin"
            "https://cdn.free2aitools.com/data/vector-core.bin"
            # Read-path P1: canonical id->shard warm tier (full corpus).
            "https://cdn.free2aitools.com/data/id-index.bin"
            "https://cdn.free2aitools.com/sitemap.xml"
            "https://cdn.free2aitools.com/cache/trending.json"
          )

          # V25.8: Warm fused-shard binary files (cold payload layer)
          for i in $(seq -w 0 3); do
            WARM_URLS+=("https://cdn.free2aitools.com/data/fused-shard-0${i}.bin")
          done
          
          # V∞ Phase 1A-β: Warm inverted index manifest
          WARM_URLS+=("https://cdn.free2aitools.com/data/term_index/_manifest.json.zst")

          # V26.7 Phase 6: Cluster ANN index for semantic rerank
          WARM_URLS+=("https://cdn.free2aitools.com/data/cluster-ann-index.bin")
          WARM_URLS+=("https://cdn.free2aitools.com/data/cluster-ann-index-ids.json")
          WARM_URLS+=("https://cdn.free2aitools.com/data/cluster-ann-index-entity-map.json")

          # V25.8: Dynamic VFS Shard Warming (discovers actual DB files instead of hardcoding counts)
          if [ -d "output/data" ]; then
            for db_file in output/data/meta-*.db; do
              db_name=$(basename "$db_file")
              WARM_URLS+=("https://cdn.free2aitools.com/data/${db_name}")
            done
          fi

          for url in "${WARM_URLS[@]}"; do
            echo "Warming: $url"
            curl -s -o /dev/null --max-time 30 -H "User-Agent: Nexus-Warmer/1.0" "$url" || true
          done

          # V27.103: Live-SSR VFS warming. The CDN curls above DO NOT warm the
          # path that matters: the live isolate reads meta-NN.db from R2 via
          # binding and caches it under vfs-cache.internal/${etag}/ + opens a
          # wa-sqlite handle — none of which a CDN static curl triggers. Since an
          # in-place meta-NN.db overwrite bumps the R2 etag and invalidates that
          # whole etag-scoped cache, the deploy itself manufactures a cold cliff,
          # and the first real Agent request pays full cold-open (503/524 risk).
          # Hit a SMALL fixed set of live SSR endpoints (origin, not CDN) so the
          # isolate opens the handle + seeds the new etag cache before that first
          # Agent. Best-effort latency mitigation only — bounded + non-fatal, it
          # must NEVER block or fail the pipeline (each curl is `|| true`).
          SSR_ORIGIN="https://free2aitools.com"
          SSR_WARM_URLS=(
            # Entity API — forces per-shard getCachedDbConnection + executeSql.
            "${SSR_ORIGIN}/api/v1/entity/meta-llama/Llama-3.1-8B-Instruct"
            "${SSR_ORIGIN}/api/v1/entity/openai-community/gpt2"
            # Detail page — exercises loadEntityStreams -> resolveVfsMetadata SSR.
            "${SSR_ORIGIN}/model/meta-llama/Llama-3.1-8B-Instruct"
            # List page — warms the catalog/list read path.
            "${SSR_ORIGIN}/models"
          )
          for url in "${SSR_WARM_URLS[@]}"; do
            echo "Warming SSR: $url"
            curl -s -o /dev/null --max-time 20 -H "User-Agent: Nexus-Warmer/1.0" "$url" || true
          done
          echo "✅ Proactive Warming Complete."
      # V27.3: Drain wait now bridges purge -> probe (was: TTL expiry -> probe).
      # Cloudflare purge is fast at origin but propagation to every edge POP
      # takes seconds; 90s leaves headroom before the L3 probe samples 583 edges.
      - name: CDN Drain Wait (90s)
        run: |
          echo "⏳ [V27.3] Waiting 90s for purge propagation across CDN edges..."
          sleep 90
          echo "✅ Drain wait complete. Commencing L3 CDN Probing."
      - name: V19.2 Production Health Probe
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: node scripts/factory/probe-vfs.js
      - name: Data Quality Check
        run: node scripts/factory/data-quality-check.js
      # V27.89: restore the true-delta manifest (new-page URLs this cycle) emitted by the
      # 1/4 harvest. Replaces V27.84's catalog-wide sitemap-lastmod scan (459K URLs/cycle).
      - name: Restore IndexNow Delta Manifest from R2
        continue-on-error: true
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          mkdir -p state
          node scripts/factory/r2-workflow-cli.js restore-file state/indexnow-delta.json state/indexnow-delta.json || echo "⚠️ No IndexNow delta manifest on R2 — push will safe-skip"
      # V27.84/V27.89: IndexNow push. Runs only after upload + purge + drain + health probe +
      # quality check all pass, so engines are pinged for a verified-live deploy. Non-blocking.
      # URL source = state/indexnow-delta.json (entities NEW this cycle), NOT sitemap lastmod.
      - name: Push Incremental Deltas via IndexNow
        continue-on-error: true
        run: |
          echo "=== V27.89 IndexNow True-Delta Push ==="
          node scripts/factory/indexnow-push.js
      - name: Trigger Health Check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🏥 Triggering Daily Health Check..."
          gh workflow run global-health-monitor.yml
        continue-on-error: true

      # V26.6: Upload sharded dedup ledger to R2 state/ for Factory 1.5 consumption
      # §18.23.10: if: always() prevents dedup loss when probe-vfs fails
      - name: Upload Dedup Ledger to R2 State
        if: always()
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          if [ -d "output/data/dedup" ] && [ -n "$(ls output/data/dedup/*.db 2>/dev/null)" ]; then
            node scripts/factory/r2-workflow-cli.js backup-dir output/data/dedup/ state/dedup/
            echo "✅ Sharded dedup ledger uploaded to R2 state/dedup/"
          else
            echo "⚠️ No dedup shards found — Factory 1.5 will use stale ledger"
          fi
      # Embedding cache R2 backup moved to vfs-packing job (file only exists there)

      # CUT #4 (legal-resilience L1, 2026-06-06): the Factory 1.5 Density Booster
      # dispatch is REMOVED. factory-enrich.yml harvested + stored full paper text
      # (ar5iv full_html) into R2 enrichment/fulltext/, which 4/4 fusion then re-injected
      # as paper body_content — the very full third-party text being retired. Full body
      # is a transient derivation input only (clean_summary + embedding), proven NOT read
      # by keyword-search / FNI / mesh / ranking / semantic. factory-enrich.yml is
      # workflow_dispatch-only, so removing this dispatch fully stops paper-fulltext
      # enrichment (8×330min runners) — "Raw Content = Fuel; Structure = Asset".
