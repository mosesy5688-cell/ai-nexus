# Factory 4/4 - Finalize V14.6
# Consolidated Stage 3.5 + 4.0
# 
# Triggers: workflow_run from Aggregate, or manual dispatch
# Inputs: factory-output artifact/cache from Aggregate stage
# Jobs: Relations, Knowledge Mesh, RSS, and Final R2 Upload

name: Factory 4/4 - Finalize

permissions:
  actions: write
  contents: read
  id-token: write

on:
  workflow_run:
    workflows: ["Factory 3/4 - Aggregate"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Aggregate workflow run ID (3/4 upstream)'
        required: false
        type: string
      # V27.52: force rebuild even when cycle-scoped cache hit. Pass when shipping
      # code changes that affect heavy-compute output (pack-db.js / master-fusion.js)
      # — cycle-cache restore would yield stale data otherwise.
      force_fresh:
        description: 'Force rebuild all compute (ignore cycle-scoped cache restores)'
        required: false
        type: boolean
        default: false

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_BUCKET: ai-nexus-assets
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  NODE_OPTIONS: '--max-old-space-size=6144'
  ENABLE_R2_BACKUP: 'true'
  # Embedding-CODE version token. BUMP this whenever the embedding logic changes
  # (model name, normalization, or int8 quantization in pack-db.js) so cached
  # vectors are busted. pack-db.js only computes embeddings for ids NOT already in
  # the restored shards, so a code change would otherwise leave every existing
  # vector STALE forever (the #2145-class stale-artifact bug for data). Bumping
  # this token is the supported way to force a full re-embed; force_fresh does NOT
  # (a cold 551K recompute exceeds the 330-min job cap — see #2150 revert below).
  EMBED_CODE_VERSION: 'v1'
  # P3-EVIDENCE-1 STAGE-B: VFS-pack-CODE version token. BUMP this whenever the code
  # that produces the packed meta-NN.db rows changes (row-builders.js / pack-db.js)
  # so the intra-4-4-vfs-pack cache cannot be REUSED across incompatible packer code.
  # A cache restored under an OLD version (or with a missing/mismatched sentinel) MUST
  # NOT satisfy skip-detect — pack-db.js re-runs and rewrites the rows. Bumped to
  # citation-authority-v2 for the row-builders citation re-derivation (final authority
  # at the pack chokepoint): a re-run on the prior cache would otherwise skip pack-db
  # and ship the stale raw-citation rows. Scope is the SQLite rows ONLY — the fused
  # entities + warm embedding caches are intentionally NOT busted (their keys are
  # untouched), so only the packed rows rebuild while fusion/embeddings stay warm.
  VFS_PACK_CODE_VERSION: 'citation-authority-v2'
  # AUTHORITY-M: mesh-profile-CODE version token. BUMP whenever the mesh-profile bake
  # logic (mesh-profile-baker.js) changes so the AUTH-M descriptor cross-SHA gate rejects
  # a foreign-code cycle's dict/profile-shards. Scope is the AUTH-M provenance bind ONLY.
  MESH_PROFILE_CODE_VERSION: 'mesh-profile-v1'

jobs:
  check-upstream:
    name: Check Upstream
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      upstream-run-id: ${{ steps.get-id.outputs.id }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
      - name: Verify Upstream Conclusion
        if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion != 'success' }}
        run: |
          echo "ERROR: Upstream workflow '${{ github.event.workflow_run.name }}' failed with conclusion '${{ github.event.workflow_run.conclusion }}'."
          exit 1
      - name: Get ID
        id: get-id
        run: |
          AGGREGATE_RUN_ID=${{ inputs.run_id || github.event.workflow_run.id }}
          if [ -z "$AGGREGATE_RUN_ID" ] || [ "$AGGREGATE_RUN_ID" == "null" ]; then
            echo "Finding latest successful Aggregate run on main..."
            AGGREGATE_RUN_ID=$(gh run list --workflow factory-aggregate.yml --branch main --status success --limit 1 --json databaseId --jq '.[0].databaseId' | tr -d '[:space:]')
          fi
          echo "id=$AGGREGATE_RUN_ID" >> $GITHUB_OUTPUT

  mesh-baking:
    name: Mesh Baking
    needs: check-upstream
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/factory-setup
        with:
          aggressive-disk-cleanup: 'false'
          with-rust-ffi: 'true'
      - name: R2 Fallback for Rust FFI
        continue-on-error: true
        run: |
          FOUND=$(find rust -name '*.node' 2>/dev/null | wc -l)
          [ "$FOUND" -lt 9 ] && node scripts/factory/r2-workflow-cli.js restore-rust-ffi || true
      - name: Restore Complete Cycle Output from Cache
        id: cache-output-mesh
        uses: actions/cache/restore@v5
        with:
          path: output/
          key: cycle-${{ needs.check-upstream.outputs.upstream-run-id }}-output
          # FIX-2 / C12 (D-264): the GHA cache is EXACT-KEY acceleration ONLY. The
          # `cycle-<upstream-run-id>-` restore-keys PREFIX authority is REMOVED (a prefix
          # hit is identity-ambiguous -- could pull a wrong-shape -shards/-harvest entry --
          # and was consumed UNVERIFIED). The verify-or-recover step below is the
          # correctness truth vs the attempt-scoped R2 authority.
      # FIX-2 / C12 (D-264) CONSUMER: verify-or-recover the EXACT cycle-output set
      # (output/cache/**) against the current-cycle attempt-scoped R2 AUTHORITY established
      # by 3/4 finalize. Cross-workflow cycle key = the 3/4 Aggregate run id = upstream-run-id.
      # The GHA cache (restored above) is USED only if output/cache/** EXACTLY matches the
      # producer manifest (EXACT-set + per-file sha + set_sha == descriptor set_sha); on GHA
      # miss OR mismatch wipe ONLY output/cache/** (NEVER output/data/, owned by FIX-4
      # meta-NN.db) + recover from the EXACT staging + re-verify. A missing authority /
      # invalid descriptor / residual mismatch FAILS CLOSED. The fixed prefix
      # state/cycle-output/ is NO LONGER a recovery input.
      - name: Verify or Recover Cycle Output from R2 Authority (FIX-2 / D-264)
        env:
          HANDOFF_FINALIZE_RUN_ID: ${{ needs.check-upstream.outputs.upstream-run-id }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          set -uo pipefail
          mkdir -p output/cache
          PID="${HANDOFF_FINALIZE_RUN_ID}"
          if [ -z "$PID" ]; then echo "::error::FIX-2: no upstream-run-id resolved -- cannot consume cycle-output safely."; exit 1; fi
          # (1) resolve the current-cycle attempt-scoped R2 authority descriptor (fail-closed).
          DESC="state/_handoff/cycle-output/${PID}/handoff.json"
          node scripts/factory/r2-workflow-cli.js restore-file "$DESC" /tmp/cycle-output-handoff-rb.json --strict || { echo "::error::FIX-2: no current-cycle cycle-output authority descriptor ($DESC). Fail-closed."; exit 1; }
          OUT=$(node scripts/factory/cycle-output-handoff-manifest.mjs verify-descriptor /tmp/cycle-output-handoff-rb.json --carrier=cycle-output-authority) || { echo "::error::FIX-2: cycle-output descriptor provenance invalid. Fail-closed."; exit 1; }
          STAGING_PREFIX=$(printf '%s' "$OUT" | cut -f1); EXPECT_SET_SHA=$(printf '%s' "$OUT" | cut -f2)
          node scripts/factory/r2-workflow-cli.js restore-file "${STAGING_PREFIX}manifest.json" /tmp/cycle-output-manifest.json --strict || { echo "::error::FIX-2: cycle-output manifest missing at ${STAGING_PREFIX}. Fail-closed."; exit 1; }
          verify_cycle_output() { node scripts/factory/cycle-output-handoff-manifest.mjs verify output /tmp/cycle-output-manifest.json --carrier=cycle-output-authority; }
          # (2) GHA fast path: verify the GHA-restored output/cache/** against the R2 manifest.
          NEED_RECOVER=0
          if OUT2=$(verify_cycle_output) && [ "$(printf '%s' "$OUT2" | tail -n1)" = "$EXPECT_SET_SHA" ]; then
            echo "[CYCLE-OUTPUT-HANDOFF] GHA fast-path cycle-output matches producer set_sha=$EXPECT_SET_SHA"
          else
            echo "[CYCLE-OUTPUT-HANDOFF] GHA miss/mismatch -- recover from exact staging"; NEED_RECOVER=1
          fi
          # (3) GHA miss/mismatch => wipe ONLY output/cache/** (NEVER output/data/) + recover
          # from the EXACT attempt-scoped staging + re-verify set_sha256.
          if [ "$NEED_RECOVER" = "1" ]; then
            rm -rf output/cache; mkdir -p output/cache
            node scripts/factory/r2-workflow-cli.js restore-dir "$STAGING_PREFIX" output/ --strict || { echo "::error::FIX-2: recover restore failed (${STAGING_PREFIX}). Fail-closed."; exit 1; }
            rm -f output/manifest.json output/handoff.json output/_manifest.json 2>/dev/null || true
            OUT2=$(verify_cycle_output) || { echo "::error::FIX-2: exact-staging cycle-output recovery failed verification (${STAGING_PREFIX}). Fail-closed."; exit 1; }
            [ "$(printf '%s' "$OUT2" | tail -n1)" = "$EXPECT_SET_SHA" ] || { echo "::error::FIX-2: recovered cycle-output set hash != producer $EXPECT_SET_SHA. Fail-closed."; exit 1; }
            echo "[CYCLE-OUTPUT-HANDOFF] recovered + verified cycle-output from exact staging"
          fi
      # V27.52: restore cycle-scoped baked cache (per-dispatch key + cycle-prefix restore-keys).
      # Skipped on force_fresh so compute is forced.
      - name: Restore Baked Profile Shards from Cache (V27.52)
        id: cache-baked-restore
        if: ${{ !inputs.force_fresh }}
        uses: actions/cache/restore@v5
        with:
          # PR-D0b: restore the evidence-dict sidecar on the same key as the shards.
          path: |
            output/cache/mesh/profile-shards/
            output/cache/mesh/profile-evidence-dict.json.zst
          key: intra-4-4-baked-${{ needs.check-upstream.outputs.upstream-run-id }}-${{ github.run_id }}
          restore-keys: |
            intra-4-4-baked-${{ needs.check-upstream.outputs.upstream-run-id }}-
      # V27.52: file-existence detection (cache-hit output false-negatives on restore-keys partial match).
      - name: Detect baked output present
        id: detect-baked
        run: |
          COUNT=$(find output/cache/mesh/profile-shards -type f 2>/dev/null | wc -l)
          if [ "$COUNT" -ge 100 ]; then
            echo "skip_compute=true" >> "$GITHUB_OUTPUT"
            echo "[V27.52] ${COUNT} baked profile shards present → skip Bake compute"
          else
            echo "skip_compute=false" >> "$GITHUB_OUTPUT"
            echo "[V27.52] ${COUNT} baked profile shards present (need ≥100) → fresh Bake"
          fi
      - name: Bake atomized Mesh Profiles
        if: steps.detect-baked.outputs.skip_compute != 'true'
        env:
          CACHE_DIR: ./output/cache
        run: node scripts/factory/mesh-profile-baker.js
      # V27.52: Save uses per-dispatch unique key (cycle+run_id); cycle-prefix restore-keys
      # gives soft hit on next dispatch. Save runs ONLY when fresh compute happened.
      - name: Save Baked Profile Shards to Cache
        if: success() && steps.detect-baked.outputs.skip_compute != 'true'
        uses: actions/cache/save@v5
        with:
          # PR-D0b: carry the baked evidence-dict sidecar (mesh-profile-baker.js:188)
          # on the SAME key as the shards. Without it, a cache-restored canary job
          # (verify-db.js -> loadBakedDict) sees null -> ui_related_mesh reverse-edge
          # refs resolve as gaps -> the verification bake UNDER-REPORTS coverage.
          path: |
            output/cache/mesh/profile-shards/
            output/cache/mesh/profile-evidence-dict.json.zst
          key: intra-4-4-baked-${{ needs.check-upstream.outputs.upstream-run-id }}-${{ github.run_id }}
      - name: Backup Profile Shards to R2
        if: success() && steps.detect-baked.outputs.skip_compute != 'true'
        run: |
          node scripts/factory/r2-workflow-cli.js backup-dir output/cache/mesh/profile-shards/ state/mesh-profile-shards/
          # PR-D0b: back up the baked evidence-dict sidecar alongside the shards so the
          # R2-fallback restore (canary jobs) recovers it when the GHA cache misses.
          # NOTE (AUTHORITY-M): these fixed prefixes state/mesh-profile-{shards,dict}/ are now
          # COMPAT/DIAGNOSTIC ONLY — the attempt-scoped AUTH-M authority below is the truth.
          node scripts/factory/r2-workflow-cli.js backup-file output/cache/mesh/profile-evidence-dict.json.zst state/mesh-profile-dict/profile-evidence-dict.json.zst
      # AUTHORITY-M PRODUCER — establish a DURABLE, run + PRODUCER-attempt scoped, content-
      # verified mesh-profile authority so vfs-pack-db / vfs-derived / upload never depend on
      # the LRU-evicted / write-denied GHA cache OR the MUTABLE fixed-prefix R2 copies for the
      # dict + profile-shards. Runs whenever dict + profile-shards exist (success(), incl. the
      # cache-hit skip path) so the current cycle ALWAYS has an AUTH-M descriptor. Order:
      # (1) manifest over output/cache/mesh dict+shards (INCLUDE-filtered) -> (2) data (shards
      # dir + dict) to the attempt prefix -> (3) manifest.json LAST -> (4) handoff.json LAST OF
      # ALL -> (5) read-back verify. Staging goes to R2 + /tmp only.
      - name: Produce Exact-Producer R2 Handoff (MESH-PROFILE, AUTH-M)
        id: mesh-profile-handoff
        if: success()
        env:
          HANDOFF_UPSTREAM_RUN_ID: ${{ needs.check-upstream.outputs.upstream-run-id }}
          HANDOFF_FACTORY_RUN_ID: ${{ github.run_id }}
          HANDOFF_PRODUCER_ATTEMPT: ${{ github.run_attempt }}
          HANDOFF_HEAD_SHA: ${{ github.sha }}
          HANDOFF_MESH_CODE_VERSION: ${{ env.MESH_PROFILE_CODE_VERSION }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          set -euo pipefail
          UP="${HANDOFF_UPSTREAM_RUN_ID}"; RUN="${HANDOFF_FACTORY_RUN_ID}"; ATT="${HANDOFF_PRODUCER_ATTEMPT}"
          RUN_PREFIX="state/_handoff/mesh-profile/${UP}/${RUN}"
          export STAGING="${RUN_PREFIX}/attempt-${ATT}/"
          # (1) manifest over output/cache/mesh (INCLUDE picks ONLY dict + profile-shards;
          # graph.json/stats.json siblings ignored). Freezes expected_shard_count + dict_sha256.
          node scripts/factory/mesh-profile-handoff-manifest.mjs generate output/cache/mesh /tmp/mesh-profile-manifest.json --carrier=mesh-profile-authority
          export SET_SHA=$(node -e "process.stdout.write(require('/tmp/mesh-profile-manifest.json').set_sha256)")
          export DICT_SHA=$(node -e "process.stdout.write(require('/tmp/mesh-profile-manifest.json').dict_sha256)")
          export SHARD_COUNT=$(node -e "process.stdout.write(String(require('/tmp/mesh-profile-manifest.json').expected_shard_count))")
          export MEMBER_COUNT=$(node -e "process.stdout.write(String(require('/tmp/mesh-profile-manifest.json').member_count))")
          export MANIFEST_SHA=$(node -e "const c=require('crypto'),f=require('fs');process.stdout.write(c.createHash('sha256').update(f.readFileSync('/tmp/mesh-profile-manifest.json')).digest('hex'))")
          # (2) data FIRST: profile-shards subtree + the evidence dict.
          node scripts/factory/r2-workflow-cli.js backup-dir output/cache/mesh/profile-shards/ "${STAGING}profile-shards/"
          node scripts/factory/r2-workflow-cli.js upload-file output/cache/mesh/profile-evidence-dict.json.zst "${STAGING}profile-evidence-dict.json.zst"
          # (3) manifest.json LAST.
          node scripts/factory/r2-workflow-cli.js upload-file /tmp/mesh-profile-manifest.json "${STAGING}manifest.json"
          # (4) descriptor LAST OF ALL — binds upstream + 4/4 run + attempt + head-SHA + code
          # version + dict_sha256 + expected_shard_count.
          node -e "const f=require('fs');f.writeFileSync('/tmp/mesh-profile-handoff.json',JSON.stringify({schema_version:1,carrier_type:'mesh-profile-authority',exact_staging_prefix:process.env.STAGING,manifest_sha256:process.env.MANIFEST_SHA,set_sha256:process.env.SET_SHA,dict_sha256:process.env.DICT_SHA,expected_shard_count:Number(process.env.SHARD_COUNT),member_count:Number(process.env.MEMBER_COUNT),upstream_run_id:String(process.env.HANDOFF_UPSTREAM_RUN_ID),factory_run_id:String(process.env.HANDOFF_FACTORY_RUN_ID),producer_attempt:Number(process.env.HANDOFF_PRODUCER_ATTEMPT),head_sha:String(process.env.HANDOFF_HEAD_SHA),code_version:String(process.env.HANDOFF_MESH_CODE_VERSION),created_at:new Date().toISOString()}))"
          node scripts/factory/r2-workflow-cli.js upload-file /tmp/mesh-profile-handoff.json "${RUN_PREFIX}/handoff.json"
          # (5) read-back verify the descriptor provenance (missing/malformed => fail-loud).
          node scripts/factory/r2-workflow-cli.js restore-file "${RUN_PREFIX}/handoff.json" /tmp/mesh-profile-handoff-rb.json --strict
          OUT=$(HANDOFF_RUN_ATTEMPT="${ATT}" node scripts/factory/mesh-profile-handoff-manifest.mjs verify-descriptor /tmp/mesh-profile-handoff-rb.json --carrier=mesh-profile-authority)
          echo "[MESH-PROFILE-HANDOFF] staging=${STAGING} set_sha256=${SET_SHA} shards=${SHARD_COUNT} descriptor=${RUN_PREFIX}/handoff.json"

  # V27.40: master-fusion was a 1h20m monolithic job — split into compute + persist.
  # R2 backup failure no longer redoes 1h20m fusion.
  master-fusion-compute:
    name: Master Fusion (Compute)
    needs: [mesh-baking, check-upstream]
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/factory-setup
        with:
          aggressive-disk-cleanup: 'true'
          with-rust-ffi: 'true'
      - name: R2 Fallback for Rust FFI
        continue-on-error: true
        run: |
          FOUND=$(find rust -name '*.node' 2>/dev/null | wc -l)
          [ "$FOUND" -lt 9 ] && node scripts/factory/r2-workflow-cli.js restore-rust-ffi || true
      - name: Restore Base Output from Cache
        id: cache-output-fusion
        uses: actions/cache/restore@v5
        with:
          path: output/
          key: cycle-${{ needs.check-upstream.outputs.upstream-run-id }}-output
          # FIX-2 / C12 (D-264): the GHA cache is EXACT-KEY acceleration ONLY. The
          # `cycle-<upstream-run-id>-` restore-keys PREFIX authority is REMOVED (a prefix
          # hit is identity-ambiguous -- could pull a wrong-shape -shards/-harvest entry --
          # and was consumed UNVERIFIED). The verify-or-recover step below is the
          # correctness truth vs the attempt-scoped R2 authority.
      # FIX-2 / C12 (D-264) CONSUMER: verify-or-recover the EXACT cycle-output set
      # (output/cache/**) against the current-cycle attempt-scoped R2 AUTHORITY established
      # by 3/4 finalize. Cross-workflow cycle key = the 3/4 Aggregate run id = upstream-run-id.
      # The GHA cache (restored above) is USED only if output/cache/** EXACTLY matches the
      # producer manifest (EXACT-set + per-file sha + set_sha == descriptor set_sha); on GHA
      # miss OR mismatch wipe ONLY output/cache/** (NEVER output/data/, owned by FIX-4
      # meta-NN.db) + recover from the EXACT staging + re-verify. A missing authority /
      # invalid descriptor / residual mismatch FAILS CLOSED. The fixed prefix
      # state/cycle-output/ is NO LONGER a recovery input.
      - name: Verify or Recover Cycle Output from R2 Authority (FIX-2 / D-264)
        env:
          HANDOFF_FINALIZE_RUN_ID: ${{ needs.check-upstream.outputs.upstream-run-id }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          set -uo pipefail
          mkdir -p output/cache
          PID="${HANDOFF_FINALIZE_RUN_ID}"
          if [ -z "$PID" ]; then echo "::error::FIX-2: no upstream-run-id resolved -- cannot consume cycle-output safely."; exit 1; fi
          # (1) resolve the current-cycle attempt-scoped R2 authority descriptor (fail-closed).
          DESC="state/_handoff/cycle-output/${PID}/handoff.json"
          node scripts/factory/r2-workflow-cli.js restore-file "$DESC" /tmp/cycle-output-handoff-rb.json --strict || { echo "::error::FIX-2: no current-cycle cycle-output authority descriptor ($DESC). Fail-closed."; exit 1; }
          OUT=$(node scripts/factory/cycle-output-handoff-manifest.mjs verify-descriptor /tmp/cycle-output-handoff-rb.json --carrier=cycle-output-authority) || { echo "::error::FIX-2: cycle-output descriptor provenance invalid. Fail-closed."; exit 1; }
          STAGING_PREFIX=$(printf '%s' "$OUT" | cut -f1); EXPECT_SET_SHA=$(printf '%s' "$OUT" | cut -f2)
          node scripts/factory/r2-workflow-cli.js restore-file "${STAGING_PREFIX}manifest.json" /tmp/cycle-output-manifest.json --strict || { echo "::error::FIX-2: cycle-output manifest missing at ${STAGING_PREFIX}. Fail-closed."; exit 1; }
          verify_cycle_output() { node scripts/factory/cycle-output-handoff-manifest.mjs verify output /tmp/cycle-output-manifest.json --carrier=cycle-output-authority; }
          # (2) GHA fast path: verify the GHA-restored output/cache/** against the R2 manifest.
          NEED_RECOVER=0
          if OUT2=$(verify_cycle_output) && [ "$(printf '%s' "$OUT2" | tail -n1)" = "$EXPECT_SET_SHA" ]; then
            echo "[CYCLE-OUTPUT-HANDOFF] GHA fast-path cycle-output matches producer set_sha=$EXPECT_SET_SHA"
          else
            echo "[CYCLE-OUTPUT-HANDOFF] GHA miss/mismatch -- recover from exact staging"; NEED_RECOVER=1
          fi
          # (3) GHA miss/mismatch => wipe ONLY output/cache/** (NEVER output/data/) + recover
          # from the EXACT attempt-scoped staging + re-verify set_sha256.
          if [ "$NEED_RECOVER" = "1" ]; then
            rm -rf output/cache; mkdir -p output/cache
            node scripts/factory/r2-workflow-cli.js restore-dir "$STAGING_PREFIX" output/ --strict || { echo "::error::FIX-2: recover restore failed (${STAGING_PREFIX}). Fail-closed."; exit 1; }
            rm -f output/manifest.json output/handoff.json output/_manifest.json 2>/dev/null || true
            OUT2=$(verify_cycle_output) || { echo "::error::FIX-2: exact-staging cycle-output recovery failed verification (${STAGING_PREFIX}). Fail-closed."; exit 1; }
            [ "$(printf '%s' "$OUT2" | tail -n1)" = "$EXPECT_SET_SHA" ] || { echo "::error::FIX-2: recovered cycle-output set hash != producer $EXPECT_SET_SHA. Fail-closed."; exit 1; }
            echo "[CYCLE-OUTPUT-HANDOFF] recovered + verified cycle-output from exact staging"
          fi
      # V25.13: R2 fallback completeness gate (P3 fail-fast).
      # Mirrors 3/4 G1 — checks 3/4-actual outputs (satellite results in
      # output/cache/). Registry shards live in cache/ (separate cache key),
      # not output/cache/shards/. reports/index.json.zst is 4/4 vfs-packing's job.
      - name: Verify Cycle Output Completeness
        run: |
          set -e
          MISSING=()
          [ ! -f "output/cache/knowledge/index.json.zst" ] && MISSING+=("knowledge/index.json.zst")
          [ ! -f "output/cache/trending.json.zst" ] && MISSING+=("trending.json.zst")
          RANKINGS_COUNT=$(ls output/cache/rankings 2>/dev/null | wc -l)
          ARTICLES_COUNT=$(ls output/cache/knowledge/articles 2>/dev/null | wc -l)
          [ "$RANKINGS_COUNT" -lt 5 ] && MISSING+=("rankings (got $RANKINGS_COUNT, need ≥5)")
          [ "$ARTICLES_COUNT" -lt 10 ] && MISSING+=("knowledge articles (got $ARTICLES_COUNT, need ≥10)")
          if [ "${#MISSING[@]}" -gt 0 ]; then
            echo "::error::R2 cycle-output incomplete (P3 violation). Refusing to use partial state."
            for m in "${MISSING[@]}"; do echo "  - $m"; done
            echo "Action: trigger fresh 3/4 to rewrite R2 cycle-output."
            exit 1
          fi
          echo "✅ Cycle output complete: $ARTICLES_COUNT articles, $RANKINGS_COUNT rankings"
      - name: Restore Baked Profile Shards from Cache
        id: cache-baked
        uses: actions/cache/restore@v5
        with:
          path: output/cache/mesh/profile-shards/
          key: intra-4-4-baked-${{ needs.check-upstream.outputs.upstream-run-id }}-${{ github.run_id }}
          restore-keys: |
            intra-4-4-baked-${{ needs.check-upstream.outputs.upstream-run-id }}-
      # V27.52: file-existence (cache-hit false-fires on restore-keys partial match)
      - name: R2 Fallback for Profile Shards
        run: |
          if find output/cache/mesh/profile-shards -type f 2>/dev/null | head -1 | grep -q .; then
            echo "✅ Baked profile shards present from cache"
          else
            echo "⚠️ Baked profile shards missing — falling back to R2"
            node scripts/factory/r2-workflow-cli.js restore-dir state/mesh-profile-shards/ output/cache/mesh/profile-shards/
          fi
      # D-2026-0704-250 (GAP-1 stop-gap): the GHA cache is EXACT-KEY verified
      # acceleration ONLY. The bare restore-keys prefix authority (the old
      # `global-registry-` fallback line) is REMOVED — under the normal cron
      # cascade 3/4 is a workflow_run whose exact
      # `global-registry-<upstream>` SAVE is write-denied (GitHub 2026-06-26
      # read-only-cache policy), so the exact current-cycle key always misses and a
      # bare prefix would pull the newest SURVIVING registry from a prior/FOREIGN
      # cycle. That stale registry (if it had ≥100 .bin shards) then suppressed the
      # fresh current-cycle R2 restore -> silent stale/mixed-cycle Master Fusion
      # publication. A restore is trusted ONLY when cache-hit == 'true' (an exact
      # current-cycle key hit, i.e. this upstream cycle's own registry); every other
      # case falls through to the MANDATORY R2 state/registry/ authority below.
      - name: Restore Global Registry Cache
        id: cache-global-registry
        uses: actions/cache/restore@v5
        with:
          path: |
            cache/global-registry.json.zst
            cache/registry/
          key: global-registry-${{ needs.check-upstream.outputs.upstream-run-id }}
      # V27.53: Purge legacy .json.gz ghost files (mirror 3/4's V25.8.3 protection).
      # An exact-key GHA hit (or a legacy R2 restore below) may carry pre-V25.8.3
      # era legacy gzip shards. registry-loader.js rejects .json.gz (line 34), so
      # leaving them in place is harmless — but explicit purge makes diag log cleaner
      # and prevents future confusion. (D-250: the bare restore-keys prefix that used
      # to be the ghost source is removed; the ensure step below wipes+R2-restores any
      # non-exact-hit cache, so ghosts now only survive a genuine exact-cycle hit.)
      - name: Purge Legacy Registry Ghosts (V27.53)
        run: |
          if [ -d "cache/registry" ]; then
            GHOST_COUNT=$(find cache/registry -name 'part-*.json.gz' -o -name 'part-*.json' 2>/dev/null | wc -l)
            if [ "$GHOST_COUNT" -gt 0 ]; then
              echo "🧹 Purging ${GHOST_COUNT} legacy .json.gz ghost files from cache/registry/"
              find cache/registry -name 'part-*.json.gz' -delete 2>/dev/null || true
              find cache/registry -name 'part-*.json' -delete 2>/dev/null || true
            fi
            BIN_COUNT=$(find cache/registry -name 'part-*.bin' 2>/dev/null | wc -l)
            echo "[V27.53] cache/registry: ${BIN_COUNT} .bin shards, 0 legacy ghosts"
          fi
      # D-2026-0704-250 (GAP-1 stop-gap): establish a CURRENT-CYCLE registry, fresh
      # R2 WINS. INVARIANT: a stale or restore-keys-prefix-restored GitHub cache must
      # NEVER prevent/suppress the current-cycle R2 state/registry/ restore that 3/4
      # wrote for this exact cycle. The old `BIN_COUNT>=100 -> skip R2` gate is GONE:
      # it trusted a bare-restore-keys FOREIGN-cycle registry and suppressed the fresh
      # restore. Now the GHA cache is trusted ONLY on an EXACT current-cycle key hit
      # (steps.cache-global-registry.outputs.cache-hit == 'true'); any non-exact case
      # WIPES the (possibly prefix-restored/stale) cache and does the MANDATORY fresh
      # R2 restore, preserving the legit fallback chain (state/registry/ -> monolith
      # state/global-registry.json.zst -> r2-registry-restore.js bootstrap). Fails
      # CLOSED (exit 1) if neither an exact current-cycle GHA hit NOR a fresh R2
      # restore reaches the ≥100 .bin shard floor — no stale/foreign registry may
      # proceed into Master Fusion as valid-id / FNI-percentile authority.
      - name: Ensure Current-Cycle Registry (D-250, fail-closed)
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
          CACHE_EXACT_HIT: ${{ steps.cache-global-registry.outputs.cache-hit }}
        run: |
          # (1) EXACT current-cycle GHA cache hit is the ONLY trusted fast path.
          if [ "$CACHE_EXACT_HIT" = "true" ]; then
            BIN_COUNT=$(find cache/registry -name 'part-*.bin' 2>/dev/null | wc -l)
            if [ "$BIN_COUNT" -ge 100 ]; then
              echo "✅ [D-250] Exact current-cycle GHA registry cache hit: ${BIN_COUNT} .bin shards (trusted acceleration; no R2 restore needed)"
              exit 0
            fi
            echo "⚠️ [D-250] Exact cache hit but only ${BIN_COUNT} .bin shards (<100) — falling through to the mandatory R2 authority"
          else
            echo "ℹ️ [D-250] No exact current-cycle GHA registry cache (cache-hit='${CACHE_EXACT_HIT}') — a restore-keys/prefix match is NEVER authority. Wiping any stale/foreign cache and restoring fresh from R2 state/registry/."
          fi
          # (2) Non-exact => WIPE any prefix-restored/stale registry so a foreign-cycle
          #     cache can never be consumed as authority, then MANDATORY fresh R2
          #     current-cycle restore (state/registry/ populated by 3/4 for THIS cycle).
          rm -rf cache/registry cache/global-registry.json.zst
          mkdir -p cache/registry
          # Fresh path (state/registry/) first — the current-cycle authority 3/4 wrote.
          node scripts/factory/r2-workflow-cli.js restore-dir state/registry/ cache/registry/ || echo "⚠️ state/registry/ unavailable (3/4 V27.53 may not have run yet)"
          # Monolith download (legit fallback #2).
          node scripts/factory/r2-workflow-cli.js restore-file state/global-registry.json.zst cache/global-registry.json.zst 2>/dev/null || true
          # Last-resort bootstrap (legit fallback #3): V25.8 handles legacy meta/backup/registry/ + format mismatch.
          BIN_COUNT=$(find cache/registry -name 'part-*.bin' 2>/dev/null | wc -l)
          if [ "$BIN_COUNT" -lt 100 ]; then
            echo "⚠️ Still ${BIN_COUNT} after state/registry/ restore — invoking r2-registry-restore.js for legacy/bootstrap paths"
            node scripts/factory/lib/r2-registry-restore.js || echo "⚠️ Bootstrap restore failed"
          fi
          BIN_COUNT=$(find cache/registry -name 'part-*.bin' 2>/dev/null | wc -l)
          echo "[D-250] Final: ${BIN_COUNT} .bin shards in cache/registry/ (fresh current-cycle R2 authority)"
          if [ "$BIN_COUNT" -lt 100 ]; then
            echo "::error::[D-250] No current-cycle registry established: neither an exact current-cycle GHA cache hit nor a fresh R2 state/registry/ restore reached the ≥100 .bin shard floor. Failing CLOSED to prevent stale/mixed-cycle Master Fusion publication."
            exit 1
          fi
      - name: Align Registry Cache for Fusion
        run: |
          mkdir -p output/cache/registry
          [ -f "cache/global-registry.json.zst" ] && cp cache/global-registry.json.zst output/cache/ || true
          [ -d "cache/registry" ] && cp -r cache/registry/* output/cache/registry/ 2>/dev/null || true
          echo "✅ Registry aligned: $(ls output/cache/registry/ 2>/dev/null | wc -l) shards"
      # V27.52: restore cycle-scoped fused cache for re-dispatch reuse. S1-BR: EXACT
      # key only — the restore-keys prefix is removed so a re-dispatch can never pull a
      # FOREIGN-attempt's fused output (identity-ambiguous) and skip recompute on it. An
      # exact-key miss simply recomputes (the >=400 gates + handoff re-validate fresh).
      - name: Restore Fused Cache (V27.52)
        id: cache-fused-restore
        if: ${{ !inputs.force_fresh }}
        uses: actions/cache/restore@v5
        with:
          path: output/cache/fused/
          key: intra-4-4-fused-${{ needs.check-upstream.outputs.upstream-run-id }}-${{ github.run_id }}
      - name: Detect fused output present
        id: detect-fused
        run: |
          # Reuse Verify Shard Count threshold (400 shards) so skip only when sentinel-passing data is present.
          FUSED_COUNT=$(find output/cache/fused -name 'part-*.json.zst' 2>/dev/null | wc -l)
          if [ "$FUSED_COUNT" -ge 400 ] && [ -f output/cache/fused/.complete ]; then
            echo "skip_compute=true" >> "$GITHUB_OUTPUT"
            echo "[V27.52] ${FUSED_COUNT} fused shards + sentinel present → skip Master Fusion compute"
          else
            echo "skip_compute=false" >> "$GITHUB_OUTPUT"
            echo "[V27.52] ${FUSED_COUNT} fused shards present (need ≥400 + .complete sentinel) → fresh Fusion"
          fi
      # D-297 (PR-B): FAIL-CLOSED capacity preflight BEFORE Master Fusion. Mirrors the
      # SAME skip guard so it runs only when Fusion will actually compute. master-fusion.js
      # loads the aligned registry .bin shards + enrichment-local into memory and re-writes
      # fused part-NNN.json.zst. MEASURES df free + du of output/cache/registry +
      # output/cache/enrichment-local, fails closed INSUFFICIENT_RUNNER_DISK_UPLOAD_MASTER_FUSION
      # (+ coarse memory guard) BEFORE the compute. No warning-only, no `|| true`.
      - name: Capacity Preflight — Master Fusion (fail-closed)
        if: steps.detect-fused.outputs.skip_compute != 'true'
        env:
          CAPACITY_OLD_SPACE_MB: '8192'  # mirror the Master Fusion step's --max-old-space-size for the coarse memory guard
        run: node scripts/factory/lib/runner-capacity-preflight.mjs UPLOAD_MASTER_FUSION
      - name: Execute Master Fusion
        if: steps.detect-fused.outputs.skip_compute != 'true'
        env:
          CACHE_DIR: ./output/cache
          ARTIFACT_DIR: ./output/cache/registry
          AES_CRYPTO_KEY: ${{ secrets.AES_CRYPTO_KEY }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
          # §18.22.4: --unhandled-rejections=strict surfaces silent promise
          # rejections instead of letting them swallow the process. RUST_BACKTRACE
          # ensures the next NAPI panic leaves an unwind trace in stderr.
          NODE_OPTIONS: '--max-old-space-size=8192 --expose-gc --unhandled-rejections=strict'
          RUST_BACKTRACE: full
        # §18.22.4: explicit exit-code capture. The previous `run: node …`
        # form returned green when the field run silently aborted at part-087.
        run: |
          set -uo pipefail
          node scripts/factory/master-fusion.js
          rc=$?
          echo "[GHA] master-fusion.js exit code: ${rc}"
          if [ "${rc}" != "0" ]; then
            echo "::error::Master Fusion exited with code ${rc}"
            exit "${rc}"
          fi
      - name: Verify Master Fusion Sentinel
        # §18.22.4: file-existence check is the ONLY mechanism that survives
        # native crashes that bypass Node's 'exit' event. master-fusion.js
        # writes .complete only after its post-loop assertion passes.
        run: |
          set -euo pipefail
          if [ ! -f output/cache/fused/.complete ]; then
            echo "::error::Master Fusion did not produce .complete sentinel — silent early-exit suspected"
            ls -la output/cache/fused/ 2>/dev/null || echo "(fused/ dir missing)"
            exit 1
          fi
          echo "[GHA] Master Fusion sentinel verified:"
          cat output/cache/fused/.complete
      # V25.13: Absolute entity count gate (P6 fail-fast).
      # Sentinel only checks "processed == expected shards" — passes even if
      # input was a truncated cycle-output. This adds an absolute lower bound
      # against historical baseline (~480K). Prior catastrophic run produced
      # 301K (38% drop) and pack-db halted 1+ hour later at FNI=77% zero
      # sanity check — wasted 1+ hour. Fail HERE instead.
      - name: Verify Master Fusion Shard Count
        # V25.13: master-fusion.js:134 writes `part-NNN.json.zst` per shard (~488 normal).
        # Each shard contains ~1000 entities. Threshold 400 shards ≈ 400K entities.
        # Sentinel `.complete` written only if processedCount >= expectedCount
        # (fusion-completion-guard.js), so existence implies no silent-truncate.
        run: |
          set -e
          SHARD_COUNT=$(find output/cache/fused -name 'part-*.json.zst' | wc -l)
          THRESHOLD=400
          # Sentinel content (already verified to exist by prior step)
          SENTINEL_PROCESSED=$(node -e "try{const j=require('fs').readFileSync('output/cache/fused/.complete','utf8');process.stdout.write(String(JSON.parse(j).processedShards||0))}catch{process.stdout.write('0')}")
          echo "[GHA] Master Fusion: $SHARD_COUNT files in fused/, sentinel.processedShards=$SENTINEL_PROCESSED"
          if [ "$SHARD_COUNT" -lt "$THRESHOLD" ] || [ "$SENTINEL_PROCESSED" -lt "$THRESHOLD" ]; then
            echo "::error::Master Fusion shard count below threshold ($SHARD_COUNT files / $SENTINEL_PROCESSED reported < $THRESHOLD)."
            echo "Refusing to save partial fused-entities.tar that would propagate to vfs-packing → bad FNI → broken cycle."
            echo "Likely cause: incomplete cycle-output input (R2 state stale, or 3/4 produced fewer than expected)."
            exit 1
          fi
          echo "✅ Shard gate passed: $SHARD_COUNT files / $SENTINEL_PROCESSED reported ≥ $THRESHOLD (≈$((SHARD_COUNT * 1000)) entities)"
      # V27.40 end of master-fusion-compute. V27.52: per-dispatch unique save key
      # gated on detect-fused (mirrors Compute condition — fires when fresh compute
      # ran, skips when restore-keys hit and Verify gates already validated cached data).
      # S1-BR: generate the producer manifest BEFORE the cache save so the GHA
      # fast-path cache carries manifest.json (lets consumers verify the GHA hit
      # against the descriptor without always falling back to exact staging). Runs
      # after the .complete + >=400 gates, so the carrier set is sentinel-passing.
      - name: Generate Fused Handoff Manifest (S1-BR)
        if: success()
        env:
          HANDOFF_UPSTREAM_RUN_ID: ${{ needs.check-upstream.outputs.upstream-run-id }}
          HANDOFF_FACTORY_RUN_ID: ${{ github.run_id }}
          HANDOFF_PRODUCER_ATTEMPT: ${{ github.run_attempt }}
          HANDOFF_HEAD_SHA: ${{ github.sha }}
        run: node scripts/factory/fused-handoff-manifest.js generate output/cache/fused/ output/cache/fused/manifest.json
      - name: Save Fused Entities to Cache
        if: success() && steps.detect-fused.outputs.skip_compute != 'true'
        uses: actions/cache/save@v5
        with:
          path: output/cache/fused/
          key: intra-4-4-fused-${{ needs.check-upstream.outputs.upstream-run-id }}-${{ github.run_id }}
      # S1-BR EXACT-PRODUCER R2 HANDOFF — Compute produces a DURABLE, run +
      # PRODUCER-attempt scoped, content-verified handoff to R2 so Persist never
      # depends on the LRU-evicted GHA fused cache (the root cause: the cache
      # carrying output/cache/fused/ was unretrievable at Persist restore time,
      # forcing a fail-closed empty-state guard). Runs AFTER the .complete + >=400
      # gates above, so output/cache/fused/ is sentinel-passing. PRODUCER attempt =
      # github.run_attempt OF THIS compute job (the attempt that produced the set).
      # Order: (1) local manifest -> (2) ALL data + .complete + manifest.json to the
      # attempt-scoped staging prefix (manifest LAST) -> (3) handoff.json descriptor
      # LAST OF ALL at the run level. Fail-loud on any step (no empty handoff).
      - name: Produce Exact-Producer R2 Handoff (S1-BR)
        if: success()
        env:
          HANDOFF_UPSTREAM_RUN_ID: ${{ needs.check-upstream.outputs.upstream-run-id }}
          HANDOFF_FACTORY_RUN_ID: ${{ github.run_id }}
          HANDOFF_PRODUCER_ATTEMPT: ${{ github.run_attempt }}
          HANDOFF_HEAD_SHA: ${{ github.sha }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          set -euo pipefail
          UP="${HANDOFF_UPSTREAM_RUN_ID}"
          RUN="${HANDOFF_FACTORY_RUN_ID}"
          ATT="${HANDOFF_PRODUCER_ATTEMPT}"
          RUN_PREFIX="state/_handoff/fused/${UP}/${RUN}"
          export STAGING="${RUN_PREFIX}/attempt-${ATT}/"
          # (1) local manifest over the carrier set (part-*.json.zst + .complete).
          node scripts/factory/fused-handoff-manifest.js generate output/cache/fused/ output/cache/fused/manifest.json
          # (2) upload ALL data objects (part-*.json.zst + .complete) FIRST, EXCLUDING
          # manifest.json so it is uploaded strictly LAST.
          node scripts/factory/r2-workflow-cli.js backup-dir output/cache/fused/ "${STAGING}" --extensions=.json.zst,.complete
          # (2a) explicitly upload the .complete sentinel so it never depends on the
          # backup-dir extension matcher (Rust FFI walkDirWithMd5 is unverified for the
          # dotfile; JS fallback uses endsWith which is fine). Idempotent re-upload.
          node scripts/factory/r2-workflow-cli.js upload-file output/cache/fused/.complete "${STAGING}.complete"
          # (2b) manifest.json LAST (after every data object is durable).
          node scripts/factory/r2-workflow-cli.js upload-file output/cache/fused/manifest.json "${STAGING}manifest.json"
          # (3) run-scoped descriptor handoff.json LAST OF ALL. Points ONLY at the
          # CURRENT upstream + CURRENT factory run + this producer attempt — no list,
          # no prefix guess, no previous-run fallback.
          export MANIFEST_SHA=$(node -e "const c=require('crypto'),f=require('fs');process.stdout.write(c.createHash('sha256').update(f.readFileSync('output/cache/fused/manifest.json')).digest('hex'))")
          export SET_SHA=$(node -e "const m=require('./output/cache/fused/manifest.json');process.stdout.write(m.set_sha256)")
          node -e "const f=require('fs');f.writeFileSync('output/cache/fused/handoff.json',JSON.stringify({producer_attempt:Number(process.env.HANDOFF_PRODUCER_ATTEMPT),exact_staging_prefix:process.env.STAGING,manifest_sha256:process.env.MANIFEST_SHA,set_sha256:process.env.SET_SHA,upstream_run_id:String(process.env.HANDOFF_UPSTREAM_RUN_ID),factory_run_id:String(process.env.HANDOFF_FACTORY_RUN_ID),head_sha:String(process.env.HANDOFF_HEAD_SHA),created_at:new Date().toISOString()}))"
          node scripts/factory/r2-workflow-cli.js upload-file output/cache/fused/handoff.json "${RUN_PREFIX}/handoff.json"
          echo "✅ [HANDOFF] staging=${STAGING} set_sha256=${SET_SHA} descriptor=${RUN_PREFIX}/handoff.json"

  # V27.40: master-fusion-persist isolates R2 backup from heavy compute.
  # Transient R2 failure → re-run only persist (~3-5m), not 1h20m fusion.
  master-fusion-persist:
    name: Master Fusion (Persist R2)
    needs: [master-fusion-compute, check-upstream]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # S1-BR: expose the VERIFIED handoff identity so downstream consumers
    # (vfs-pack-db, upload) verify their restored fused set EQUALS this exact one
    # and recover from the SAME exact producer staging prefix on any miss/mismatch.
    outputs:
      verified_fused_manifest_sha: ${{ steps.handoff-verify.outputs.manifest_sha }}
      verified_fused_set_sha: ${{ steps.handoff-verify.outputs.set_sha }}
      verified_fused_staging_prefix: ${{ steps.handoff-verify.outputs.staging_prefix }}
      verified_fused_producer_attempt: ${{ steps.handoff-verify.outputs.producer_attempt }}
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/factory-setup
        with:
          aggressive-disk-cleanup: 'false'
          with-rust-ffi: 'false'
      # S1-BR AUTHORITATIVE ORDER. The GHA fused cache is an OPTIONAL FAST PATH,
      # NOT authority — the run-scoped descriptor + content-verified producer
      # staging prefix is. (1) read descriptor -> (2) verify provenance ->
      # (3) TRY exact-key GHA restore (NO restore-keys prefix) -> (4) verify the
      # GHA-restored content EXACTLY matches the descriptor manifest + set hash ->
      # (5) on miss OR mismatch: wipe local fused/ + restore from the EXACT producer
      # staging prefix -> (6) full manifest verification -> (7) mark VERIFIED ->
      # (8) only THEN publish the compatibility copy to state/fused-entities/.
      - name: Fetch + Verify Handoff Descriptor (S1-BR)
        id: handoff-verify
        env:
          HANDOFF_UPSTREAM_RUN_ID: ${{ needs.check-upstream.outputs.upstream-run-id }}
          HANDOFF_FACTORY_RUN_ID: ${{ github.run_id }}
          HANDOFF_RUN_ATTEMPT: ${{ github.run_attempt }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          set -euo pipefail
          UP="${HANDOFF_UPSTREAM_RUN_ID}"; RUN="${HANDOFF_FACTORY_RUN_ID}"
          DESC_KEY="state/_handoff/fused/${UP}/${RUN}/handoff.json"
          # (1) read the run-scoped descriptor (missing/malformed => fail-loud).
          if ! node scripts/factory/r2-workflow-cli.js restore-file "${DESC_KEY}" /tmp/handoff.json; then
            echo "::error::Handoff descriptor ${DESC_KEY} unretrievable — Compute must write it LAST. Fail-closed (no empty-state publish)."
            exit 1
          fi
          if [ ! -s /tmp/handoff.json ]; then echo "::error::Handoff descriptor empty/missing"; exit 1; fi
          # (2) verify provenance: current upstream + current run; producer_attempt
          # <= current run_attempt; exact staging prefix derivation. Emits prefix\tset.
          OUT=$(node scripts/factory/fused-handoff-manifest.js verify-descriptor /tmp/handoff.json)
          STAGING_PREFIX=$(printf '%s' "$OUT" | cut -f1)
          SET_SHA=$(printf '%s' "$OUT" | cut -f2)
          MANIFEST_SHA=$(node -e "process.stdout.write(String(require('/tmp/handoff.json').manifest_sha256))")
          PRODUCER_ATTEMPT=$(node -e "process.stdout.write(String(require('/tmp/handoff.json').producer_attempt))")
          echo "staging_prefix=${STAGING_PREFIX}" >> "$GITHUB_OUTPUT"
          echo "set_sha=${SET_SHA}" >> "$GITHUB_OUTPUT"
          echo "manifest_sha=${MANIFEST_SHA}" >> "$GITHUB_OUTPUT"
          echo "producer_attempt=${PRODUCER_ATTEMPT}" >> "$GITHUB_OUTPUT"
          echo "✅ [HANDOFF] descriptor verified: staging=${STAGING_PREFIX} set=${SET_SHA}"
      # (3) OPTIONAL FAST PATH: exact-key GHA cache restore. NO restore-keys prefix —
      # a prefix hit is identity-ambiguous and is NOT authority. A miss is fine; the
      # exact-staging recovery below is the durable source of truth.
      - name: Restore Fused Entities (GHA fast path, exact key only)
        id: cache-restore-fused
        uses: actions/cache/restore@v5
        with:
          path: output/cache/fused/
          key: intra-4-4-fused-${{ needs.check-upstream.outputs.upstream-run-id }}-${{ github.run_id }}
      # (4)+(5)+(6) verify GHA content == descriptor manifest/set EXACTLY; on miss OR
      # mismatch wipe local fused/ and restore from the EXACT producer staging prefix,
      # then full-verify. (7) mark VERIFIED_FUSED_HANDOFF. An exact GHA hit with 400
      # files + .complete is NOT acceptable unless it matches the handoff manifest.
      - name: Verify or Recover Fused from Exact Staging (S1-BR)
        env:
          STAGING_PREFIX: ${{ steps.handoff-verify.outputs.staging_prefix }}
          EXPECT_SET_SHA: ${{ steps.handoff-verify.outputs.set_sha }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          set -uo pipefail
          verify() {
            node scripts/factory/fused-handoff-manifest.js verify output/cache/fused/ output/cache/fused/manifest.json
          }
          NEED_RECOVER=0
          # GHA fast path is only trusted if it carries the producer's manifest.json AND
          # full verification passes (set hash + per-file + counts).
          if [ -f output/cache/fused/manifest.json ] && OUT=$(verify); then
            GOT=$(printf '%s' "$OUT" | tail -n1)
            if [ "$GOT" = "$EXPECT_SET_SHA" ]; then
              echo "✅ [HANDOFF] GHA fast-path content matches descriptor set_sha=$GOT"
            else
              echo "⚠️ [HANDOFF] GHA set hash $GOT != descriptor $EXPECT_SET_SHA — recover from exact staging"; NEED_RECOVER=1
            fi
          else
            echo "⚠️ [HANDOFF] GHA fast path missing/unverified — recover from exact staging"; NEED_RECOVER=1
          fi
          if [ "$NEED_RECOVER" = "1" ]; then
            rm -rf output/cache/fused/
            mkdir -p output/cache/fused/
            node scripts/factory/r2-workflow-cli.js restore-dir "$STAGING_PREFIX" output/cache/fused/ --strict
            # backup-dir's restore fast-path uses its own _manifest.json sidecar and
            # excludes the producer manifest.json (uploaded separately, LAST). Restore
            # it explicitly so `verify` has the producer manifest to verify against.
            node scripts/factory/r2-workflow-cli.js restore-file "${STAGING_PREFIX}manifest.json" output/cache/fused/manifest.json --strict
            # Explicitly restore the .complete sentinel so recovery never depends on
            # restore-dir having captured the dotfile (belt-and-suspenders for the
            # producer-side explicit upload above). Before verify so the .complete gate sees it.
            node scripts/factory/r2-workflow-cli.js restore-file "${STAGING_PREFIX}.complete" output/cache/fused/.complete --strict
            OUT=$(verify) || { echo "::error::Exact-staging recovery failed verification ($STAGING_PREFIX). Fail-closed."; exit 1; }
            GOT=$(printf '%s' "$OUT" | tail -n1)
            if [ "$GOT" != "$EXPECT_SET_SHA" ]; then
              echo "::error::Recovered set hash $GOT != descriptor $EXPECT_SET_SHA. Fail-closed."; exit 1
            fi
            echo "✅ [HANDOFF] recovered + verified from exact staging set_sha=$GOT"
          fi
          echo "VERIFIED_FUSED_HANDOFF=1"
      # (8) COMPATIBILITY PUBLICATION COPY only. state/fused-entities/ is NEVER a
      # pre-Persist recovery input, NEVER exact-cycle authority, NEVER a prefix-fallback
      # input — it is written ONLY after VERIFIED above (not an atomic promotion).
      - name: Publish Fused Compatibility Copy to R2
        if: success()
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: node scripts/factory/r2-workflow-cli.js backup-dir output/cache/fused/ state/fused-entities/

  # V27.40: vfs-packing renamed to vfs-pack-db; sitemap/RSS/health moved to vfs-derived.
  # Pack-db heavy step + verify-gate stay here; derived artifacts split into separate job.
  vfs-pack-db:
    name: VFS Packing (Stable 1.0) — Compute
    needs: [master-fusion-persist, check-upstream]
    runs-on: ubuntu-latest
    timeout-minutes: 330
    # D-245 PRIMARY: expose the VERIFIED vfs-pack R2 authority identity so VFS Derived
    # verifies its restored meta-NN.db set EQUALS this exact one and recovers from the
    # SAME exact producer staging prefix on any GHA miss/mismatch (durable R2 authority;
    # GHA demoted to verified acceleration).
    outputs:
      verified_vfs_pack_staging_prefix: ${{ steps.vfs-pack-handoff.outputs.staging_prefix }}
      verified_vfs_pack_set_sha: ${{ steps.vfs-pack-handoff.outputs.set_sha }}
      verified_vfs_pack_producer_attempt: ${{ steps.vfs-pack-handoff.outputs.producer_attempt }}
      # AUTHORITY-W (4/4): the VERIFIED warm-read (bins + term_index) sibling set-sha so
      # vfs-derived + upload verify the served warm-tier artifacts are THIS exact cycle's.
      verified_vfs_pack_warm_read_set_sha: ${{ steps.vfs-pack-handoff.outputs.warm_read_set_sha }}
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/factory-setup
        with:
          aggressive-disk-cleanup: 'true'
          with-rust-ffi: 'true'
      - name: R2 Fallback for Rust FFI
        continue-on-error: true
        run: |
          FOUND=$(find rust -name '*.node' 2>/dev/null | wc -l)
          [ "$FOUND" -lt 9 ] && node scripts/factory/r2-workflow-cli.js restore-rust-ffi || true
      - name: Restore Base Output (Trending Context)
        id: cache-output-vfs
        uses: actions/cache/restore@v5
        with:
          path: output/
          key: cycle-${{ needs.check-upstream.outputs.upstream-run-id }}-output
          # FIX-2 / C12 (D-264): the GHA cache is EXACT-KEY acceleration ONLY. The
          # `cycle-<upstream-run-id>-` restore-keys PREFIX authority is REMOVED (a prefix
          # hit is identity-ambiguous -- could pull a wrong-shape -shards/-harvest entry --
          # and was consumed UNVERIFIED). The verify-or-recover step below is the
          # correctness truth vs the attempt-scoped R2 authority.
      # FIX-2 / C12 (D-264) CONSUMER: verify-or-recover the EXACT cycle-output set
      # (output/cache/**) against the current-cycle attempt-scoped R2 AUTHORITY established
      # by 3/4 finalize. Cross-workflow cycle key = the 3/4 Aggregate run id = upstream-run-id.
      # The GHA cache for cycle-<run_id>-output gets LRU-evicted within ~24h (vfs-assets,
      # fused, embeddings push past the 10GB per-repo limit); pack-db.js needs cache/mesh/
      # graph.json + search-core.json + category_stats.json which only live in cycle-output.
      # The GHA cache (restored above) is USED only if output/cache/** EXACTLY matches the
      # producer manifest (EXACT-set + per-file sha + set_sha == descriptor set_sha); on GHA
      # miss OR mismatch wipe ONLY output/cache/** (NEVER output/data/, owned by FIX-4
      # meta-NN.db) + recover from the EXACT staging + re-verify. A missing authority /
      # invalid descriptor / residual mismatch FAILS CLOSED. The fixed prefix
      # state/cycle-output/ is NO LONGER a recovery input.
      - name: Verify or Recover Cycle Output from R2 Authority (FIX-2 / D-264)
        env:
          HANDOFF_FINALIZE_RUN_ID: ${{ needs.check-upstream.outputs.upstream-run-id }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          set -uo pipefail
          mkdir -p output/cache
          PID="${HANDOFF_FINALIZE_RUN_ID}"
          if [ -z "$PID" ]; then echo "::error::FIX-2: no upstream-run-id resolved -- cannot consume cycle-output safely."; exit 1; fi
          # (1) resolve the current-cycle attempt-scoped R2 authority descriptor (fail-closed).
          DESC="state/_handoff/cycle-output/${PID}/handoff.json"
          node scripts/factory/r2-workflow-cli.js restore-file "$DESC" /tmp/cycle-output-handoff-rb.json --strict || { echo "::error::FIX-2: no current-cycle cycle-output authority descriptor ($DESC). Fail-closed."; exit 1; }
          OUT=$(node scripts/factory/cycle-output-handoff-manifest.mjs verify-descriptor /tmp/cycle-output-handoff-rb.json --carrier=cycle-output-authority) || { echo "::error::FIX-2: cycle-output descriptor provenance invalid. Fail-closed."; exit 1; }
          STAGING_PREFIX=$(printf '%s' "$OUT" | cut -f1); EXPECT_SET_SHA=$(printf '%s' "$OUT" | cut -f2)
          node scripts/factory/r2-workflow-cli.js restore-file "${STAGING_PREFIX}manifest.json" /tmp/cycle-output-manifest.json --strict || { echo "::error::FIX-2: cycle-output manifest missing at ${STAGING_PREFIX}. Fail-closed."; exit 1; }
          verify_cycle_output() { node scripts/factory/cycle-output-handoff-manifest.mjs verify output /tmp/cycle-output-manifest.json --carrier=cycle-output-authority; }
          # (2) GHA fast path: verify the GHA-restored output/cache/** against the R2 manifest.
          NEED_RECOVER=0
          if OUT2=$(verify_cycle_output) && [ "$(printf '%s' "$OUT2" | tail -n1)" = "$EXPECT_SET_SHA" ]; then
            echo "[CYCLE-OUTPUT-HANDOFF] GHA fast-path cycle-output matches producer set_sha=$EXPECT_SET_SHA"
          else
            echo "[CYCLE-OUTPUT-HANDOFF] GHA miss/mismatch -- recover from exact staging"; NEED_RECOVER=1
          fi
          # (3) GHA miss/mismatch => wipe ONLY output/cache/** (NEVER output/data/) + recover
          # from the EXACT attempt-scoped staging + re-verify set_sha256.
          if [ "$NEED_RECOVER" = "1" ]; then
            rm -rf output/cache; mkdir -p output/cache
            node scripts/factory/r2-workflow-cli.js restore-dir "$STAGING_PREFIX" output/ --strict || { echo "::error::FIX-2: recover restore failed (${STAGING_PREFIX}). Fail-closed."; exit 1; }
            rm -f output/manifest.json output/handoff.json output/_manifest.json 2>/dev/null || true
            OUT2=$(verify_cycle_output) || { echo "::error::FIX-2: exact-staging cycle-output recovery failed verification (${STAGING_PREFIX}). Fail-closed."; exit 1; }
            [ "$(printf '%s' "$OUT2" | tail -n1)" = "$EXPECT_SET_SHA" ] || { echo "::error::FIX-2: recovered cycle-output set hash != producer $EXPECT_SET_SHA. Fail-closed."; exit 1; }
            echo "[CYCLE-OUTPUT-HANDOFF] recovered + verified cycle-output from exact staging"
          fi
      - name: R2 Fallback for Trending Data
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          mkdir -p output/cache
          [ ! -f "output/cache/trending.json.zst" ] && node scripts/factory/r2-workflow-cli.js restore-file state/satellite-trending/trending.json.zst output/cache/trending.json.zst || true
          [ ! -f "output/cache/trend-data.json.zst" ] && node scripts/factory/r2-workflow-cli.js restore-file state/satellite-trending/trend-data.json.zst output/cache/trend-data.json.zst || true
          # V27.38: trends-summary.json.zst fallback removed (V27.36 paused generation)
      # S1-BR consumer (VFS Packing): may first try the exact-key GHA cache, but the
      # restored fused set's manifest/set hash MUST EQUAL the Persist-VERIFIED identity.
      # NO restore-keys prefix (identity-ambiguous), NO state/fused-entities/ fixed
      # fallback (that fixed prefix is a compatibility copy, not current-run authority).
      # On miss OR mismatch: wipe local fused/ + restore from the EXACT producer staging
      # prefix from Persist's output, then re-verify; verification failure => fail-loud.
      - name: Restore Fused Entities (GHA fast path, exact key only)
        id: cache-fused
        uses: actions/cache/restore@v5
        with:
          path: output/cache/fused/
          key: intra-4-4-fused-${{ needs.check-upstream.outputs.upstream-run-id }}-${{ github.run_id }}
      - name: Verify or Recover Fused from Exact Staging (S1-BR)
        env:
          STAGING_PREFIX: ${{ needs.master-fusion-persist.outputs.verified_fused_staging_prefix }}
          EXPECT_SET_SHA: ${{ needs.master-fusion-persist.outputs.verified_fused_set_sha }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          set -uo pipefail
          if [ -z "${STAGING_PREFIX}" ] || [ -z "${EXPECT_SET_SHA}" ]; then
            echo "::error::Persist did not export a verified fused identity — cannot consume fused safely."; exit 1
          fi
          verify() { node scripts/factory/fused-handoff-manifest.js verify output/cache/fused/ output/cache/fused/manifest.json; }
          NEED_RECOVER=0
          if [ -f output/cache/fused/manifest.json ] && OUT=$(verify) && [ "$(printf '%s' "$OUT" | tail -n1)" = "$EXPECT_SET_SHA" ]; then
            echo "✅ [HANDOFF] VFS fast-path fused matches Persist set_sha=$EXPECT_SET_SHA"
          else
            echo "⚠️ [HANDOFF] VFS fused miss/mismatch — recover from exact staging"; NEED_RECOVER=1
          fi
          if [ "$NEED_RECOVER" = "1" ]; then
            rm -rf output/cache/fused/; mkdir -p output/cache/fused/
            node scripts/factory/r2-workflow-cli.js restore-dir "$STAGING_PREFIX" output/cache/fused/ --strict
            node scripts/factory/r2-workflow-cli.js restore-file "${STAGING_PREFIX}manifest.json" output/cache/fused/manifest.json --strict
            # Explicitly restore the .complete sentinel so recovery never depends on
            # restore-dir having captured the dotfile (before verify so the gate sees it).
            node scripts/factory/r2-workflow-cli.js restore-file "${STAGING_PREFIX}.complete" output/cache/fused/.complete --strict
            OUT=$(verify) || { echo "::error::VFS exact-staging recovery failed verification ($STAGING_PREFIX)."; exit 1; }
            [ "$(printf '%s' "$OUT" | tail -n1)" = "$EXPECT_SET_SHA" ] || { echo "::error::VFS recovered set hash != Persist $EXPECT_SET_SHA."; exit 1; }
            echo "✅ [HANDOFF] VFS recovered + verified from exact staging"
          fi
      # Embedding-shard restore. The EMBED_CODE_VERSION token in the key busts the
      # cache when the embedding logic changes (pack-db.js re-embeds only ids NOT in
      # the restored shards, so a stale token would freeze every vector); bump it to
      # force a full re-embed. restore-keys stay scoped to the SAME code version —
      # they never fall through to a bare cross-version prefix.
      # NOT gated on force_fresh (revert of #2150): force_fresh must recompute
      # baker/mesh/master-fusion/pack, but a cold 551K embedding recompute (≈12-19h)
      # blows the 330-min job cap → cancelled. Restoring warm embeddings keeps
      # force_fresh viable while pack-db still re-embeds only genuinely-new ids.
      - name: Restore Embedding Shards (Cache)
        id: cache-embedding
        uses: actions/cache/restore@v5
        with:
          path: output/cache/embeddings/
          key: embedding-shards-${{ env.EMBED_CODE_VERSION }}-${{ needs.check-upstream.outputs.upstream-run-id }}-${{ github.run_id }}
          restore-keys: |
            embedding-shards-${{ env.EMBED_CODE_VERSION }}-${{ needs.check-upstream.outputs.upstream-run-id }}-
            embedding-shards-${{ env.EMBED_CODE_VERSION }}-
      # R2 fallback when the GHA cache misses. Runs regardless of force_fresh
      # (revert of #2150) so a force_fresh dispatch still restores warm vectors and
      # avoids the 330-min-busting cold recompute; pack-db re-embeds only new ids.
      - name: R2 Fallback for Embedding Shards
        if: steps.cache-embedding.outputs.cache-hit != 'true'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          mkdir -p output/cache/embeddings
          node scripts/factory/r2-workflow-cli.js restore-dir state/embeddings/ output/cache/embeddings/ || echo "⚠️ No embedding shards on R2 — cold start"
      - name: Restore Pack-State DB
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          mkdir -p output/cache
          node scripts/factory/r2-workflow-cli.js restore-file state/pack-state.db output/cache/pack-state.db || echo "⚠️ No pack-state.db — cold start"
      # V27.67: bridge mesh-profile-shards into this job. V27.62 mesh-attach in
      # pack-db.js silently skipped each cycle ("[MESH] profile-shards dir missing
      # — skip mesh attach") because vfs-pack-db runs in an isolated GHA workspace
      # and never restored output/cache/mesh/profile-shards/ that mesh-baking job
      # (line 130) saved to cache + R2. Same GHA-cache + R2-fallback pattern as
      # master-fusion-compute (lines 190-204) which already has it.
      - name: Restore Baked Profile Shards from Cache (V27.67)
        id: cache-mesh-profile-vfs
        uses: actions/cache/restore@v5
        with:
          # PR-D0b: restore the evidence-dict sidecar on the same key as the shards.
          path: |
            output/cache/mesh/profile-shards/
            output/cache/mesh/profile-evidence-dict.json.zst
          key: intra-4-4-baked-${{ needs.check-upstream.outputs.upstream-run-id }}-${{ github.run_id }}
          restore-keys: |
            intra-4-4-baked-${{ needs.check-upstream.outputs.upstream-run-id }}-
      # AUTHORITY-M CONSUMER (V27.67 REPLACED): verify-or-recover the dict + profile-shards
      # against the current-cycle attempt-scoped mesh-profile authority established by
      # mesh-baking. The GHA cache (restored above) is USED only if output/cache/mesh's
      # dict+shards EXACTLY match the producer manifest (EXACT-set + per-file sha + set_sha ==
      # descriptor set_sha + expected_shard_count + dict_sha256); on miss/mismatch recover from
      # the EXACT staging + re-verify. A missing/invalid descriptor / residual mismatch FAILS
      # CLOSED (pack-db mesh-attach would silent-skip -> empty ui_related_mesh). The fixed
      # prefixes state/mesh-profile-{shards,dict}/ are NO LONGER a recovery input (compat only).
      - name: Verify or Recover Mesh Profiles from Exact Staging (AUTH-M)
        env:
          HANDOFF_UPSTREAM_RUN_ID: ${{ needs.check-upstream.outputs.upstream-run-id }}
          HANDOFF_FACTORY_RUN_ID: ${{ github.run_id }}
          HANDOFF_RUN_ATTEMPT: ${{ github.run_attempt }}
          HANDOFF_HEAD_SHA: ${{ github.sha }}
          HANDOFF_MESH_CODE_VERSION: ${{ env.MESH_PROFILE_CODE_VERSION }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          set -uo pipefail
          UP="${HANDOFF_UPSTREAM_RUN_ID}"; RUN="${HANDOFF_FACTORY_RUN_ID}"
          if [ -z "$UP" ] || [ -z "$RUN" ]; then echo "::error::AUTH-M: missing run identity — cannot consume mesh-profiles safely."; exit 1; fi
          DESC="state/_handoff/mesh-profile/${UP}/${RUN}/handoff.json"
          node scripts/factory/r2-workflow-cli.js restore-file "$DESC" /tmp/mesh-profile-handoff-rb.json --strict || { echo "::error::AUTH-M: no current-cycle mesh-profile authority descriptor ($DESC). Fail-closed."; exit 1; }
          OUT=$(node scripts/factory/mesh-profile-handoff-manifest.mjs verify-descriptor /tmp/mesh-profile-handoff-rb.json --carrier=mesh-profile-authority) || { echo "::error::AUTH-M: descriptor provenance invalid. Fail-closed."; exit 1; }
          STAGING_PREFIX=$(printf '%s' "$OUT" | cut -f1); EXPECT_SET_SHA=$(printf '%s' "$OUT" | cut -f2)
          node scripts/factory/r2-workflow-cli.js restore-file "${STAGING_PREFIX}manifest.json" /tmp/mesh-profile-manifest.json --strict || { echo "::error::AUTH-M: manifest missing at ${STAGING_PREFIX}. Fail-closed."; exit 1; }
          verify_mesh() { node scripts/factory/mesh-profile-handoff-manifest.mjs verify output/cache/mesh /tmp/mesh-profile-manifest.json --carrier=mesh-profile-authority; }
          NEED_RECOVER=0
          if OUT2=$(verify_mesh) && [ "$(printf '%s' "$OUT2" | tail -n1)" = "$EXPECT_SET_SHA" ]; then
            echo "[MESH-PROFILE-HANDOFF] fast-path mesh-profile matches producer set_sha=$EXPECT_SET_SHA"
          else
            echo "[MESH-PROFILE-HANDOFF] miss/mismatch — recover from exact staging"; NEED_RECOVER=1
          fi
          if [ "$NEED_RECOVER" = "1" ]; then
            rm -rf output/cache/mesh/profile-shards output/cache/mesh/profile-evidence-dict.json.zst; mkdir -p output/cache/mesh
            node scripts/factory/r2-workflow-cli.js restore-dir "$STAGING_PREFIX" output/cache/mesh/ --strict
            rm -f output/cache/mesh/manifest.json output/cache/mesh/handoff.json output/cache/mesh/_manifest.json 2>/dev/null || true
            OUT2=$(verify_mesh) || { echo "::error::AUTH-M: exact-staging recovery failed verification (${STAGING_PREFIX}). Fail-closed."; exit 1; }
            [ "$(printf '%s' "$OUT2" | tail -n1)" = "$EXPECT_SET_SHA" ] || { echo "::error::AUTH-M: recovered set hash != producer $EXPECT_SET_SHA. Fail-closed."; exit 1; }
            echo "[MESH-PROFILE-HANDOFF] recovered + verified mesh-profile from exact staging"
          fi
      - name: Migrate Legacy Embedding Cache (one-time)
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          SHARD_COUNT=$(find output/cache/embeddings -name 'embed-*.bin.zst' 2>/dev/null | wc -l)
          if [ "$SHARD_COUNT" -eq 0 ]; then
            echo "[MIGRATE] No shards found — attempting legacy SQLite migration..."
            node scripts/factory/r2-workflow-cli.js restore-file state/embedding-cache.db output/cache/embedding-cache.db || true
            node scripts/factory/migrate-embedding-cache.js output/cache/embedding-cache.db output/cache/embeddings
            rm -f output/cache/embedding-cache.db
          else
            echo "[MIGRATE] ${SHARD_COUNT} shards present — no migration needed."
          fi
      - name: Download Hosted-On Data from R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          for p in replicate together hf-inference; do
            node scripts/factory/r2-workflow-cli.js restore-file "state/hosted-on/hosted-on-${p}.json" "output/cache/hosted-on-${p}.json" || echo "⚠️ hosted-on-${p}.json not in R2 (first run?)"
          done
      # V27.2: fail-fast before pack-db if essential metadata files are missing.
      # Saves ~2h of wasted runner time on cycle cache miss (run 25896561032).
      - name: Verify Essential Metadata Cache
        run: |
          REQUIRED=(
            "output/cache/mesh/graph.json"
            "output/cache/search-core.json"
            "output/cache/category_stats.json"
          )
          MISSING=()
          for f in "${REQUIRED[@]}"; do
            if [ ! -f "$f" ] && [ ! -f "${f}.zst" ] && [ ! -f "${f}.gz" ]; then
              MISSING+=("$f")
            fi
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "❌ Essential metadata cache files missing — pack-db would produce content-stripped meta DBs:"
            printf '  %s\n' "${MISSING[@]}"
            echo "Upstream cycle cache (cycle-<aggregate-run-id>-output) must contain these files."
            exit 1
          fi
          echo "✅ All essential metadata cache files present"
      # V27.52: restore cycle-scoped vfs-pack cache for skip detection.
      # P3-EVIDENCE-1 STAGE-B: the cache key + restore-keys carry VFS_PACK_CODE_VERSION
      # so a restore can NEVER cross packer-code versions. A cache produced by older
      # row-builders code lives under a different prefix and is invisible here; the
      # sentinel gate below is the second, content-level defense.
      - name: Restore VFS Pack Output for Skip Detection (V27.52)
        id: cache-vfs-pack-restore
        if: ${{ !inputs.force_fresh }}
        uses: actions/cache/restore@v5
        with:
          path: |
            output/data/
            output/meta/
            output/cache/reports/
            output/cache/knowledge/
            output/cache/mesh/
          key: intra-4-4-vfs-pack-${{ env.VFS_PACK_CODE_VERSION }}-${{ needs.check-upstream.outputs.upstream-run-id }}-${{ github.run_id }}
          restore-keys: |
            intra-4-4-vfs-pack-${{ env.VFS_PACK_CODE_VERSION }}-${{ needs.check-upstream.outputs.upstream-run-id }}-
      # P3-EVIDENCE-1 STAGE-B: skip pack-db ONLY when ALL hold —
      #   (a) force_fresh is NOT set,
      #   (b) >= 20 meta-NN.db present,
      #   (c) the mesh graph is present,
      #   (d) the version sentinel EXACTLY equals VFS_PACK_CODE_VERSION.
      # A missing OR mismatched sentinel -> skip_compute=false (must run pack-db.js),
      # so repaired row-builders code can never be skipped on a re-run of a stale cache.
      # force_fresh -> unconditional fresh compute (and the fresh pack below overwrites
      # any restored meta-NN.db). The sentinel file is written by the fresh-pack step.
      - name: Detect vfs-pack output present
        id: detect-vfs-pack
        env:
          VFS_PACK_CODE_VERSION: ${{ env.VFS_PACK_CODE_VERSION }}
          FORCE_FRESH: ${{ inputs.force_fresh }}
        run: |
          SENTINEL=output/meta/vfs-pack-code-version.txt
          META_COUNT=$(find output/data -name 'meta-*.db' 2>/dev/null | wc -l)
          MESH_OK=false
          { [ -f output/cache/mesh/graph.json ] || [ -f output/cache/mesh/graph.json.zst ]; } && MESH_OK=true
          SENTINEL_VAL=""
          [ -f "$SENTINEL" ] && SENTINEL_VAL=$(tr -d '[:space:]' < "$SENTINEL")
          if [ "$FORCE_FRESH" = "true" ]; then
            echo "skip_compute=false" >> "$GITHUB_OUTPUT"
            echo "[STAGE-B] force_fresh=true → unconditional fresh pack-db (cache ignored)"
          elif [ "$META_COUNT" -ge 20 ] && [ "$MESH_OK" = "true" ] && [ "$SENTINEL_VAL" = "$VFS_PACK_CODE_VERSION" ]; then
            echo "skip_compute=true" >> "$GITHUB_OUTPUT"
            echo "[STAGE-B] ${META_COUNT} meta-NN.db + mesh graph + sentinel '${SENTINEL_VAL}' == '${VFS_PACK_CODE_VERSION}' → skip pack-db.js compute"
          else
            echo "skip_compute=false" >> "$GITHUB_OUTPUT"
            echo "[STAGE-B] fresh pack-db: meta=${META_COUNT}(need>=20) mesh=${MESH_OK} sentinel='${SENTINEL_VAL}'(need '${VFS_PACK_CODE_VERSION}')"
          fi
      # D-297 (PR-B): FAIL-CLOSED capacity preflight BEFORE the Packer. Mirrors the SAME
      # skip guard so it runs only when pack-db will actually compute. pack-db.js opens
      # META_SHARD_COUNT=96 meta-NN.db simultaneously (per-DB SQLite page-cache + WAL/journal
      # transient ×96 + denormalized meta rows) while the fused set stays resident. MEASURES
      # df free + du of output/cache/{fused,embeddings,reports,knowledge,mesh}, fails closed
      # INSUFFICIENT_RUNNER_DISK_UPLOAD_PACKER (+ coarse memory guard) BEFORE the compute.
      # No warning-only, no `|| true`.
      - name: Capacity Preflight — Packer (fail-closed)
        if: steps.detect-vfs-pack.outputs.skip_compute != 'true'
        env:
          CAPACITY_OLD_SPACE_MB: '6144'  # mirror the Packer step's --max-old-space-size for the coarse memory guard
        run: node scripts/factory/lib/runner-capacity-preflight.mjs UPLOAD_PACKER
      - name: Execute Stable 1.0 Packer
        if: steps.detect-vfs-pack.outputs.skip_compute != 'true'
        env:
          CACHE_DIR: ./output/cache
          AES_CRYPTO_KEY: ${{ secrets.AES_CRYPTO_KEY }}
          NODE_OPTIONS: '--max-old-space-size=6144 --expose-gc'
          VFS_PACK_CODE_VERSION: ${{ env.VFS_PACK_CODE_VERSION }}
        # P3-EVIDENCE-1 STAGE-B: a SUCCESSFUL fresh pack stamps the version sentinel
        # (output/meta/, carried by the vfs-pack save below). It is written only after
        # pack-db.js exits 0, so a failed/partial pack leaves no/old sentinel and the
        # next run will NOT skip. force_fresh reaches here too (skip_compute=false),
        # and this fresh pack overwrites any restored meta-NN.db.
        run: |
          node scripts/factory/pack-db.js
          mkdir -p output/meta
          printf '%s' "$VFS_PACK_CODE_VERSION" > output/meta/vfs-pack-code-version.txt
          echo "[STAGE-B] wrote pack-code sentinel: $(cat output/meta/vfs-pack-code-version.txt)"
      # V27.2 fail-loud gate (always runs as sanity check on both fresh + cached data)
      - name: V27.2 Verify Shard-Meta Consistency
        run: node scripts/factory/verify-shard-meta-consistency.js
      # PR-C2 WIRE: run the identity-cluster crate on the 4/4 full recompute.
      # Reads ONLY PR-C1 SAME_AS shards (output/cache/assertions/, restored via the
      # cycle-output cache above) and writes ONLY the cluster-assignment artifact
      # (output/cache/identity/, producer-internal -- NOT in the upload allow-list).
      # HARD-fails the bake if buildIdentityClusters errors (MAX_PASSES / SKEW /
      # NON_SINGLETON_FLOOR); skips loudly only when PR-C1 produced no shards.
      - name: PR-C2 Build Identity Clusters
        env:
          OUTPUT_DIR: ./output
          CACHE_DIR: ./output/cache
        run: node scripts/factory/build-identity-clusters.js
      # Persist the cluster artifact to R2 producer-internal state (NOT the public
      # CDN). Gated on a fresh compute so a re-dispatch cache-hit does not re-upload.
      - name: Backup Identity Clusters to R2
        if: success() && steps.detect-vfs-pack.outputs.skip_compute != 'true'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          if [ -f output/cache/identity/cluster-assignment.jsonl.zst ]; then
            node scripts/factory/r2-workflow-cli.js backup-dir output/cache/identity/ state/identity/
            echo "[R2] Identity cluster-assignment backed up to state/identity/"
          else
            echo "[IDENTITY] No cluster artifact to back up (PR-C1 produced no SAME_AS shards this cycle)."
          fi
      - name: Save Embedding Shards to Cache
        if: success() && steps.detect-vfs-pack.outputs.skip_compute != 'true'
        uses: actions/cache/save@v5
        with:
          path: output/cache/embeddings/
          key: embedding-shards-${{ env.EMBED_CODE_VERSION }}-${{ needs.check-upstream.outputs.upstream-run-id }}-${{ github.run_id }}
      - name: Backup Embedding Shards to R2
        if: success() && steps.detect-vfs-pack.outputs.skip_compute != 'true'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          node scripts/factory/r2-workflow-cli.js backup-dir output/cache/embeddings/ state/embeddings/ --extensions=.bin.zst
          if [ -f "output/cache/pack-state.db" ]; then
            node -e "const D=require('better-sqlite3')('./output/cache/pack-state.db');D.exec('DROP TABLE IF EXISTS html_cache');D.exec('VACUUM');D.close();"
            node scripts/factory/r2-workflow-cli.js upload-file output/cache/pack-state.db state/pack-state.db
          fi
          echo "[R2] Embedding shards + pack-state (no html_cache) backed up"

      # V27.51: backup meta-NN.db + sitemaps to R2 — vfs-pack → vfs-derived → upload cache
      # chain hit GHA 10GB cache-entry limit on the V27.40 first real cron (run
      # 26362048142, vfs-assets save silently failed because vfs-pack restore had
      # already used 12.8GB). upload's cache restore returned empty → output/data/
      # had no meta-NN.db → L2 probe failed → cycle broke after 4h+ compute.
      # R2 is source-of-truth (P2 principle); backing up meta DBs here decouples
      # upload-job correctness from inter-job cache success.
      # V27.51 + V27.52: backup meta-NN.db + sitemaps to R2. Gated on detect-vfs-pack
      # so re-dispatch cache-hit doesn't re-upload identical state (R2 has it).
      - name: Backup VFS Data to R2 (V27.51)
        if: success() && steps.detect-vfs-pack.outputs.skip_compute != 'true'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          node scripts/factory/r2-workflow-cli.js backup-dir output/data/ state/vfs-data/
          if [ -d "output/meta" ]; then
            node scripts/factory/r2-workflow-cli.js backup-dir output/meta/ state/vfs-meta/ || true
          fi
          META_COUNT=$(find output/data -name 'meta-*.db' 2>/dev/null | wc -l)
          echo "[R2] VFS data backed up: ${META_COUNT} meta-NN.db files to state/vfs-data/"
      # D-245 PRIMARY EXACT-PRODUCER R2 HANDOFF — establish a DURABLE, run +
      # PRODUCER-attempt scoped, content-verified vfs-pack authority so VFS Derived
      # never depends on the LRU-evicted / write-denied GHA vfs-pack cache (the root
      # cause: the cache carrying output/data/ meta-NN.db was unretrievable, so the
      # empty-state guard fail-closed and the whole publish chain was skipped). Runs
      # AFTER the pack + sentinel + shard-meta gates, so output/data/ is verified.
      # PRODUCER attempt = github.run_attempt OF THIS job. Order: (1) local manifest over
      # the meta-NN.db set -> (2) data (.db) to the attempt-scoped staging prefix (manifest
      # LAST) -> (3) handoff.json descriptor LAST OF ALL -> (4) read-back verify ->
      # (5) export the verified identity. Fail-loud on any step. Gated on success() (NOT
      # skip_compute) so a re-dispatch cache-hit STILL establishes a current-run authority.
      # The manifest/descriptor go to R2 + /tmp only, NEVER into output/data/ (the tree
      # r2-upload-s3.js publishes to the public CDN).
      - name: Produce Exact-Producer R2 Handoff (VFS-PACK, D-245)
        id: vfs-pack-handoff
        if: success()
        env:
          HANDOFF_UPSTREAM_RUN_ID: ${{ needs.check-upstream.outputs.upstream-run-id }}
          HANDOFF_FACTORY_RUN_ID: ${{ github.run_id }}
          HANDOFF_PRODUCER_ATTEMPT: ${{ github.run_attempt }}
          HANDOFF_HEAD_SHA: ${{ github.sha }}
          HANDOFF_VFS_PACK_CODE_VERSION: ${{ env.VFS_PACK_CODE_VERSION }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          set -euo pipefail
          UP="${HANDOFF_UPSTREAM_RUN_ID}"; RUN="${HANDOFF_FACTORY_RUN_ID}"; ATT="${HANDOFF_PRODUCER_ATTEMPT}"
          RUN_PREFIX="state/_handoff/vfs-pack/${UP}/${RUN}"
          export STAGING="${RUN_PREFIX}/attempt-${ATT}/"
          # (1) local manifest over output/data/ meta-NN.db set (.db only) + the D-246 RSS
          # input presence/sha probe (--rss-base=. => output/cache/{reports,knowledge}/…).
          # Written to /tmp so it never pollutes the publicly-uploaded output/data/ tree.
          node scripts/factory/vfs-derived-handoff-manifest.mjs generate output/data/ /tmp/vfs-pack-manifest.json --carrier=vfs-pack-authority --ext=.db --rss-base=.
          export SET_SHA=$(node -e "process.stdout.write(require('/tmp/vfs-pack-manifest.json').set_sha256)")
          export MANIFEST_SHA=$(node -e "const c=require('crypto'),f=require('fs');process.stdout.write(c.createHash('sha256').update(f.readFileSync('/tmp/vfs-pack-manifest.json')).digest('hex'))")
          # (2) upload ALL .db meta data FIRST, to the meta ROLE sub-prefix ${STAGING}meta/.
          # D-302: each backup-dir role gets its OWN sub-prefix so it writes its OWN
          # _manifest.json restore sidecar — the .bin warm backup (2w) can NEVER overwrite
          # the meta restore index (the D-245 last-writer-wins bug that dropped every meta-NN.db
          # incl. meta-00.db from the surviving restore index and fail-closed VFS Derived). The
          # meta CONTENT manifest.json + its set_sha256 (2c) are UNCHANGED — sub-prefixing changes
          # only WHERE the .db live in R2, not their output/data-relative names, content, or hash.
          node scripts/factory/r2-workflow-cli.js backup-dir output/data/ "${STAGING}meta/" --extensions=.db
          # (2b) D-246: stage the DECLARED-PRESENT RSS-generator inputs (CAPTURED_IF_PRESENT)
          # under rss-inputs/… so VFS Derived recovers them BEFORE rss-generator. Absent
          # (paused/floor-zero) inputs are recorded present:false and NOT in the plan.
          node scripts/factory/vfs-derived-handoff-manifest.mjs rss-recovery-plan /tmp/vfs-pack-manifest.json --carrier=vfs-pack-authority > /tmp/vfs-pack-rss-plan.tsv
          while IFS=$'\t' read -r RSS_STAGED RSS_LOCAL RSS_SHA; do
            [ -z "$RSS_STAGED" ] && continue
            node scripts/factory/r2-workflow-cli.js upload-file "$RSS_LOCAL" "${STAGING}${RSS_STAGED}"
          done < /tmp/vfs-pack-rss-plan.tsv
          # (2w) AUTHORITY-W: SIBLING warm-read authority. The meta_db manifest.json + its
          # set_sha256 (2c below) stay BYTE-IDENTICAL — warm_read is a SEPARATE manifest over
          # the shared warm-tier producer artifacts (vector-core.bin/hot-shard.bin/id-index.bin
          # + term_index/**), staged into the SAME attempt prefix. Order: generate warm sibling
          # manifest -> stage the warm data (bins + term_index) into STAGING -> upload the
          # warm-read-manifest.json (manifest-last for warm too) BEFORE the meta manifest/desc.
          # This makes wiping+restoring STAGING recover the FULL output/data/ (meta .db + warm),
          # killing the self-strip. NEVER writes the warm manifest into the public output/data/.
          node scripts/factory/vfs-derived-handoff-manifest.mjs generate-warm-read output/data/ /tmp/vfs-warm-read-manifest.json --carrier=vfs-pack-authority
          export WARM_SET_SHA=$(node -e "process.stdout.write(require('/tmp/vfs-warm-read-manifest.json').set_sha256)")
          export WARM_MEMBER_COUNT=$(node -e "process.stdout.write(String(require('/tmp/vfs-warm-read-manifest.json').member_count))")
          # bins (the 3 named + any stray .bin, harmless — the warm INCLUDE verify ignores non-members).
          # D-302: warm ROLE sub-prefix ${STAGING}warm/ — its OWN _manifest.json restore sidecar,
          # never colliding with the meta (2) or term_index (below) restore indices. term_index
          # already had a distinct sub-prefix (below) — the meta vs warm collision was the only bug.
          node scripts/factory/r2-workflow-cli.js backup-dir output/data/ "${STAGING}warm/" --extensions=.bin
          # term_index/** subtree (the _manifest.json.zst + per-prefix buckets + high-freq chunks)
          [ -d output/data/term_index ] && node scripts/factory/r2-workflow-cli.js backup-dir output/data/term_index/ "${STAGING}term_index/"
          # warm-read-manifest.json (SIBLING of manifest.json) — after all warm data is durable.
          node scripts/factory/r2-workflow-cli.js upload-file /tmp/vfs-warm-read-manifest.json "${STAGING}warm-read-manifest.json"
          # (2c) manifest.json LAST (after every data object incl. present RSS inputs is durable).
          node scripts/factory/r2-workflow-cli.js upload-file /tmp/vfs-pack-manifest.json "${STAGING}manifest.json"
          # (3) run-scoped descriptor handoff.json LAST OF ALL. Binds ONLY current upstream
          # + current factory run + this producer attempt + head-SHA + VFS_PACK_CODE_VERSION,
          # and RECORDS per-RSS-input presence (D-246 §2) so paused/absent is distinguishable.
          # AUTHORITY-W: the descriptor gains ONLY additive warm_read_set_sha256 +
          # warm_read_member_count — the meta set_sha256/manifest_sha256 are UNCHANGED.
          node -e "const f=require('fs');const m=require('/tmp/vfs-pack-manifest.json');f.writeFileSync('/tmp/vfs-pack-handoff.json',JSON.stringify({schema_version:1,carrier_type:'vfs-pack-authority',producer_attempt:Number(process.env.HANDOFF_PRODUCER_ATTEMPT),exact_staging_prefix:process.env.STAGING,manifest_sha256:process.env.MANIFEST_SHA,set_sha256:process.env.SET_SHA,warm_read_set_sha256:String(process.env.WARM_SET_SHA),warm_read_member_count:Number(process.env.WARM_MEMBER_COUNT),upstream_run_id:String(process.env.HANDOFF_UPSTREAM_RUN_ID),factory_run_id:String(process.env.HANDOFF_FACTORY_RUN_ID),head_sha:String(process.env.HANDOFF_HEAD_SHA),vfs_pack_code_version:String(process.env.HANDOFF_VFS_PACK_CODE_VERSION),parent_set_sha256:null,rss_inputs:(m.rss_inputs||[]).map(e=>({name:e.name,present:e.present})),created_at:new Date().toISOString()}))"
          node scripts/factory/r2-workflow-cli.js upload-file /tmp/vfs-pack-handoff.json "${RUN_PREFIX}/handoff.json"
          # (4) read-back verify the descriptor provenance (missing/malformed => fail-loud).
          node scripts/factory/r2-workflow-cli.js restore-file "${RUN_PREFIX}/handoff.json" /tmp/vfs-pack-handoff-rb.json --strict
          OUT=$(HANDOFF_RUN_ATTEMPT="${ATT}" node scripts/factory/vfs-derived-handoff-manifest.mjs verify-descriptor /tmp/vfs-pack-handoff-rb.json --carrier=vfs-pack-authority)
          V_PREFIX=$(printf '%s' "$OUT" | cut -f1); V_SET=$(printf '%s' "$OUT" | cut -f2)
          # (4w) AUTHORITY-W read-back: restore the durable warm-read-manifest.json + assert its
          # set_sha equals the locally-generated warm authority (a partial/corrupt warm upload reds).
          node scripts/factory/r2-workflow-cli.js restore-file "${STAGING}warm-read-manifest.json" /tmp/vfs-warm-read-manifest-rb.json --strict
          RB_WARM_SET=$(node -e "process.stdout.write(require('/tmp/vfs-warm-read-manifest-rb.json').set_sha256)")
          [ "$RB_WARM_SET" = "$WARM_SET_SHA" ] || { echo "::error::AUTH-W: warm-read-manifest read-back set_sha mismatch. Fail-closed."; exit 1; }
          # (5) export the verified identity for the VFS Derived + Upload consumers.
          echo "staging_prefix=${V_PREFIX}" >> "$GITHUB_OUTPUT"
          echo "set_sha=${V_SET}" >> "$GITHUB_OUTPUT"
          echo "producer_attempt=${ATT}" >> "$GITHUB_OUTPUT"
          echo "warm_read_set_sha=${WARM_SET_SHA}" >> "$GITHUB_OUTPUT"
          echo "[VFS-PACK-HANDOFF] staging=${V_PREFIX} set_sha256=${V_SET} warm_read_set_sha256=${WARM_SET_SHA} descriptor=${RUN_PREFIX}/handoff.json"
      # V27.40: end of vfs-pack-db. Save VFS pack output (data/meta/reports/knowledge/mesh)
      # as inter-job cache for vfs-derived. Sitemap + RSS + health move to vfs-derived job.
      # P3-EVIDENCE-1 STAGE-B: the save key carries VFS_PACK_CODE_VERSION so a fresh
      # pack is stored under the current-version prefix only. output/meta/ carries the
      # version sentinel written by the packer step, so a restore on the matching key
      # recovers BOTH the rows and the sentinel (skip-gate's content check).
      - name: Save VFS Pack Output to Cache
        if: success() && steps.detect-vfs-pack.outputs.skip_compute != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            output/data/
            output/meta/
            output/cache/reports/
            output/cache/knowledge/
            output/cache/mesh/
            output/cache/assertions/
          key: intra-4-4-vfs-pack-${{ env.VFS_PACK_CODE_VERSION }}-${{ needs.check-upstream.outputs.upstream-run-id }}-${{ github.run_id }}

  # V27.40: vfs-derived = sitemap-gen + RSS-gen + SQL-health + cache saves.
  # ~2m; failure here costs minutes, not hours (vs old vfs-packing 2h10m blast radius).
  # Recovery: GHA UI "Re-run failed jobs" — run_id stable, vfs-pack cache hits within ~5min window.
  # No R2 fallback for vfs-pack cache miss (state/cycle-output/ does NOT contain meta-NN.db).
  vfs-derived:
    name: VFS Derived (Sitemap + RSS + Health)
    needs: [vfs-pack-db, check-upstream]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # D-245 SECONDARY: expose the VERIFIED vfs-derived (sitemaps + RSS) R2 authority so
    # Final Upload publishes ONLY the current-cycle sitemap/RSS identity (the sitemap/RSS
    # GHA caches have no R2 fallback, so the same token denial could otherwise ship a
    # stale/empty sitemap — an SEO wipe of the append-only corpus).
    outputs:
      verified_vfs_derived_staging_prefix: ${{ steps.vfs-derived-handoff.outputs.staging_prefix }}
      verified_vfs_derived_set_sha: ${{ steps.vfs-derived-handoff.outputs.set_sha }}
      verified_vfs_derived_producer_attempt: ${{ steps.vfs-derived-handoff.outputs.producer_attempt }}
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/factory-setup
        with:
          aggressive-disk-cleanup: 'false'
          with-rust-ffi: 'false'
      # P3-EVIDENCE-1 STAGE-B: vfs-derived may restore ONLY output of the matching pack
      # version — the key + restore-keys prefix carry VFS_PACK_CODE_VERSION so a
      # cross-version vfs-pack cache can never be pulled into the derived (sitemap/RSS/
      # health) job that runs over the packed meta-NN.db.
      - name: Restore VFS Pack Output from intra-cache
        id: cache-restore-vfs-pack
        uses: actions/cache/restore@v5
        with:
          path: |
            output/data/
            output/meta/
            output/cache/reports/
            output/cache/knowledge/
            output/cache/mesh/
            output/cache/assertions/
          key: intra-4-4-vfs-pack-${{ env.VFS_PACK_CODE_VERSION }}-${{ needs.check-upstream.outputs.upstream-run-id }}-${{ github.run_id }}
          # D-245: restore-keys PREFIX authority REMOVED. The GHA cache is an OPTIONAL
          # exact-key fast path only; a restore-keys prefix hit is identity-ambiguous and
          # was previously consumed UNVERIFIED. The vfs-pack-db VERIFIED R2 authority (set
          # hash + manifest) in the next step is the correctness source of truth.
      # D-245 PRIMARY CONSUMER — verify-or-recover BEFORE the defensive guard. The GHA
      # vfs-pack cache (exact key, NO restore-keys) is an OPTIONAL fast path; the
      # vfs-pack-db VERIFIED R2 authority is the truth. Verify the restored meta-NN.db
      # set's manifest/set hash EQUALS vfs-pack-db's exported identity; on GHA miss OR
      # mismatch wipe output/data/ + recover from the EXACT producer staging prefix +
      # re-verify (fail-loud). ONLY THEN the META>=1 guard runs — now backstopped by
      # durable R2, so it means "genuine content void", not "cache unretrievable".
      # AUTHORITY-W (4/4): verify-or-recover BOTH the meta-NN.db set AND the warm-read
      # sibling (bins + term_index) against the vfs-pack authority. SELF-STRIP KILL: the
      # recover restore-dir brings back the FULL output/data/ (meta .db + warm) from the
      # SAME attempt prefix, and warm is then VERIFIED (not ignored via --ext=.db) so a
      # missing/stale warm-tier artifact fails BEFORE the SQL health check + sitemap gen.
      - name: Verify or Recover VFS Pack from Exact Staging (D-245)
        env:
          STAGING_PREFIX: ${{ needs.vfs-pack-db.outputs.verified_vfs_pack_staging_prefix }}
          EXPECT_SET_SHA: ${{ needs.vfs-pack-db.outputs.verified_vfs_pack_set_sha }}
          EXPECT_WARM_SET_SHA: ${{ needs.vfs-pack-db.outputs.verified_vfs_pack_warm_read_set_sha }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          set -uo pipefail
          if [ -z "${STAGING_PREFIX}" ] || [ -z "${EXPECT_SET_SHA}" ]; then
            echo "::error::vfs-pack-db did not export a verified vfs-pack identity — cannot consume meta-NN.db safely."; exit 1
          fi
          if [ -z "${EXPECT_WARM_SET_SHA}" ]; then
            echo "::error::AUTH-W: vfs-pack-db did not export a verified warm_read set-sha — cannot consume warm-tier safely. Fail-closed."; exit 1
          fi
          # Fetch the producer manifest from R2 (small) to verify the GHA-restored set.
          verify() {
            node scripts/factory/r2-workflow-cli.js restore-file "${STAGING_PREFIX}manifest.json" /tmp/vfs-pack-manifest.json --strict >/dev/null 2>&1 || return 1
            node scripts/factory/vfs-derived-handoff-manifest.mjs verify output/data/ /tmp/vfs-pack-manifest.json --carrier=vfs-pack-authority --ext=.db
          }
          verify_warm() {
            node scripts/factory/r2-workflow-cli.js restore-file "${STAGING_PREFIX}warm-read-manifest.json" /tmp/vfs-warm-read-manifest.json --strict >/dev/null 2>&1 || return 1
            node scripts/factory/vfs-derived-handoff-manifest.mjs verify-warm-read output/data/ /tmp/vfs-warm-read-manifest.json --carrier=vfs-pack-authority
          }
          NEED_RECOVER=0
          if OUT=$(verify) && [ "$(printf '%s' "$OUT" | tail -n1)" = "$EXPECT_SET_SHA" ]; then
            echo "[VFS-PACK-HANDOFF] GHA fast-path meta-NN.db matches producer set_sha=$EXPECT_SET_SHA"
          else
            echo "[VFS-PACK-HANDOFF] GHA meta miss/mismatch — recover from exact staging"; NEED_RECOVER=1
          fi
          if OUTW=$(verify_warm) && [ "$(printf '%s' "$OUTW" | tail -n1)" = "$EXPECT_WARM_SET_SHA" ]; then
            echo "[VFS-PACK-HANDOFF] GHA fast-path warm_read matches producer set_sha=$EXPECT_WARM_SET_SHA"
          else
            echo "[VFS-PACK-HANDOFF] GHA warm_read miss/mismatch — recover from exact staging"; NEED_RECOVER=1
          fi
          if [ "$NEED_RECOVER" = "1" ]; then
            rm -rf output/data/; mkdir -p output/data/
            # D-302: restore EACH producer role EXPLICITLY from its OWN sub-prefix into the
            # correct output/data/ layout. Role sub-prefixing gives each backup-dir its OWN
            # _manifest.json restore index, so the meta (.db incl. meta-00.db) restore set can
            # NEVER be overwritten by the warm (.bin) set (the D-245 last-writer-wins bug). Each
            # restore-dir --strict fails CLOSED on a missing/empty R2 role (no partial recovery).
            # This is a PURE R2 recovery — NO GHA-cache data is consulted on this path; a GHA miss
            # OR save-denial forces this exact R2 restore, never a failure.
            node scripts/factory/r2-workflow-cli.js restore-dir "${STAGING_PREFIX}meta/" output/data/ --strict
            node scripts/factory/r2-workflow-cli.js restore-dir "${STAGING_PREFIX}warm/" output/data/ --strict
            node scripts/factory/r2-workflow-cli.js restore-dir "${STAGING_PREFIX}term_index/" output/data/term_index/ --strict
            # Defensive: never let a handoff sidecar leak into the public data/ tree.
            rm -f output/data/manifest.json output/data/warm-read-manifest.json output/data/handoff.json output/data/_manifest.json 2>/dev/null || true
            OUT=$(verify) || { echo "::error::VFS-pack exact-staging recovery failed verification ($STAGING_PREFIX). Fail-closed."; exit 1; }
            [ "$(printf '%s' "$OUT" | tail -n1)" = "$EXPECT_SET_SHA" ] || { echo "::error::Recovered meta set hash != producer $EXPECT_SET_SHA. Fail-closed."; exit 1; }
            OUTW=$(verify_warm) || { echo "::error::AUTH-W: warm_read exact-staging recovery failed verification ($STAGING_PREFIX). Fail-closed."; exit 1; }
            [ "$(printf '%s' "$OUTW" | tail -n1)" = "$EXPECT_WARM_SET_SHA" ] || { echo "::error::AUTH-W: recovered warm_read set hash != producer $EXPECT_WARM_SET_SHA. Fail-closed."; exit 1; }
            echo "[VFS-PACK-HANDOFF] recovered + verified meta-NN.db + warm_read from exact staging"
          fi
      # V27.40.1 + V27.52: fail-fast on missing meta-NN.db. File-existence detection
      # (cache-hit output false-fires on restore-keys partial match).
      - name: Verify VFS Pack Files Present (defensive)
        run: |
          META_COUNT=$(find output/data -name 'meta-*.db' 2>/dev/null | wc -l)
          if [ "$META_COUNT" -lt 1 ]; then
            echo "::error::No meta-NN.db found post-restore. vfs-pack-db should have written via primary key OR restore-keys partial hit. Aborting vfs-derived to avoid empty sitemap/RSS output."
            exit 1
          fi
          echo "✅ VFS pack present: $META_COUNT meta-NN.db files"
      - name: Generate VFS-Parity Sitemaps
        run: node scripts/factory/vfs-sitemap-gen.js --db=output/data/meta-00.db --out=output
      # D-246 RSS INPUT RECOVERY. The RSS-generator inputs (output/cache/{reports,knowledge}/
      # index.json.zst) are now carried durably by the vfs-pack R2 authority. Recover every
      # DECLARED-PRESENT input from the EXACT current-cycle staging BEFORE rss-generator +
      # fail-closed verify (states 3/4/6/7/8 => exit 1); SKIP declared-absent (paused/
      # floor-zero) inputs (states 1/5) — a present input can never be silently lost, while
      # the paused/static-historical RSS behavior is preserved (RSS is NOT forced non-empty).
      - name: Recover VFS-Pack RSS Inputs from Exact Staging (D-246)
        env:
          STAGING_PREFIX: ${{ needs.vfs-pack-db.outputs.verified_vfs_pack_staging_prefix }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          set -uo pipefail
          if [ -z "${STAGING_PREFIX}" ]; then echo "::error::no verified vfs-pack staging prefix for RSS inputs."; exit 1; fi
          # The verified producer manifest (with rss_inputs) is at /tmp/vfs-pack-manifest.json
          # from the meta verify-or-recover step; re-fetch defensively if absent.
          if [ ! -s /tmp/vfs-pack-manifest.json ]; then
            node scripts/factory/r2-workflow-cli.js restore-file "${STAGING_PREFIX}manifest.json" /tmp/vfs-pack-manifest.json --strict
          fi
          node scripts/factory/vfs-derived-handoff-manifest.mjs rss-recovery-plan /tmp/vfs-pack-manifest.json --carrier=vfs-pack-authority > /tmp/vfs-pack-rss-plan.tsv
          while IFS=$'\t' read -r RSS_STAGED RSS_LOCAL RSS_SHA; do
            [ -z "$RSS_STAGED" ] && continue
            mkdir -p "$(dirname "$RSS_LOCAL")"
            node scripts/factory/r2-workflow-cli.js restore-file "${STAGING_PREFIX}${RSS_STAGED}" "$RSS_LOCAL" --strict || { echo "::error::RSS input recovery failed for ${RSS_STAGED} (declared present). Fail-closed."; exit 1; }
          done < /tmp/vfs-pack-rss-plan.tsv
          # Fail-closed verify: every declared-present input recovered + sha matches (states
          # 3/4/6/7/8 => exit 1); declared-absent skipped + recorded (states 1/5 non-fatal).
          node scripts/factory/vfs-derived-handoff-manifest.mjs verify-rss-inputs /tmp/vfs-pack-manifest.json . --carrier=vfs-pack-authority
          echo "[VFS-PACK-HANDOFF] RSS inputs: declared-present recovered+verified from exact staging; declared-absent skipped (paused/floor-zero)"
      # V25.13: RSS gen requires output/cache/reports/index.json.zst (from pack-db meta-anchors)
      # — guaranteed present via vfs-pack cache restore above.
      # V27.39: soft-warn when both feeds empty (V27.36 paused daily reports + knowledge-ai).
      - name: Generate RSS feeds
        run: node scripts/factory/lib/rss-generator.js ./output
      # AUTHORITY-M CONSUMER (vfs-derived; the missing output/cache/mesh recovery seam):
      # verify-or-recover the dict + profile-shards against the current-cycle mesh-profile
      # authority BEFORE the V23.1 SQL Health Check, whose verify-db canary (loadBakedDict)
      # resolves ui_related_mesh refs from the dict. Without this, a GHA-cache miss left the
      # dict/shards unrecovered and the canary under-reported coverage. Fail-closed on a
      # missing descriptor / residual mismatch.
      - name: Verify or Recover Mesh Profiles from Exact Staging (AUTH-M)
        env:
          HANDOFF_UPSTREAM_RUN_ID: ${{ needs.check-upstream.outputs.upstream-run-id }}
          HANDOFF_FACTORY_RUN_ID: ${{ github.run_id }}
          HANDOFF_RUN_ATTEMPT: ${{ github.run_attempt }}
          HANDOFF_HEAD_SHA: ${{ github.sha }}
          HANDOFF_MESH_CODE_VERSION: ${{ env.MESH_PROFILE_CODE_VERSION }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          set -uo pipefail
          UP="${HANDOFF_UPSTREAM_RUN_ID}"; RUN="${HANDOFF_FACTORY_RUN_ID}"
          if [ -z "$UP" ] || [ -z "$RUN" ]; then echo "::error::AUTH-M: missing run identity — cannot consume mesh-profiles safely."; exit 1; fi
          DESC="state/_handoff/mesh-profile/${UP}/${RUN}/handoff.json"
          node scripts/factory/r2-workflow-cli.js restore-file "$DESC" /tmp/mesh-profile-handoff-rb.json --strict || { echo "::error::AUTH-M: no current-cycle mesh-profile authority descriptor ($DESC). Fail-closed."; exit 1; }
          OUT=$(node scripts/factory/mesh-profile-handoff-manifest.mjs verify-descriptor /tmp/mesh-profile-handoff-rb.json --carrier=mesh-profile-authority) || { echo "::error::AUTH-M: descriptor provenance invalid. Fail-closed."; exit 1; }
          STAGING_PREFIX=$(printf '%s' "$OUT" | cut -f1); EXPECT_SET_SHA=$(printf '%s' "$OUT" | cut -f2)
          node scripts/factory/r2-workflow-cli.js restore-file "${STAGING_PREFIX}manifest.json" /tmp/mesh-profile-manifest.json --strict || { echo "::error::AUTH-M: manifest missing at ${STAGING_PREFIX}. Fail-closed."; exit 1; }
          verify_mesh() { node scripts/factory/mesh-profile-handoff-manifest.mjs verify output/cache/mesh /tmp/mesh-profile-manifest.json --carrier=mesh-profile-authority; }
          NEED_RECOVER=0
          if OUT2=$(verify_mesh) && [ "$(printf '%s' "$OUT2" | tail -n1)" = "$EXPECT_SET_SHA" ]; then
            echo "[MESH-PROFILE-HANDOFF] fast-path mesh-profile matches producer set_sha=$EXPECT_SET_SHA"
          else
            echo "[MESH-PROFILE-HANDOFF] miss/mismatch — recover from exact staging"; NEED_RECOVER=1
          fi
          if [ "$NEED_RECOVER" = "1" ]; then
            rm -rf output/cache/mesh/profile-shards output/cache/mesh/profile-evidence-dict.json.zst; mkdir -p output/cache/mesh
            node scripts/factory/r2-workflow-cli.js restore-dir "$STAGING_PREFIX" output/cache/mesh/ --strict
            rm -f output/cache/mesh/manifest.json output/cache/mesh/handoff.json output/cache/mesh/_manifest.json 2>/dev/null || true
            OUT2=$(verify_mesh) || { echo "::error::AUTH-M: exact-staging recovery failed verification (${STAGING_PREFIX}). Fail-closed."; exit 1; }
            [ "$(printf '%s' "$OUT2" | tail -n1)" = "$EXPECT_SET_SHA" ] || { echo "::error::AUTH-M: recovered set hash != producer $EXPECT_SET_SHA. Fail-closed."; exit 1; }
            echo "[MESH-PROFILE-HANDOFF] recovered + verified mesh-profile from exact staging"
          fi
      - name: V23.1 SQL Health Check
        run: |
          for db in output/data/*.db; do
            case "$(basename "$db")" in rankings-*) echo "⏭ Skipping rankings DB: $db"; continue;; esac
            echo "🔍 Verifying $db..."
            node scripts/factory/verify-db.js "$db"
          done
      # D-245 SECONDARY EXACT-PRODUCER R2 HANDOFF (sitemaps + RSS). The vfs-assets +
      # rss-feeds GHA caches are the ONLY carriers of output/sitemaps/ + sitemap.xml +
      # output/rss/ to Final Upload, with NO R2 fallback — the SAME token denial can ship
      # a stale/empty sitemap (an SEO wipe of the append-only corpus). Establish a DURABLE,
      # run + attempt scoped, content-verified authority bound to the vfs-pack set-sha
      # (parent). sitemap class floor >=1 (empty fails); rss floor 0 (the V27.39 empty-feed
      # generator contract). Order: assemble -> manifest -> data FIRST -> manifest LAST ->
      # descriptor LAST OF ALL -> read-back verify -> export. Staging goes to R2 + /tmp only.
      - name: Produce Exact-Producer R2 Handoff (VFS-DERIVED sitemaps/RSS, D-245)
        id: vfs-derived-handoff
        if: success()
        env:
          HANDOFF_UPSTREAM_RUN_ID: ${{ needs.check-upstream.outputs.upstream-run-id }}
          HANDOFF_FACTORY_RUN_ID: ${{ github.run_id }}
          HANDOFF_PRODUCER_ATTEMPT: ${{ github.run_attempt }}
          HANDOFF_HEAD_SHA: ${{ github.sha }}
          HANDOFF_VFS_PACK_CODE_VERSION: ${{ env.VFS_PACK_CODE_VERSION }}
          HANDOFF_PARENT_SET_SHA: ${{ needs.vfs-pack-db.outputs.verified_vfs_pack_set_sha }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          set -euo pipefail
          UP="${HANDOFF_UPSTREAM_RUN_ID}"; RUN="${HANDOFF_FACTORY_RUN_ID}"; ATT="${HANDOFF_PRODUCER_ATTEMPT}"
          RUN_PREFIX="state/_handoff/vfs-derived/${UP}/${RUN}"
          export STAGING="${RUN_PREFIX}/attempt-${ATT}/"
          # Assemble the sitemap/RSS carrier set into one staging tree (never uploaded to
          # the public CDN prefix). sitemaps/ + sitemap.xml + rss/ mirror the Final Upload
          # layout; empty rss/ tolerated, empty sitemap fails closed at generate.
          STAGE_LOCAL=/tmp/vfs-derived-stage
          rm -rf "$STAGE_LOCAL"; mkdir -p "$STAGE_LOCAL"
          [ -d output/sitemaps ] && cp -r output/sitemaps "$STAGE_LOCAL/sitemaps" || true
          [ -f output/sitemap.xml ] && cp output/sitemap.xml "$STAGE_LOCAL/sitemap.xml" || true
          [ -d output/rss ] && cp -r output/rss "$STAGE_LOCAL/rss" || true
          # (1) manifest over ALL assembled files (sitemap floor >=1 fails an empty sitemap).
          node scripts/factory/vfs-derived-handoff-manifest.mjs generate "$STAGE_LOCAL" /tmp/vfs-derived-manifest.json --carrier=vfs-derived-authority
          export SET_SHA=$(node -e "process.stdout.write(require('/tmp/vfs-derived-manifest.json').set_sha256)")
          export MANIFEST_SHA=$(node -e "const c=require('crypto'),f=require('fs');process.stdout.write(c.createHash('sha256').update(f.readFileSync('/tmp/vfs-derived-manifest.json')).digest('hex'))")
          # (2) data FIRST, then manifest.json LAST.
          node scripts/factory/r2-workflow-cli.js backup-dir "$STAGE_LOCAL" "${STAGING}"
          node scripts/factory/r2-workflow-cli.js upload-file /tmp/vfs-derived-manifest.json "${STAGING}manifest.json"
          # (3) descriptor LAST OF ALL — binds the parent vfs-pack set-sha + head-SHA + version.
          node -e "const f=require('fs');f.writeFileSync('/tmp/vfs-derived-handoff.json',JSON.stringify({schema_version:1,carrier_type:'vfs-derived-authority',producer_attempt:Number(process.env.HANDOFF_PRODUCER_ATTEMPT),exact_staging_prefix:process.env.STAGING,manifest_sha256:process.env.MANIFEST_SHA,set_sha256:process.env.SET_SHA,upstream_run_id:String(process.env.HANDOFF_UPSTREAM_RUN_ID),factory_run_id:String(process.env.HANDOFF_FACTORY_RUN_ID),head_sha:String(process.env.HANDOFF_HEAD_SHA),vfs_pack_code_version:String(process.env.HANDOFF_VFS_PACK_CODE_VERSION),parent_set_sha256:(process.env.HANDOFF_PARENT_SET_SHA||null),created_at:new Date().toISOString()}))"
          node scripts/factory/r2-workflow-cli.js upload-file /tmp/vfs-derived-handoff.json "${RUN_PREFIX}/handoff.json"
          # (4) read-back verify + (5) export the verified identity for Final Upload.
          node scripts/factory/r2-workflow-cli.js restore-file "${RUN_PREFIX}/handoff.json" /tmp/vfs-derived-handoff-rb.json --strict
          OUT=$(HANDOFF_RUN_ATTEMPT="${ATT}" node scripts/factory/vfs-derived-handoff-manifest.mjs verify-descriptor /tmp/vfs-derived-handoff-rb.json --carrier=vfs-derived-authority)
          V_PREFIX=$(printf '%s' "$OUT" | cut -f1); V_SET=$(printf '%s' "$OUT" | cut -f2)
          echo "staging_prefix=${V_PREFIX}" >> "$GITHUB_OUTPUT"
          echo "set_sha=${V_SET}" >> "$GITHUB_OUTPUT"
          echo "producer_attempt=${ATT}" >> "$GITHUB_OUTPUT"
          echo "[VFS-DERIVED-HANDOFF] staging=${V_PREFIX} set_sha256=${V_SET} descriptor=${RUN_PREFIX}/handoff.json"
      - name: Save VFS Assets to Cache
        if: success()
        uses: actions/cache/save@v5
        with:
          path: |
            output/data/
            output/meta/
            output/sitemaps/
            output/sitemap.xml
          key: intra-4-4-vfs-assets-${{ needs.check-upstream.outputs.upstream-run-id }}-${{ github.run_id }}
      - name: Save RSS Feeds to Cache
        if: success()
        uses: actions/cache/save@v5
        with:
          path: output/rss/
          key: intra-4-4-rss-feeds-${{ needs.check-upstream.outputs.upstream-run-id }}-${{ github.run_id }}

  # V25.13: rss-feeds job DELETED — RSS gen moved into vfs-packing (now vfs-derived).
  # V27.40: vfs-packing further split into vfs-pack-db (heavy compute) + vfs-derived (light).

  upload:
    name: Final Upload to R2
    # FIX-4 / D-252 §E: vfs-pack-db ADDED so the published meta-NN.db set can be bound
    # to the CURRENT-CYCLE VFS Pack R2 authority (H17/PR#2265 producer) before Final
    # Upload — the DB the site describes must be the DB it serves. No DAG cycle:
    # vfs-pack-db -> vfs-derived -> upload stays acyclic; the added edge only exposes
    # vfs-pack-db's already-verified outputs (verified_vfs_pack_{staging_prefix,set_sha})
    # to a downstream sink; no duplicate producer, no 1/4-2/4-3/4 semantics change.
    needs: [mesh-baking, master-fusion-persist, vfs-derived, vfs-pack-db, check-upstream]
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/factory-setup
        with:
          aggressive-disk-cleanup: 'false'
          with-rust-ffi: 'true'
      - name: R2 Fallback for Rust FFI
        continue-on-error: true
        run: |
          FOUND=$(find rust -name '*.node' 2>/dev/null | wc -l)
          [ "$FOUND" -lt 9 ] && node scripts/factory/r2-workflow-cli.js restore-rust-ffi || true
      - name: Restore Base Output from Cache
        id: cache-output-upload
        uses: actions/cache/restore@v5
        with:
          path: output/
          key: cycle-${{ needs.check-upstream.outputs.upstream-run-id }}-output
          # FIX-2 / C12 (D-264): the GHA cache is EXACT-KEY acceleration ONLY. The
          # `cycle-<upstream-run-id>-` restore-keys PREFIX authority is REMOVED (a prefix
          # hit is identity-ambiguous -- could pull a wrong-shape -shards/-harvest entry --
          # and was consumed UNVERIFIED). The verify-or-recover step below is the
          # correctness truth vs the attempt-scoped R2 authority.
      # FIX-2 / C12 (D-264) CONSUMER: verify-or-recover the EXACT cycle-output set
      # (output/cache/**) against the current-cycle attempt-scoped R2 AUTHORITY established
      # by 3/4 finalize. Cross-workflow cycle key = the 3/4 Aggregate run id = upstream-run-id.
      # The GHA cache (restored above) is USED only if output/cache/** EXACTLY matches the
      # producer manifest (EXACT-set + per-file sha + set_sha == descriptor set_sha); on GHA
      # miss OR mismatch wipe ONLY output/cache/** (NEVER output/data/, owned by FIX-4
      # meta-NN.db) + recover from the EXACT staging + re-verify. A missing authority /
      # invalid descriptor / residual mismatch FAILS CLOSED. The fixed prefix
      # state/cycle-output/ is NO LONGER a recovery input.
      - name: Verify or Recover Cycle Output from R2 Authority (FIX-2 / D-264)
        env:
          HANDOFF_FINALIZE_RUN_ID: ${{ needs.check-upstream.outputs.upstream-run-id }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          set -uo pipefail
          mkdir -p output/cache
          PID="${HANDOFF_FINALIZE_RUN_ID}"
          if [ -z "$PID" ]; then echo "::error::FIX-2: no upstream-run-id resolved -- cannot consume cycle-output safely."; exit 1; fi
          # (1) resolve the current-cycle attempt-scoped R2 authority descriptor (fail-closed).
          DESC="state/_handoff/cycle-output/${PID}/handoff.json"
          node scripts/factory/r2-workflow-cli.js restore-file "$DESC" /tmp/cycle-output-handoff-rb.json --strict || { echo "::error::FIX-2: no current-cycle cycle-output authority descriptor ($DESC). Fail-closed."; exit 1; }
          OUT=$(node scripts/factory/cycle-output-handoff-manifest.mjs verify-descriptor /tmp/cycle-output-handoff-rb.json --carrier=cycle-output-authority) || { echo "::error::FIX-2: cycle-output descriptor provenance invalid. Fail-closed."; exit 1; }
          STAGING_PREFIX=$(printf '%s' "$OUT" | cut -f1); EXPECT_SET_SHA=$(printf '%s' "$OUT" | cut -f2)
          node scripts/factory/r2-workflow-cli.js restore-file "${STAGING_PREFIX}manifest.json" /tmp/cycle-output-manifest.json --strict || { echo "::error::FIX-2: cycle-output manifest missing at ${STAGING_PREFIX}. Fail-closed."; exit 1; }
          verify_cycle_output() { node scripts/factory/cycle-output-handoff-manifest.mjs verify output /tmp/cycle-output-manifest.json --carrier=cycle-output-authority; }
          # (2) GHA fast path: verify the GHA-restored output/cache/** against the R2 manifest.
          NEED_RECOVER=0
          if OUT2=$(verify_cycle_output) && [ "$(printf '%s' "$OUT2" | tail -n1)" = "$EXPECT_SET_SHA" ]; then
            echo "[CYCLE-OUTPUT-HANDOFF] GHA fast-path cycle-output matches producer set_sha=$EXPECT_SET_SHA"
          else
            echo "[CYCLE-OUTPUT-HANDOFF] GHA miss/mismatch -- recover from exact staging"; NEED_RECOVER=1
          fi
          # (3) GHA miss/mismatch => wipe ONLY output/cache/** (NEVER output/data/) + recover
          # from the EXACT attempt-scoped staging + re-verify set_sha256.
          if [ "$NEED_RECOVER" = "1" ]; then
            rm -rf output/cache; mkdir -p output/cache
            node scripts/factory/r2-workflow-cli.js restore-dir "$STAGING_PREFIX" output/ --strict || { echo "::error::FIX-2: recover restore failed (${STAGING_PREFIX}). Fail-closed."; exit 1; }
            rm -f output/manifest.json output/handoff.json output/_manifest.json 2>/dev/null || true
            OUT2=$(verify_cycle_output) || { echo "::error::FIX-2: exact-staging cycle-output recovery failed verification (${STAGING_PREFIX}). Fail-closed."; exit 1; }
            [ "$(printf '%s' "$OUT2" | tail -n1)" = "$EXPECT_SET_SHA" ] || { echo "::error::FIX-2: recovered cycle-output set hash != producer $EXPECT_SET_SHA. Fail-closed."; exit 1; }
            echo "[CYCLE-OUTPUT-HANDOFF] recovered + verified cycle-output from exact staging"
          fi
      - name: Restore Upload Manifest from Cache
        uses: actions/cache/restore@v5
        with:
          path: output/cache/last-upload-manifest.json
          key: r2-upload-manifest-${{ needs.check-upstream.outputs.upstream-run-id }}-${{ github.run_id }}
          restore-keys: |
            r2-upload-manifest-${{ needs.check-upstream.outputs.upstream-run-id }}-
            r2-upload-manifest-
      # S1-BR consumer (Final Upload): exact-key GHA fast path, then the restored
      # fused set MUST match the Persist-VERIFIED identity. NO restore-keys prefix,
      # NO state/fused-entities/ identity-ambiguous current-run fallback. On miss OR
      # mismatch: wipe local fused/ + restore from the EXACT producer staging prefix
      # from Persist's output, then re-verify; verification failure => fail-loud.
      - name: Restore Fused Entities (GHA fast path, exact key only)
        id: cache-fused-upload
        uses: actions/cache/restore@v5
        with:
          path: output/cache/fused/
          key: intra-4-4-fused-${{ needs.check-upstream.outputs.upstream-run-id }}-${{ github.run_id }}
      - name: Verify or Recover Fused from Exact Staging (S1-BR)
        env:
          STAGING_PREFIX: ${{ needs.master-fusion-persist.outputs.verified_fused_staging_prefix }}
          EXPECT_SET_SHA: ${{ needs.master-fusion-persist.outputs.verified_fused_set_sha }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          set -uo pipefail
          if [ -z "${STAGING_PREFIX}" ] || [ -z "${EXPECT_SET_SHA}" ]; then
            echo "::error::Persist did not export a verified fused identity — cannot consume fused safely."; exit 1
          fi
          verify() { node scripts/factory/fused-handoff-manifest.js verify output/cache/fused/ output/cache/fused/manifest.json; }
          NEED_RECOVER=0
          if [ -f output/cache/fused/manifest.json ] && OUT=$(verify) && [ "$(printf '%s' "$OUT" | tail -n1)" = "$EXPECT_SET_SHA" ]; then
            echo "✅ [HANDOFF] Upload fast-path fused matches Persist set_sha=$EXPECT_SET_SHA"
          else
            echo "⚠️ [HANDOFF] Upload fused miss/mismatch — recover from exact staging"; NEED_RECOVER=1
          fi
          if [ "$NEED_RECOVER" = "1" ]; then
            rm -rf output/cache/fused/; mkdir -p output/cache/fused/
            node scripts/factory/r2-workflow-cli.js restore-dir "$STAGING_PREFIX" output/cache/fused/ --strict
            node scripts/factory/r2-workflow-cli.js restore-file "${STAGING_PREFIX}manifest.json" output/cache/fused/manifest.json --strict
            # Explicitly restore the .complete sentinel so recovery never depends on
            # restore-dir having captured the dotfile (before verify so the gate sees it).
            node scripts/factory/r2-workflow-cli.js restore-file "${STAGING_PREFIX}.complete" output/cache/fused/.complete --strict
            OUT=$(verify) || { echo "::error::Upload exact-staging recovery failed verification ($STAGING_PREFIX)."; exit 1; }
            [ "$(printf '%s' "$OUT" | tail -n1)" = "$EXPECT_SET_SHA" ] || { echo "::error::Upload recovered set hash != Persist $EXPECT_SET_SHA."; exit 1; }
            echo "✅ [HANDOFF] Upload recovered + verified from exact staging"
          fi
      - name: Restore Global Registry Cache (V22.8 Cycle)
        uses: actions/cache/restore@v5
        with:
          path: |
            cache/global-registry.json.zst
            cache/registry/
          key: global-registry-${{ needs.check-upstream.outputs.upstream-run-id }}
          restore-keys: global-registry-
      - name: Restore FNI History Cache
        id: cache-fni-history
        uses: actions/cache/restore@v5
        with:
          path: |
            cache/fni-history.json.zst
            cache/fni-history/
          key: fni-history-${{ needs.check-upstream.outputs.upstream-run-id }}
          restore-keys: fni-history-
      # P0-R3: R2 fallback for FNI history
