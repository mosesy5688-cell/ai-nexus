# Factory 4/4 - Finalize V14.6
# Consolidated Stage 3.5 + 4.0
# 
# Triggers: workflow_run from Aggregate, or manual dispatch
# Inputs: factory-output artifact/cache from Aggregate stage
# Jobs: Relations, Knowledge Mesh, RSS, and Final R2 Upload

name: Factory 4/4 - Finalize

permissions:
  actions: write
  contents: read
  id-token: write

on:
  workflow_run:
    workflows: ["Factory 3/4 - Aggregate"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Aggregate workflow run ID'
        required: false
        type: string

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_BUCKET: ai-nexus-assets
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  NODE_OPTIONS: '--max-old-space-size=6144'
  STRICT_R2_LOCKDOWN: 'true'

jobs:
  check-upstream:
    name: Check Upstream
    runs-on: ubuntu-latest
    outputs:
      upstream-run-id: ${{ steps.get-id.outputs.id }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Verify Upstream Conclusion
        if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion != 'success' }}
        run: |
          echo "ERROR: Upstream workflow '${{ github.event.workflow_run.name }}' failed with conclusion '${{ github.event.workflow_run.conclusion }}'."
          exit 1
      - name: Get ID
        id: get-id
        run: |
          AGGREGATE_RUN_ID=${{ inputs.run_id || github.event.workflow_run.id }}
          if [ -z "$AGGREGATE_RUN_ID" ] || [ "$AGGREGATE_RUN_ID" == "null" ]; then
            echo "Finding latest successful Aggregate run on main..."
            AGGREGATE_RUN_ID=$(gh run list --workflow factory-aggregate.yml --branch main --status success --limit 1 --json databaseId --jq '.[0].databaseId' | tr -d '[:space:]')
          fi
          echo "id=$AGGREGATE_RUN_ID" >> $GITHUB_OUTPUT

  mesh-baking:
    name: Mesh Baking
    needs: check-upstream
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: Restore Complete Cycle Output from Cache
        uses: actions/cache/restore@v4
        with:
          path: output/
          key: cycle-${{ needs.check-upstream.outputs.upstream-run-id }}-output
          restore-keys: cycle-
      - name: Bake atomized Mesh Profiles
        env:
          CACHE_DIR: ./output/cache
        run: node scripts/factory/mesh-profile-baker.js
      - name: Tar Baked Profiles
        run: tar -cf mesh-profiles.tar -C output/cache/mesh profiles
      - name: Save Baked Profiles to Cache
        uses: actions/cache/save@v4
        with:
          path: mesh-profiles.tar
          key: intra-4-4-${{ github.run_id }}-baked

  master-fusion:
    name: Master Fusion
    needs: [mesh-baking, check-upstream]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: Restore Base Output from Cache
        uses: actions/cache/restore@v4
        with:
          path: output/
          key: cycle-${{ needs.check-upstream.outputs.upstream-run-id }}-output
          restore-keys: cycle-
      - name: Restore Baked Profiles from Cache
        uses: actions/cache/restore@v4
        with:
          path: mesh-profiles.tar
          key: intra-4-4-${{ github.run_id }}-baked
      - name: Extract Profiles
        run: |
          mkdir -p output/cache/mesh
          tar -xf mesh-profiles.tar -C output/cache/mesh
      - name: Organize Shards for Fusion
        run: |
          mkdir -p artifacts
          # V19.2 Fix: Harvest Registry Shards (part-*) instead of incremental Process shards (shard-*)
          # The full registry is in output/cache/registry/
          if [ -d "output/cache/registry" ]; then
            echo "📦 Copying registry shards for fusion (preserving originals for Closed World)..."
            find output/cache/registry -name "part-*.json.gz" -exec cp {} artifacts/ \;
          elif [ -d "output/shards" ]; then
            # Fallback for older structures if they somehow persist
            find output/shards -name "shard-*.json.gz" -exec cp {} artifacts/ \;
          fi
          echo "📦 Shards ready in artifacts/: $(ls artifacts | wc -l)"
      - name: Execute Master Fusion
        env:
          CACHE_DIR: ./output/cache
          ARTIFACT_DIR: ./artifacts
        run: node scripts/factory/master-fusion.js
      - name: Tar Fused Entities
        run: tar -cf fused-entities.tar -C output/cache fused
      - name: Save Fused Entities to Cache
        uses: actions/cache/save@v4
        with:
          path: fused-entities.tar
          key: intra-4-4-${{ github.run_id }}-fused-tar

  vfs-packing:
    name: VFS Packing (Stable 1.0)
    needs: master-fusion
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: Restore Base Output (Trending Context)
        uses: actions/cache/restore@v4
        with:
          path: output/
          key: cycle-${{ github.event.workflow_run.id || inputs.run_id }}-output
          restore-keys: cycle-
      - name: Restore Fused Entities
        uses: actions/cache/restore@v4
        with:
          path: fused-entities.tar
          key: intra-4-4-${{ github.run_id }}-fused-tar
      - name: Extract Fused Entities
        run: |
          mkdir -p output/cache/fused
          tar -xf fused-entities.tar -C output/cache
      - name: Execute Stable 1.0 Packer
        env:
          CACHE_DIR: ./output/cache
        run: node scripts/factory/pack-db.js
      - name: Generate VFS-Parity Sitemaps
        run: node scripts/factory/vfs-sitemap-gen.js --db=output/data/search.db --out=output
      - name: V22.3 SQL Health Check
        run: |
          node scripts/factory/verify-db.js output/data/meta.db
          node scripts/factory/verify-db.js output/data/search.db
      - name: Save VFS Assets to Cache
        uses: actions/cache/save@v4
        with:
          path: |
            output/data/
            output/sitemaps/
            output/sitemap.xml
          key: intra-4-4-${{ github.run_id }}-vfs-assets

  rss-feeds:
    name: RSS Feeds
    needs: check-upstream
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: Restore Base Output from Cache
        uses: actions/cache/restore@v4
        with:
          path: output/
          key: cycle-${{ needs.check-upstream.outputs.upstream-run-id }}-output
          restore-keys: cycle-
      - name: Generate RSS feeds
        run: node scripts/factory/lib/rss-generator.js ./output
      - name: Save RSS Feeds to Cache
        uses: actions/cache/save@v4
        with:
          path: output/rss/
          key: intra-4-4-${{ github.run_id }}-rss-feeds

  upload:
    name: Final Upload to R2
    needs: [mesh-baking, master-fusion, vfs-packing, rss-feeds, check-upstream]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: Restore Base Output from Cache
        uses: actions/cache/restore@v4
        with:
          path: output/
          key: cycle-${{ needs.check-upstream.outputs.upstream-run-id }}-output
          restore-keys: cycle-
      - name: Restore Upload Manifest from Cache
        uses: actions/cache/restore@v4
        with:
          path: output/cache/last-upload-manifest.json
          key: r2-upload-manifest-${{ github.run_id }}
          restore-keys: r2-upload-manifest-
      - name: Restore Fused Entities from Cache
        uses: actions/cache/restore@v4
        with:
          path: fused-entities.tar
          key: intra-4-4-${{ github.run_id }}-fused-tar
      - name: Extract Fused Entities
        run: |
          mkdir -p output/cache
          tar -xf fused-entities.tar -C output/cache
      - name: Restore Baked Profiles from Cache
        uses: actions/cache/restore@v4
        with:
          path: mesh-profiles.tar
          key: intra-4-4-${{ github.run_id }}-baked
      - name: Extract Baked Profiles
        run: |
          mkdir -p output/cache/mesh
          tar -xf mesh-profiles.tar -C output/cache/mesh
      - name: Restore VFS Assets from Cache
        uses: actions/cache/restore@v4
        with:
          path: |
            output/data/
            output/sitemaps/
            output/sitemap.xml
          key: intra-4-4-${{ github.run_id }}-vfs-assets
      - name: Restore RSS Feeds from Cache
        uses: actions/cache/restore@v4
        with:
          path: output/rss/
          key: intra-4-4-${{ github.run_id }}-rss-feeds
      - name: Consolidate Enrichment Artifacts
        run: |
          # V22.8: RSS feeds restored directly to output/rss/ via cache
          [ -d "output/rss" ] && echo "✅ RSS feeds loaded from cache" || echo "⚠️ No RSS feeds found"
          
          # Ensure sitemaps from vfs-packing are in the right place
          if [ -d "output/sitemaps" ]; then
            echo "✅ VFS Sitemaps aligned for upload"
          fi
          
          echo "✅ Artifacts consolidated into output/"
      - name: Prepare Registry Backup for S3 Upload
        run: |
          mkdir -p output/meta/backup
          # V19.3 Optimization: Promote legacy monoliths to root for filter compliance
          [ -f "output/meta/backup/global-registry.json.gz" ] && cp output/meta/backup/global-registry.json.gz output/ || true
          [ -f "output/meta/backup/fni-history.json.gz" ] && cp output/meta/backup/fni-history.json.gz output/ || true
          [ -f "output/meta/backup/daily-accum.json.gz" ] && cp output/meta/backup/daily-accum.json.gz output/ || true
          [ -f "output/meta/backup/entity-checksums.json.gz" ] && cp output/meta/backup/entity-checksums.json.gz output/ || true
          echo "✅ aggregator.js has prepared baseline backups in output/meta/backup/ and promoted to root"
      # V19.0: SQL Health Check before upload (blocks deployment on failure)
      - name: V22.3 SQL Health Check
        run: |
          if [ -f "output/data/meta.db" ]; then
            echo "🔍 Running meta.db health check..."
            node scripts/factory/verify-db.js output/data/meta.db
            echo "🔍 Running search.db health check..."
            node scripts/factory/verify-db.js output/data/search.db
          else
            echo "⚠️ No VFS DBs found in output — skipping health check"
          fi
      - name: Upload to R2 via S3 API
        env:
          # V22.3: Added Split-DB meta.db and search.db
          R2_PREFIX_FILTER: checkpoint.json,entities.json,entities.json.gz,global-registry.json.gz,fni-history.json.gz,daily-accum.json.gz,entity-checksums.json.gz,cache/fused/,cache/rankings/,cache/search/,cache/trending.json,cache/trending.json.gz,cache/category_stats.json,cache/category_stats.json.gz,cache/search-core.json,cache/search-core.json.gz,cache/search-full.json,cache/search-full.json.gz,cache/search-manifest.json,cache/relations/,cache/relations.json,cache/relations.json.gz,cache/trend-data.json,cache/knowledge/,cache/mesh/,cache/graph.json,cache/reports/,meta/,sitemaps/,rss/,sitemap.xml,data/meta.db,data/search.db,data/
          CACHE_DIR: output/cache
        run: node scripts/factory/r2-upload-s3.js
      - name: Save Upload Manifest to Cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: output/cache/last-upload-manifest.json
          key: r2-upload-manifest-${{ github.run_id }}
      # V19.0: 60s Drain Wait — let CDN edge caches expire before purge
      - name: CDN Drain Wait (90s)
        run: |
          echo "⏳ [V19.2] Waiting 90s for CDN edge cache TTL expiry..."
          sleep 90
          echo "✅ Drain wait complete. Commencing Probing."
      - name: V19.2 Production Health Probe
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: node scripts/factory/probe-vfs.js
      - name: Purge & Warm CDN
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          if [ -z "$CLOUDFLARE_ZONE_ID" ] || [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "⚠️ [PURGE] Skipping CDN purge: CLOUDFLARE_ZONE_ID/TOKEN missing"
            exit 0
          fi
          PURGE_PATHS='["https://cdn.free2aitools.com/cache/trending.json","https://cdn.free2aitools.com/cache/trending.json.gz","https://cdn.free2aitools.com/cache/search-core.json","https://cdn.free2aitools.com/cache/search-core.json.gz","https://cdn.free2aitools.com/cache/relations.json","https://cdn.free2aitools.com/cache/relations.json.gz","https://cdn.free2aitools.com/sitemap.xml","https://cdn.free2aitools.com/data/meta.db","https://cdn.free2aitools.com/data/search.db"]'
          echo "📡 Purging CDN cache for paths: $PURGE_PATHS"
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" -H "Content-Type: application/json" \
            --data "{\"files\":$PURGE_PATHS}" > purge_res.json
          if grep -q '"code":10000' purge_res.json; then
            echo "❌ [PURGE ERROR] Authentication failed. Please ensure your CLOUDFLARE_API_TOKEN has 'Zone.Cache Purge' permissions."
          fi
          cat purge_res.json
      - name: Trigger Health Check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🏥 Triggering Daily Health Check..."
          gh workflow run global-health-monitor.yml
        continue-on-error: true
