# Factory 4/4 - Finalize V14.6
# Consolidated Stage 3.5 + 4.0
# 
# Triggers: workflow_run from Aggregate, or manual dispatch
# Inputs: factory-output artifact/cache from Aggregate stage
# Jobs: Relations, Knowledge Mesh, RSS, and Final R2 Upload

name: Factory 4/4 - Finalize

permissions:
  actions: write
  contents: read
  id-token: write

on:
  workflow_run:
    workflows: ["Factory 3/4 - Aggregate"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Aggregate workflow run ID'
        required: false
        type: string

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_BUCKET: ai-nexus-assets
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  NODE_OPTIONS: '--max-old-space-size=6144'
  STRICT_R2_LOCKDOWN: 'true'

jobs:
  check-upstream:
    name: Check Upstream
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      upstream-run-id: ${{ steps.get-id.outputs.id }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Verify Upstream Conclusion
        if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion != 'success' }}
        run: |
          echo "ERROR: Upstream workflow '${{ github.event.workflow_run.name }}' failed with conclusion '${{ github.event.workflow_run.conclusion }}'."
          exit 1
      - name: Get ID
        id: get-id
        run: |
          AGGREGATE_RUN_ID=${{ inputs.run_id || github.event.workflow_run.id }}
          if [ -z "$AGGREGATE_RUN_ID" ] || [ "$AGGREGATE_RUN_ID" == "null" ]; then
            echo "Finding latest successful Aggregate run on main..."
            AGGREGATE_RUN_ID=$(gh run list --workflow factory-aggregate.yml --branch main --status success --limit 1 --json databaseId --jq '.[0].databaseId' | tr -d '[:space:]')
          fi
          echo "id=$AGGREGATE_RUN_ID" >> $GITHUB_OUTPUT

  mesh-baking:
    name: Mesh Baking
    needs: check-upstream
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - name: Restore Complete Cycle Output from Cache
        id: cache-output-mesh
        uses: actions/cache/restore@v4
        with:
          path: output/
          key: cycle-${{ needs.check-upstream.outputs.upstream-run-id }}-output
          restore-keys: cycle-
      # V25.8.3: R2 fallback if cache miss
      - name: R2 Fallback for Cycle Output
        if: steps.cache-output-mesh.outputs.cache-hit != 'true'
        run: |
          node -e "
            import { restoreDirectoryFromR2 } from './scripts/factory/lib/r2-handoff.js';
            const r = await restoreDirectoryFromR2('state/cycle-output/', 'output/');
            if (!r.count) { console.error('No cycle-output on R2'); process.exit(1); }
          "
      - name: Bake atomized Mesh Profiles
        env:
          CACHE_DIR: ./output/cache
        run: node scripts/factory/mesh-profile-baker.js
      - name: Tar Baked Profiles
        run: tar -cf mesh-profiles.tar -C output/cache/mesh profiles
      - name: Save Baked Profiles to Cache
        uses: actions/cache/save@v4
        with:
          path: mesh-profiles.tar
          key: intra-4-4-${{ github.run_id }}-baked

  master-fusion:
    name: Master Fusion
    needs: [mesh-baking, check-upstream]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - name: Restore Base Output from Cache
        id: cache-output-fusion
        uses: actions/cache/restore@v4
        with:
          path: output/
          key: cycle-${{ needs.check-upstream.outputs.upstream-run-id }}-output
          restore-keys: cycle-
      - name: R2 Fallback for Base Output
        if: steps.cache-output-fusion.outputs.cache-hit != 'true'
        run: |
          node -e "
            import { restoreDirectoryFromR2 } from './scripts/factory/lib/r2-handoff.js';
            await restoreDirectoryFromR2('state/cycle-output/', 'output/');
          " || echo '⚠️ R2 fallback skipped'
      - name: Restore Baked Profiles from Cache
        uses: actions/cache/restore@v4
        with:
          path: mesh-profiles.tar
          key: intra-4-4-${{ github.run_id }}-baked
      - name: Extract Profiles
        run: |
          mkdir -p output/cache/mesh
          tar -xf mesh-profiles.tar -C output/cache/mesh
      - name: Restore Global Registry Cache
        uses: actions/cache/restore@v4
        with:
          path: |
            cache/global-registry.json.zst
            cache/registry/
          key: global-registry-${{ needs.check-upstream.outputs.upstream-run-id }}
          restore-keys: global-registry-
      - name: Align Registry Cache for Fusion
        run: |
          mkdir -p output/cache/registry
          [ -f "cache/global-registry.json.zst" ] && cp cache/global-registry.json.zst output/cache/ || true
          [ -d "cache/registry" ] && cp -r cache/registry/* output/cache/registry/ 2>/dev/null || true
          echo "✅ Registry aligned: $(ls output/cache/registry/ 2>/dev/null | wc -l) shards"
      - name: Execute Master Fusion
        env:
          CACHE_DIR: ./output/cache
          ARTIFACT_DIR: ./output/cache/registry
          AES_CRYPTO_KEY: ${{ secrets.AES_CRYPTO_KEY }}
        run: node scripts/factory/master-fusion.js
      - name: Tar Fused Entities
        run: tar -cf fused-entities.tar -C output/cache fused
      - name: Save Fused Entities to Cache
        uses: actions/cache/save@v4
        with:
          path: fused-entities.tar
          key: intra-4-4-${{ github.run_id }}-fused-tar

  vfs-packing:
    name: VFS Packing (Stable 1.0)
    needs: master-fusion
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - name: Restore Rust FFI Binaries
        uses: actions/cache/restore@v4
        with:
          path: |
            rust/shard-router/shard-router-rust.node
            rust/fni-calc/fni-calc-rust.node
            rust/mesh-engine/mesh-engine-rust.node
            rust/content-extractor/content-extractor-rust.node
            rust/stream-aggregator/stream-aggregator-rust.node
            rust/satellite-tasks/satellite-tasks-rust.node
          key: rust-ffi-binaries-${{ hashFiles('rust/Cargo.toml', 'rust/*/Cargo.toml', 'rust/*/src/**') }}
          restore-keys: rust-ffi-binaries-
      - name: R2 Fallback for Rust FFI
        continue-on-error: true
        run: |
          FOUND=$(find rust -name '*.node' 2>/dev/null | wc -l)
          [ "$FOUND" -lt 6 ] && node --input-type=module -e "
            import { restoreFileFromR2 } from './scripts/factory/lib/r2-handoff.js';
            const crates = ['shard-router','fni-calc','mesh-engine','content-extractor','stream-aggregator','satellite-tasks'];
            for (const c of crates) { await restoreFileFromR2('vault/rust-ffi/' + c + '-rust.node', 'rust/' + c + '/' + c + '-rust.node'); }
          " || true
      - name: Restore Base Output (Trending Context)
        uses: actions/cache/restore@v4
        with:
          path: output/
          key: cycle-${{ github.event.workflow_run.id || inputs.run_id }}-output
          restore-keys: cycle-
      - name: Restore Fused Entities
        uses: actions/cache/restore@v4
        with:
          path: fused-entities.tar
          key: intra-4-4-${{ github.run_id }}-fused-tar
      - name: Restore Embedding Cache (Vault)
        id: cache-embedding
        uses: actions/cache/restore@v4
        with:
          path: output/cache/embedding-cache.db
          key: embedding-cache-v1-${{ github.run_id }}
          restore-keys: embedding-cache-v1-
      - name: R2 Fallback for Embedding Cache
        if: steps.cache-embedding.outputs.cache-hit != 'true'
        continue-on-error: true
        run: |
          mkdir -p output/cache
          node --input-type=module -e "
            import { restoreFileFromR2 } from './scripts/factory/lib/r2-handoff.js';
            await restoreFileFromR2('state/embedding-cache.db', 'output/cache/embedding-cache.db');
          " || echo "⚠️ No embedding cache on R2"
      - name: Extract Fused Entities
        run: |
          mkdir -p output/cache/fused
          tar -xf fused-entities.tar -C output/cache
      - name: Execute Stable 1.0 Packer
        env:
          CACHE_DIR: ./output/cache
          AES_CRYPTO_KEY: ${{ secrets.AES_CRYPTO_KEY }}
          UMID_SALT: ${{ secrets.UMID_SALT }}
        run: node scripts/factory/pack-db.js
      - name: Save Embedding Cache to Vault
        if: always()
        uses: actions/cache/save@v4
        with:
          path: output/cache/embedding-cache.db
          key: embedding-cache-v1-${{ github.run_id }}
      - name: Generate VFS-Parity Sitemaps
        run: node scripts/factory/vfs-sitemap-gen.js --db=output/data/search.db --out=output
      - name: V23.1 SQL Health Check
        run: |
          for db in output/data/*.db; do
            echo "🔍 Verifying $db..."
            node scripts/factory/verify-db.js "$db"
          done
      - name: Save VFS Assets to Cache
        uses: actions/cache/save@v4
        with:
          path: |
            output/data/
            output/meta/
            output/sitemaps/
            output/sitemap.xml
          key: intra-4-4-${{ github.run_id }}-vfs-assets

  rss-feeds:
    name: RSS Feeds
    needs: check-upstream
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - name: Restore Base Output from Cache
        id: cache-output-rss
        uses: actions/cache/restore@v4
        with:
          path: output/
          key: cycle-${{ needs.check-upstream.outputs.upstream-run-id }}-output
          restore-keys: cycle-
      - name: R2 Fallback for Base Output
        if: steps.cache-output-rss.outputs.cache-hit != 'true'
        continue-on-error: true
        run: |
          node --input-type=module -e "
            import { restoreDirectoryFromR2 } from './scripts/factory/lib/r2-handoff.js';
            await restoreDirectoryFromR2('state/cycle-output/', 'output/');
          " || echo '⚠️ R2 fallback skipped'
      - name: Generate RSS feeds
        run: node scripts/factory/lib/rss-generator.js ./output
      - name: Save RSS Feeds to Cache
        uses: actions/cache/save@v4
        with:
          path: output/rss/
          key: intra-4-4-${{ github.run_id }}-rss-feeds


  upload:
    name: Final Upload to R2
    needs: [mesh-baking, master-fusion, vfs-packing, rss-feeds, check-upstream]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - name: Restore Base Output from Cache
        id: cache-output-upload
        uses: actions/cache/restore@v4
        with:
          path: output/
          key: cycle-${{ needs.check-upstream.outputs.upstream-run-id }}-output
          restore-keys: cycle-
      - name: R2 Fallback for Base Output
        if: steps.cache-output-upload.outputs.cache-hit != 'true'
        continue-on-error: true
        run: |
          node --input-type=module -e "
            import { restoreDirectoryFromR2 } from './scripts/factory/lib/r2-handoff.js';
            await restoreDirectoryFromR2('state/cycle-output/', 'output/');
          " || echo '⚠️ R2 fallback skipped'
      - name: Restore Upload Manifest from Cache
        uses: actions/cache/restore@v4
        with:
          path: output/cache/last-upload-manifest.json
          key: r2-upload-manifest-${{ github.run_id }}
          restore-keys: r2-upload-manifest-
      - name: Restore Fused Entities from Cache
        uses: actions/cache/restore@v4
        with:
          path: fused-entities.tar
          key: intra-4-4-${{ github.run_id }}-fused-tar
      - name: Restore Global Registry Cache (V22.8 Cycle)
        uses: actions/cache/restore@v4
        with:
          path: |
            cache/global-registry.json.zst
            cache/registry/
          key: global-registry-${{ needs.check-upstream.outputs.upstream-run-id }}
          restore-keys: global-registry-
      - name: Restore FNI History Cache
        uses: actions/cache/restore@v4
        with:
          path: |
            cache/fni-history.json.zst
            cache/fni-history/
          key: fni-history-${{ needs.check-upstream.outputs.upstream-run-id }}
          restore-keys: fni-history-
      - name: Restore Daily Accumulator Cache
        uses: actions/cache/restore@v4
        with:
          path: |
            cache/daily-accum.json.zst
            cache/daily-accum/
          key: daily-accum-${{ needs.check-upstream.outputs.upstream-run-id }}
          restore-keys: daily-accum-
      - name: Extract Fused Entities
        run: |
          mkdir -p output/cache
          tar -xf fused-entities.tar -C output/cache
      - name: Restore Baked Profiles from Cache
        uses: actions/cache/restore@v4
        with:
          path: mesh-profiles.tar
          key: intra-4-4-${{ github.run_id }}-baked
      - name: Extract Baked Profiles
        run: |
          mkdir -p output/cache/mesh
          tar -xf mesh-profiles.tar -C output/cache/mesh
      - name: Restore VFS Assets from Cache
        uses: actions/cache/restore@v4
        with:
          path: |
            output/data/
            output/meta/
            output/sitemaps/
            output/sitemap.xml
          key: intra-4-4-${{ github.run_id }}-vfs-assets
      - name: Restore RSS Feeds from Cache
        uses: actions/cache/restore@v4
        with:
          path: output/rss/
          key: intra-4-4-${{ github.run_id }}-rss-feeds
      - name: Consolidate Enrichment Artifacts
        run: |
          # V22.8: RSS feeds restored directly to output/rss/ via cache
          [ -d "output/rss" ] && echo "✅ RSS feeds loaded from cache" || echo "⚠️ No RSS feeds found"
          
          # V22.8: Verify Fused Shards
          if [ -d "output/cache/fused" ]; then
            FUSED_COUNT=$(ls -A output/cache/fused | wc -l)
            echo "✅ [FUSION] $FUSED_COUNT fused shards located in output/cache/fused"
          else
            echo "❌ [ERROR] Fused entities missing from output/cache/fused!"
            exit 1
          fi
          
          # Ensure sitemaps from vfs-packing are in the right place
          if [ -d "output/sitemaps" ]; then
            echo "✅ VFS Sitemaps aligned for upload"
          fi
          
          echo "✅ Artifacts consolidated into output/"
      - name: Prepare Industrial Backup for R2
        run: |
          echo "🛡️  V22.8: Sequestering Industrial Data in meta/backup..."
          mkdir -p output/meta/backup/registry output/meta/backup/fni-history output/meta/backup/daily-accum
          
          # 1. Promote Monoliths from local cache to Stage 4 sequestration zone
          MONOLITHS="global-registry.json.zst fni-history.json.zst daily-accum.json.zst entity-checksums.json.zst"
          for f in $MONOLITHS; do
            if [ -f "cache/$f" ]; then
              cp "cache/$f" output/meta/backup/
              echo "✅ Sequestered monolith $f to meta/backup"
            fi
          done
          
          # 2. Promote Shards from local cache to Stage 4 sequestration zone
          for dir in registry fni-history daily-accum; do
            if [ -d "cache/$dir" ] && [ "$(ls -A cache/$dir 2>/dev/null)" ]; then
              cp -r cache/$dir/* output/meta/backup/$dir/
              echo "✅ Sequestered $dir shards to meta/backup"
            fi
          done
          
          echo "✅ Industrial Isolation Complete. Public CDN remains clean."
      # V23.1: SQL Health Check before upload (blocks deployment on failure)
      - name: V23.1 SQL Health Check
        run: |
          if [ -d "output/data" ]; then
            for db in output/data/*.db; do
              echo "🔍 Production Guard: Verifying $db..."
              node scripts/factory/verify-db.js "$db"
            done
          else
            echo "⚠️ No VFS DBs found in output — skipping health check"
          fi
      # V25.8.3: Feed Density Booster Queue — onboard entities into dedup.db
      - name: Sync Ledger (Feed 1.5)
        env:
          CACHE_DIR: ./output/cache
          DEDUP_DB_PATH: ./output/data/dedup.db
        run: node scripts/factory/sync-ledger.js
      - name: Upload to R2 via S3 API
        env:
          # V22.9.6: Removed cache/fused/ (~290K PUTs) and cache/mesh/profiles/ (~10K PUTs)
          # VFS is now the sole data source — individual entity JSONs are redundant.
          # Kept: cache/mesh/graph + cache/mesh/stats (VFS-IN via site_metadata)
          R2_PREFIX_FILTER: checkpoint.json,entities.json,entities.json.zst,cache/rankings/,cache/search/,cache/trending.json,cache/trending.json.zst,cache/category_stats.json,cache/category_stats.json.zst,cache/search-core.json,cache/search-core.json.zst,cache/search-manifest.json,cache/relations/,cache/relations.json,cache/relations.json.zst,cache/trend-data.json,cache/trend-data.json.zst,cache/knowledge/,cache/mesh/graph,cache/mesh/stats,cache/graph.json,cache/reports/,meta/,sitemaps/,rss/,sitemap.xml,data/search.db,data/hot-shard.bin,data/vector-core.bin,data/
          CACHE_DIR: output/cache
          # V25.8 §2.2: Enable S3 Multipart for fused-shard-NNN.bin (>8MB)
          R2_MULTIPART_ENABLED: 'true'
        run: node scripts/factory/r2-upload-s3.js
      - name: Save Upload Manifest to Cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: output/cache/last-upload-manifest.json
          key: r2-upload-manifest-${{ github.run_id }}
      # V19.0: 60s Drain Wait — let CDN edge caches expire before purge
      - name: CDN Drain Wait (90s)
        run: |
          echo "⏳ [V19.2] Waiting 90s for CDN edge cache TTL expiry..."
          sleep 90
          echo "✅ Drain wait complete. Commencing Probing."
      - name: V19.2 Production Health Probe
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: node scripts/factory/probe-vfs.js
      - name: Purge & Warm CDN
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          if [ -z "$CLOUDFLARE_ZONE_ID" ] || [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "⚠️ [PURGE] Skipping CDN purge: CLOUDFLARE_ZONE_ID/TOKEN missing"
            exit 0
          fi
          echo "📡 [V25.1] Executing Atomic Purge (purge_everything)..."
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' > purge_res.json
            
          if grep -q '"code":10000' purge_res.json; then
            echo "❌ [PURGE ERROR] Authentication failed. Please ensure your CLOUDFLARE_API_TOKEN has 'Zone.Cache Purge' permissions."
          fi
          cat purge_res.json
          
          echo -e "\n🔥 [V25.1] Commencing Proactive CDN Warming..."
          
          # V25.8: Initialize with global configs, core DB, and new V25.8 assets
          WARM_URLS=(
            "https://cdn.free2aitools.com/data/shards_manifest.json"
            "https://cdn.free2aitools.com/data/search.db"
            "https://cdn.free2aitools.com/data/fts.db"
            "https://cdn.free2aitools.com/data/hot-shard.bin"
            "https://cdn.free2aitools.com/data/vector-core.bin"
            "https://cdn.free2aitools.com/sitemap.xml"
            "https://cdn.free2aitools.com/cache/trending.json"
          )

          # V25.8: Warm fused-shard binary files (cold payload layer)
          for i in $(seq -w 0 3); do
            WARM_URLS+=("https://cdn.free2aitools.com/data/fused-shard-0${i}.bin")
          done
          
          # V25.8: Dynamic VFS Shard Warming (discovers actual DB files instead of hardcoding counts)
          if [ -d "output/data" ]; then
            for db_file in output/data/meta-*.db; do
              db_name=$(basename "$db_file")
              WARM_URLS+=("https://cdn.free2aitools.com/data/${db_name}")
            done
          fi

          for url in "${WARM_URLS[@]}"; do
            echo "Warming: $url"
            curl -s -o /dev/null -H "User-Agent: Nexus-Warmer/1.0" "$url"
          done
          echo "✅ Proactive Warming Complete."
      - name: Trigger Health Check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🏥 Triggering Daily Health Check..."
          gh workflow run global-health-monitor.yml
        continue-on-error: true

      # V25.8.3: Upload dedup.db to state/ for Factory 1.5 consumption
      # factory-enrich.yml downloads from state/dedup.db, not data/dedup.db
      - name: Upload Dedup Ledger to R2 State
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          if [ -f "output/data/dedup.db" ]; then
            node --input-type=module -e "
              import { createR2Client } from './scripts/factory/lib/r2-helpers.js';
              import { PutObjectCommand } from '@aws-sdk/client-s3';
              import fs from 'fs';
              const s3 = createR2Client();
              if (!s3) process.exit(0);
              const data = fs.readFileSync('output/data/dedup.db');
              await s3.send(new PutObjectCommand({
                Bucket: 'ai-nexus-assets', Key: 'state/dedup.db',
                Body: data, ContentType: 'application/x-sqlite3'
              }));
              console.log('✅ dedup.db uploaded to state/dedup.db for Factory 1.5');
            "
          fi
          
          # V25.8.3: Upload Embedding Cache (Vault) to R2 State
          if [ -f "output/cache/embedding-cache.db" ]; then
            node --input-type=module -e "
              import { createR2Client } from './scripts/factory/lib/r2-helpers.js';
              import { PutObjectCommand } from '@aws-sdk/client-s3';
              import fs from 'fs';
              const s3 = createR2Client();
              if (!s3) process.exit(0);
              const data = fs.readFileSync('output/cache/embedding-cache.db');
              await s3.send(new PutObjectCommand({
                Bucket: 'ai-nexus-assets', Key: 'state/embedding-cache.db',
                Body: data, ContentType: 'application/x-sqlite3'
              }));
              console.log('✅ embedding-cache.db uploaded to state/embedding-cache.db');
            "
          fi
        continue-on-error: true

      # V25.8.3: Recursion Bypass — workflow_run chain depth limit is 3.
      # Factory 4/4 is Level 3, so Factory 1.5 cannot be triggered via workflow_run.
      # Manual dispatch resets the depth counter.
      - name: Trigger Factory 1.5 Density Booster
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🚀 [Recursion Bypass] Dispatching Factory 1.5 - Density Booster..."
          gh workflow run factory-enrich.yml
        continue-on-error: true
