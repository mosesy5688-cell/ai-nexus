# Factory 1/4 - Harvest (V14.5 Parallel Architecture)
# 
# V14.5: 4 parallel job groups for 3x faster harvesting
# Based on proven L1 Harvester pattern (loop1-harvester-v42.yml)
# 
# Triggers: Schedule daily 02:47 UTC
# Outputs: merged.json artifact for downstream processing
# 
# Constitution: Art 3.1 (Factory Pipeline)

name: Factory 1/4 - Harvest

permissions:
  actions: write
  contents: read

on:
  schedule:
    - cron: '47 2 * * *'  # Daily 02:47 UTC
  workflow_dispatch:
    inputs:
      skip_harvest:
        description: 'Skip harvesting and use solidified batches from cache'
        required: false
        type: boolean
        default: false
      source_run_id:
        description: 'Run ID to recover batches from (if skip_harvest is true)'
        required: false
        type: string
      source_run_attempt:
        description: 'WO-3-B1 PR-B1A: Run ATTEMPT of source_run_id to recover from (REQUIRED with skip_harvest; caches are attempt-scoped, no prefix guess)'
        required: false
        type: string

concurrency:
  group: factory-harvest
  cancel-in-progress: false

# ============================================================
# JOB 1: HUGGINGFACE MODELS (10K)
# ============================================================
jobs:
  harvest-huggingface:
    name: Harvest HuggingFace
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci

      - name: Harvest HuggingFace Models
        if: github.event.inputs.skip_harvest != 'true'
        timeout-minutes: 120
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          NODE_OPTIONS: '--max-old-space-size=8192'
        run: |
          echo "📥 Harvesting HuggingFace Models (V22.8: 100K target)..."
          node scripts/ingestion/harvest-single.js huggingface --limit 100000 --no-bridge
          
      - name: Solidify HuggingFace Batches (Cache)
        # PR-H2c: if: always() so a sidecar still persists even when the harvest
        # step failed loud — the aggregator must SEE a failed-class terminal state,
        # not infer step_killed from a missing cache.
        if: always() && github.event.inputs.skip_harvest != 'true'
        uses: actions/cache/save@v5
        with:
          # PR-H2c: extend with the per-source terminal-state sidecar (data/state/).
          path: |
            data/huggingface_master.ndjson
            data/state/harvest-state-*.json
          # WO-3-B1 PR-B1A: attempt-scoped key. A rerun-failed-jobs attempt gets a
          # DISTINCT key, so a partial attempt-1 cache can NEVER be restored over a
          # complete attempt-2 (the immutable run-id-only key was the root cause).
          key: harvest-raw-huggingface-${{ github.run_id }}-attempt-${{ github.run_attempt }}

      # V25.8 §2.2: Direct-Stream-to-R2 (dual-write with cache fallback)
      - name: Stream HuggingFace to R2
        if: github.event.inputs.skip_harvest != 'true'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          if [ -f "data/huggingface_master.ndjson" ]; then
            node scripts/factory/r2-workflow-cli.js upload-buffer data/huggingface_master.ndjson ingestion/raw/huggingface_master.ndjson || { echo "::error::R2 batch upload FAILED — R2 is primary data layer"; exit 1; }
          fi

      # D-236/D-237: establish the attempt-scoped R2 harvest source authority for
      # this role (deterministic tar+zstd, manifest-last, byte+sha256 verified,
      # read-back). FAIL-RED — a failed establish must NOT be a warning; the Merge
      # R2 resolver relies on it to recover a merge-only "Re-run failed jobs" attempt.
      - name: Establish Authoritative R2 Harvest Source Authority
        if: github.event.inputs.skip_harvest != 'true'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          PRODUCER_MAIN_SHA: ${{ github.sha }}
        run: node scripts/factory/r2-workflow-cli.js harvest-handoff-establish --role=huggingface



  # ============================================================
  # JOB 2: GITHUB AGENTS (5K)
  # ============================================================
  harvest-github:
    name: Harvest GitHub
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci

      - name: Harvest GitHub Repos
        if: github.event.inputs.skip_harvest != 'true'
        timeout-minutes: 90
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # V27.23: README cache lives in R2 — needs read+write during harvest
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          echo "📥 [Parallel] Harvesting GitHub (V19: 10K)..."
          node scripts/ingestion/harvest-single.js github --limit 10000 --no-bridge
          
      - name: Solidify GitHub Batches (Cache)
        # PR-H2c: if: always() so a sidecar persists even on a failed-loud harvest.
        if: always() && github.event.inputs.skip_harvest != 'true'
        uses: actions/cache/save@v5
        with:
          # PR-H2c: extend with the per-source terminal-state sidecar.
          path: |
            data/github_master.ndjson
            data/state/harvest-state-*.json
          # WO-3-B1 PR-B1A: attempt-scoped key (see huggingface save for rationale).
          key: harvest-raw-github-${{ github.run_id }}-attempt-${{ github.run_attempt }}

      # V25.8 §2.2: Direct-Stream-to-R2
      - name: Stream GitHub to R2
        if: github.event.inputs.skip_harvest != 'true'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          if [ -f "data/github_master.ndjson" ]; then
            node scripts/factory/r2-workflow-cli.js upload-buffer data/github_master.ndjson ingestion/raw/github_master.ndjson || { echo "::error::R2 batch upload FAILED — R2 is primary data layer"; exit 1; }
          fi

      # D-236/D-237: establish the attempt-scoped R2 harvest source authority for
      # this role (manifest-last, byte+sha256 verified, read-back). FAIL-RED.
      - name: Establish Authoritative R2 Harvest Source Authority
        if: github.event.inputs.skip_harvest != 'true'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          PRODUCER_MAIN_SHA: ${{ github.sha }}
        run: node scripts/factory/r2-workflow-cli.js harvest-handoff-establish --role=github



  # ============================================================
  # JOB 3: ACADEMIC SOURCES (ArXiv + Papers + Datasets)
  # ============================================================
  harvest-academic:
    name: Harvest Academic
    runs-on: ubuntu-latest
    timeout-minutes: 300
    
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Harvest ArXiv Papers
        if: github.event.inputs.skip_harvest != 'true'
        # V28 PR-3: ArXiv's 100K target + OAI 20s/page pagination legitimately
        # needs ~140min+. The 60min cap (PR-1) false-timed-out a HEALTHY run
        # (run 26899131808: ingested 16200, Failed 0, still progressing).
        # Right-sized to 180 — kept (not removed) for hung-source protection,
        # still well under the job-level 300min ceiling.
        timeout-minutes: 180
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
        run: |
          echo "📥 Harvesting ArXiv..."
          # H1 (fail loud): no `|| echo` swallow here — a hard fetch failure from
          # harvest-single.js (exit 1) MUST fail this step instead of laundering
          # into a green zero-yield run. Sibling sources keep their `|| echo`
          # tolerance (small-source protection) per Founder decision; only the
          # arXiv line is de-masked in this WO.
          node scripts/ingestion/harvest-single.js arxiv --limit 100000 --no-bridge
          
      - name: Harvest HuggingFace Papers
        if: github.event.inputs.skip_harvest != 'true'
        timeout-minutes: 60
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "📥 Harvesting HF Papers..."
          node scripts/ingestion/harvest-single.js huggingface-papers --limit 5000 --no-bridge

      - name: Harvest HuggingFace Datasets
        if: github.event.inputs.skip_harvest != 'true'
        timeout-minutes: 60
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: |
          echo "📥 Harvesting HF Datasets..."
          node scripts/ingestion/harvest-single.js huggingface-datasets --limit 10000 --no-bridge

      - name: Solidify Academic Batches (Cache)
        # PR-H2c: if: always() so sidecars persist even on a failed-loud harvest.
        if: always() && github.event.inputs.skip_harvest != 'true'
        uses: actions/cache/save@v5
        with:
          # PR-H2c: extend with the per-source terminal-state sidecars.
          path: |
            data/*_master.ndjson
            data/state/harvest-state-*.json
          # WO-3-B1 PR-B1A: attempt-scoped key (see huggingface save for rationale).
          key: harvest-raw-academic-${{ github.run_id }}-attempt-${{ github.run_attempt }}

      # V25.8 §2.2: Direct-Stream-to-R2
      - name: Stream Academic to R2
        if: github.event.inputs.skip_harvest != 'true'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          for f in data/*_master.ndjson; do
            [ -f "$f" ] || continue
            BASENAME=$(basename "$f")
            node scripts/factory/r2-workflow-cli.js upload-buffer "$f" "ingestion/raw/$BASENAME" || { echo "::error::R2 stream for $BASENAME FAILED — R2 is primary"; exit 1; }
          done

      # D-236/D-237: establish the attempt-scoped R2 harvest source authority for
      # this role (archives ALL academic masters + sidecars; manifest-last,
      # byte+sha256 verified, read-back). FAIL-RED.
      - name: Establish Authoritative R2 Harvest Source Authority
        if: github.event.inputs.skip_harvest != 'true'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          PRODUCER_MAIN_SHA: ${{ github.sha }}
        run: node scripts/factory/r2-workflow-cli.js harvest-handoff-establish --role=academic



  # ============================================================
  # JOB 4: ECOSYSTEM (All remaining sources)
  # ============================================================
  harvest-ecosystem:
    name: Harvest Ecosystem
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci

      - name: Harvest Ollama Registry
        if: github.event.inputs.skip_harvest != 'true'
        timeout-minutes: 60
        run: |
          echo "📥 Harvesting Ollama..."
          node scripts/ingestion/harvest-single.js ollama --limit 1000 --no-bridge || echo "Ollama adapter skipped"
          
      - name: Harvest MCP Servers
        if: github.event.inputs.skip_harvest != 'true'
        timeout-minutes: 60
        run: |
          echo "📥 Harvesting MCP..."
          node scripts/ingestion/harvest-single.js mcp --limit 500 --no-bridge || echo "MCP adapter skipped"

      - name: Harvest Replicate
        if: github.event.inputs.skip_harvest != 'true'
        timeout-minutes: 60
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
        run: |
          echo "📥 Harvesting Replicate..."
          node scripts/ingestion/harvest-single.js replicate --limit 5000 --no-bridge || echo "Replicate adapter skipped"

      # V14.5.2: Setup Python for Kaggle models sidecar (REST API deprecated)
      - name: Setup Python for Kaggle
        if: github.event.inputs.skip_harvest != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          
      - name: Install Kaggle CLI
        if: github.event.inputs.skip_harvest != 'true'
        run: pip install kaggle

      - name: Harvest Kaggle
        if: github.event.inputs.skip_harvest != 'true'
        timeout-minutes: 60
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          echo "📥 Harvesting Kaggle..."
          node scripts/ingestion/harvest-single.js kaggle --limit 10000 --no-bridge || echo "Kaggle adapter skipped"

      - name: Harvest CivitAI
        if: github.event.inputs.skip_harvest != 'true'
        timeout-minutes: 60
        run: |
          echo "📥 Harvesting CivitAI..."
          node scripts/ingestion/harvest-single.js civitai --limit 5000 --no-bridge || echo "CivitAI adapter skipped"

      - name: Harvest Semantic Scholar
        if: github.event.inputs.skip_harvest != 'true'
        timeout-minutes: 60
        env:
          # V28: authenticate S2 — the adapter reads S2_API_KEY and sends it as
          # x-api-key. Running unauthenticated triggered aggressive 429s. Secret
          # already used in factory-s2orc.yml.
          S2_API_KEY: ${{ secrets.S2_API_KEY }}
        run: |
          echo "📥 Harvesting Semantic Scholar..."
          # PR-H2a (de-mask): semanticscholar is a known-large source (floor-gated
          # in harvest-floors.js). Removed the `|| echo` mask so its floor-gate
          # exit(1) can redden the job instead of laundering a zero/near-zero
          # harvest into green. Sibling small-source `|| echo` lines are left
          # untouched (Founder-decided small-source tolerance).
          node scripts/ingestion/harvest-single.js semanticscholar --limit 3000 --no-bridge

      - name: Harvest OpenLLM Benchmarks
        if: github.event.inputs.skip_harvest != 'true'
        timeout-minutes: 60
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "📊 Harvesting OpenLLM Leaderboard..."
          node scripts/ingestion/harvest-single.js openllm --limit 1000 --no-bridge || echo "OpenLLM adapter skipped"

      - name: Harvest Benchmark Nodes
        if: github.event.inputs.skip_harvest != 'true'
        timeout-minutes: 5
        run: |
          echo "🎯 Promoting curated benchmark catalog to nodes (EVALUATED_ON targets)..."
          node scripts/ingestion/harvest-single.js benchmark --limit 50 || echo "Benchmark adapter skipped"

      - name: Harvest DeepSpec Specifications
        if: github.event.inputs.skip_harvest != 'true'
        timeout-minutes: 60
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "📋 Extracting Model Specifications..."
          node scripts/ingestion/harvest-single.js deepspec --limit 2000 --no-bridge || echo "DeepSpec adapter skipped"

      # HuggingFace Spaces harvest removed — `space` merged into `model`. The
      # SpacesAdapter normalize() now returns null (emits nothing), so this step
      # would harvest 0 served entities. Revert: restore this step + the adapter.

      - name: Harvest AI Tools (GitHub frameworks/agents)
        if: github.event.inputs.skip_harvest != 'true'
        timeout-minutes: 60
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "📥 Harvesting AI Tools (agent type cancelled — repos emit as tools)..."
          node scripts/ingestion/harvest-single.js agents --limit 200 --no-bridge || echo "Agents adapter skipped"

      # LangChain Hub harvest removed — `prompt` (#2141) + `agent` (this PR) both
      # cancelled, so the adapter emits nothing. Revert: restore this step +
      # re-add the langchain routing entry in scripts/ingestion/adapters/index.js.

      - name: Solidify Ecosystem Batches (Cache)
        # PR-H2c: if: always() so sidecars persist even on a failed-loud harvest.
        if: always() && github.event.inputs.skip_harvest != 'true'
        uses: actions/cache/save@v5
        with:
          # PR-H2c: extend with the per-source terminal-state sidecars.
          path: |
            data/*_master.ndjson
            data/state/harvest-state-*.json
          # WO-3-B1 PR-B1A: attempt-scoped key (see huggingface save for rationale).
          key: harvest-raw-ecosystem-${{ github.run_id }}-attempt-${{ github.run_attempt }}

      # V25.8 §2.2: Direct-Stream-to-R2
      - name: Stream Ecosystem to R2
        if: github.event.inputs.skip_harvest != 'true'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          for f in data/*_master.ndjson; do
            [ -f "$f" ] || continue
            BASENAME=$(basename "$f")
            node scripts/factory/r2-workflow-cli.js upload-buffer "$f" "ingestion/raw/$BASENAME" || { echo "::error::R2 stream for $BASENAME FAILED — R2 is primary"; exit 1; }
          done

      # D-236/D-237: establish the attempt-scoped R2 harvest source authority for
      # this role (required semanticscholar + present optional masters + sidecars;
      # EXCLUDES benchmark_NNN.json bridge shards; manifest-last, byte+sha256
      # verified, read-back). FAIL-RED.
      - name: Establish Authoritative R2 Harvest Source Authority
        if: github.event.inputs.skip_harvest != 'true'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          PRODUCER_MAIN_SHA: ${{ github.sha }}
        run: node scripts/factory/r2-workflow-cli.js harvest-handoff-establish --role=ecosystem



  # ============================================================
  # JOB 5: MERGE AND UPLOAD
  # ============================================================
  merge-and-upload:
    name: Merge & Upload
    runs-on: ubuntu-latest
    needs: [harvest-huggingface, harvest-github, harvest-academic, harvest-ecosystem]
    timeout-minutes: 120
    env:
      # V55.9: 10GB Heap + expose-gc for explicit GC in merge phase
      NODE_OPTIONS: '--max-old-space-size=10240 --expose-gc'
    
    steps:
      # V27.77: composite supplies Free Runner Disk + Node + npm ci + Rust FFI restore.
      # Fix for run 26559091640 Merge & Upload "[FATAL] database or disk is full" —
      # 4 sub-harvest jobs each only handle 1 batch (no disk pressure), but Merge &
      # Upload aggregates all 4 → ENOSPC. Other heavy jobs in 3/4 + 4/4 already use
      # this composite with aggressive-disk-cleanup=true; sibling consistency fix.
      - uses: actions/checkout@v5
      - uses: ./.github/actions/factory-setup
        with:
          aggressive-disk-cleanup: 'true'
          with-rust-ffi: 'true'
      # P1-R13: R2 fallback for Rust FFI (was cache-only, no fallback)
      - name: R2 Fallback for Rust FFI
        continue-on-error: true
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          FOUND=$(find rust -name '*.node' 2>/dev/null | wc -l)
          if [ "$FOUND" -lt 9 ]; then
            echo "⚠️ Only $FOUND/9 Rust binaries from cache. Restoring from R2 vault..."
            node scripts/factory/r2-workflow-cli.js restore-rust-ffi || echo '⚠️ R2 Rust FFI fallback unavailable'
          else
            echo "✅ All 9 Rust FFI binaries restored from cache"
          fi

      # V16.96.2: Pre-merge Cache Maintenance
      - name: Cache Cleanup
        run: |
          echo "🧹 [V16.96.2] Purging stale shards to stay under 10GB limit..."
          node scripts/factory/cleanup-cache.js
      
      # V18.3: Solidification Recovery Logic
      - name: Create Data Directory
        run: mkdir -p data/

      # WO-3-B1 PR-B1A: skip_harvest source-attempt PROVENANCE PRE-CHECK.
      # The legacy recovery used `source_run_id` only + a `restore-keys:
      # harvest-raw-<group>-` PREFIX, which would silently pick "the most recent
      # matching cache" — exactly the stale/partial-attempt substitution this WO
      # closes. skip_harvest now REQUIRES BOTH source_run_id AND source_run_attempt,
      # and recovers via the EXACT attempt-scoped key (no prefix). A missing input
      # hard-stops here BEFORE any restore/merge.
      - name: Source Attempt Provenance Pre-Check (skip_harvest)
        if: github.event.inputs.skip_harvest == 'true'
        run: |
          if [ -z "${{ github.event.inputs.source_run_id }}" ] || [ -z "${{ github.event.inputs.source_run_attempt }}" ]; then
            echo "::error::SOURCE_ATTEMPT_PROVENANCE_INCOMPLETE — skip_harvest=true requires BOTH source_run_id AND source_run_attempt (caches are attempt-scoped; no prefix/latest-match guess)."
            echo "SOURCE_ATTEMPT_PROVENANCE_INCOMPLETE: source_run_id='${{ github.event.inputs.source_run_id }}' source_run_attempt='${{ github.event.inputs.source_run_attempt }}'"
            exit 1
          fi
          echo "✅ source provenance inputs present: run_id=${{ github.event.inputs.source_run_id }} attempt=${{ github.event.inputs.source_run_attempt }}"

      - name: Recover Solidified Batches (Cache Fallback)
        id: recover_hf
        if: github.event.inputs.skip_harvest == 'true'
        uses: actions/cache/restore@v5
        with:
          path: data/huggingface_master.ndjson
          # WO-3-B1 PR-B1A: EXACT source-attempt key only; NO restore-keys prefix.
          key: harvest-raw-huggingface-${{ github.event.inputs.source_run_id }}-attempt-${{ github.event.inputs.source_run_attempt }}
      - name: Recover Solidified Batches (GitHub)
        id: recover_github
        if: github.event.inputs.skip_harvest == 'true'
        uses: actions/cache/restore@v5
        with:
          path: data/github_master.ndjson
          # WO-3-B1 PR-B1A: EXACT source-attempt key only; NO restore-keys prefix.
          key: harvest-raw-github-${{ github.event.inputs.source_run_id }}-attempt-${{ github.event.inputs.source_run_attempt }}
      - name: Recover Solidified Batches (Academic)
        id: recover_academic
        if: github.event.inputs.skip_harvest == 'true'
        uses: actions/cache/restore@v5
        with:
          path: data/*_master.ndjson
          # WO-3-B1 PR-B1A: EXACT source-attempt key only; NO restore-keys prefix.
          key: harvest-raw-academic-${{ github.event.inputs.source_run_id }}-attempt-${{ github.event.inputs.source_run_attempt }}
      - name: Recover Solidified Batches (Ecosystem)
        id: recover_ecosystem
        if: github.event.inputs.skip_harvest == 'true'
        uses: actions/cache/restore@v5
        with:
          path: data/*_master.ndjson
          # WO-3-B1 PR-B1A: EXACT source-attempt key only; NO restore-keys prefix.
          key: harvest-raw-ecosystem-${{ github.event.inputs.source_run_id }}-attempt-${{ github.event.inputs.source_run_attempt }}

      # D-236/D-237 (review FIX 1, §J): the skip_harvest 4/4-GHA "Source Attempt
      # Provenance Gate" is REMOVED. It exit-1'd on a GHA miss BEFORE consulting R2,
      # making a GHA miss fatal despite a valid R2 authority (breaking skip_harvest
      # recovery of an older source run whose GHA caches were evicted but whose R2
      # authorities remain). The recover_* GHA restores above stay as R2-verified
      # acceleration (the resolver's ghaProbe verifies them against the selected R2
      # manifest); resolveExactTuple is the SOLE authority on the skip path. The
      # input Pre-Check above (BOTH source_run_id + source_run_attempt required) is
      # retained as the legitimate fail-closed on missing provenance inputs.

      # V22.8: Restore current batch data from cache (replaces download-artifact for privacy)
      - name: Restore HuggingFace Batch (Current Run)
        id: restore_hf
        if: github.event.inputs.skip_harvest != 'true'
        uses: actions/cache/restore@v5
        with:
          # PR-H2c: restore terminal-state sidecars alongside the batch.
          path: |
            data/huggingface_master.ndjson
            data/state/harvest-state-*.json
          # WO-3-B1 PR-B1A: EXACT attempt-scoped key only — byte-identical to the save
          # key; NO restore-keys prefix (an old-attempt cache must NEVER substitute).
          key: harvest-raw-huggingface-${{ github.run_id }}-attempt-${{ github.run_attempt }}
      - name: Restore GitHub Batch (Current Run)
        id: restore_github
        if: github.event.inputs.skip_harvest != 'true'
        uses: actions/cache/restore@v5
        with:
          path: |
            data/github_master.ndjson
            data/state/harvest-state-*.json
          # WO-3-B1 PR-B1A: EXACT attempt-scoped key only; NO restore-keys prefix.
          key: harvest-raw-github-${{ github.run_id }}-attempt-${{ github.run_attempt }}
      - name: Restore Academic Batch (Current Run)
        id: restore_academic
        if: github.event.inputs.skip_harvest != 'true'
        uses: actions/cache/restore@v5
        with:
          path: |
            data/*_master.ndjson
            data/state/harvest-state-*.json
          # WO-3-B1 PR-B1A: EXACT attempt-scoped key only; NO restore-keys prefix.
          key: harvest-raw-academic-${{ github.run_id }}-attempt-${{ github.run_attempt }}
      - name: Restore Ecosystem Batch (Current Run)
        id: restore_ecosystem
        if: github.event.inputs.skip_harvest != 'true'
        uses: actions/cache/restore@v5
        with:
          path: |
            data/*_master.ndjson
            data/state/harvest-state-*.json
          # WO-3-B1 PR-B1A: EXACT attempt-scoped key only; NO restore-keys prefix.
          key: harvest-raw-ecosystem-${{ github.run_id }}-attempt-${{ github.run_attempt }}

      # ========================================================
      # D-236/D-237: R2 SOURCE-AUTHORITY RESOLVE + CONSUME (fail-closed)
      # ========================================================
      # Replaces the removed run/attempt GHA "Attempt Cache Provenance Gate". R2 is
      # the SOLE authority for the four harvest source roles. The attempt-scoped GHA
      # restores above stay as OPTIONAL acceleration: a restored payload is USED only
      # if it matches the selected R2 manifest identity+bytes+inventory
      # (GHA_EXACT_MATCH); a GHA miss/mismatch DOWNLOADS the EXACT R2 archive (never
      # MERGE_RED per se unless the R2 authority is also missing/invalid). Normal
      # path: current-attempt-complete, else the highest prior COMPLETE attempt of the
      # SAME run (recovers a merge-only "Re-run failed jobs"); a current-partial /
      # mixed / missing-role set fails closed. skip_harvest: EXACT (source_run_id,
      # source_run_attempt) tuple only. The resolver verifies + safe-extracts + unions
      # each role into data/ and withholds FOUR_R2_SOURCE_AUTHORITIES_VERIFIED
      # (exit 1) until all four immutable R2 authorities from one exact attempt are
      # verified, BEFORE any NDJSON bridge / merge / health publication.
      - name: Resolve and Consume R2 Harvest Source Authorities
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          PRODUCER_MAIN_SHA: ${{ github.sha }}
          SKIP_HARVEST: ${{ github.event.inputs.skip_harvest }}
          SOURCE_RUN_ID: ${{ github.event.inputs.source_run_id }}
          SOURCE_RUN_ATTEMPT: ${{ github.event.inputs.source_run_attempt }}
        run: node scripts/factory/r2-workflow-cli.js harvest-handoff-consume

      # V25.8 §2.2: legacy fixed-key R2 Fallback for harvest batches. D-236/D-237:
      # INERT on both paths — the R2 source-authority resolver above populates data/
      # (or fails closed) before this runs, so this fixed-key ingestion/raw fallback
      # only fires if data/ is somehow empty (it is not on a verified authority set).
      - name: R2 Batch Recovery (Fallback)
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ai-nexus-assets
        run: |
          NDJSON_COUNT=$(ls data/*_master.ndjson 2>/dev/null | wc -l)
          if [ "$NDJSON_COUNT" -gt 0 ]; then
            echo "✅ $NDJSON_COUNT NDJSON files from cache. Skipping R2 fallback."
          else
            echo "⚠️ No NDJSON files from cache. Restoring from R2 ingestion/raw/..."
            node scripts/factory/r2-workflow-cli.js restore-dir ingestion/raw/ data/ --strict
          fi

      - name: List Batches (Current or Recovered)
        run: |
          echo "📦 Entity batches ready for merge:"
          ls -la data/

          # V22.8: Resilient NDJSON Bridge
          if ls data/*_master.ndjson 1>/dev/null 2>&1; then
            echo "🌉 [Bridge] Consolidating NDJSON streams..."
            cat data/*_master.ndjson > data/master.ndjson
            node scripts/ingestion/ndjson-sharder.js data/master.ndjson data/ 1000 raw_batch
          else
            echo "⏭️ [Bridge] No NDJSON files found, using pre-existing batch files"
          fi

          ls -la data/raw_batch_*.json 2>/dev/null || echo "⚠️ No batch files found in data/"
          
      - name: Restore FNI History
        uses: actions/cache@v5
        with:
          path: |
            cache/fni-history.json.zst
            cache/fni-history/
          key: fni-history-${{ github.run_id }}
          restore-keys: |
            fni-history-

      - name: Restore Daily Accumulator
        uses: actions/cache@v5
        with:
          path: |
            cache/daily-accum.json.zst
            cache/daily-accum/
          key: daily-accum-${{ github.run_id }}
          restore-keys: |
            daily-accum-

      - name: Restore Checksums
        uses: actions/cache@v5
        with:
          path: |
            cache/entity-checksums.json.zst
            cache/task-checksums.json.zst
          key: checksums-${{ github.run_id }}
          restore-keys: |
            checksums-

      # V4.1: Restore global registry (Immutable Key + Prefix Match)
      - name: Restore Global Registry (Cache-First)
        id: cache-registry
        uses: actions/cache/restore@v5
        with:
          path: |
            cache/global-registry.json.zst
            cache/registry/
          key: global-registry-${{ github.run_id }}  # Won't match (not saved yet)
          restore-keys: |
            global-registry-
          # GitHub auto-selects the most recently created match

      # V25.8: R2-Primary Registry Restoration (Dynamic Shard Discovery)
      # Replaces hardcoded 16-shard loop with S3 ListObjects.
      # Supports both Binary NXVF (.bin) and legacy JSON.gz formats.
      - name: R2 Registry Restoration (V25.8)
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ai-nexus-assets
        run: |
          mkdir -p cache/registry cache/fni-history cache/daily-accum
          node scripts/factory/lib/r2-registry-restore.js


      - name: Restore Caches from R2 (params + benchmark)
        continue-on-error: true
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          mkdir -p output/data
          node scripts/factory/r2-workflow-cli.js restore-file state/params-cache.json.zst output/data/params-cache.json.zst || echo "⚠️ No params cache on R2 — first run"
          node scripts/factory/r2-workflow-cli.js restore-file state/benchmark-cache.json.zst output/data/benchmark-cache.json.zst || echo "⚠️ No benchmark cache on R2 — first run"
      - name: Merge Batches
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ai-nexus-assets
          AES_CRYPTO_KEY: ${{ secrets.AES_CRYPTO_KEY }}
          ALLOW_R2_RECOVERY: 'true'
        run: |
          echo "🔄 Merging batches with ID deduplication..."
          node scripts/ingestion/merge-batches.js
          
          if [ -f "data/manifest.json" ]; then
            ENTITY_COUNT=$(jq -r '.total_entities' data/manifest.json)
            echo "✅ Merged: $ENTITY_COUNT total entities (via manifest)"
            
            if [ "$ENTITY_COUNT" -lt 85000 ]; then
              echo "❌ ERROR: Only $ENTITY_COUNT entities found. Expected 85,000+."
              echo "This indicates corrupted data or missing batches."
              exit 1
            fi
          else
            echo "❌ Error: manifest.json not generated"
            exit 1
          fi

      # V4.1: Save Entity Data to Cache (Cycle-Specific Key)
      - name: Save Entity Data to Cache
        uses: actions/cache/save@v5
        with:
          path: |
            data/merged_shard_*.json.zst
            data/manifest.json
            cache/
          key: cycle-${{ github.run_id }}-harvest

      - name: Params Backfill (HF API)
        continue-on-error: true
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          CACHE_DIR: ./cache
          PARAMS_CACHE_PATH: ./output/data/params-cache.json.zst
          # AES_CRYPTO_KEY required to decrypt binary shards via registry-binary-reader.
          # Missing key previously caused every entity JSON.parse to fail silently,
          # so the script reported "Missing: 0 models" while scanning the entire registry.
          AES_CRYPTO_KEY: ${{ secrets.AES_CRYPTO_KEY }}
        run: node scripts/factory/params-backfill.js --limit=2000

      # ========================================================
      # PR-H2c: HARVEST HEALTH (observation layer, runs after Merge + Params Backfill)
      # ========================================================
      # 1 R2 GET for the prior harvest-health latest.json. COLD-START RESILIENT:
      # a miss/permission error just leaves no prev file -> previous_yield=null and
      # previous-based checks skip; the run must NOT fail because history is unreadable.
      - name: Restore Previous Harvest Health (R2, cold-start resilient)
        continue-on-error: true
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          mkdir -p data/state
          node scripts/factory/r2-workflow-cli.js restore-file state/harvest-health/latest.json data/state/prev-latest.json || echo "::notice::no prior harvest-health/latest.json on R2 (cold start) — previous-based checks will skip"

      # The aggregator reads the 4 jobs' restored sidecars + prev-latest.json +
      # the params-backfill enrichment record + manifest, renders the HARVEST SOURCE
      # HEALTH table to the step summary, sets the HARVEST_HEALTH output, and writes
      # data/state/harvest-health-latest.json for the upload below. RED (exit 1) is
      # defense-in-depth ONLY: a gated/H2a-class source that escaped into a green merge.
      - name: Harvest Health Summary
        id: harvest_health
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          # 2nd independent input (ANTI-LYING b): each source maps to its containing
          # job's result (sources do not run as separate jobs). A missing gated sidecar
          # paired with a failure/cancelled job result => step_killed timeout, not a bare
          # missing. Job grouping mirrors the jobs above:
          #   huggingface job -> huggingface | github job -> github
          #   academic job    -> arxiv, huggingface-papers, huggingface-datasets
          #   ecosystem job   -> ollama, mcp, replicate, kaggle, civitai, semanticscholar,
          #                      openllm, benchmark, deepspec, agents
          STEP_OUTCOMES_JSON: >-
            {"huggingface":"${{ needs.harvest-huggingface.result }}",
             "github":"${{ needs.harvest-github.result }}",
             "arxiv":"${{ needs.harvest-academic.result }}",
             "huggingface-papers":"${{ needs.harvest-academic.result }}",
             "huggingface-datasets":"${{ needs.harvest-academic.result }}",
             "semanticscholar":"${{ needs.harvest-ecosystem.result }}",
             "ollama":"${{ needs.harvest-ecosystem.result }}",
             "mcp":"${{ needs.harvest-ecosystem.result }}",
             "replicate":"${{ needs.harvest-ecosystem.result }}",
             "kaggle":"${{ needs.harvest-ecosystem.result }}",
             "civitai":"${{ needs.harvest-ecosystem.result }}",
             "openllm":"${{ needs.harvest-ecosystem.result }}",
             "benchmark":"${{ needs.harvest-ecosystem.result }}",
             "deepspec":"${{ needs.harvest-ecosystem.result }}",
             "agents":"${{ needs.harvest-ecosystem.result }}"}
        run: node scripts/ingestion/harvest-health.js

      # Upload the aggregated doc to R2 state/harvest-health/latest.json (next run's
      # previous_yield source). continue-on-error: an upload miss must not redden the
      # merge — RED already exited above when it had to.
      - name: Upload Harvest Health to R2
        if: always()
        continue-on-error: true
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          [ -f "data/state/harvest-health-latest.json" ] && node scripts/factory/r2-workflow-cli.js upload-file data/state/harvest-health-latest.json state/harvest-health/latest.json || echo "::warning::no harvest-health-latest.json to upload"

      - name: Benchmark Importer (Open LLM Leaderboard)
        continue-on-error: true
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          BENCHMARK_CACHE_PATH: ./output/data/benchmark-cache.json.zst
        run: node scripts/factory/benchmark-importer.js --limit=5000
      - name: Upload Caches to R2 (params + benchmark)
        continue-on-error: true
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          [ -f "output/data/params-cache.json.zst" ] && node scripts/factory/r2-workflow-cli.js upload-file output/data/params-cache.json.zst state/params-cache.json.zst || true
          [ -f "output/data/benchmark-cache.json.zst" ] && node scripts/factory/r2-workflow-cli.js upload-file output/data/benchmark-cache.json.zst state/benchmark-cache.json.zst || true
          # V27.89: IndexNow true-delta manifest (new-page URLs this cycle) for the 4/4 push step.
          [ -f "output/data/indexnow-delta.json" ] && node scripts/factory/r2-workflow-cli.js upload-file output/data/indexnow-delta.json state/indexnow-delta.json || true
      # V25.8 §6.1: Dual-write harvest output to R2 (cross-workflow resilience)
      # P0-R4: Removed continue-on-error — this is the primary R2 backup for harvest data
      - name: Backup Harvest Cycle to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          node scripts/factory/r2-workflow-cli.js backup-dir data/ state/cycle-harvest/data/ --extensions=.json,.json.zst
          node scripts/factory/r2-workflow-cli.js backup-dir cache/ state/cycle-harvest/cache/
          echo "✅ Harvest cycle backed up to R2 state/cycle-harvest/"
      # P0-R4: Dedicated R2 backup for FNI history, daily-accum, checksums
      - name: Backup FNI/Accum/Checksums to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          # FNI History
          [ -f "cache/fni-history.json.zst" ] && node scripts/factory/r2-workflow-cli.js upload-buffer cache/fni-history.json.zst meta/backup/fni-history.json.zst
          [ -d "cache/fni-history" ] && node scripts/factory/r2-workflow-cli.js backup-dir cache/fni-history/ meta/backup/fni-history/
          # Daily Accumulator
          [ -f "cache/daily-accum.json.zst" ] && node scripts/factory/r2-workflow-cli.js upload-buffer cache/daily-accum.json.zst meta/backup/daily-accum.json.zst
          [ -d "cache/daily-accum" ] && node scripts/factory/r2-workflow-cli.js backup-dir cache/daily-accum/ meta/backup/daily-accum/
          # Entity Checksums
          [ -f "cache/entity-checksums.json.zst" ] && node scripts/factory/r2-workflow-cli.js upload-buffer cache/entity-checksums.json.zst meta/backup/entity-checksums.json.zst
          echo "✅ FNI/Accum/Checksums backed up to R2"

      # Pipeline Summary
      - name: Summary
        run: |
          ENTITY_COUNT=$(jq -r '.total_entities' data/manifest.json)
          BATCH_COUNT=$(ls -1 data/raw_batch_*.json 2>/dev/null | wc -l)
          
          echo "## Factory Stage 1/4 (Harvest) - Complete 🚀" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Ingestion Data Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Total Entities**: $ENTITY_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "- **Batch Files**: $BATCH_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "- **Manifest State**: Verified ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Next: Factory 2/4 - Process" >> $GITHUB_STEP_SUMMARY
