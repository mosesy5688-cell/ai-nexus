# Factory 1/4 - Harvest (V14.5 Parallel Architecture)
# 
# V14.5: 4 parallel job groups for 3x faster harvesting
# Based on proven L1 Harvester pattern (loop1-harvester-v42.yml)
# 
# Triggers: Schedule Mon/Thu 03:00 UTC (11:00 Beijing)
# Outputs: merged.json artifact for downstream processing
# 
# Constitution: Art 3.1 (Factory Pipeline)

name: Factory 1/4 - Harvest

permissions:
  actions: write
  contents: read

on:
  schedule:
    - cron: '0 3 * * *'  # Daily 03:00 UTC
  workflow_dispatch:
    inputs:
      skip_harvest:
        description: 'Skip harvesting and use solidified batches from cache'
        required: false
        type: boolean
        default: false
      source_run_id:
        description: 'Run ID to recover batches from (if skip_harvest is true)'
        required: false
        type: string

concurrency:
  group: factory-harvest
  cancel-in-progress: false

# ============================================================
# JOB 1: HUGGINGFACE MODELS (10K)
# ============================================================
jobs:
  harvest-huggingface:
    name: Harvest HuggingFace
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      
      - name: Harvest HuggingFace Models
        if: github.event.inputs.skip_harvest != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          NODE_OPTIONS: '--max-old-space-size=8192'
        run: |
          echo "📥 Harvesting HuggingFace Models (V22.8: 100K target)..."
          node scripts/ingestion/harvest-single.js huggingface --limit 100000 --no-bridge
          
      - name: Solidify HuggingFace Batches (Cache)
        if: github.event.inputs.skip_harvest != 'true'
        uses: actions/cache/save@v4
        with:
          path: data/huggingface_master.ndjson
          key: harvest-raw-huggingface-${{ github.run_id }}

      # V25.8 §2.2: Direct-Stream-to-R2 (dual-write with cache fallback)
      - name: Stream HuggingFace to R2
        if: github.event.inputs.skip_harvest != 'true'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          if [ -f "data/huggingface_master.ndjson" ]; then
            node scripts/factory/r2-workflow-cli.js upload-buffer data/huggingface_master.ndjson ingestion/raw/huggingface_master.ndjson || echo "⚠️ R2 stream skipped (non-fatal)"
          fi



  # ============================================================
  # JOB 2: GITHUB AGENTS (5K)
  # ============================================================
  harvest-github:
    name: Harvest GitHub
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      
      - name: Harvest GitHub Repos
        if: github.event.inputs.skip_harvest != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "📥 [Parallel] Harvesting GitHub (V19: 10K)..."
          node scripts/ingestion/harvest-single.js github --limit 10000 --no-bridge
          
      - name: Solidify GitHub Batches (Cache)
        if: github.event.inputs.skip_harvest != 'true'
        uses: actions/cache/save@v4
        with:
          path: data/github_master.ndjson
          key: harvest-raw-github-${{ github.run_id }}

      # V25.8 §2.2: Direct-Stream-to-R2
      - name: Stream GitHub to R2
        if: github.event.inputs.skip_harvest != 'true'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          if [ -f "data/github_master.ndjson" ]; then
            node scripts/factory/r2-workflow-cli.js upload-buffer data/github_master.ndjson ingestion/raw/github_master.ndjson || echo "⚠️ R2 stream skipped (non-fatal)"
          fi



  # ============================================================
  # JOB 3: ACADEMIC SOURCES (ArXiv + Papers + Datasets)
  # ============================================================
  harvest-academic:
    name: Harvest Academic
    runs-on: ubuntu-latest
    timeout-minutes: 300
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Harvest ArXiv Papers
        if: github.event.inputs.skip_harvest != 'true'
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
        run: |
          echo "📥 Harvesting ArXiv..."
          node scripts/ingestion/harvest-single.js arxiv --limit 100000 --no-bridge || echo "ArXiv adapter skipped"
          
      - name: Harvest HuggingFace Papers
        if: github.event.inputs.skip_harvest != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "📥 Harvesting HF Papers..."
          node scripts/ingestion/harvest-single.js huggingface-papers --limit 5000 --no-bridge || echo "HF Papers adapter skipped"

      - name: Harvest HuggingFace Datasets
        if: github.event.inputs.skip_harvest != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: |
          echo "📥 Harvesting HF Datasets..."
          node scripts/ingestion/harvest-single.js huggingface-datasets --limit 10000 --no-bridge || echo "HF Datasets adapter skipped"

      - name: Solidify Academic Batches (Cache)
        if: github.event.inputs.skip_harvest != 'true'
        uses: actions/cache/save@v4
        with:
          path: data/*_master.ndjson
          key: harvest-raw-academic-${{ github.run_id }}

      # V25.8 §2.2: Direct-Stream-to-R2
      - name: Stream Academic to R2
        if: github.event.inputs.skip_harvest != 'true'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          for f in data/*_master.ndjson; do
            [ -f "$f" ] || continue
            BASENAME=$(basename "$f")
            node scripts/factory/r2-workflow-cli.js upload-buffer "$f" "ingestion/raw/$BASENAME" || echo "⚠️ R2 stream for $BASENAME skipped"
          done



  # ============================================================
  # JOB 4: ECOSYSTEM (All remaining sources)
  # ============================================================
  harvest-ecosystem:
    name: Harvest Ecosystem
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      
      - name: Harvest Ollama Registry
        if: github.event.inputs.skip_harvest != 'true'
        run: |
          echo "📥 Harvesting Ollama..."
          node scripts/ingestion/harvest-single.js ollama --limit 1000 --no-bridge || echo "Ollama adapter skipped"
          
      - name: Harvest MCP Servers
        if: github.event.inputs.skip_harvest != 'true'
        run: |
          echo "📥 Harvesting MCP..."
          node scripts/ingestion/harvest-single.js mcp --limit 500 --no-bridge || echo "MCP adapter skipped"

      - name: Harvest Replicate
        if: github.event.inputs.skip_harvest != 'true'
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
        run: |
          echo "📥 Harvesting Replicate..."
          node scripts/ingestion/harvest-single.js replicate --limit 5000 --no-bridge || echo "Replicate adapter skipped"

      # V14.5.2: Setup Python for Kaggle models sidecar (REST API deprecated)
      - name: Setup Python for Kaggle
        if: github.event.inputs.skip_harvest != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Kaggle CLI
        if: github.event.inputs.skip_harvest != 'true'
        run: pip install kaggle

      - name: Harvest Kaggle
        if: github.event.inputs.skip_harvest != 'true'
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          echo "📥 Harvesting Kaggle..."
          node scripts/ingestion/harvest-single.js kaggle --limit 10000 --no-bridge || echo "Kaggle adapter skipped"

      - name: Harvest CivitAI
        if: github.event.inputs.skip_harvest != 'true'
        run: |
          echo "📥 Harvesting CivitAI..."
          node scripts/ingestion/harvest-single.js civitai --limit 5000 --no-bridge || echo "CivitAI adapter skipped"

      - name: Harvest Semantic Scholar
        if: github.event.inputs.skip_harvest != 'true'
        run: |
          echo "📥 Harvesting Semantic Scholar..."
          node scripts/ingestion/harvest-single.js semanticscholar --limit 3000 --no-bridge || echo "Semantic Scholar adapter skipped"

      - name: Harvest OpenLLM Benchmarks
        if: github.event.inputs.skip_harvest != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "📊 Harvesting OpenLLM Leaderboard..."
          node scripts/ingestion/harvest-single.js openllm --limit 1000 --no-bridge || echo "OpenLLM adapter skipped"

      - name: Harvest DeepSpec Specifications
        if: github.event.inputs.skip_harvest != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "📋 Extracting Model Specifications..."
          node scripts/ingestion/harvest-single.js deepspec --limit 2000 --no-bridge || echo "DeepSpec adapter skipped"

      - name: Harvest HuggingFace Spaces
        if: github.event.inputs.skip_harvest != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "📥 Harvesting HuggingFace Spaces..."
          node scripts/ingestion/harvest-single.js huggingface-spaces --limit 5000 --no-bridge || echo "Spaces adapter skipped"

      - name: Harvest AI Agents
        if: github.event.inputs.skip_harvest != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "📥 Harvesting AI Agents..."
          node scripts/ingestion/harvest-single.js agents --limit 200 --no-bridge || echo "Agents adapter skipped"

      - name: Harvest LangChain Hub
        if: github.event.inputs.skip_harvest != 'true'
        run: |
          echo "✨ Harvesting LangChain Prompts..."
          node scripts/ingestion/harvest-single.js langchain --limit 5000 --no-bridge || echo "LangChain adapter skipped"

      - name: Solidify Ecosystem Batches (Cache)
        if: github.event.inputs.skip_harvest != 'true'
        uses: actions/cache/save@v4
        with:
          path: data/*_master.ndjson
          key: harvest-raw-ecosystem-${{ github.run_id }}

      # V25.8 §2.2: Direct-Stream-to-R2
      - name: Stream Ecosystem to R2
        if: github.event.inputs.skip_harvest != 'true'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          for f in data/*_master.ndjson; do
            [ -f "$f" ] || continue
            BASENAME=$(basename "$f")
            node scripts/factory/r2-workflow-cli.js upload-buffer "$f" "ingestion/raw/$BASENAME" || echo "⚠️ R2 stream for $BASENAME skipped"
          done



  # ============================================================
  # JOB 5: MERGE AND UPLOAD
  # ============================================================
  merge-and-upload:
    name: Merge & Upload
    runs-on: ubuntu-latest
    needs: [harvest-huggingface, harvest-github, harvest-academic, harvest-ecosystem]
    timeout-minutes: 30
    env:
      # V55.9: 10GB Heap + expose-gc for explicit GC in merge phase
      NODE_OPTIONS: '--max-old-space-size=10240 --expose-gc'
    
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci

      # V55.9: Restore Rust FFI binaries for native Zstd compression
      - name: Restore Rust FFI
        uses: actions/cache/restore@v4
        with:
          path: |
            rust/shard-router/shard-router-rust.node
            rust/fni-calc/fni-calc-rust.node
            rust/mesh-engine/mesh-engine-rust.node
            rust/content-extractor/content-extractor-rust.node
            rust/stream-aggregator/stream-aggregator-rust.node
            rust/satellite-tasks/satellite-tasks-rust.node
            rust/r2-engine/r2-engine-rust.node
          key: rust-ffi-v2-${{ hashFiles('rust/Cargo.toml', 'rust/*/Cargo.toml', 'rust/*/src/**') }}
          restore-keys: rust-ffi-v2-

      # V16.96.2: Pre-merge Cache Maintenance
      - name: Cache Cleanup
        run: |
          echo "🧹 [V16.96.2] Purging stale shards to stay under 10GB limit..."
          node scripts/factory/cleanup-cache.js
      
      # V18.3: Solidification Recovery Logic
      - name: Create Data Directory
        run: mkdir -p data/
      - name: Recover Solidified Batches (Cache Fallback)
        if: github.event.inputs.skip_harvest == 'true'
        uses: actions/cache/restore@v4
        with:
          path: data/huggingface_master.ndjson
          key: harvest-raw-huggingface-${{ github.event.inputs.source_run_id }}
          restore-keys: harvest-raw-huggingface-
      - name: Recover Solidified Batches (GitHub)
        if: github.event.inputs.skip_harvest == 'true'
        uses: actions/cache/restore@v4
        with:
          path: data/github_master.ndjson
          key: harvest-raw-github-${{ github.event.inputs.source_run_id }}
          restore-keys: harvest-raw-github-
      - name: Recover Solidified Batches (Academic)
        if: github.event.inputs.skip_harvest == 'true'
        uses: actions/cache/restore@v4
        with:
          path: data/*_master.ndjson
          key: harvest-raw-academic-${{ github.event.inputs.source_run_id }}
          restore-keys: harvest-raw-academic-
      - name: Recover Solidified Batches (Ecosystem)
        if: github.event.inputs.skip_harvest == 'true'
        uses: actions/cache/restore@v4
        with:
          path: data/*_master.ndjson
          key: harvest-raw-ecosystem-${{ github.event.inputs.source_run_id }}
          restore-keys: harvest-raw-ecosystem-

      # V22.8: Restore current batch data from cache (replaces download-artifact for privacy)
      - name: Restore HuggingFace Batch (Current Run)
        if: github.event.inputs.skip_harvest != 'true'
        uses: actions/cache/restore@v4
        with:
          path: data/huggingface_master.ndjson
          key: harvest-raw-huggingface-${{ github.run_id }}
      - name: Restore GitHub Batch (Current Run)
        if: github.event.inputs.skip_harvest != 'true'
        uses: actions/cache/restore@v4
        with:
          path: data/github_master.ndjson
          key: harvest-raw-github-${{ github.run_id }}
      - name: Restore Academic Batch (Current Run)
        if: github.event.inputs.skip_harvest != 'true'
        uses: actions/cache/restore@v4
        with:
          path: data/*_master.ndjson
          key: harvest-raw-academic-${{ github.run_id }}
      - name: Restore Ecosystem Batch (Current Run)
        if: github.event.inputs.skip_harvest != 'true'
        uses: actions/cache/restore@v4
        with:
          path: data/*_master.ndjson
          key: harvest-raw-ecosystem-${{ github.run_id }}
          
      # V25.8 §2.2: R2 Fallback for harvest batches (if cache missed)
      - name: R2 Batch Recovery (Fallback)
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ai-nexus-assets
        run: |
          NDJSON_COUNT=$(ls data/*_master.ndjson 2>/dev/null | wc -l)
          if [ "$NDJSON_COUNT" -gt 0 ]; then
            echo "✅ $NDJSON_COUNT NDJSON files from cache. Skipping R2 fallback."
          else
            echo "⚠️ No NDJSON files from cache. Restoring from R2 ingestion/raw/..."
            node scripts/factory/r2-workflow-cli.js restore-dir ingestion/raw/ data/ --strict
          fi

      - name: List Batches (Current or Recovered)
        run: |
          echo "📦 Entity batches ready for merge:"
          ls -la data/

          # V22.8: Resilient NDJSON Bridge
          if ls data/*_master.ndjson 1>/dev/null 2>&1; then
            echo "🌉 [Bridge] Consolidating NDJSON streams..."
            cat data/*_master.ndjson > data/master.ndjson
            node scripts/ingestion/ndjson-sharder.js data/master.ndjson data/ 1000 raw_batch
          else
            echo "⏭️ [Bridge] No NDJSON files found, using pre-existing batch files"
          fi

          ls -la data/raw_batch_*.json 2>/dev/null || echo "⚠️ No batch files found in data/"
          
      - name: Restore FNI History
        uses: actions/cache@v4
        with:
          path: |
            cache/fni-history.json.zst
            cache/fni-history/
          key: fni-history-${{ github.run_id }}
          restore-keys: |
            fni-history-

      - name: Restore Daily Accumulator
        uses: actions/cache@v4
        with:
          path: |
            cache/daily-accum.json.zst
            cache/daily-accum/
          key: daily-accum-${{ github.run_id }}
          restore-keys: |
            daily-accum-

      - name: Restore Checksums
        uses: actions/cache@v4
        with:
          path: |
            cache/entity-checksums.json.zst
            cache/task-checksums.json.zst
          key: checksums-${{ github.run_id }}
          restore-keys: |
            checksums-

      # V4.1: Restore global registry (Immutable Key + Prefix Match)
      - name: Restore Global Registry (Cache-First)
        id: cache-registry
        uses: actions/cache/restore@v4
        with:
          path: |
            cache/global-registry.json.zst
            cache/registry/
          key: global-registry-${{ github.run_id }}  # Won't match (not saved yet)
          restore-keys: |
            global-registry-
          # GitHub auto-selects the most recently created match

      # V25.8: R2-Primary Registry Restoration (Dynamic Shard Discovery)
      # Replaces hardcoded 16-shard loop with S3 ListObjects.
      # Supports both Binary NXVF (.bin) and legacy JSON.gz formats.
      - name: R2 Registry Restoration (V25.8)
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ai-nexus-assets
        run: |
          mkdir -p cache/registry cache/fni-history cache/daily-accum
          node scripts/factory/lib/r2-registry-restore.js

      # V25.8.3: Purge legacy .json.gz ghost files from registry directory to prevent reader collision.
      - name: Purge Legacy Registry Ghosts
        run: |
          if [ -d "cache/registry" ]; then
            GHOST_COUNT=$(find cache/registry -name 'part-*.json.gz' -o -name 'part-*.json' 2>/dev/null | wc -l)
            if [ "$GHOST_COUNT" -gt 0 ]; then
              echo "🧹 Purging $GHOST_COUNT legacy .json.gz ghost files from cache/registry/"
              find cache/registry -name 'part-*.json.gz' -delete 2>/dev/null || true
              find cache/registry -name 'part-*.json' -delete 2>/dev/null || true
            fi
            BIN_COUNT=$(find cache/registry -name 'part-*.bin' 2>/dev/null | wc -l)
            echo "✅ Registry: $BIN_COUNT binary shards, 0 legacy ghosts"
          fi

      - name: Merge Batches
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ai-nexus-assets
          AES_CRYPTO_KEY: ${{ secrets.AES_CRYPTO_KEY }}
          UMID_SALT: ${{ secrets.UMID_SALT }}
          ALLOW_R2_RECOVERY: 'true'
        run: |
          echo "🔄 Merging batches with ID deduplication..."
          node scripts/ingestion/merge-batches.js
          
          if [ -f "data/manifest.json" ]; then
            ENTITY_COUNT=$(jq -r '.total_entities' data/manifest.json)
            echo "✅ Merged: $ENTITY_COUNT total entities (via manifest)"
            
            if [ "$ENTITY_COUNT" -lt 80000 ]; then
              echo "❌ ERROR: Only $ENTITY_COUNT entities found. Expected 80,000+."
              echo "This indicates corrupted data or missing batches."
              exit 1
            fi
          else
            echo "❌ Error: manifest.json not generated"
            exit 1
          fi

      # V4.1: Save Entity Data to Cache (Cycle-Specific Key)
      - name: Save Entity Data to Cache
        uses: actions/cache/save@v4
        with:
          path: |
            data/merged_shard_*.json.zst
            data/manifest.json
            cache/
          key: cycle-${{ github.run_id }}-harvest

      # V25.8 §6.1: Dual-write harvest output to R2 (cross-workflow resilience)
      - name: Backup Harvest Cycle to R2
        continue-on-error: true
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          node scripts/factory/r2-workflow-cli.js backup-dir data/ state/cycle-harvest/data/ --extensions=.json,.json.zst
          node scripts/factory/r2-workflow-cli.js backup-dir cache/ state/cycle-harvest/cache/
          echo "✅ Harvest cycle backed up to R2 state/cycle-harvest/"

      # Pipeline Summary
      - name: Summary
        run: |
          ENTITY_COUNT=$(jq -r '.total_entities' data/manifest.json)
          BATCH_COUNT=$(ls -1 data/raw_batch_*.json 2>/dev/null | wc -l)
          
          echo "## Factory Stage 1/4 (Harvest) - Complete 🚀" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Ingestion Data Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Total Entities**: $ENTITY_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "- **Batch Files**: $BATCH_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "- **Manifest State**: Verified ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Next: Factory 2/4 - Process" >> $GITHUB_STEP_SUMMARY
