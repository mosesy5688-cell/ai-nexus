name: Infra Deploy

on:
  # Trigger this workflow on every push to the main branch
  push:
    branches:
      - main
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# V5.2.1 Constitution Art 3.2: Execution Safety
concurrency:
  group: infra-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      deployments: write
    name: Build and Deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ASTRO_SKIP_BINDING_CHECK: true

      - name: Restructure artifacts for Cloudflare Pages _worker.js convention
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');

            // 1. Promote entry.mjs to the standard _worker.js entry point
            fs.copyFileSync('dist/server/entry.mjs', 'dist/_worker.js');
            console.log('Created dist/_worker.js');

            // 2. Move all other server assets (chunks etc.) to dist root
            //    so relative imports in _worker.js resolve correctly
            const serverFiles = fs.readdirSync('dist/server');
            for (const f of serverFiles) {
              if (f === 'entry.mjs' || f === 'wrangler.json') continue;
              const src = path.join('dist/server', f);
              const dest = path.join('dist', f);
              if (fs.statSync(src).isDirectory()) {
                fs.cpSync(src, dest, { recursive: true });
              } else {
                fs.copyFileSync(src, dest);
              }
            }
            console.log('Moved server assets to dist root');

            // 3. Move all client static assets to dist root
            //    so CSS/JS are served at the correct URL paths
            if (fs.existsSync('dist/client')) {
              fs.cpSync('dist/client', 'dist', { recursive: true });
              console.log('Moved client assets to dist root');
            }

            // 4. Remove subdirectories and stale Wrangler cache
            fs.rmSync('dist/server', { recursive: true, force: true });
            fs.rmSync('dist/client', { recursive: true, force: true });
            if (fs.existsSync('.wrangler')) {
              fs.rmSync('.wrangler', { recursive: true, force: true });
            }

            console.log('Restructure complete. dist/ is ready for _worker.js deployment.');
          "

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=ai-nexus --branch=main
        env:
          ASTRO_SKIP_BINDING_CHECK: true