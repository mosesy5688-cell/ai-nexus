name: Infra Deploy

on:
  # Trigger this workflow on every push to the main branch
  push:
    branches:
      - main
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# V5.2.1 Constitution Art 3.2: Execution Safety
concurrency:
  group: infra-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      deployments: write
    name: Build and Deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ASTRO_SKIP_BINDING_CHECK: true

      - name: Restructure artifacts for Cloudflare Pages (Proxy + Client Promotion)
        run: |
          node -e "
            const fs = require('fs');

            // 1. Create standard _worker.js proxy at root (Convention-over-Configuration)
            //    Importing from ./server/entry.mjs preserves its relative imports to ../assets/
            const workerProxy = \"export { default } from './server/entry.mjs';\";
            fs.writeFileSync('dist/_worker.js', workerProxy);
            console.log('Created dist/_worker.js proxy');

            // 2. Promote all client static assets to dist root
            //    This ensures CSS/JS load at the correct URL paths (e.g. /_astro/...)
            if (fs.existsSync('dist/client')) {
              console.log('Promoting client assets from dist/client to dist root...');
              fs.cpSync('dist/client', 'dist', { recursive: true });
              fs.rmSync('dist/client', { recursive: true, force: true });
            }

            // 3. Delete ONLY conflicting wrangler configs in artifacts
            //    We KEEP the server folder and entry.mjs to maintain WASM relative paths.
            const targets = ['dist/wrangler.json', 'dist/server/wrangler.json', 'dist/_worker.js/wrangler.json'];
            targets.forEach(f => {
              if (fs.existsSync(f)) {
                fs.unlinkSync(f);
                console.log('Deleted conflicting artifact config:', f);
              }
            });

            // 4. Wipe stale Wrangler cache
            if (fs.existsSync('.wrangler')) {
              fs.rmSync('.wrangler', { recursive: true, force: true });
              console.log('Wiped .wrangler cache');
            }

            console.log('Restructure complete. Standard Pages Layout + SSR Proxy ready.');
          "

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=ai-nexus --branch=main
        env:
          ASTRO_SKIP_BINDING_CHECK: true