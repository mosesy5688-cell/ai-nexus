name: Infra CI - Lint & Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# V5.2.1 Constitution Art 3.2: Execution Safety
concurrency:
  group: infra-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      
      - name: Install Dependencies
        run: npm ci

      - name: Constitutional CES Check (V5.1.2)
        run: npm run ces-check
      
      - name: Build Project
        run: npm run build
        env:
          NODE_ENV: production
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ASTRO_SKIP_BINDING_CHECK: true
      
      - name: Check Build Output
        run: |
          echo "📦 Verifying build artifacts..."
          
          # Check dist directory exists
          if [ ! -d "dist" ]; then
            echo "❌ dist directory not found"
            exit 1
          fi
          
          # V26.0: Use recursive search to accommodate Astro 6 rearranged assets
          if ! find dist -name "*.css" | grep . 1> /dev/null 2>&1; then
            echo "❌ No CSS files found in dist directory"
            exit 1
          fi
          
          if ! find dist -name "*.js" | grep . 1> /dev/null 2>&1; then
            echo "❌ No JS files found in dist directory"
            exit 1
          fi
          
          echo "✅ Build artifacts verified"
      
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 7

  # =============================================================
  # V4.9.1 CEO IRON RULE: Frontend D1 = 0 Detection
  # Constitutional: Art.I-Extended - Frontend must not access D1
  # =============================================================
  constitutional-guard:
    name: Constitutional D1 Guard
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Check for D1 Access in Frontend
        run: |
          echo "🛡️ Constitutional Guard: Checking for D1 access in frontend..."
          
          # CEO Iron Rule: Frontend D1 = 0
          # Detect any direct D1 database access in frontend PAGES only
          # NOTE: API endpoints and utils are EXCLUDED - they are backend code
          
          VIOLATIONS=0
          
          # Only check frontend pages (*.astro files in src/pages, excluding api/)
          # Store results in variable to avoid pipeline exit code issues
          FRONTEND_DB=$(find src/pages -type f -name "*.astro" ! -path "*/api/*" -exec grep -l "env\.DB\|\.prepare\s*(" {} \; 2>/dev/null || true)
          
          if [ -n "$FRONTEND_DB" ]; then
            echo "❌ VIOLATION: D1 access found in frontend pages:"
            echo "$FRONTEND_DB"
            VIOLATIONS=$((VIOLATIONS + 1))
          fi
          
          if [ $VIOLATIONS -gt 0 ]; then
            echo ""
            echo "🚨 CONSTITUTION VIOLATION: Frontend D1 = 0"
            echo "📖 Reference: V4.9 Art.I-Extended, Pillar VIII"
            echo "🔧 Solution: Use R2 cache files instead of D1 queries"
            exit 1
          fi
          
          echo "✅ Constitutional Guard: No frontend D1 access violations found"
          echo "ℹ️  Note: API endpoints (src/pages/api/*) and utils are allowed to access D1"

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: lint-and-build
    continue-on-error: true  # Don't block deployment on smoke test failures
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist/
      
      - name: Start Preview Server
        run: |
          # Use npx serve since astro preview is not supported by Cloudflare adapter
          npx serve dist -l 4321 > preview.log 2>&1 &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
          
          # Wait for server to be ready (increased timeout)
          echo "⏳ Waiting for server to start..."
          for i in {1..60}; do
            if curl -s http://localhost:4321 > /dev/null; then
              echo "✅ Server is ready"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "❌ Server failed to start. Logs:"
              cat preview.log
              exit 1
            fi
            sleep 1
          done
      
      - name: Test Homepage
        run: |
          echo "🧪 Testing homepage..."
          
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4321/)
          if [ "$STATUS" != "200" ]; then
            echo "❌ Homepage returned $STATUS"
            exit 1
          fi
          
          # Check for critical content
          CONTENT=$(curl -s http://localhost:4321/)
          if ! echo "$CONTENT" | grep -q "Free AI Tools"; then
            echo "❌ Homepage missing title"
            exit 1
          fi
          
          echo "✅ Homepage test passed"
      
      - name: Test Model Detail Page
        run: |
          echo "🧪 Testing model detail page..."
          
          # Test with a known model (adjust slug as needed)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4321/model/meta-llama--Llama-3-2-1B)
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "404" ]; then
            echo "⚠️ Model page returned $STATUS (acceptable if model doesn't exist)"
          else
            echo "✅ Model page test passed"
          fi
      
      - name: Test Explore Page (deprecated redirect → /models)
        run: |
          echo "🧪 Testing /explore redirect..."

          # /explore is deprecated and returns 301 → /models (see src/pages/explore.astro
          # and public/_redirects). The preview server (`npx serve dist`) is static-only
          # and does not honor SSR redirects or _redirects, so the valid outcomes are:
          #   301/302: redirect runtime evaluated (CF Pages prod reality)
          #   404:     static preview has no file for this SSR-redirect route
          #   200:     route accidentally re-enabled as a real page (allowed, not asserted)
          # Only 5xx should fail this step.
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4321/explore)
          if [ "$STATUS" -ge 500 ] 2>/dev/null; then
            echo "❌ Explore page returned $STATUS (server error)"
            exit 1
          fi

          echo "✅ Explore page test passed (status=$STATUS, redirect expected)"
      
      - name: Test API Endpoints
        run: |
          echo "🧪 Testing API endpoints..."
          
          # Test search API (if exists)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4321/api/search?q=test)
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "404" ]; then
            echo "⚠️ Search API returned $STATUS"
          fi
          
          echo "✅ API tests completed"
      
      - name: Cleanup
        if: always()
        run: |
          if [ -n "${{ env.SERVER_PID }}" ]; then
            kill ${{ env.SERVER_PID }} || true
          fi

  lighthouse:
    name: Lighthouse Performance
    runs-on: ubuntu-latest
    needs: lint-and-build
    continue-on-error: true  # Don't block deployment on lighthouse failures
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist/
      
      - name: Start Preview Server
        run: |
          npx serve dist -l 4321 &
          
          # Wait for server to be ready
          echo "⏳ Waiting for server to start..."
          for i in {1..30}; do
            if curl -s http://localhost:4321 > /dev/null; then
              echo "✅ Server is ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Server failed to start"
              exit 1
            fi
            sleep 1
          done
      
      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v11
        with:
          # /explore is a 301 redirect (see smoke test above); measure the real
          # destination /models instead so Lighthouse sees an actual rendered page.
          urls: |
            http://localhost:4321/
            http://localhost:4321/models
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 3
      
      - name: Check Lighthouse Scores
        run: |
          echo "📊 Lighthouse scores recorded"
          echo "View results in job artifacts"

  security-check:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      
      - name: Run npm audit
        run: |
          npm audit --audit-level=moderate || true
          echo "⚠️ Security audit completed (warnings allowed)"
      
      - name: Check for Secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before != '0000000000000000000000000000000000000000' && github.event.before || '' }}
          head: HEAD
          extra_args: --only-verified

  status-check:
    name: CI Status Summary
    runs-on: ubuntu-latest
    needs: [lint-and-build, smoke-tests, lighthouse, security-check]
    if: always()
    
    steps:
      - name: Check Job Status
        run: |
          echo "## 📊 CI Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Required Checks" >> $GITHUB_STEP_SUMMARY
          echo "- **Lint & Build**: ${{ needs.lint-and-build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Security**: ${{ needs.security-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Informational Checks (non-blocking)" >> $GITHUB_STEP_SUMMARY
          echo "- **Smoke Tests**: ${{ needs.smoke-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Lighthouse**: ${{ needs.lighthouse.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Only require lint-and-build and security-check to pass
          # Smoke tests and lighthouse are informational (continue-on-error: true)
          if [ "${{ needs.lint-and-build.result }}" != "success" ] || \
             [ "${{ needs.security-check.result }}" != "success" ]; then
            echo "❌ **Required CI checks failed. Please fix errors before merging.**" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ **Required CI checks passed. Ready to merge.**" >> $GITHUB_STEP_SUMMARY
          fi
