# =============================================================================
# SRS-2A — Frontend Playwright DEPLOYED baseline
#
#   STATUS: INFORMATIONAL / NON-BLOCKING.  This workflow is NOT a required PR
#   gate. It runs POST-DEPLOY against deployed prod (https://free2aitools.com)
#   to surface frontend signal, closing the Frontend Matrix PENDING_RUNTIME
#   browser cells. A failure here NEVER blocks a merge or a deploy:
#     - the job is `continue-on-error: true`
#     - it is a standalone workflow, not referenced by any branch protection
#     - it does not run on `pull_request`, so it cannot become a PR check
#
#   Founder authorization: "SRS-2A Frontend Playwright R0 = IMPLEMENTATION NOW
#   / POST-DEPLOY / INFORMATIONAL / NOT BLOCKING YET."
# =============================================================================
name: SRS-2A Frontend Baseline (informational)

on:
  # Run after the deploy workflow completes (post-deploy verification).
  workflow_run:
    workflows: ["Infra Deploy"]
    types: [completed]
  # Daily informational sweep so the baseline stays current as data grows.
  schedule:
    - cron: "37 6 * * *"
  # Manual trigger from the Actions tab.
  workflow_dispatch:
    inputs:
      base_url:
        description: "Target base URL (default https://free2aitools.com)"
        required: false
        default: "https://free2aitools.com"

# Read-only against prod; least-privilege token.
permissions:
  contents: read

concurrency:
  group: srs2a-frontend-baseline
  cancel-in-progress: true

jobs:
  baseline:
    name: Frontend baseline (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # NON-BLOCKING: a red result is informational and must not fail the run.
    continue-on-error: true
    env:
      BASE_URL: ${{ github.event.inputs.base_url || 'https://free2aitools.com' }}
      SRS2A_REGION: ${{ vars.SRS2A_REGION || 'gha-ubuntu' }}
      SRS2A_CACHE_STATE: warm
    steps:
      - name: Checkout (harness only)
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run SRS-2A frontend baseline (informational)
        # Double safety net: tolerate non-zero exit so the artifact still uploads
        # and the workflow stays green regardless of assertion outcomes.
        continue-on-error: true
        run: npx playwright test tests/e2e/srs2a-frontend-baseline.spec.ts --reporter=line

      - name: Upload provenance run artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: srs2a-frontend-baseline-${{ github.run_id }}
          path: |
            test-results/srs2a-frontend-baseline*.json
            playwright-report/
          if-no-files-found: warn
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "### SRS-2A Frontend Baseline (informational, non-blocking)" >> "$GITHUB_STEP_SUMMARY"
          echo "Target: \`$BASE_URL\`" >> "$GITHUB_STEP_SUMMARY"
          echo "This run does NOT gate any PR or deploy. See artifact for provenance freeze." >> "$GITHUB_STEP_SUMMARY"
