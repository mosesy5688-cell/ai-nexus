# Factory 1.5 - Density Booster (Paper Enrichment)
# V25.8.3: Asynchronous full-text collection for academic papers
#
# Trigger: workflow_dispatch ONLY (dispatched by Factory 4/4 upload job).
# NOTE: workflow_run is NOT used because GitHub has a 3-level depth limit
# for chained workflow_run triggers. Factory 4/4 is already Level 3,
# so Level 4 would be silently dropped. Factory 4/4 uses `gh workflow run`
# to dispatch this workflow, which resets the depth counter.
#
# V25.8.7: Marker PDF-first strategy for high-quality PDF→Markdown conversion.
# Architecture: 8 parallel runners with persistent Marker sidecar per runner.
# Budget: 5000 papers / 5.5h per runner (20K papers/cycle max)
# Priority: arxiv.org HTML5 → S2 fullText API → PDF+Marker → skip

name: Factory 1.5 - Density Booster

permissions:
  actions: write
  contents: read

on:
  workflow_dispatch:
    inputs:
      continuation_round:
        description: 'Auto-continuation round (0=initial, max 3)'
        required: false
        default: '0'

jobs:
  check-upstream:
    name: Check Upstream
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Gate Check
        run: echo "✅ Upstream OK. Starting Density Booster."

  enrich:
    name: Enrich [${{ matrix.partition }}]
    needs: check-upstream
    runs-on: ubuntu-latest
    timeout-minutes: 330
    strategy:
      matrix:
        partition:
          - { start: '00', end: '1f' }
          - { start: '20', end: '3f' }
          - { start: '40', end: '5f' }
          - { start: '60', end: '7f' }
          - { start: '80', end: '9f' }
          - { start: 'a0', end: 'bf' }
          - { start: 'c0', end: 'df' }
          - { start: 'e0', end: 'ff' }
      fail-fast: false
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Marker
        run: pip install marker-pdf torch --extra-index-url https://download.pytorch.org/whl/cpu

      # Restore all Rust .node binaries (must match rust-build.yml cache/save)
      - name: Restore Rust FFI Binaries
        uses: actions/cache/restore@v4
        with:
          path: |
            rust/shard-router/shard-router-rust.node
            rust/fni-calc/fni-calc-rust.node
            rust/mesh-engine/mesh-engine-rust.node
            rust/content-extractor/content-extractor-rust.node
            rust/stream-aggregator/stream-aggregator-rust.node
            rust/satellite-tasks/satellite-tasks-rust.node
            rust/r2-engine/r2-engine-rust.node
          key: rust-ffi-v2-${{ hashFiles('rust/Cargo.toml', 'rust/*/Cargo.toml', 'rust/*/src/**') }}
          # No restore-keys: prevent stale binary fallback (V25.8.5)
      - name: R2 Fallback for Rust FFI
        continue-on-error: true
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          FOUND=$(find rust -name '*.node' 2>/dev/null | wc -l)
          [ "$FOUND" -lt 6 ] && node scripts/factory/r2-workflow-cli.js restore-rust-ffi || true

      # Download dedup.db from R2
      - name: Restore Dedup Ledger from R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          mkdir -p output/data
          node scripts/factory/r2-workflow-cli.js restore-file state/dedup.db output/data/dedup.db || echo "⚠️ dedup.db not found on R2"

      # Run Density Booster
      - name: Run Booster [${{ matrix.partition.start }}..${{ matrix.partition.end }}]
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
          AES_CRYPTO_KEY: ${{ secrets.AES_CRYPTO_KEY }}
          S2_API_KEY: ${{ secrets.S2_API_KEY }}
          DEDUP_DB_PATH: ./output/data/dedup.db
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: |
          node scripts/factory/density-booster.js \
            --partition-start=${{ matrix.partition.start }} \
            --partition-end=${{ matrix.partition.end }}

      - name: Upload Booster Stats
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: booster-stats-${{ matrix.partition.start }}
          path: output/booster-stats-*.json
          if-no-files-found: ignore

  summary:
    name: Enrichment Summary
    needs: enrich
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Download All Stats
        uses: actions/download-artifact@v4
        with:
          pattern: booster-stats-*
          path: stats/
          merge-multiple: true
      - name: Aggregate and Decide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TOTAL_SUCCESS=0
          TOTAL_REMAINING=0
          for f in stats/booster-stats-*.json; do
            [ -f "$f" ] || continue
            S=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$f','utf-8')).success||0)")
            R=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$f','utf-8')).remaining||0)")
            TOTAL_SUCCESS=$((TOTAL_SUCCESS + S))
            TOTAL_REMAINING=$((TOTAL_REMAINING + R))
          done
          ROUND=${{ inputs.continuation_round || 0 }}
          echo "## Factory 1.5 - Density Booster Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Total SUCCESS: $TOTAL_SUCCESS" >> $GITHUB_STEP_SUMMARY
          echo "- Total Remaining: $TOTAL_REMAINING" >> $GITHUB_STEP_SUMMARY
          echo "📊 Enrichment Complete | SUCCESS: $TOTAL_SUCCESS | Remaining: $TOTAL_REMAINING"
          
          if [ "$TOTAL_REMAINING" -eq 0 ]; then
            echo "✅ All reachable papers successfully enriched."
          else
            echo "✅ Round complete. Remaining papers can be processed in the next manual run."
          fi
