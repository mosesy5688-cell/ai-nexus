# Factory 1.5 - Density Booster (Paper Enrichment)
# V25.8.3: Asynchronous full-text collection for academic papers
#
# Trigger: workflow_dispatch ONLY (dispatched by Factory 4/4 upload job).
# NOTE: workflow_run is NOT used because GitHub has a 3-level depth limit
# for chained workflow_run triggers. Factory 4/4 is already Level 3,
# so Level 4 would be silently dropped. Factory 4/4 uses `gh workflow run`
# to dispatch this workflow, which resets the depth counter.
#
# Architecture: 16 parallel runners, each assigned a UMID partition range
# Budget: 5000 papers / 5h per runner (80K papers/cycle max)
# Core: Rust content-extractor FFI for HTML extraction + classification

name: Factory 1.5 - Density Booster

permissions:
  actions: read
  contents: read

on:
  workflow_dispatch:

jobs:
  check-upstream:
    name: Check Upstream
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Gate Check
        run: echo "✅ Upstream OK. Starting Density Booster."

  enrich:
    name: Enrich [${{ matrix.partition }}]
    needs: check-upstream
    runs-on: ubuntu-latest
    timeout-minutes: 330
    strategy:
      matrix:
        partition:
          - { start: '00', end: '0f' }
          - { start: '10', end: '1f' }
          - { start: '20', end: '2f' }
          - { start: '30', end: '3f' }
          - { start: '40', end: '4f' }
          - { start: '50', end: '5f' }
          - { start: '60', end: '6f' }
          - { start: '70', end: '7f' }
          - { start: '80', end: '8f' }
          - { start: '90', end: '9f' }
          - { start: 'a0', end: 'af' }
          - { start: 'b0', end: 'bf' }
          - { start: 'c0', end: 'cf' }
          - { start: 'd0', end: 'df' }
          - { start: 'e0', end: 'ef' }
          - { start: 'f0', end: 'ff' }
      fail-fast: false
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # Restore all Rust .node binaries (must match rust-build.yml cache/save)
      - name: Restore Rust FFI Binaries
        uses: actions/cache/restore@v4
        with:
          path: |
            rust/shard-router/shard-router-rust.node
            rust/fni-calc/fni-calc-rust.node
            rust/mesh-engine/mesh-engine-rust.node
            rust/content-extractor/content-extractor-rust.node
            rust/stream-aggregator/stream-aggregator-rust.node
            rust/satellite-tasks/satellite-tasks-rust.node
            rust/r2-engine/r2-engine-rust.node
          key: rust-ffi-binaries-${{ hashFiles('rust/Cargo.toml', 'rust/*/Cargo.toml', 'rust/*/src/**') }}
          restore-keys: rust-ffi-binaries-
      - name: R2 Fallback for Rust FFI
        continue-on-error: true
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          FOUND=$(find rust -name '*.node' 2>/dev/null | wc -l)
          [ "$FOUND" -lt 6 ] && node scripts/factory/r2-workflow-cli.js restore-rust-ffi || true

      # Download dedup.db from R2
      - name: Restore Dedup Ledger from R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          mkdir -p output/data
          node scripts/factory/r2-workflow-cli.js restore-file state/dedup.db output/data/dedup.db || echo "⚠️ dedup.db not found on R2"

      # Run Density Booster
      - name: Run Booster [${{ matrix.partition.start }}..${{ matrix.partition.end }}]
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
          AES_CRYPTO_KEY: ${{ secrets.AES_CRYPTO_KEY }}
          DEDUP_DB_PATH: ./output/data/dedup.db
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: |
          node scripts/factory/density-booster.js \
            --partition-start=${{ matrix.partition.start }} \
            --partition-end=${{ matrix.partition.end }}

      # Upload updated dedup.db back to R2
      - name: Sync Dedup Ledger to R2
        if: always()
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          if [ -f "output/data/dedup.db" ]; then
            node scripts/factory/r2-workflow-cli.js upload-buffer output/data/dedup.db state/dedup.db --content-type=application/x-sqlite3
          fi

  summary:
    name: Enrichment Summary
    needs: enrich
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Factory 1.5 - Density Booster Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Partitions: 16 parallel (00-ff)" >> $GITHUB_STEP_SUMMARY
          echo "- Budget: 5000 papers/partition" >> $GITHUB_STEP_SUMMARY
          echo "- Storage: R2 enrichment/fulltext/{partition}/{umid}.md.zst" >> $GITHUB_STEP_SUMMARY
          echo "- Next: Fusion in Factory 3/4 Aggregate (T+1)" >> $GITHUB_STEP_SUMMARY
