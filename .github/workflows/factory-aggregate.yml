# Factory 3/4 - Aggregate
# V14.5 Phase 4: Modular Factory Architecture
# 
# Triggers: workflow_run from Process, or manual dispatch
# Inputs: shard-* artifacts from Process stage
# Outputs: trending.json, search-*.json, sitemaps, rankings
# 
# Constitution: Art 3.1 (Aggregator), Art 5 (Weekly), Art 6.3 (Search)

name: Factory 3/4 - Aggregate

permissions:
  actions: write
  contents: read

on:
  workflow_run:
    workflows: ["Factory 2/4 - Process"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Run ID of Process workflow to get shard artifacts from'
        required: false
        type: string

jobs:
  # V14.5.3: Identify upstream Harvest run for full data restoration
  check-upstream:
    name: Check Upstream Harvest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      harvest-id: ${{ steps.get-ids.outputs.harvest-id }}
      process-id: ${{ steps.get-ids.outputs.process-id }}
    steps:
      - name: Verify Upstream Conclusion
        if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion != 'success' }}
        run: |
          echo "❌ ERROR: Upstream workflow '${{ github.event.workflow_run.name }}' failed with conclusion '${{ github.event.workflow_run.conclusion }}'."
          echo "Aborting Factory 3/4 to prevent data corruption."
          exit 1
      - name: Checkout Repository
        uses: actions/checkout@v5
      - name: Get Run IDs (Harvest & Process)
        id: get-ids
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Start with the Process Run ID (Triggering event or manual input)
          PROCESS_RUN_ID=${{ inputs.run_id || github.event.workflow_run.id }}
          
          # 2. If PROCESS_RUN_ID is missing, find the latest successful Process run on MAIN
          if [ -z "$PROCESS_RUN_ID" ] || [ "$PROCESS_RUN_ID" == "null" ]; then
            echo "🔍 Manual dispatch: Finding latest successful Process run on main branch..."
            PROCESS_RUN_ID=$(gh run list --workflow factory-process.yml --branch main --status success --limit 1 --json databaseId --jq '.[0].databaseId' | tr -d '[:space:]')
          fi
          
          # 3. Find the latest successful Harvest run on MAIN (The Production Source of Truth)
          HARVEST_RUN_ID=$(gh run list --workflow factory-harvest.yml --branch main --status success --limit 1 --json databaseId --jq '.[0].databaseId' | tr -d '[:space:]')
          
          echo "harvest-id=$HARVEST_RUN_ID" >> $GITHUB_OUTPUT
          echo "process-id=$PROCESS_RUN_ID" >> $GITHUB_OUTPUT
          echo "✅ Resolved Harvest ID (Main): $HARVEST_RUN_ID"
          echo "✅ Resolved Process ID (Main): $PROCESS_RUN_ID"

  # Job 1: Core Merge (The Pivot - SPEC V2.0)
  # V27.40: merge-core was a 1h41m monolithic job — split into compute + persist.
  # Save-step failure no longer redoes 1h merge.
  # See plan: brain/3de56fa3.../V27.40-factory-optimization-review.md
  merge-core-compute:
    name: Merge Core Registry (Compute)
    needs: check-upstream
    runs-on: ubuntu-22.04
    timeout-minutes: 330
    env:
      NODE_OPTIONS: "--max-old-space-size=8192 --expose-gc"
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/factory-setup
        with:
          aggressive-disk-cleanup: 'true'
          with-rust-ffi: 'true'
      - name: R2 Fallback for Rust FFI
        continue-on-error: true
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          FOUND=$(find rust -name '*.node' 2>/dev/null | wc -l)
          if [ "$FOUND" -lt 9 ]; then
            echo "⚠️ Only $FOUND/9 Rust binaries. Restoring from R2 vault..."
            node scripts/factory/r2-workflow-cli.js restore-rust-ffi || echo '⚠️ R2 Rust FFI fallback unavailable'
          fi

      # V4.1: Restore Shards from Cache (Not Artifact)
      - name: Restore Shards from Cache
        id: cache-shards
        uses: actions/cache/restore@v5
        with:
          path: |
            output/shards
          key: cycle-${{ needs.check-upstream.outputs.process-id }}-shards
          # Cycle-SCOPED restore-key: bare `cycle-${ref_name}-` could fall through to
          # a DIFFERENT cycle's cache (or a wrong-shape -harvest/-output entry) on an
          # exact-key miss. Scope to this Process run-id so only same-cycle -shards
          # variants match; true misses fall to the R2 state/shards/ restore below.
          restore-keys: |
            cycle-${{ needs.check-upstream.outputs.process-id }}-

      - name: Clean Environment Residue
        run: |
          echo "🧹 Cleaning any residue from previous failed runs..."
          rm -rf cache/ data/ output/meta/backup/
          mkdir -p cache data output/meta/backup

      - name: Organize Shards & Context
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          mkdir -p artifacts output/cache/shards
          # Copy shards for local aggregator use
          if [ -d "output/shards" ]; then
            SHARD_COUNT=$(find output/shards -name "shard-*.json.zst" | wc -l)
            echo "📦 Preparing $SHARD_COUNT shards from cache..."

            # V25.9: Integrity Check (Sniff Zstd Magic Bytes: 0x28 0xB5 0x2F 0xFD)
            for f in output/shards/shard-*.json.zst; do
              [ -e "$f" ] || continue
              if ! node -e "const b=require('fs').readFileSync('$f'); if(b[0]!==0x28 || b[1]!==0xb5 || b[2]!==0x2f || b[3]!==0xfd) process.exit(1)" 2>/dev/null; then
                echo "  - ⚠️ Fake .zst detected: $f. Removing to prevent crash."
                rm "$f"
              else
                cp "$f" artifacts/
              fi
            done
          fi

          # V25.8 §2.2: R2 Fallback — restore missing shards from R2 state/shards/
          CACHE_COUNT=$(ls artifacts/shard-*.json.zst 2>/dev/null | wc -l)
          if [ "$CACHE_COUNT" -lt 20 ]; then
            echo "⚠️ Only $CACHE_COUNT shards from cache. Attempting R2 restoration..."
            for i in $(seq 0 19); do
              if [ ! -f "artifacts/shard-${i}.json.zst" ]; then
                echo "  Fetching shard-${i} from R2..."
                node scripts/factory/r2-workflow-cli.js restore-file "state/shards/shard-${i}.json.zst" "artifacts/shard-${i}.json.zst" || echo "  ⚠️ shard-${i} not available on R2"
              fi
            done
          fi

          # Final validation
          FINAL_COUNT=$(ls artifacts/shard-*.json.zst 2>/dev/null | wc -l)
          echo "✅ Final compressed shards for aggregator: $FINAL_COUNT"

          if [ "$FINAL_COUNT" -eq 0 ]; then
            echo "❌ ERROR: No valid compressed shard files found!"
            ls -R output/shards || echo "output/shards is empty"
            exit 1
          fi

      # V4.1: Restore Harvest Context from Cache
      - name: Restore Harvest Context from Cache
        uses: actions/cache/restore@v5
        with:
          path: |
            data/merged_shard_*.json.zst
            data/manifest.json
            cache/
          key: cycle-${{ needs.check-upstream.outputs.harvest-id }}-harvest
          # Cycle-SCOPED restore-key: bare `cycle-${ref_name}-` could restore a
          # foreign cycle's cache (or a wrong-shape -shards/-output entry) on an
          # exact-key miss. Scope to this Harvest run-id so only same-cycle -harvest
          # variants match. Validate Context below soft-warns on a true miss, and the
          # R2 Registry Fallback step restores cache/registry/ independently.
          restore-keys: |
            cycle-${{ needs.check-upstream.outputs.harvest-id }}-

      - name: Validate Context
        run: |
          SHARD_COUNT=$(ls data/merged_shard_*.json.zst 2>/dev/null | wc -l)
          if [ "$SHARD_COUNT" -gt 0 ]; then
            echo "✅ Harvest context restored: $SHARD_COUNT shards"
          else
            echo "⚠️ No harvest shards in cache."
          fi

      # V26.9: R2 fallback for registry when harvest cache misses (e.g. re-run 3/4 only)
      - name: R2 Registry Fallback
        if: ${{ !cancelled() }}
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ai-nexus-assets
        run: |
          BIN_COUNT=$(find cache/registry -name 'part-*.bin' 2>/dev/null | wc -l)
          if [ "$BIN_COUNT" -gt 0 ]; then
            echo "✅ Registry already present: $BIN_COUNT binary shards"
          else
            echo "⚠️ No registry in cache. Restoring from R2..."
            mkdir -p cache/registry
            node scripts/factory/lib/r2-registry-restore.js
          fi

      # V25.8.3: Purge legacy .json.gz ghost files from registry directory.
      # These are stale files from pre-V25.8 pipeline runs, persisted through GHA cache.
      # Current pipeline writes binary .bin (NXVF). Ghost .json.gz files cause Rust
      # stream-aggregator to read corrupted/truncated data instead of current .bin shards.
      - name: Purge Legacy Registry Ghosts
        run: |
          if [ -d "cache/registry" ]; then
            GHOST_COUNT=$(find cache/registry -name 'part-*.json.gz' -o -name 'part-*.json' 2>/dev/null | wc -l)
            if [ "$GHOST_COUNT" -gt 0 ]; then
              echo "🧹 Purging $GHOST_COUNT legacy .json.gz ghost files from cache/registry/"
              find cache/registry -name 'part-*.json.gz' -delete 2>/dev/null || true
              find cache/registry -name 'part-*.json' -delete 2>/dev/null || true
            fi
            BIN_COUNT=$(find cache/registry -name 'part-*.bin' 2>/dev/null | wc -l)
            echo "✅ Registry: $BIN_COUNT binary shards, 0 legacy ghosts"
          fi

      # V55.9: Restore FNI history from GHA cache (cross-run continuity)
      - name: Restore FNI History from Cache
        uses: actions/cache/restore@v5
        with:
          path: |
            cache/fni-history.json.zst
            cache/fni-history/
          key: fni-history-${{ github.run_id }}
          restore-keys: |
            fni-history-

      # V55.9: If GHA cache expired, restore FNI history from R2 (read-only state)
      - name: R2 Fallback for FNI History
        continue-on-error: true
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          FNI_COUNT=$(find cache/fni-history -name 'part-*.json.zst' -o -name 'part-*.json.gz' 2>/dev/null | wc -l)
          if [ "$FNI_COUNT" -gt 0 ]; then
            echo "✅ FNI history already restored from GHA cache ($FNI_COUNT parts)"
            exit 0
          fi
          echo "⚠️ No FNI history in GHA cache. Restoring from R2..."
          mkdir -p cache/fni-history
          node scripts/factory/r2-workflow-cli.js restore-dir meta/backup/fni-history/ cache/fni-history/ || echo '⚠️ R2 FNI history fallback unavailable'

      - name: Run Core Merge & Health
        env:
          GEMINI_MODEL: gemini-3.1-pro-preview
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ai-nexus-assets
          AES_CRYPTO_KEY: ${{ secrets.AES_CRYPTO_KEY }}
          ENABLE_R2_BACKUP: 'true'
        run: |
            echo "🔄 Running Merge-Core (V2.0 Sharding)..."
            node scripts/factory/aggregator.js --task=health
            node scripts/factory/aggregator.js --task=core

      - name: Consolidate Final Artifacts & Context
        if: success()
        run: |
          mkdir -p output/cache output/meta/backup cache
          
          # 1. Mirror production artifacts for R2 distribution (Stage 4/4)
          # V22.8: Aggregator persistence handled meta/backup/ mirrors.
          # We just need to ensure directory structure is consistent.
          [ -d "meta" ] && cp -r meta/* output/meta/ 2>/dev/null || true
          
          # 2. Mirror BACK to root cache/ for persistent memory (Stage 1/4)
          # Ensure local flow has the latest state for GHA cache save
          if [ -d "output/meta/backup" ] && [ "$(ls -A output/meta/backup)" ]; then
            cp -r output/meta/backup/* cache/ 2>/dev/null || true
          fi
          
          echo "📦 Final output structure for R2 staging:"
          ls -R output/ | head -20
          echo "📦 Final cache structure for GitHub flow:"
          ls -R cache/ | head -20

      # V17.0: Cleaning relocated to finalize step after cache save to prevent Fusion data loss
      - name: Registry Handoff
        run: |
          echo "✅ Core registry and fragments verified. Ready for handoff."

      # D-209/D-211: end of merge-core-compute. The best-effort GHA actions/cache
      # `intra-cycle-<run>-core` save is REMOVED from this seam (it failed closed
      # on a cache-service write-auth denial). Instead, ESTABLISH the authoritative
      # attempt-scoped R2 handoff (deterministic tar.zst OUTSIDE payload roots ->
      # multipart upload -> verify -> immutable manifest written LAST + re-verified).
      # Failure is FATAL: Compute goes RED and neither consumer becomes eligible
      # (no warning-only-green). Step-level R2 creds are mandatory — the composite
      # factory-setup action cannot inject secrets (D-211 §K).
      - name: Establish Authoritative R2 Handoff (Core)
        if: success()
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
          CYCLE_ID: ${{ needs.check-upstream.outputs.process-id }}
          PRODUCER_MAIN_SHA: ${{ github.sha }}
        run: |
          node scripts/factory/r2-workflow-cli.js handoff-establish

  # V27.40: merge-core-persist isolates Save / R2-backup from heavy compute.
  # Failure here costs ~10-15m rerun, not 1h merge. Restores unpruned -core cache,
  # prunes (artifacts/ + cache/deltas/ + cache/fni-history/ + output/meta/),
  # then writes -satellite (pruned) + 4 monolith caches + R2 FNI backup.
  merge-core-persist:
    name: Merge Core Registry (Persist)
    needs: [merge-core-compute, check-upstream]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/factory-setup
        with:
          aggressive-disk-cleanup: 'false'
          with-rust-ffi: 'false'

      # D-209/D-211: the GHA actions/cache `intra-cycle-<run>-core` restore + its
      # cache-hit "defensive" guard (with the misleading "Re-run failed jobs" text)
      # are REMOVED. Persist INDEPENDENTLY consumes the authoritative current-attempt
      # R2 handoff: load manifest -> validate exact allowed_consumers + own role +
      # cycle/run/attempt/producer-sha -> download archive -> recompute bytes+sha ->
      # reject absolute/traversal/symlink -> extract to role-specific staging ->
      # expose output/+cache/+artifacts/ at the workspace root. Any invalid state =
      # ZERO writes (non-zero exit aborts persist). No cache fallback for this seam.
      - name: Consume Authoritative R2 Handoff (Core)
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
          CYCLE_ID: ${{ needs.check-upstream.outputs.process-id }}
          PRODUCER_MAIN_SHA: ${{ github.sha }}
        run: |
          node scripts/factory/r2-workflow-cli.js handoff-consume --role=merge-core-persist

      # V27.43: Reordered — save monoliths/shards FIRST while disk state is intact,
      # THEN prune + save satellite cache. Pre-V27.43 order pruned cache/fni-history/
      # before Save FNI History → "Path Validation Error: ... do(es) not exist" warning
      # and silent shard backup loss (monolith .zst still saved OK).

      # V4.1: Save Global Registry for next cycle's 1/4 Harvest
      - name: Save Global Registry to Cache
        if: success()
        uses: actions/cache/save@v5
        with:
          path: |
            cache/global-registry.json.zst
            cache/registry/
          key: global-registry-${{ github.run_id }}

      # V27.53: backup registry shards to R2 — 4/4 master-fusion's R2 fallback
      # previously got STALE bootstrap-era data (meta/backup/registry/ only
      # populated by registry-bootstrap.js once, never refreshed). After eviction
      # of GHA cache `global-registry-${run_id}` (LRU 24h+), 4/4 fell back to
      # stale R2 → 0 entities → master-fusion produced 0 fused shards → cycle
      # broken (4h+ wasted on run 26376590873).
      - name: Backup Registry Shards to R2 (V27.53)
        if: success()
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          if [ -d "cache/registry" ]; then
            BIN_COUNT=$(find cache/registry -name 'part-*.bin' 2>/dev/null | wc -l)
            if [ "$BIN_COUNT" -gt 0 ]; then
              node scripts/factory/r2-workflow-cli.js backup-dir cache/registry/ state/registry/
              echo "[R2] Registry: ${BIN_COUNT} .bin shards backed up to state/registry/"
            else
              echo "::warning::No .bin shards in cache/registry — skipping R2 backup"
            fi
          fi
          if [ -f "cache/global-registry.json.zst" ]; then
            node scripts/factory/r2-workflow-cli.js upload-buffer cache/global-registry.json.zst state/global-registry.json.zst
            echo "[R2] global-registry.json.zst monolith backed up"
          fi

      - name: Save FNI History to Cache (Self-Healing)
        if: success()
        uses: actions/cache/save@v5
        with:
          path: |
            cache/fni-history.json.zst
            cache/fni-history/
          key: fni-history-${{ github.run_id }}

      # P1-R9: R2 backup for FNI history (was cache-only, no R2 copy for current cycle)
      - name: Backup FNI History to R2
        if: success()
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          [ -f "cache/fni-history.json.zst" ] && node scripts/factory/r2-workflow-cli.js upload-buffer cache/fni-history.json.zst meta/backup/fni-history.json.zst
          [ -d "cache/fni-history" ] && node scripts/factory/r2-workflow-cli.js backup-dir cache/fni-history/ meta/backup/fni-history/
          TODAY=$(date -u +%Y-%m-%d)
          [ -f "cache/fni-history.json.zst" ] && node scripts/factory/r2-workflow-cli.js upload-buffer cache/fni-history.json.zst "history/fni/${TODAY}.json.zst"
          echo "✅ FNI history backed up to R2 + daily snapshot archived"

      - name: Save Daily Accumulator to Cache (Self-Healing)
        if: success()
        uses: actions/cache/save@v5
        with:
          path: |
            cache/daily-accum.json.zst
            cache/daily-accum/
          key: daily-accum-${{ github.run_id }}

      - name: Save Checksums to Cache
        if: success()
        uses: actions/cache/save@v5
        with:
          path: |
            cache/entity-checksums.json.zst
            cache/task-checksums.json.zst
          key: checksums-${{ github.run_id }}

      # V27.43: Prune AFTER all individual monolith/shard saves are done — earlier
      # this ran before Save FNI History which silently lost the shard dir backup.
      - name: Prune for Satellite Cache (drop deltas/artifacts/fni/meta)
        if: success()
        run: |
          rm -rf artifacts/ cache/deltas/ cache/fni-history/ output/meta/ 2>/dev/null
          echo "Satellite cache pruned: $(du -sh cache/ output/ 2>/dev/null | paste -s)"

      - name: Save Satellite Cache (pruned)
        if: success()
        uses: actions/cache/save@v5
        with:
          path: |
            output/
            cache/
          key: intra-cycle-${{ github.run_id }}-satellite

  # Parallel Satellite Jobs (SPEC V2.0) — all `needs: merge-core-persist` per V27.40
  aggregate-search:
    name: "Agg: Search Index"
    needs: merge-core-persist
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/factory-setup
        with:
          aggressive-disk-cleanup: 'true'
          with-rust-ffi: 'true'
      - name: R2 Fallback for Rust FFI
        continue-on-error: true
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          FOUND=$(find rust -name '*.node' 2>/dev/null | wc -l)
          [ "$FOUND" -lt 9 ] && node scripts/factory/r2-workflow-cli.js restore-rust-ffi || true
      - name: Restore Satellite Cache
        uses: actions/cache/restore@v5
        with:
          path: |
            output/
            cache/
          key: intra-cycle-${{ github.run_id }}-satellite
      - name: Generate Search Indices
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ai-nexus-assets
          CACHE_DIR: ./cache
          ENABLE_R2_BACKUP: 'true'
          AES_CRYPTO_KEY: ${{ secrets.AES_CRYPTO_KEY }}
        run: |
          export NODE_OPTIONS="--max-old-space-size=6144"
          node scripts/factory/aggregator.js --task=search
      - name: Save Search Results to Cache
        uses: actions/cache/save@v5
        with:
          path: output/cache/search*
          key: intra-cycle-${{ github.run_id }}-search
      # R2 backup for search satellite (P0-R2: R2-primary resilience)
      - name: Backup Search Results to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          node scripts/factory/r2-workflow-cli.js backup-dir output/cache/ state/satellite-search/ --extensions=.json,.json.zst,.json.gz
          echo "✅ Search results backed up to R2"

  aggregate-rankings:
    name: "Agg: Rankings"
    needs: merge-core-persist
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/factory-setup
        with:
          aggressive-disk-cleanup: 'true'
          with-rust-ffi: 'true'
      - name: R2 Fallback for Rust FFI
        continue-on-error: true
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          FOUND=$(find rust -name '*.node' 2>/dev/null | wc -l)
          [ "$FOUND" -lt 9 ] && node scripts/factory/r2-workflow-cli.js restore-rust-ffi || true
      - name: Restore Satellite Cache
        uses: actions/cache/restore@v5
        with:
          path: |
            output/
            cache/
          key: intra-cycle-${{ github.run_id }}-satellite
      - name: Download Hosted-On Data from R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          for p in replicate together hf-inference; do
            node scripts/factory/r2-workflow-cli.js restore-file "state/hosted-on/hosted-on-${p}.json" "output/cache/hosted-on-${p}.json" || echo "⚠️ hosted-on-${p}.json not in R2"
          done
      - name: Generate Rankings
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ai-nexus-assets
          CACHE_DIR: ./cache
          ENABLE_R2_BACKUP: 'true'
          AES_CRYPTO_KEY: ${{ secrets.AES_CRYPTO_KEY }}
        run: |
          export NODE_OPTIONS="--max-old-space-size=6144"
          node scripts/factory/aggregator.js --task=rankings
          node scripts/factory/aggregator.js --task=category
      - name: Save Rankings Results to Cache
        uses: actions/cache/save@v5
        with:
          path: |
            output/cache/rankings/
            output/cache/category_stats.json.zst
            output/data/
          key: intra-cycle-${{ github.run_id }}-rankings
      # R2 backup for rankings satellite (P0-R2: R2-primary resilience)
      - name: Backup Rankings Results to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          node scripts/factory/r2-workflow-cli.js backup-dir output/cache/rankings/ state/satellite-rankings/rankings/
          [ -f "output/cache/category_stats.json.zst" ] && node scripts/factory/r2-workflow-cli.js upload-buffer output/cache/category_stats.json.zst state/satellite-rankings/category_stats.json.zst
          # V27.40: 13 serial uploads -> 6-way parallel xargs (saves ~2-3m)
          ls output/data/rankings-*.db 2>/dev/null | xargs -I{} -P 6 -n 1 bash -c \
            'node scripts/factory/r2-workflow-cli.js upload-buffer "$1" "state/satellite-rankings/$(basename "$1")" || true' _ {}
          echo "✅ Rankings results + DBs backed up to R2 (parallel)"

  aggregate-trending:
    name: "Agg: Trending"
    needs: merge-core-persist
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/factory-setup
        with:
          aggressive-disk-cleanup: 'true'
          with-rust-ffi: 'true'
      - name: R2 Fallback for Rust FFI
        continue-on-error: true
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          FOUND=$(find rust -name '*.node' 2>/dev/null | wc -l)
          [ "$FOUND" -lt 9 ] && node scripts/factory/r2-workflow-cli.js restore-rust-ffi || true
      # D-2026-0624-113: RESTORE-FOOTPRINT hotfix. Trending only READS
      # cache/registry/ (rankings + shardReader; see scripts/factory/aggregator.js
      # runSatelliteTask + lib/registry-loader.js loadRegistryShardsSequentially)
      # and cache/fni-history/ (--task=trend; lib/registry-history.js loadFniHistory).
      # artifacts/, cache/deltas/, output/meta/ are OUTPUT-only/Rust-rebuilt dirs
      # (rust/stream-aggregator StatsTask Phase 3 tolerates a missing artifacts/ via
      # `if let Ok(read_dir)` and recreates cache/deltas/ itself). Restoring the full
      # intra-cycle-${run_id}-core archive (output/+cache/+artifacts/, append-only)
      # overran the runner disk ("No space left on device", 2026-06-24). Restore the
      # SMALL same-run registry-only cache merge-core-persist already produced instead.
      - name: Disk usage before registry restore
        run: df -h .
      - name: Restore Global Registry from Cache (registry-only footprint)
        id: cache-restore-registry
        uses: actions/cache/restore@v5
        with:
          path: |
            cache/global-registry.json.zst
            cache/registry/
          key: global-registry-${{ github.run_id }}
      # Fail-closed: same-run registry cache MUST hit (merge-core-persist wrote it
      # before this job's `needs` was satisfied). Mirror the persist-job guard at
      # ~line 344 — never proceed on an empty cache (would silently emit empty
      # trending.json poisoning the satellite-trending cache + R2).
      - name: Verify Registry Cache Hit (fail closed)
        if: steps.cache-restore-registry.outputs.cache-hit != 'true'
        run: |
          echo "::error::Cache miss on global-registry-${{ github.run_id }}. merge-core-persist must have written it before this job ran. Aborting Trending to avoid emitting empty results. Recovery: 'Re-run failed jobs' in GHA UI."
          exit 1
      - name: Verify Registry Shards Present (fail closed on zero)
        run: |
          SHARD_COUNT=$(find cache/registry -name 'part-*.bin' -o -name 'part-*.json.zst' -o -name 'part-*.json' 2>/dev/null | wc -l)
          if [ "$SHARD_COUNT" -eq 0 ]; then
            echo "::error::Registry restore yielded 0 shards in cache/registry/. Refusing to generate trending from an empty registry."
            exit 1
          fi
          echo "✅ Registry restored: $SHARD_COUNT shards"
      - name: Disk usage after registry restore
        run: df -h .
      # Output dirs the Rust StatsTask + generators write into (no longer restored
      # via the full-core archive; create explicitly so writes don't fail).
      - name: Prepare Output Directories
        run: mkdir -p output/cache cache/deltas artifacts
      - name: Restore FNI History from Cache
        uses: actions/cache/restore@v5
        with:
          path: |
            cache/fni-history.json.zst
            cache/fni-history/
          key: fni-history-${{ github.run_id }}
      # V27.38: trends-summary task + GEMINI_API_KEY env removed (V27.36 paused
      # the Gemini call in aggregator-tasks.js; this was dead invocation).
      - name: Generate Trending & Trends
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ai-nexus-assets
          CACHE_DIR: ./cache
          ENABLE_R2_BACKUP: 'true'
          AES_CRYPTO_KEY: ${{ secrets.AES_CRYPTO_KEY }}
        run: |
          df -h .  # scalability watch: disk before Trending generation
          export NODE_OPTIONS="--max-old-space-size=6144"
          node scripts/factory/aggregator.js --task=trending
          node scripts/factory/aggregator.js --task=trend
      - name: Save Trending Results to Cache
        uses: actions/cache/save@v5
        with:
          path: |
            output/cache/trending.json.zst
            output/cache/trend-data.json.zst
          key: intra-cycle-${{ github.run_id }}-trending
      # R2 backup for trending satellite (P0-R2: R2-primary resilience)
      - name: Backup Trending Results to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          [ -f "output/cache/trending.json.zst" ] && node scripts/factory/r2-workflow-cli.js upload-buffer output/cache/trending.json.zst state/satellite-trending/trending.json.zst
          [ -f "output/cache/trend-data.json.zst" ] && node scripts/factory/r2-workflow-cli.js upload-buffer output/cache/trend-data.json.zst state/satellite-trending/trend-data.json.zst
          echo "✅ Trending results backed up to R2"

