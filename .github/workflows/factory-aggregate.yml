            const crates = ['shard-router','fni-calc','mesh-engine','content-extractor','stream-aggregator','satellite-tasks'];
            for (const c of crates) { await restoreFileFromR2('vault/rust-ffi/' + c + '-rust.node', 'rust/' + c + '/' + c + '-rust.node'); }
          " || true
      - name: Restore Core Registry from Cache
        uses: actions/cache/restore@v4
        with:
          path: |
            output/
            cache/
            artifacts/
          key: intra-cycle-${{ github.run_id }}-core
      - name: Restore FNI History from Cache
        uses: actions/cache/restore@v4
        with:
          path: |
            cache/fni-history.json.zst
            cache/fni-history/
          key: fni-history-${{ github.run_id }}
      - name: Generate Trending & Trends
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ai-nexus-assets
          CACHE_DIR: ./cache
          STRICT_R2_LOCKDOWN: 'true'
          AES_CRYPTO_KEY: ${{ secrets.AES_CRYPTO_KEY }}
        run: |
          export NODE_OPTIONS="--max-old-space-size=6144"
          node scripts/factory/aggregator.js --task=trending
          node scripts/factory/aggregator.js --task=trend
      - name: Save Trending Results to Cache
        uses: actions/cache/save@v4
        with:
          path: |
            output/cache/trending.json.zst
            output/cache/trend-data.json.zst
          key: intra-cycle-${{ github.run_id }}-trending

  aggregate-relations:
    name: "Agg: Knowledge Mesh"
    needs: merge-core
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - name: Restore Rust FFI Binaries
        uses: actions/cache/restore@v4
        with:
