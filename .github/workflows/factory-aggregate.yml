# Factory 3/4 - Aggregate
# V14.5 Phase 4: Modular Factory Architecture
# 
# Triggers: workflow_run from Process, or manual dispatch
# Inputs: shard-* artifacts from Process stage
# Outputs: trending.json, search-*.json, sitemaps, rankings
# 
# Constitution: Art 3.1 (Aggregator), Art 5 (Weekly), Art 6.3 (Search)

name: Factory 3/4 - Aggregate

permissions:
  actions: write
  contents: read

on:
  workflow_run:
    workflows: ["Factory 2/4 - Process"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Run ID of Process workflow to get shard artifacts from'
        required: false
        type: string

jobs:
  # V14.5.3: Identify upstream Harvest run for full data restoration
  check-upstream:
    name: Check Upstream Harvest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      harvest-id: ${{ steps.get-ids.outputs.harvest-id }}
      process-id: ${{ steps.get-ids.outputs.process-id }}
    steps:
      - name: Verify Upstream Conclusion
        if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion != 'success' }}
        run: |
          echo "❌ ERROR: Upstream workflow '${{ github.event.workflow_run.name }}' failed with conclusion '${{ github.event.workflow_run.conclusion }}'."
          echo "Aborting Factory 3/4 to prevent data corruption."
          exit 1
      - name: Checkout Repository
        uses: actions/checkout@v5
      - name: Get Run IDs (Harvest & Process)
        id: get-ids
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Start with the Process Run ID (Triggering event or manual input)
          PROCESS_RUN_ID=${{ inputs.run_id || github.event.workflow_run.id }}
          
          # 2. If PROCESS_RUN_ID is missing, find the latest successful Process run on MAIN
          if [ -z "$PROCESS_RUN_ID" ] || [ "$PROCESS_RUN_ID" == "null" ]; then
            echo "🔍 Manual dispatch: Finding latest successful Process run on main branch..."
            PROCESS_RUN_ID=$(gh run list --workflow factory-process.yml --branch main --status success --limit 1 --json databaseId --jq '.[0].databaseId' | tr -d '[:space:]')
          fi
          
          # 3. Find the latest successful Harvest run on MAIN (The Production Source of Truth)
          HARVEST_RUN_ID=$(gh run list --workflow factory-harvest.yml --branch main --status success --limit 1 --json databaseId --jq '.[0].databaseId' | tr -d '[:space:]')
          
          echo "harvest-id=$HARVEST_RUN_ID" >> $GITHUB_OUTPUT
          echo "process-id=$PROCESS_RUN_ID" >> $GITHUB_OUTPUT
          echo "✅ Resolved Harvest ID (Main): $HARVEST_RUN_ID"
          echo "✅ Resolved Process ID (Main): $PROCESS_RUN_ID"

  # Job 1: Core Merge (The Pivot - SPEC V2.0)
  # V27.40: merge-core was a 1h41m monolithic job — split into compute + persist.
  # Save-step failure no longer redoes 1h merge.
  # See plan: brain/3de56fa3.../V27.40-factory-optimization-review.md
  merge-core-compute:
    name: Merge Core Registry (Compute)
    needs: check-upstream
    runs-on: ubuntu-22.04
    timeout-minutes: 330
    env:
      NODE_OPTIONS: "--max-old-space-size=8192 --expose-gc"
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/factory-setup
        with:
          aggressive-disk-cleanup: 'true'
          with-rust-ffi: 'true'
      - name: R2 Fallback for Rust FFI
        continue-on-error: true
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          FOUND=$(find rust -name '*.node' 2>/dev/null | wc -l)
          if [ "$FOUND" -lt 9 ]; then
            echo "⚠️ Only $FOUND/9 Rust binaries. Restoring from R2 vault..."
            node scripts/factory/r2-workflow-cli.js restore-rust-ffi || echo '⚠️ R2 Rust FFI fallback unavailable'
          fi

      # V4.1 / FIX-3 (D-262): Restore Shards from GHA cache — OPTIONAL exact-key fast path.
      # The restore-keys PREFIX authority is REMOVED: a `cycle-<process-id>-` prefix hit is
      # identity-ambiguous (could pull a wrong-shape -harvest/-output entry) and was
      # consumed UNVERIFIED. The exact key survives as an acceleration carrier only; the
      # attempt-scoped R2 authority (verify-or-recover below) is the correctness truth.
      - name: Restore Shards from Cache
        id: cache-shards
        uses: actions/cache/restore@v5
        with:
          path: |
            output/shards
          key: cycle-${{ needs.check-upstream.outputs.process-id }}-shards

      - name: Clean Environment Residue
        run: |
          echo "🧹 Cleaning any residue from previous failed runs..."
          rm -rf cache/ data/ output/meta/backup/
          mkdir -p cache data output/meta/backup

      # FIX-3/C10 (D-262) CONSUMER: verify-or-recover the EXACT 20-shard set against the
      # current-cycle attempt-scoped R2 AUTHORITY established by Factory 2/4 save-shards-cache.
      # The cross-workflow cycle key is the Process (2/4) run id = process-id. The GHA cache
      # (restored above) is USED only if output/shards EXACTLY matches the producer manifest
      # (exact-20 + per-file sha + set_sha == descriptor set_sha); on GHA miss OR mismatch
      # wipe + recover the 20 shards from the EXACT staging + re-verify. A missing
      # current-cycle authority, an invalid descriptor, or a residual mismatch FAILS CLOSED
      # (exit 1, no aggregate). The fixed-prefix state/shards/ is NO LONGER a recovery input.
      - name: Organize Shards & Context
        env:
          HANDOFF_PROCESS_RUN_ID: ${{ needs.check-upstream.outputs.process-id }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          set -uo pipefail
          mkdir -p artifacts output/cache/shards
          PID="${HANDOFF_PROCESS_RUN_ID}"
          if [ -z "$PID" ]; then echo "::error::FIX-3: no process-id resolved — cannot consume shards safely."; exit 1; fi
          # (1) resolve the current-cycle attempt-scoped R2 authority descriptor (fail-closed).
          DESC="state/_handoff/shards/${PID}/handoff.json"
          node scripts/factory/r2-workflow-cli.js restore-file "$DESC" /tmp/shards-handoff-rb.json --strict || { echo "::error::FIX-3: no current-cycle shards authority descriptor ($DESC). No aggregate. Fail-closed."; exit 1; }
          OUT=$(node scripts/factory/shards-handoff-manifest.mjs verify-descriptor /tmp/shards-handoff-rb.json --carrier=shards-authority) || { echo "::error::FIX-3: shards descriptor provenance invalid. Fail-closed."; exit 1; }
          STAGING_PREFIX=$(printf '%s' "$OUT" | cut -f1); EXPECT_SET_SHA=$(printf '%s' "$OUT" | cut -f2)
          node scripts/factory/r2-workflow-cli.js restore-file "${STAGING_PREFIX}manifest.json" /tmp/shards-manifest.json --strict || { echo "::error::FIX-3: shards manifest missing at ${STAGING_PREFIX}. Fail-closed."; exit 1; }
          verify_shards() { node scripts/factory/shards-handoff-manifest.mjs verify artifacts /tmp/shards-manifest.json --carrier=shards-authority; }
          # (2) GHA fast path: stage the GHA-restored shards into artifacts/ and verify them
          # against the R2 manifest (exact-20 + per-file sha + set_sha). USE only on exact match.
          if [ -d output/shards ]; then cp output/shards/shard-*.json.zst artifacts/ 2>/dev/null || true; fi
          rm -f artifacts/manifest.json artifacts/handoff.json artifacts/_manifest.json 2>/dev/null || true
          NEED_RECOVER=0
          if OUT2=$(verify_shards) && [ "$(printf '%s' "$OUT2" | tail -n1)" = "$EXPECT_SET_SHA" ]; then
            echo "[SHARDS-HANDOFF] GHA fast-path shards match producer set_sha=$EXPECT_SET_SHA"
          else
            echo "[SHARDS-HANDOFF] GHA miss/mismatch — recover from exact staging"; NEED_RECOVER=1
          fi
          # (3) GHA miss/mismatch => wipe + recover the EXACT 20-shard set from staging + re-verify.
          if [ "$NEED_RECOVER" = "1" ]; then
            rm -rf artifacts; mkdir -p artifacts
            node scripts/factory/r2-workflow-cli.js restore-dir "$STAGING_PREFIX" artifacts/ --strict || { echo "::error::FIX-3: recover restore failed (${STAGING_PREFIX}). Fail-closed."; exit 1; }
            rm -f artifacts/manifest.json artifacts/handoff.json artifacts/_manifest.json 2>/dev/null || true
            OUT2=$(verify_shards) || { echo "::error::FIX-3: exact-staging shard recovery failed verification (${STAGING_PREFIX}). Fail-closed."; exit 1; }
            [ "$(printf '%s' "$OUT2" | tail -n1)" = "$EXPECT_SET_SHA" ] || { echo "::error::FIX-3: recovered shard set hash != producer $EXPECT_SET_SHA. Fail-closed."; exit 1; }
            echo "[SHARDS-HANDOFF] recovered + verified 20 shards from exact staging"
          fi

          # Final validation: EXACTLY 20 verified shards (never count-lenient / never 0).
          FINAL_COUNT=$(ls artifacts/shard-*.json.zst 2>/dev/null | wc -l)
          echo "✅ Final verified shards for aggregator: $FINAL_COUNT"
          if [ "$FINAL_COUNT" -ne 20 ]; then
            echo "::error::FIX-3: expected exactly 20 verified shards, found $FINAL_COUNT. Fail-closed."
            exit 1
          fi

      # V4.1: Restore Harvest Context from Cache
      - name: Restore Harvest Context from Cache
        uses: actions/cache/restore@v5
        with:
          path: |
            data/merged_shard_*.json.zst
            data/manifest.json
            cache/
          key: cycle-${{ needs.check-upstream.outputs.harvest-id }}-harvest
          # Cycle-SCOPED restore-key: bare `cycle-${ref_name}-` could restore a
          # foreign cycle's cache (or a wrong-shape -shards/-output entry) on an
          # exact-key miss. Scope to this Harvest run-id so only same-cycle -harvest
          # variants match. Validate Context below soft-warns on a true miss, and the
          # R2 Registry Fallback step restores cache/registry/ independently.
          restore-keys: |
            cycle-${{ needs.check-upstream.outputs.harvest-id }}-

      - name: Validate Context
        run: |
          SHARD_COUNT=$(ls data/merged_shard_*.json.zst 2>/dev/null | wc -l)
          if [ "$SHARD_COUNT" -gt 0 ]; then
            echo "✅ Harvest context restored: $SHARD_COUNT shards"
          else
            echo "⚠️ No harvest shards in cache."
          fi

      # V26.9: R2 fallback for registry when harvest cache misses (e.g. re-run 3/4 only)
      - name: R2 Registry Fallback
        if: ${{ !cancelled() }}
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ai-nexus-assets
        run: |
          BIN_COUNT=$(find cache/registry -name 'part-*.bin' 2>/dev/null | wc -l)
          if [ "$BIN_COUNT" -gt 0 ]; then
            echo "✅ Registry already present: $BIN_COUNT binary shards"
          else
            echo "⚠️ No registry in cache. Restoring from R2..."
            mkdir -p cache/registry
            node scripts/factory/lib/r2-registry-restore.js
          fi

      # V25.8.3: Purge legacy .json.gz ghost files from registry directory.
      # These are stale files from pre-V25.8 pipeline runs, persisted through GHA cache.
      # Current pipeline writes binary .bin (NXVF). Ghost .json.gz files cause Rust
      # stream-aggregator to read corrupted/truncated data instead of current .bin shards.
      - name: Purge Legacy Registry Ghosts
        run: |
          if [ -d "cache/registry" ]; then
            GHOST_COUNT=$(find cache/registry -name 'part-*.json.gz' -o -name 'part-*.json' 2>/dev/null | wc -l)
            if [ "$GHOST_COUNT" -gt 0 ]; then
              echo "🧹 Purging $GHOST_COUNT legacy .json.gz ghost files from cache/registry/"
              find cache/registry -name 'part-*.json.gz' -delete 2>/dev/null || true
              find cache/registry -name 'part-*.json' -delete 2>/dev/null || true
            fi
            BIN_COUNT=$(find cache/registry -name 'part-*.bin' 2>/dev/null | wc -l)
            echo "✅ Registry: $BIN_COUNT binary shards, 0 legacy ghosts"
          fi

      # V55.9: Restore FNI history from GHA cache (cross-run continuity)
      - name: Restore FNI History from Cache
        uses: actions/cache/restore@v5
        with:
          path: |
            cache/fni-history.json.zst
            cache/fni-history/
          key: fni-history-${{ github.run_id }}
          restore-keys: |
            fni-history-

      # V55.9: If GHA cache expired, restore FNI history from R2 (read-only state)
      - name: R2 Fallback for FNI History
        continue-on-error: true
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          FNI_COUNT=$(find cache/fni-history -name 'part-*.json.zst' -o -name 'part-*.json.gz' 2>/dev/null | wc -l)
          if [ "$FNI_COUNT" -gt 0 ]; then
            echo "✅ FNI history already restored from GHA cache ($FNI_COUNT parts)"
            exit 0
          fi
          echo "⚠️ No FNI history in GHA cache. Restoring from R2..."
          mkdir -p cache/fni-history
          node scripts/factory/r2-workflow-cli.js restore-dir meta/backup/fni-history/ cache/fni-history/ || echo '⚠️ R2 FNI history fallback unavailable'

      # D-295 Component 1: HARD pre-finalization disk gate — FAIL CLOSED (exit 1).
      # The Merge Core Registry (Compute) finalization (merge shard re-write +
      # persist + streamed trend) transiently duplicates the working set. Measure
      # real free bytes on the workspace fs (df) and the real on-disk size (du -sb)
      # of cache/fni-history/ + cache/registry/ + the output/cache trend working
      # set, then require measured_free >= estimated_peak + margin. Estimator +
      # comparator live in aggregator-maintenance.js (unit-tested); this step only
      # measures + reports. WARNING-ONLY IS FORBIDDEN — an insufficient runner disk
      # aborts BEFORE the merge with terminal code INSUFFICIENT_RUNNER_DISK_FINALIZATION.
      - name: Pre-Finalization Disk Gate (fail-closed)
        run: |
          set -euo pipefail
          # Free bytes on the workspace filesystem (POSIX 1-byte blocks -> col 4 = avail).
          FREE_BYTES=$(df -PB1 . | awk 'NR==2{print $4}')
          # Measured on-disk sizes of the finalization working set (bytes; 0 if absent).
          FNI_BYTES=$(du -sb cache/fni-history 2>/dev/null | cut -f1 || echo 0); FNI_BYTES=${FNI_BYTES:-0}
          REG_BYTES=$(du -sb cache/registry 2>/dev/null | cut -f1 || echo 0); REG_BYTES=${REG_BYTES:-0}
          TREND_BYTES=$(du -sb output/cache 2>/dev/null | cut -f1 || echo 0); TREND_BYTES=${TREND_BYTES:-0}
          FREE_BYTES="$FREE_BYTES" FNI_BYTES="$FNI_BYTES" REG_BYTES="$REG_BYTES" TREND_BYTES="$TREND_BYTES" \
          node --input-type=module -e '
            import { evaluateDiskGate } from "./scripts/factory/lib/aggregator-maintenance.js";
            const r = evaluateDiskGate({
              freeBytes: Number(process.env.FREE_BYTES),
              sizes: { fniBytes: Number(process.env.FNI_BYTES), regBytes: Number(process.env.REG_BYTES), trendBytes: Number(process.env.TREND_BYTES) },
            });
            const gb = (n) => (Number(n) / (1024 ** 3)).toFixed(2) + " GiB";
            console.log("[DISK-GATE] terminal-code   :", r.terminalCode);
            console.log("[DISK-GATE] measured-free    :", gb(r.measuredFreeBytes), "(" + r.measuredFreeBytes + " B)");
            console.log("[DISK-GATE] estimated-peak   :", gb(r.estimatedPeakBytes), "(factor " + r.safetyFactor + " x measured base)");
            console.log("[DISK-GATE] required-margin  :", gb(r.requiredMarginBytes));
            console.log("[DISK-GATE] required-total    :", gb(r.requiredTotalBytes));
            if (!r.ok) {
              console.error("::error::" + r.terminalCode + " — measured free " + gb(r.measuredFreeBytes) + " < required " + gb(r.requiredTotalBytes) + " (peak+margin). Aborting before finalization.");
              process.exit(1);
            }
            console.log("[DISK-GATE] PASS — free space covers estimated finalization peak + margin.");
          '

      - name: Run Core Merge & Health
        env:
          GEMINI_MODEL: gemini-3.1-pro-preview
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ai-nexus-assets
          AES_CRYPTO_KEY: ${{ secrets.AES_CRYPTO_KEY }}
          ENABLE_R2_BACKUP: 'true'
        run: |
            echo "🔄 Running Merge-Core (V2.0 Sharding)..."
            node scripts/factory/aggregator.js --task=health
            node scripts/factory/aggregator.js --task=core

      - name: Consolidate Final Artifacts & Context
        if: success()
        run: |
          mkdir -p output/cache output/meta/backup cache
          
          # 1. Mirror production artifacts for R2 distribution (Stage 4/4)
          # V22.8: Aggregator persistence handled meta/backup/ mirrors.
          # We just need to ensure directory structure is consistent.
          [ -d "meta" ] && cp -r meta/* output/meta/ 2>/dev/null || true
          
          # 2. Mirror BACK to root cache/ for persistent memory (Stage 1/4)
          # Ensure local flow has the latest state for GHA cache save
          if [ -d "output/meta/backup" ] && [ "$(ls -A output/meta/backup)" ]; then
            cp -r output/meta/backup/* cache/ 2>/dev/null || true
          fi
          
          echo "📦 Final output structure for R2 staging:"
          ls -R output/ | head -20
          echo "📦 Final cache structure for GitHub flow:"
          ls -R cache/ | head -20

      # V17.0: Cleaning relocated to finalize step after cache save to prevent Fusion data loss
      - name: Registry Handoff
        run: |
          echo "✅ Core registry and fragments verified. Ready for handoff."

      # D-209/D-211: end of merge-core-compute. The best-effort GHA actions/cache
      # `intra-cycle-<run>-core` save is REMOVED from this seam (it failed closed
      # on a cache-service write-auth denial). Instead, ESTABLISH the authoritative
      # attempt-scoped R2 handoff (deterministic tar.zst OUTSIDE payload roots ->
      # multipart upload -> verify -> immutable manifest written LAST + re-verified).
      # Failure is FATAL: Compute goes RED and neither consumer becomes eligible
      # (no warning-only-green). Step-level R2 creds are mandatory — the composite
      # factory-setup action cannot inject secrets (D-211 §K).
      - name: Establish Authoritative R2 Handoff (Core)
        if: success()
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
          CYCLE_ID: ${{ needs.check-upstream.outputs.process-id }}
          PRODUCER_MAIN_SHA: ${{ github.sha }}
        run: |
          node scripts/factory/r2-workflow-cli.js handoff-establish

  # V27.40: merge-core-persist isolates Save / R2-backup from heavy compute.
  # Failure here costs ~10-15m rerun, not 1h merge. Restores unpruned -core cache,
  # prunes (artifacts/ + cache/deltas/ + cache/fni-history/ + output/meta/),
  # then writes -satellite (pruned) + 4 monolith caches + R2 FNI backup.
  merge-core-persist:
    name: Merge Core Registry (Persist)
    needs: [merge-core-compute, check-upstream]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/factory-setup
        with:
          aggressive-disk-cleanup: 'false'
          with-rust-ffi: 'false'

      # D-209/D-211: the GHA actions/cache `intra-cycle-<run>-core` restore + its
      # cache-hit "defensive" guard (with the misleading "Re-run failed jobs" text)
      # are REMOVED. Persist INDEPENDENTLY consumes the authoritative current-attempt
      # R2 handoff: load manifest -> validate exact allowed_consumers + own role +
      # cycle/run/attempt/producer-sha -> download archive -> recompute bytes+sha ->
      # reject absolute/traversal/symlink -> extract to role-specific staging ->
      # expose output/+cache/+artifacts/ at the workspace root. Any invalid state =
      # ZERO writes (non-zero exit aborts persist). No cache fallback for this seam.
      - name: Consume Authoritative R2 Handoff (Core)
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
          CYCLE_ID: ${{ needs.check-upstream.outputs.process-id }}
          PRODUCER_MAIN_SHA: ${{ github.sha }}
        run: |
          node scripts/factory/r2-workflow-cli.js handoff-consume --role=merge-core-persist

      # V27.43: Reordered — save monoliths/shards FIRST while disk state is intact,
      # THEN prune + save satellite cache. Pre-V27.43 order pruned cache/fni-history/
      # before Save FNI History → "Path Validation Error: ... do(es) not exist" warning
      # and silent shard backup loss (monolith .zst still saved OK).

      # V4.1: Save Global Registry for next cycle's 1/4 Harvest
      - name: Save Global Registry to Cache
        if: success()
        uses: actions/cache/save@v5
        with:
          path: |
            cache/global-registry.json.zst
            cache/registry/
          key: global-registry-${{ github.run_id }}

      # V27.53: backup registry shards to R2 — 4/4 master-fusion's R2 fallback
      # previously got STALE bootstrap-era data (meta/backup/registry/ only
      # populated by registry-bootstrap.js once, never refreshed). After eviction
      # of GHA cache `global-registry-${run_id}` (LRU 24h+), 4/4 fell back to
      # stale R2 → 0 entities → master-fusion produced 0 fused shards → cycle
      # broken (4h+ wasted on run 26376590873).
      - name: Backup Registry Shards to R2 (V27.53)
        if: success()
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          if [ -d "cache/registry" ]; then
            BIN_COUNT=$(find cache/registry -name 'part-*.bin' 2>/dev/null | wc -l)
            if [ "$BIN_COUNT" -gt 0 ]; then
              node scripts/factory/r2-workflow-cli.js backup-dir cache/registry/ state/registry/
              echo "[R2] Registry: ${BIN_COUNT} .bin shards backed up to state/registry/"
            else
              echo "::warning::No .bin shards in cache/registry — skipping R2 backup"
            fi
          fi
          if [ -f "cache/global-registry.json.zst" ]; then
            node scripts/factory/r2-workflow-cli.js upload-buffer cache/global-registry.json.zst state/global-registry.json.zst
            echo "[R2] global-registry.json.zst monolith backed up"
          fi

      - name: Save FNI History to Cache (Self-Healing)
        if: success()
        uses: actions/cache/save@v5
        with:
          path: |
            cache/fni-history.json.zst
            cache/fni-history/
          key: fni-history-${{ github.run_id }}

      # P1-R9: R2 backup for FNI history (was cache-only, no R2 copy for current cycle)
      - name: Backup FNI History to R2
        if: success()
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          [ -f "cache/fni-history.json.zst" ] && node scripts/factory/r2-workflow-cli.js upload-buffer cache/fni-history.json.zst meta/backup/fni-history.json.zst
          [ -d "cache/fni-history" ] && node scripts/factory/r2-workflow-cli.js backup-dir cache/fni-history/ meta/backup/fni-history/
          TODAY=$(date -u +%Y-%m-%d)
          [ -f "cache/fni-history.json.zst" ] && node scripts/factory/r2-workflow-cli.js upload-buffer cache/fni-history.json.zst "history/fni/${TODAY}.json.zst"
          echo "✅ FNI history backed up to R2 + daily snapshot archived"

      - name: Save Daily Accumulator to Cache (Self-Healing)
        if: success()
        uses: actions/cache/save@v5
        with:
          path: |
            cache/daily-accum.json.zst
            cache/daily-accum/
          key: daily-accum-${{ github.run_id }}

      - name: Save Checksums to Cache
        if: success()
        uses: actions/cache/save@v5
        with:
          path: |
            cache/entity-checksums.json.zst
            cache/task-checksums.json.zst
          key: checksums-${{ github.run_id }}

      # D-228/D-230 (Option 1): the warning-only GHA satellite-registry cache is
      # REMOVED from the correctness path (the removed satellite prune + satellite
      # cache save). The cache-service write-auth DENIAL of that save (left green,
      # warning-only) was the incident root cause and
      # the four satellites had no R2 fallback for the registry INPUT. Persist now
      # ESTABLISHES the authoritative attempt-scoped R2 SATELLITE-REGISTRY handoff over
      # cache/registry/: exact source snapshot -> deterministic registry.tar.zst OUTSIDE
      # the payload root -> multipart upload -> HeadObject byte verify -> immutable
      # manifest (LAST) -> GetObject re-verify. FATAL on any failure (Persist RED, no
      # preflight/satellite eligible; never warning-only-green). Step-level R2 creds are
      # mandatory (composite factory-setup cannot inject secrets). "Save Global Registry
      # to Cache" (above) is UNTOUCHED — it is the cross-cycle Harvest carrier, not a
      # satellite input.
      - name: Establish Authoritative R2 Satellite Registry Handoff
        if: success()
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
          CYCLE_ID: ${{ needs.check-upstream.outputs.process-id }}
          PRODUCER_MAIN_SHA: ${{ github.sha }}
        run: |
          node scripts/factory/r2-workflow-cli.js satellite-registry-establish

  # D-228/D-230: ONE verify-only gate between Persist and the four satellites.
  # Independent FULL remote verification (C5) in its OWN $RUNNER_TEMP: download the
  # complete registry.tar.zst, recompute bytes+sha256, validate members + inventory
  # hash + exact shard count/identities + allowed-consumer set + tuple, then delete
  # the temp copy (exposes NOTHING). RED here => no satellite starts (needs).
  satellite-authority-preflight:
    name: Satellite Authority Preflight
    needs: [merge-core-persist, check-upstream]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/factory-setup
        with:
          aggressive-disk-cleanup: 'true'
          with-rust-ffi: 'false'
      - name: Preflight Satellite Registry Authority (R2)
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
          CYCLE_ID: ${{ needs.check-upstream.outputs.process-id }}
          PRODUCER_MAIN_SHA: ${{ github.sha }}
        run: |
          node scripts/factory/r2-workflow-cli.js satellite-registry-preflight

  # Parallel Satellite Jobs (SPEC V2.0) — all `needs: satellite-authority-preflight`
  # (D-228/D-230); each independently consumes + verifies the R2 satellite handoff.
  aggregate-search:
    name: "Agg: Search Index"
    needs: [satellite-authority-preflight, check-upstream]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/factory-setup
        with:
          aggressive-disk-cleanup: 'true'
          with-rust-ffi: 'true'
      - name: R2 Fallback for Rust FFI
        continue-on-error: true
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          FOUND=$(find rust -name '*.node' 2>/dev/null | wc -l)
          [ "$FOUND" -lt 9 ] && node scripts/factory/r2-workflow-cli.js restore-rust-ffi || true
      - name: Consume Satellite Registry Handoff (R2)
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
          CYCLE_ID: ${{ needs.check-upstream.outputs.process-id }}
          PRODUCER_MAIN_SHA: ${{ github.sha }}
        run: |
          node scripts/factory/r2-workflow-cli.js satellite-registry-consume --role=search-index
      - name: Generate Search Indices
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ai-nexus-assets
          CACHE_DIR: ./cache
          ENABLE_R2_BACKUP: 'true'
          AES_CRYPTO_KEY: ${{ secrets.AES_CRYPTO_KEY }}
        run: |
          export NODE_OPTIONS="--max-old-space-size=6144"
          node scripts/factory/aggregator.js --task=search
      - name: Save Search Results to Cache
        uses: actions/cache/save@v5
        with:
          path: output/cache/search*
          key: intra-cycle-${{ github.run_id }}-search
      # R2 backup for search satellite (P0-R2: R2-primary resilience)
      - name: Backup Search Results to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          node scripts/factory/r2-workflow-cli.js backup-dir output/cache/ state/satellite-search/ --extensions=.json,.json.zst,.json.gz
          echo "✅ Search results backed up to R2"

  aggregate-rankings:
    name: "Agg: Rankings"
    needs: [satellite-authority-preflight, check-upstream]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/factory-setup
        with:
          aggressive-disk-cleanup: 'true'
          with-rust-ffi: 'true'
      - name: R2 Fallback for Rust FFI
        continue-on-error: true
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          FOUND=$(find rust -name '*.node' 2>/dev/null | wc -l)
          [ "$FOUND" -lt 9 ] && node scripts/factory/r2-workflow-cli.js restore-rust-ffi || true
      - name: Consume Satellite Registry Handoff (R2)
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
          CYCLE_ID: ${{ needs.check-upstream.outputs.process-id }}
          PRODUCER_MAIN_SHA: ${{ github.sha }}
        run: |
          node scripts/factory/r2-workflow-cli.js satellite-registry-consume --role=rankings
      - name: Download Hosted-On Data from R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          for p in replicate together hf-inference; do
            node scripts/factory/r2-workflow-cli.js restore-file "state/hosted-on/hosted-on-${p}.json" "output/cache/hosted-on-${p}.json" || echo "⚠️ hosted-on-${p}.json not in R2"
          done
      - name: Generate Rankings
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ai-nexus-assets
          CACHE_DIR: ./cache
          ENABLE_R2_BACKUP: 'true'
          AES_CRYPTO_KEY: ${{ secrets.AES_CRYPTO_KEY }}
        run: |
          export NODE_OPTIONS="--max-old-space-size=6144"
          node scripts/factory/aggregator.js --task=rankings
          node scripts/factory/aggregator.js --task=category
      - name: Save Rankings Results to Cache
        uses: actions/cache/save@v5
        with:
          path: |
            output/cache/rankings/
            output/cache/category_stats.json.zst
            output/data/
          key: intra-cycle-${{ github.run_id }}-rankings
      # R2 backup for rankings satellite (P0-R2: R2-primary resilience)
      - name: Backup Rankings Results to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          node scripts/factory/r2-workflow-cli.js backup-dir output/cache/rankings/ state/satellite-rankings/rankings/
          [ -f "output/cache/category_stats.json.zst" ] && node scripts/factory/r2-workflow-cli.js upload-buffer output/cache/category_stats.json.zst state/satellite-rankings/category_stats.json.zst
          # V27.40: 13 serial uploads -> 6-way parallel xargs (saves ~2-3m)
          ls output/data/rankings-*.db 2>/dev/null | xargs -I{} -P 6 -n 1 bash -c \
            'node scripts/factory/r2-workflow-cli.js upload-buffer "$1" "state/satellite-rankings/$(basename "$1")" || true' _ {}
          echo "✅ Rankings results + DBs backed up to R2 (parallel)"

  aggregate-trending:
    name: "Agg: Trending"
    needs: [satellite-authority-preflight, check-upstream]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/factory-setup
        with:
          aggressive-disk-cleanup: 'true'
          with-rust-ffi: 'true'
      - name: R2 Fallback for Rust FFI
        continue-on-error: true
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          FOUND=$(find rust -name '*.node' 2>/dev/null | wc -l)
          [ "$FOUND" -lt 9 ] && node scripts/factory/r2-workflow-cli.js restore-rust-ffi || true
      # D-228/D-230 (Option 1): the GHA "Restore Global Registry from Cache" step +
      # its two fail-closed guards are REMOVED from Trending. Trending now consumes the
      # authoritative R2 SATELLITE-REGISTRY handoff (full independent verify + extract
      # of cache/registry/), identical to the other three satellites. Registry
      # completeness/presence is enforced by the handoff inventory verification (exact
      # shard set + inventory_sha256), not a post-restore `find` count. Trending READS
      # cache/registry/ + cache/fni-history/; the FNI-history restore (below) is a
      # DIFFERENT carrier and is unchanged.
      - name: Consume Satellite Registry Handoff (R2)
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
          CYCLE_ID: ${{ needs.check-upstream.outputs.process-id }}
          PRODUCER_MAIN_SHA: ${{ github.sha }}
        run: |
          node scripts/factory/r2-workflow-cli.js satellite-registry-consume --role=trending
      # Output dirs the Rust StatsTask + generators write into (no longer restored
      # via the full-core archive; create explicitly so writes don't fail).
      - name: Prepare Output Directories
        run: mkdir -p output/cache cache/deltas artifacts
      - name: Restore FNI History from Cache
        uses: actions/cache/restore@v5
        with:
          path: |
            cache/fni-history.json.zst
            cache/fni-history/
          key: fni-history-${{ github.run_id }}
      # V27.38: trends-summary task + GEMINI_API_KEY env removed (V27.36 paused
      # the Gemini call in aggregator-tasks.js; this was dead invocation).
      - name: Generate Trending & Trends
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ai-nexus-assets
          CACHE_DIR: ./cache
          ENABLE_R2_BACKUP: 'true'
          AES_CRYPTO_KEY: ${{ secrets.AES_CRYPTO_KEY }}
        run: |
          df -h .  # scalability watch: disk before Trending generation
          export NODE_OPTIONS="--max-old-space-size=6144"
          node scripts/factory/aggregator.js --task=trending
          node scripts/factory/aggregator.js --task=trend
      - name: Save Trending Results to Cache
        uses: actions/cache/save@v5
        with:
          path: |
            output/cache/trending.json.zst
            output/cache/trend-data.json.zst
          key: intra-cycle-${{ github.run_id }}-trending
      # R2 backup for trending satellite (P0-R2: R2-primary resilience)
      - name: Backup Trending Results to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          [ -f "output/cache/trending.json.zst" ] && node scripts/factory/r2-workflow-cli.js upload-buffer output/cache/trending.json.zst state/satellite-trending/trending.json.zst
          [ -f "output/cache/trend-data.json.zst" ] && node scripts/factory/r2-workflow-cli.js upload-buffer output/cache/trend-data.json.zst state/satellite-trending/trend-data.json.zst
          echo "✅ Trending results backed up to R2"

  aggregate-relations:
    name: "Agg: Knowledge Mesh"
    needs: [satellite-authority-preflight, check-upstream]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/factory-setup
        with:
          aggressive-disk-cleanup: 'true'
          with-rust-ffi: 'true'
      - name: R2 Fallback for Rust FFI
        continue-on-error: true
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          FOUND=$(find rust -name '*.node' 2>/dev/null | wc -l)
          [ "$FOUND" -lt 9 ] && node scripts/factory/r2-workflow-cli.js restore-rust-ffi || true
      - name: Consume Satellite Registry Handoff (R2)
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
          CYCLE_ID: ${{ needs.check-upstream.outputs.process-id }}
          PRODUCER_MAIN_SHA: ${{ github.sha }}
        run: |
          node scripts/factory/r2-workflow-cli.js satellite-registry-consume --role=knowledge-mesh
      - name: Generate Relations & Knowledge Mesh
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ai-nexus-assets
          CACHE_DIR: ./cache
          ENABLE_R2_BACKUP: 'true'
          AES_CRYPTO_KEY: ${{ secrets.AES_CRYPTO_KEY }}
        run: |
          export NODE_OPTIONS="--max-old-space-size=6144"
          node scripts/factory/aggregator.js --task=relations
          node scripts/factory/aggregator.js --task=alt
          node scripts/factory/aggregator.js --task=knowledge-links
          node scripts/factory/aggregator.js --task=mesh
          # PR-C1 ACTIVATION: dispatch the assertion generator (registered in
          # aggregator-tasks.js but never invoked since #2156). Same job + same
          # shardReader as relations/mesh; writes output/cache/assertions/.
          node scripts/factory/aggregator.js --task=assertions
      # V27.38: knowledge-ai task + Gemini env removed (V27.36 removed the task
      # in aggregator-tasks.js; this was dead invocation).
      - name: Save Relations Results to Cache
        uses: actions/cache/save@v5
        with:
          path: |
            output/cache/relations.json.zst
            output/cache/relations/
            output/cache/mesh/
            output/cache/knowledge/
            output/cache/assertions/
          key: intra-cycle-${{ github.run_id }}-relations
      # R2 backup for relations satellite (P0-R2: R2-primary resilience)
      - name: Backup Relations Results to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          node scripts/factory/r2-workflow-cli.js backup-dir output/cache/relations/ state/satellite-relations/relations/
          node scripts/factory/r2-workflow-cli.js backup-dir output/cache/mesh/ state/satellite-relations/mesh/
          node scripts/factory/r2-workflow-cli.js backup-dir output/cache/knowledge/ state/satellite-relations/knowledge/
          [ -d "output/cache/assertions" ] && node scripts/factory/r2-workflow-cli.js backup-dir output/cache/assertions/ state/satellite-relations/assertions/ || true
          [ -f "output/cache/relations.json.zst" ] && node scripts/factory/r2-workflow-cli.js upload-buffer output/cache/relations.json.zst state/satellite-relations/relations.json.zst
          echo "✅ Relations results backed up to R2"

  finalize:
    name: Finalize Aggregation
    needs: [aggregate-search, aggregate-rankings, aggregate-trending, aggregate-relations, check-upstream]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    # FIX-2 / C12 (D-264): expose the read-back-VERIFIED cycle-output authority identity
    # (attempt-scoped staging prefix + set_sha) as provenance. The 4/4 consumers derive the
    # SAME prefix from the R2 descriptor (cross-workflow), so these outputs are telemetry.
    outputs:
      cycle_output_staging_prefix: ${{ steps.establish-cycle-output.outputs.staging_prefix }}
      cycle_output_set_sha: ${{ steps.establish-cycle-output.outputs.set_sha }}
    steps:
      # V27.40: composite setup replaces V27.37 inline free-disk + V25 setup blocks
      - uses: actions/checkout@v5
      - uses: ./.github/actions/factory-setup
        with:
          aggressive-disk-cleanup: 'true'
          with-rust-ffi: 'false'
      - name: Disk usage after composite setup
        run: df -h /
      # V22.8: Restore satellite results from cache
      - name: Restore Search Results
        id: cache-search-finalize
        uses: actions/cache/restore@v5
        with:
          path: output/cache/search*
          key: intra-cycle-${{ github.run_id }}-search
      # V25.13: P3 R2 fallback (per "R2 是主数据，GHA cache 仅加速")
      - name: R2 Fallback for Search Results
        if: steps.cache-search-finalize.outputs.cache-hit != 'true'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          mkdir -p output/cache
          node scripts/factory/r2-workflow-cli.js restore-dir state/satellite-search/ output/cache/ || echo "⚠️ R2 search fallback unavailable"
      # Rankings restore moved to post-core (cache path must match save exactly)
      - name: Restore Trending Results
        id: cache-trending-finalize
        uses: actions/cache/restore@v5
        with:
          path: |
            output/cache/trending.json.zst
            output/cache/trend-data.json.zst
          key: intra-cycle-${{ github.run_id }}-trending
      # V25.13: P3 R2 fallback — was missing, caused 25301418029 failure
      - name: R2 Fallback for Trending Results
        if: steps.cache-trending-finalize.outputs.cache-hit != 'true'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          mkdir -p output/cache
          node scripts/factory/r2-workflow-cli.js restore-file state/satellite-trending/trending.json.zst output/cache/trending.json.zst || echo "⚠️ R2 trending.json.zst missing"
          node scripts/factory/r2-workflow-cli.js restore-file state/satellite-trending/trend-data.json.zst output/cache/trend-data.json.zst || echo "⚠️ R2 trend-data.json.zst missing"
          # V27.38: trends-summary.json.zst fallback removed (V27.36 paused generation)
      - name: Restore Relations Results
        id: cache-relations-finalize
        uses: actions/cache/restore@v5
        with:
          path: |
            output/cache/relations.json.zst
            output/cache/relations/
            output/cache/mesh/
            output/cache/knowledge/
            output/cache/assertions/
          key: intra-cycle-${{ github.run_id }}-relations
      # V25.13: P3 R2 fallback for relations/knowledge/mesh
      - name: R2 Fallback for Relations Results
        if: steps.cache-relations-finalize.outputs.cache-hit != 'true'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          mkdir -p output/cache/relations output/cache/mesh output/cache/knowledge output/cache/assertions
          node scripts/factory/r2-workflow-cli.js restore-file state/satellite-relations/relations.json.zst output/cache/relations.json.zst 2>/dev/null || true
          node scripts/factory/r2-workflow-cli.js restore-dir state/satellite-relations/relations/ output/cache/relations/ || echo "⚠️ R2 relations/ fallback unavailable"
          node scripts/factory/r2-workflow-cli.js restore-dir state/satellite-relations/mesh/ output/cache/mesh/ || echo "⚠️ R2 mesh/ fallback unavailable"
          node scripts/factory/r2-workflow-cli.js restore-dir state/satellite-relations/knowledge/ output/cache/knowledge/ || echo "⚠️ R2 knowledge/ fallback unavailable"
          node scripts/factory/r2-workflow-cli.js restore-dir state/satellite-relations/assertions/ output/cache/assertions/ || echo "⚠️ R2 assertions/ fallback unavailable"
      - name: Run Health Consolidation
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ai-nexus-assets
        run: node scripts/factory/consolidate-health.js

      - name: Disk usage before Core Registry restore
        run: df -h /
      # D-209/D-211: the GHA actions/cache `intra-cycle-<run>-core` restore is
      # REMOVED. Finalize INDEPENDENTLY consumes the authoritative current-attempt
      # R2 handoff (full §J verify + extract) — it does NOT trust Persist's job
      # conclusion / workspace / extracted files / output flag / any inherited
      # boolean, and has no cache fallback for this seam. Exposes output/+cache/+
      # artifacts/ at the workspace root only after full verification.
      - name: Consume Authoritative R2 Handoff (Core)
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
          CYCLE_ID: ${{ needs.check-upstream.outputs.process-id }}
          PRODUCER_MAIN_SHA: ${{ github.sha }}
        run: |
          node scripts/factory/r2-workflow-cli.js handoff-consume --role=finalize
      - name: Disk usage after Core Registry restore
        run: df -h /

      - name: Restore Rankings (post-core, path must match save exactly)
        id: cache-rankings
        uses: actions/cache/restore@v5
        with:
          path: |
            output/cache/rankings/
            output/cache/category_stats.json.zst
            output/data/
          key: intra-cycle-${{ github.run_id }}-rankings
      - name: R2 Fallback for Rankings DBs
        if: steps.cache-rankings.outputs.cache-hit != 'true'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          mkdir -p output/data output/cache/rankings
          node scripts/factory/r2-workflow-cli.js restore-dir state/satellite-rankings/rankings/ output/cache/rankings/ || true
          node scripts/factory/r2-workflow-cli.js restore-file state/satellite-rankings/category_stats.json.zst output/cache/category_stats.json.zst || true
          for t in all model paper dataset tool text-generation knowledge-retrieval vision-multimedia automation-workflow infrastructure-ops; do
            node scripts/factory/r2-workflow-cli.js restore-file "state/satellite-rankings/rankings-${t}.db" "output/data/rankings-${t}.db" 2>/dev/null || true
          done
          echo "✅ Rankings restored from R2: $(ls output/data/rankings-*.db 2>/dev/null | wc -l) DBs"
      - name: Disk usage after Rankings restore (peak)
        run: df -h /
      - name: Merge Core with Satellite Outputs
        run: |
          # V17.5: Entities.json and meta are already restored to output/ by the previous step
          # We just need to ensure directory structure for non-standard satellite outputs
          mkdir -p output/cache
          # Move satellite outputs into cache if needed
          [ -f "output/trending.json.zst" ] && mv output/trending.json.zst output/cache/ || true
          [ -f "output/trending.json" ] && mv output/trending.json output/cache/ || true
          [ -f "output/trend-data.json.zst" ] && mv output/trend-data.json.zst output/cache/ || true
          [ -f "output/trend-data.json" ] && mv output/trend-data.json output/cache/ || true
          [ -f "output/category_stats.json.zst" ] && mv output/category_stats.json.zst output/cache/ || true
          [ -f "output/category_stats.json" ] && mv output/category_stats.json output/cache/ || true
          [ -f "output/relations.json.zst" ] && mv output/relations.json.zst output/cache/ || true
          [ -f "output/relations.json" ] && mv output/relations.json output/cache/ || true
          # V17.4: Ensure rankings and search indices are nested in cache/
          [ -d "output/rankings" ] && mv output/rankings output/cache/ || true
          [ -d "output/relations" ] && mv output/relations output/cache/ || true
          [ -d "output/mesh" ] && mv output/mesh output/cache/ || true
          [ -d "output/knowledge" ] && mv output/knowledge output/cache/ || true
          [ -f "output/search-core.json.zst" ] && mv output/search-core.json.zst output/cache/ || true
          [ -f "output/search-core.json" ] && mv output/search-core.json output/cache/ || true
          [ -f "output/search-full.json.zst" ] && mv output/search-full.json.zst output/cache/ || true
          [ -f "output/search-full.json" ] && mv output/search-full.json output/cache/ || true
          [ -f "output/search-manifest.json" ] && mv output/search-manifest.json output/cache/ || true
          
          # V19.2: content.db and bundles preservation
          [ -d "output/data" ] && echo "✅ data/ directory found" || mkdir -p output/data
          [ -f "output/meta.db" ] && mv output/meta.db output/data/ || true
          [ -f "output/search.db" ] && mv output/search.db output/data/ || true
          [ -d "output/bundles" ] && mv output/bundles output/data/ || true
          
          # V17.8: Shard Bridge - Shards from agg-shards download will be in output/*.json.zst
          mkdir -p output/cache/shards
          find output -maxdepth 1 -name "shard-*.json.zst" -exec mv {} output/cache/shards/ \; || true
          
          # Check legacy and intra-cycle locations
          [ -d "output/shards" ] && mv output/shards/* output/cache/shards/ 2>/dev/null || true
          
          # List final structure
          echo "📦 Final output structure:"
          find output -type f | head -50

      # V25.13: Cycle output completeness gate (P3 + P6).
      # Refuse to write a partial cycle-output to GHA cache or R2. R2 must NEVER
      # hold incomplete state. Validates 3/4-actual outputs only — reports/index
      # is 4/4 vfs-packing's job, registry shards live in cache/ (not output/).
      #
      # 2026-05-16 extension: also validate the 3 files 4/4 pack-db.js depends on
      # via its V27.2 pre-flight (vfs-packing's `Verify Essential Metadata Cache`).
      # Without this gate, 3/4 could silently produce cycle-output missing any of
      # cache/mesh/graph.json | cache/search-core.json | cache/category_stats.json
      # and still save it to GHA cache + R2 — fine until cache evicts, then 4/4's
      # R2 fallback restore comes back missing the file and pack-db halts. Fail
      # here instead so the gap surfaces at the producer, not at the consumer.
      # Accept any of .json | .json.zst | .json.gz (same logic as 4/4 pre-flight).
      - name: Verify Cycle Output Completeness (Pre-Save)
        run: |
          set -e
          MISSING=()
          [ ! -f "output/cache/knowledge/index.json.zst" ] && MISSING+=("knowledge/index.json.zst")
          [ ! -f "output/cache/trending.json.zst" ] && MISSING+=("trending.json.zst")
          RANKINGS_COUNT=$(ls output/cache/rankings 2>/dev/null | wc -l)
          ARTICLES_COUNT=$(ls output/cache/knowledge/articles 2>/dev/null | wc -l)
          DAILY_COUNT=$(ls output/daily 2>/dev/null | wc -l)
          [ "$RANKINGS_COUNT" -lt 5 ] && MISSING+=("rankings (got $RANKINGS_COUNT, need ≥5)")
          [ "$ARTICLES_COUNT" -lt 10 ] && MISSING+=("knowledge articles (got $ARTICLES_COUNT, need ≥10)")
          # V27.38: daily reports gate removed — V27.36 disabled shouldGenerateReport() (Gemini budget pause).
          # Reports are off Agent contract; re-enable in lockstep with scripts/factory/lib/daily-report.js.
          # 4/4-required metadata files (must be present in any of .json / .json.zst / .json.gz form)
          for f in "output/cache/mesh/graph.json" "output/cache/search-core.json" "output/cache/category_stats.json"; do
            if [ ! -f "$f" ] && [ ! -f "${f}.zst" ] && [ ! -f "${f}.gz" ]; then
              MISSING+=("$(basename "$f") (required by 4/4 pack-db.js)")
            fi
          done
          if [ "${#MISSING[@]}" -gt 0 ]; then
            echo "::error::Cycle output incomplete — refusing to save bad state to GHA cache or R2."
            for m in "${MISSING[@]}"; do echo "  - $m"; done
            exit 1
          fi
          echo "✅ Cycle output complete: $ARTICLES_COUNT articles, $RANKINGS_COUNT rankings, $DAILY_COUNT daily reports (gate disabled V27.38) + 3/3 4/4-required metadata files"

      # V17.1: Save COMPLETE output (with all satellite results) to Cache for Factory 4/4
      - name: Save Complete Cycle Output to Cache
        uses: actions/cache/save@v5
        with:
          path: output/
          key: cycle-${{ github.run_id }}-output

      # FIX-2 / C12 (D-264): establish the attempt-scoped, content-verified R2 AUTHORITY
      # over the EXACT cycle-output member set (output/cache/**) consumed by the four 4/4
      # Finalize jobs. Bound to the producing 3/4 run id (github.run_id) + producer attempt
      # + head_sha; set_sha256 over cache/** (output/data/ is 4/4-owned and NOT a member).
      # This REPLACES the mutable fixed-prefix state/cycle-output/ backup: the data upload is
      # RELOCATED (net-zero PUT delta -- fewer files, no output/data/) to the attempt-scoped
      # staging, and manifest+descriptor are the only +2 NET-NEW PUTs. No compat state/cycle-
      # output/ write (Class-A: do not add PUT beyond manifest+descriptor).
      # Order: data FIRST -> manifest LAST -> descriptor LAST-of-all -> read-back verify.
      - name: Establish Cycle-Output Authority (FIX-2/C12, D-264)
        id: establish-cycle-output
        env:
          HANDOFF_FINALIZE_RUN_ID: ${{ github.run_id }}
          # provenance only (recorded in the descriptor, NEVER in the staging path): the
          # 2/4 process run id = the cycle's upstream identity at 3/4.
          HANDOFF_UPSTREAM_RUN_ID: ${{ needs.check-upstream.outputs.process-id }}
          HANDOFF_PRODUCER_ATTEMPT: ${{ github.run_attempt }}
          HANDOFF_HEAD_SHA: ${{ github.sha }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          set -euo pipefail
          PID="${HANDOFF_FINALIZE_RUN_ID}"; ATT="${HANDOFF_PRODUCER_ATTEMPT}"
          RUN_PREFIX="state/_handoff/cycle-output/${PID}"
          export STAGING="${RUN_PREFIX}/attempt-${ATT}/"
          # (1) manifest over the EXACT cycle-output set in output/cache/** -> /tmp only.
          node scripts/factory/cycle-output-handoff-manifest.mjs generate output /tmp/cycle-output-manifest.json --carrier=cycle-output-authority
          export SET_SHA=$(node -e "process.stdout.write(require('/tmp/cycle-output-manifest.json').set_sha256)")
          export MANIFEST_SHA=$(node -e "const c=require('crypto'),f=require('fs');process.stdout.write(c.createHash('sha256').update(f.readFileSync('/tmp/cycle-output-manifest.json')).digest('hex'))")
          # (2) cache data FIRST to the attempt-scoped staging (RELOCATED from state/cycle-output/).
          # --required-json: A5 class-scoped eligibility so the consumer-required small JSONs
          # (search-manifest / fni-thresholds / assertions/_summary, < the 256B floor) transport
          # (else the manifest enumerates a member the guard refuses -> read-back FILE_MISSING).
          node scripts/factory/r2-workflow-cli.js backup-dir output/cache/ "${STAGING}cache/" --required-json
          # (3) manifest.json LAST (after every cache object is durable).
          node scripts/factory/r2-workflow-cli.js upload-file /tmp/cycle-output-manifest.json "${STAGING}manifest.json"
          # (4) run-scoped descriptor handoff.json LAST OF ALL.
          node -e "const f=require('fs');f.writeFileSync('/tmp/cycle-output-handoff.json',JSON.stringify({schema_version:1,carrier_type:'cycle-output-authority',finalize_run_id:String(process.env.HANDOFF_FINALIZE_RUN_ID),producer_attempt:Number(process.env.HANDOFF_PRODUCER_ATTEMPT),exact_staging_prefix:process.env.STAGING,manifest_sha256:process.env.MANIFEST_SHA,set_sha256:process.env.SET_SHA,head_sha:String(process.env.HANDOFF_HEAD_SHA),created_at:new Date().toISOString()}))"
          node scripts/factory/r2-workflow-cli.js upload-file /tmp/cycle-output-handoff.json "${RUN_PREFIX}/handoff.json"
          # (5) read-back verify the descriptor provenance before the cross-workflow handoff.
          node scripts/factory/r2-workflow-cli.js restore-file "${RUN_PREFIX}/handoff.json" /tmp/cycle-output-handoff-rb.json --strict
          HANDOFF_RUN_ATTEMPT="${ATT}" node scripts/factory/cycle-output-handoff-manifest.mjs verify-descriptor /tmp/cycle-output-handoff-rb.json --carrier=cycle-output-authority
          # (6) F2: producer FULL-SET read-back (READ-ONLY; Class-A +1 LIST-like op, ZERO new
          # PUT/COPY/DELETE): restore the just-written attempt-scoped staging to a temp dir +
          # verify set_sha256 + EXACT-set membership over the read-back. backup-dir returns
          # success on uploaded>0, so a PARTIAL upload would otherwise establish a FALSE authority.
          # Fail-closed BEFORE emitting "authority established".
          RB_DIR="$(mktemp -d)"
          node scripts/factory/r2-workflow-cli.js restore-dir "${STAGING}" "${RB_DIR}" --strict || { echo "::error::FIX-2: producer read-back restore failed (${STAGING}). Fail-closed."; exit 1; }
          rm -f "${RB_DIR}/manifest.json" "${RB_DIR}/handoff.json" "${RB_DIR}/_manifest.json" 2>/dev/null || true
          RB_SET=$(node scripts/factory/cycle-output-handoff-manifest.mjs verify "${RB_DIR}" /tmp/cycle-output-manifest.json --carrier=cycle-output-authority) || { echo "::error::FIX-2: producer read-back verify failed (partial/corrupt upload). Fail-closed."; exit 1; }
          [ "$(printf '%s' "$RB_SET" | tail -n1)" = "${SET_SHA}" ] || { echo "::error::FIX-2: producer read-back set hash != ${SET_SHA} (partial upload). Fail-closed."; exit 1; }
          echo "staging_prefix=${STAGING}" >> "$GITHUB_OUTPUT"
          echo "set_sha=${SET_SHA}" >> "$GITHUB_OUTPUT"
          echo "[CYCLE-OUTPUT-HANDOFF] authority established (read-back verified): ${STAGING} set_sha256=${SET_SHA}"

      - name: Summary
        run: |
          echo "## Factory 3/4 - Aggregator V2.0 Complete 🚀" >> $GITHUB_STEP_SUMMARY
          echo "Scale: 1M+ Readiness Verified" >> $GITHUB_STEP_SUMMARY
          echo "Jobs: Parallel (Search, Rankings, Trending, Relations)" >> $GITHUB_STEP_SUMMARY
          echo "Cache: Complete output saved for Factory 4/4" >> $GITHUB_STEP_SUMMARY
