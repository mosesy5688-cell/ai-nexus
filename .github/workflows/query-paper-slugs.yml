# V27.92 STEP-0 GATE — Paper round-trip diagnostic (READ-ONLY).
# workflow_dispatch only, never auto-triggered. Pairs with
# scripts/factory/probe-paper-slugs.js. Restores prod meta-NN.db from R2
# (state/vfs-data/, written by factory-upload.yml's V27.51 backup step),
# scans all shards, and reports the paper round-trip breakage rate + stored
# slug/id forms — the falsifiable gate for the round-trip-broken hypothesis.
# No R2 mutation. Delete this workflow + script once T3 is shipped + verified.
name: V27.92 - Query Paper Slugs (Step-0 Gate)

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  probe:
    name: Probe paper round-trip from prod meta-NN.db
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/factory-setup
        with:
          aggressive-disk-cleanup: 'false'
          with-rust-ffi: 'false'
      - name: Restore prod meta-NN.db from R2 (read-only)
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          mkdir -p output/data
          node scripts/factory/r2-workflow-cli.js restore-dir state/vfs-data/ output/data/
      - name: Verify meta-NN.db present
        run: |
          META_COUNT=$(find output/data -name 'meta-*.db' 2>/dev/null | wc -l)
          echo "Restored ${META_COUNT} meta-NN.db shards"
          if [ "$META_COUNT" -lt 1 ]; then
            echo "::error::No meta-NN.db restored from R2 state/vfs-data/. Cannot probe."
            exit 1
          fi
      - name: Run step-0 round-trip probe
        run: node scripts/factory/probe-paper-slugs.js
