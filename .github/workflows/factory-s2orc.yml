# Factory S2ORC — Bulk Paper Fulltext Import
#
# Independent workflow: downloads S2ORC bulk dataset files,
# streams each file, extracts fulltext for papers matching
# our unenriched arXiv IDs, writes to R2.
#
# Trigger: workflow_dispatch only (manual or scheduled)
# Does NOT block Factory 1/4-4/4 or 1.5.

name: Factory — S2ORC Import

permissions:
  actions: write
  contents: read

on:
  workflow_dispatch:
    inputs:
      max_files:
        description: 'Max S2ORC files to process (1-30, each ~6GB)'
        required: false
        default: '10'

concurrency:
  group: factory-s2orc
  cancel-in-progress: false

jobs:
  import:
    name: S2ORC Bulk Import
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci

      - name: Restore Rust FFI Binaries
        uses: actions/cache/restore@v4
        with:
          path: |
            rust/shard-router/shard-router-rust.node
            rust/fni-calc/fni-calc-rust.node
            rust/mesh-engine/mesh-engine-rust.node
            rust/content-extractor/content-extractor-rust.node
            rust/stream-aggregator/stream-aggregator-rust.node
            rust/satellite-tasks/satellite-tasks-rust.node
            rust/r2-engine/r2-engine-rust.node
            rust/markdown-renderer/markdown-renderer-rust.node
          key: rust-ffi-v2-${{ hashFiles('rust/Cargo.toml', 'rust/*/Cargo.toml', 'rust/*/src/**') }}
      - name: R2 Fallback for Rust FFI
        continue-on-error: true
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          FOUND=$(find rust -name '*.node' 2>/dev/null | wc -l)
          [ "$FOUND" -lt 7 ] && node scripts/factory/r2-workflow-cli.js restore-rust-ffi || true

      - name: Restore Dedup Ledger from R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          mkdir -p output/data/dedup
          node scripts/factory/r2-workflow-cli.js restore-dir state/dedup/ output/data/dedup/ || true
          if [ -z "$(ls output/data/dedup/*.db 2>/dev/null)" ]; then
            node scripts/factory/r2-workflow-cli.js restore-file state/dedup.db output/data/dedup.db || true
            [ -f "output/data/dedup.db" ] && node scripts/factory/lib/dedup-manager.js migrate
          fi
          SHARD_COUNT=$(ls output/data/dedup/*.db 2>/dev/null | wc -l)
          echo "✅ Dedup ledger: $SHARD_COUNT shards"

      - name: Run S2ORC Import
        env:
          S2_API_KEY: ${{ secrets.S2_API_KEY }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
          DEDUP_DIR: ./output/data/dedup
          UMID_SALT: ${{ secrets.UMID_SALT }}
          NODE_OPTIONS: '--max-old-space-size=8192'
        run: node scripts/factory/s2orc-importer.js --max-files=${{ inputs.max_files || 10 }}
