# Factory S2ORC — Bulk Paper Fulltext Import (8-worker parallel)
#
# Independent workflow: downloads S2ORC bulk dataset files in parallel,
# streams each file, extracts fulltext for papers matching
# our unenriched arXiv IDs, writes to R2.
#
# Architecture: setup job gets file count → 8 parallel workers split evenly.
# Does NOT block Factory 1/4-4/4 or 1.5.

name: Factory — S2ORC Import

permissions:
  actions: write
  contents: read

on:
  # content-min cut #6 (legal-resilience L1): S2ORC Import is the 2nd
  # full-text-as-asset producer (alongside the 1.5 density-booster, cut #4).
  # Its monthly self-firing cron is removed so it no longer auto-produces
  # paper full text into R2 enrichment/fulltext/. The importer code
  # (scripts/ingestion/s2orc-importer.js) is intentionally left 100% intact
  # for PR-3 to repurpose its S2ORC streaming (bib_entries/references) into
  # real paper->paper CITES. workflow_dispatch is kept so this stays
  # dormant/manual-only rather than deleted.
  workflow_dispatch:

concurrency:
  group: factory-s2orc
  cancel-in-progress: false

jobs:
  setup:
    name: Get File Count
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      total: ${{ steps.count.outputs.total }}
      per_worker: ${{ steps.count.outputs.per_worker }}
    steps:
      - name: Query S2ORC file count
        id: count
        env:
          S2_API_KEY: ${{ secrets.S2_API_KEY }}
        run: |
          for i in 1 2 3; do
            TOTAL=$(curl -sf -H "x-api-key: $S2_API_KEY" \
              "https://api.semanticscholar.org/datasets/v1/release/latest/dataset/s2orc" \
              | jq '.files | length' 2>/dev/null) && break
            echo "Retry $i..." && sleep $((i * 5))
          done
          TOTAL=${TOTAL:-572}
          PER_WORKER=$(( (TOTAL + 7) / 8 ))
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "per_worker=$PER_WORKER" >> $GITHUB_OUTPUT
          echo "S2ORC files: $TOTAL, per worker: $PER_WORKER"

  import:
    name: S2ORC [${{ matrix.worker }}]
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 330
    strategy:
      matrix:
        worker: [0, 1, 2, 3, 4, 5, 6, 7]
      fail-fast: false
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci

      - name: Restore Rust FFI Binaries
        uses: actions/cache/restore@v5
        with:
          path: |
            rust/shard-router/shard-router-rust.node
            rust/fni-calc/fni-calc-rust.node
            rust/content-extractor/content-extractor-rust.node
            rust/stream-aggregator/stream-aggregator-rust.node
            rust/satellite-tasks/satellite-tasks-rust.node
            rust/r2-engine/r2-engine-rust.node
            rust/markdown-renderer/markdown-renderer-rust.node
            rust/ivf-pq/ivf-pq-rust.node
          key: rust-ffi-v3-${{ hashFiles('rust/Cargo.toml', 'rust/*/Cargo.toml', 'rust/*/src/**') }}
      - name: R2 Fallback for Rust FFI
        continue-on-error: true
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          FOUND=$(find rust -name '*.node' 2>/dev/null | wc -l)
          [ "$FOUND" -lt 9 ] && node scripts/factory/r2-workflow-cli.js restore-rust-ffi || true

      - name: Restore Dedup Ledger from R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          mkdir -p output/data/dedup
          node scripts/factory/r2-workflow-cli.js restore-dir state/dedup/ output/data/dedup/ || true
          if [ -z "$(ls output/data/dedup/*.db 2>/dev/null)" ]; then
            node scripts/factory/r2-workflow-cli.js restore-file state/dedup.db output/data/dedup.db || true
            [ -f "output/data/dedup.db" ] && node scripts/factory/lib/dedup-manager.js migrate
          fi

      - name: Run S2ORC Import [Worker ${{ matrix.worker }}]
        env:
          S2_API_KEY: ${{ secrets.S2_API_KEY }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
          DEDUP_DIR: ./output/data/dedup
          NODE_OPTIONS: '--max-old-space-size=8192'
        run: |
          PER=${{ needs.setup.outputs.per_worker }}
          START=$(( ${{ matrix.worker }} * PER ))
          END=$(( START + PER - 1 ))
          TOTAL=${{ needs.setup.outputs.total }}
          [ $END -ge $TOTAL ] && END=$(( TOTAL - 1 ))
          echo "Worker ${{ matrix.worker }}: files $START-$END"
          node scripts/factory/s2orc-importer.js --file-start=$START --file-end=$END
