name: Rust FFI Build
on:
  push:
    paths:
      - 'rust/**'
      - '.github/workflows/rust-build.yml'
  workflow_dispatch:

concurrency:
  group: rust-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Rust N-API Modules
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        crate:
          - shard-router
          - fni-calc
          - mesh-engine
          - content-extractor
          - stream-aggregator
          - satellite-tasks
          - r2-engine

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Cargo Registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: rust-${{ matrix.crate }}-${{ hashFiles('rust/Cargo.toml', 'rust/*/Cargo.toml') }}
          restore-keys: |
            rust-${{ matrix.crate }}-

      - name: Install napi-cli
        run: npm install -g @napi-rs/cli

      - name: Build ${{ matrix.crate }}
        working-directory: rust/${{ matrix.crate }}
        run: |
          napi build --release --platform
          # Rename platform-suffixed .node to generic name for rust-bridge.js
          for f in *.node; do
            generic="${{ matrix.crate }}-rust.node"
            if [ "$f" != "$generic" ]; then
              cp "$f" "$generic"
              echo "Renamed $f -> $generic"
            fi
          done

      - name: Upload .node Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.crate }}-rust-node
          path: rust/${{ matrix.crate }}/${{ matrix.crate }}-rust.node
          retention-days: 30

  verify:
    name: Verify N-API Bindings
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: rust/artifacts

      - name: Place .node Files
        run: |
          for crate in shard-router fni-calc mesh-engine content-extractor stream-aggregator satellite-tasks r2-engine; do
            cp rust/artifacts/${crate}-rust-node/*.node rust/${crate}/ 2>/dev/null || true
          done
          ls -la rust/*/*.node 2>/dev/null || echo "No .node files found"

      - name: Smoke Test
        run: |
          node -e "
            const { createRequire } = require('module');
            const path = require('path');
            const req = createRequire(path.resolve(process.cwd(), 'package.json'));
            const crates = ['shard-router', 'fni-calc', 'mesh-engine', 'content-extractor', 'stream-aggregator', 'satellite-tasks', 'r2-engine'];
            let loaded = 0;
            for (const c of crates) {
              try {
                const mod = req('./rust/' + c + '/' + c + '-rust.node');
                console.log(c + ': loaded');
                loaded++;
              } catch (e) {
                console.log(c + ': not available (' + e.message.slice(0,50) + ')');
              }
            }
            console.log('Loaded: ' + loaded + '/' + crates.length);
            if (loaded === 0) process.exit(1);
          "

      # V25.8.3: Persist .node binaries to GHA Cache for downstream workflows
      - name: Save Rust Binaries to Cache
        uses: actions/cache/save@v4
        with:
          path: |
            rust/shard-router/shard-router-rust.node
            rust/fni-calc/fni-calc-rust.node
            rust/mesh-engine/mesh-engine-rust.node
            rust/content-extractor/content-extractor-rust.node
            rust/stream-aggregator/stream-aggregator-rust.node
            rust/satellite-tasks/satellite-tasks-rust.node
            rust/r2-engine/r2-engine-rust.node
          key: rust-ffi-binaries-${{ hashFiles('rust/Cargo.toml', 'rust/*/Cargo.toml', 'rust/*/src/**') }}

      # V25.8 §6.2: Backup Rust FFI to R2 vault (immutable, survives GHA cache eviction)
      - name: Backup Rust FFI to R2
        continue-on-error: true
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          node --input-type=module -e "
            import { backupFileToR2 } from './scripts/factory/lib/r2-handoff.js';
            const crates = ['shard-router','fni-calc','mesh-engine','content-extractor','stream-aggregator','satellite-tasks','r2-engine'];
            for (const c of crates) {
              const local = 'rust/' + c + '/' + c + '-rust.node';
              const r2Key = 'vault/rust-ffi/' + c + '-rust.node';
              await backupFileToR2(local, r2Key, { minSize: 1024 });
            }
            console.log('✅ Rust FFI binaries backed up to R2 vault');
          "
