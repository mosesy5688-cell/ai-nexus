name: Rust FFI Build
on:
  push:
    paths:
      - 'rust/**'
      - '.github/workflows/rust-build.yml'
  workflow_dispatch:

concurrency:
  group: rust-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Rust N-API Modules
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        crate:
          - shard-router
          - fni-calc
          - content-extractor
          - stream-aggregator
          - satellite-tasks
          - r2-engine
          - markdown-renderer
          - ivf-pq
          - identity-cluster

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      # V28: cache ONLY content-addressed dependency dirs, NOT rust/target.
      # Caching compiled output (rust/target) under a prefix restore-key let a
      # changed-source build restore a previous build's target, so `napi build`
      # saw it as up-to-date, emitted ZERO Compiling lines, and re-published the
      # STALE .node (the #2144 EVALUATED_ON=0 silent-strip; same class as V27.44).
      # Dropping rust/target forces a real compile every run (deps stay cached, so
      # it's compile-only); the `-v2` key namespace busts the poisoned caches.
      - name: Cache Cargo Registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-v2-${{ matrix.crate }}-${{ hashFiles('rust/Cargo.toml', 'rust/*/Cargo.toml', 'rust/*/src/**') }}
          restore-keys: |
            rust-v2-${{ matrix.crate }}-

      - name: Install napi-cli
        run: npm install -g @napi-rs/cli

      - name: Build ${{ matrix.crate }}
        working-directory: rust/${{ matrix.crate }}
        run: |
          napi build --release --platform
          # Rename platform-suffixed .node to generic name for rust-bridge.js
          for f in *.node; do
            generic="${{ matrix.crate }}-rust.node"
            if [ "$f" != "$generic" ]; then
              cp "$f" "$generic"
              echo "Renamed $f -> $generic"
            fi
          done

      # identity-cluster ships its 6 PR-C2 acceptance gates as `cargo test`
      # (no-global-id-map / max-pass cap / partition-skew / memory-slope / real
      # streaming reader / scope). The repo-wide convention is napi-build-only
      # (the #2132/#2136 lesson noted at the verify job), so a Rust #[test] suite
      # is normally NOT a CI gate. This crate is bake-PRODUCER-only with no JS
      # parity oracle, so its structural gates can ONLY be enforced by running the
      # tests here — make it the explicit gate for this one crate.
      - name: Cargo Test (identity-cluster gates)
        if: matrix.crate == 'identity-cluster'
        working-directory: rust/identity-cluster
        run: cargo test --release

      # D-375 NOTE: satellite-tasks alt_linker PRODUCER_OMIT_ZERO_RELATION_FRAME is NOT
      # gated via `cargo test` here. A standalone cargo-test executable for this napi
      # crate does not link on Linux (undefined napi_* runtime symbols — provided only by
      # the node host when the .node is loaded, e.g. napi_throw / threadsafe-function).
      # The omit is CI-enforced on the REAL built .node by the "Alt-Linker Omit NAPI
      # Binding Gate" in the verify job below (scripts/factory/verify-alt-omit-binding.mjs),
      # which is stronger than cargo test (real .node, real NAPI boundary, both paths).
      - name: Upload .node Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.crate }}-rust-node
          path: rust/${{ matrix.crate }}/${{ matrix.crate }}-rust.node
          retention-days: 30

  verify:
    name: Verify N-API Bindings
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Download All Artifacts
        uses: actions/download-artifact@v7
        with:
          path: rust/artifacts

      - name: Place .node Files
        run: |
          for crate in shard-router fni-calc content-extractor stream-aggregator satellite-tasks r2-engine markdown-renderer ivf-pq identity-cluster; do
            cp rust/artifacts/${crate}-rust-node/*.node rust/${crate}/ 2>/dev/null || true
          done
          ls -la rust/*/*.node 2>/dev/null || echo "No .node files found"

      - name: Smoke Test
        run: |
          node -e "
            const { createRequire } = require('module');
            const path = require('path');
            const req = createRequire(path.resolve(process.cwd(), 'package.json'));
            const crates = ['shard-router', 'fni-calc', 'content-extractor', 'stream-aggregator', 'satellite-tasks', 'r2-engine', 'markdown-renderer', 'ivf-pq', 'identity-cluster'];
            let loaded = 0;
            for (const c of crates) {
              try {
                const mod = req('./rust/' + c + '/' + c + '-rust.node');
                const fns = Object.keys(mod).join(', ');
                console.log(c + ': loaded [' + fns + ']');
                loaded++;
              } catch (e) {
                console.log(c + ': not available (' + e.message.slice(0,50) + ')');
              }
            }
            console.log('Loaded: ' + loaded + '/' + crates.length);
            if (loaded === 0) process.exit(1);
            // V26.5: Verify critical FFI functions exist
            const sa = req('./rust/stream-aggregator/stream-aggregator-rust.node');
            const required = ['streamAggregate', 'fuseShard', 'zstdCompressBuffer', 'zstdDecompressBuffer'];
            const missing = required.filter(f => typeof sa[f] !== 'function');
            if (missing.length > 0) { console.error('FATAL: stream-aggregator missing: ' + missing.join(', ')); process.exit(1); }
            console.log('stream-aggregator: all critical functions verified');
            // Ticket#1: ivf-pq crate critical FFI surface must exist (bake producer + parity oracle).
            // Hard-fail here guarantees the .node is loaded before the parity gate below
            // (the parity script silently degrades to JS-only if the .node is absent).
            const ivf = req('./rust/ivf-pq/ivf-pq-rust.node');
            const ivfReq = ['trainKmeans', 'trainPqCodebook', 'assignCentroids', 'pqEncode', 'adcLut', 'adcScore', 'cosineF32Int8'];
            const ivfMissing = ivfReq.filter(f => typeof ivf[f] !== 'function');
            if (ivfMissing.length > 0) { console.error('FATAL: ivf-pq missing: ' + ivfMissing.join(', ')); process.exit(1); }
            console.log('ivf-pq: all critical functions verified');
            // PR-C2: identity-cluster crate must expose the 4/4-bake caller surface.
            // Hard-fail guarantees the .node carrying buildIdentityClusters is the
            // one shipped to deploy (the bake step below loads exactly this binary).
            const idc = req('./rust/identity-cluster/identity-cluster-rust.node');
            if (typeof idc.buildIdentityClusters !== 'function') { console.error('FATAL: identity-cluster missing: buildIdentityClusters'); process.exit(1); }
            console.log('identity-cluster: buildIdentityClusters verified');
          "

      # W3-O1 (Founder D-94): prove the per-drop parse-accounting NAPI contract on
      # the SAME final-head Linux .node this run just built+placed. The verifier
      # loads rust/stream-aggregator/stream-aggregator-rust.node, runs the REAL
      # fuseShard on a crafted one-offset-boundary-drop NXVF shard, and asserts the
      # protocol==1 / dropRecords-array / length===droppedEntityCount / null-
      # fingerprint / conservation contract. The ls -la prints the exact file from
      # THIS run's "Place .node Files" (proves same-run/same-SHA, not an npm/cache/
      # main artifact). Non-zero exit fails this job (no suppression); exit 2 (.node
      # absent) cannot occur here because "Place .node Files" ran above.
      - name: W3-O1 Parse-Accounting NAPI Binding Gate
        run: |
          ls -la rust/stream-aggregator/stream-aggregator-rust.node
          node scripts/factory/verify-parse-accounting-binding.mjs

      # D-375: prove the alt-linker PRODUCER_OMIT_ZERO_RELATION_FRAME contract on the
      # SAME final-head Linux satellite-tasks.node this run built+placed. The verifier
      # runs the REAL computeAltRelations + computeAltRelationsFromDir over a fixture
      # with a zero-relation category and asserts the empty frame is OMITTED while the
      # census still records it. The ls -la prints the exact same-run/same-SHA .node.
      - name: Alt-Linker Omit NAPI Binding Gate
        run: |
          ls -la rust/satellite-tasks/satellite-tasks-rust.node
          node scripts/factory/verify-alt-omit-binding.mjs

      - name: IVF-PQ Rust-JS Parity Gate
        # CI runs `napi build`, NOT `cargo test`, so the Rust #[test] suite is not a
        # gate (#2132/#2136 lesson). This node step IS the Rust==JS lockstep gate.
        # The .node is guaranteed present by the ivf-pq smoke check above.
        run: node scripts/factory/verify-ivf-pq-parity.mjs

      # V25.8.3: Persist .node binaries to GHA Cache for downstream workflows
      - name: Save Rust Binaries to Cache
        uses: actions/cache/save@v5
        with:
          path: |
            rust/shard-router/shard-router-rust.node
            rust/fni-calc/fni-calc-rust.node
            rust/content-extractor/content-extractor-rust.node
            rust/stream-aggregator/stream-aggregator-rust.node
            rust/satellite-tasks/satellite-tasks-rust.node
            rust/r2-engine/r2-engine-rust.node
            rust/markdown-renderer/markdown-renderer-rust.node
            rust/ivf-pq/ivf-pq-rust.node
            rust/identity-cluster/identity-cluster-rust.node
          key: rust-ffi-v3-${{ hashFiles('rust/Cargo.toml', 'rust/*/Cargo.toml', 'rust/*/src/**') }}

      # V25.8 §6.2: Backup Rust FFI to R2 vault (immutable, survives GHA cache eviction)
      # D-375: main-only. Feature-branch builds must NOT write the durable R2 vault.
      - name: Backup Rust FFI to R2
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ai-nexus-assets
        run: |
          node scripts/factory/r2-workflow-cli.js backup-rust-ffi
